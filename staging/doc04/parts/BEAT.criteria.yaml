# ── AC-BEAT-005: heartbeat fires every HEARTBEAT_S seconds (timing) ───────────

- criterion_id: AC-BEAT-005
  name: "Heartbeat task fires approximately every HEARTBEAT_S=10 seconds"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-05]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A running with_operation_run context with a mock pool that records UPDATE invocations;
      asyncio time is controlled (event-loop clock or monkeypatched sleep).
    when: "30 seconds of simulated time elapse"
    then:
      - "The heartbeat UPDATE is called approximately 3 times (once per 10s: at t≈10, t≈20, t≈30)"
      - "No heartbeat fires before the first HEARTBEAT_S sleep completes (delay-first pattern)"
      - "The beat count is in [2, 4] for a 30-second window (allowing 1 jitter either direction)"
  primary_oracle:
    type: deterministic
    artifact: >
      unit test with controlled event loop: count mock pool.execute calls matching
      the heartbeat UPDATE signature; assert 2 <= count <= 4 after 30s of simulated time
  thresholds:
    beats_missing_in_30s_window: 0
    extra_beats_in_30s_window: 1
  fault_model_refs: []
  test_ids: [T-BEAT-005]
  dependency_class: null
  mock_boundary: "no external Postgres; mock pool recording execute() calls"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ── AC-BEAT-006: heartbeat UPDATE SQL uses WHERE id=$1 AND status='running' ───

- criterion_id: AC-BEAT-006
  name: "Heartbeat UPDATE SQL includes WHERE id=$1 AND status='running' (not unconditional)"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-07]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A real Postgres database with a running with_operation_run context;
      the operation_runs row has status='running'.
    when: "The heartbeat fires and issues the UPDATE"
    then:
      - "The UPDATE statement text contains both \"id=$1\" and \"status='running'\" in the WHERE clause"
      - "The UPDATE does NOT use an unconditional WHERE id=$1 clause alone"
      - "last_heartbeat_at is updated to approximately NOW() on success"
  primary_oracle:
    type: deterministic
    artifact: >
      pg_stat_activity or statement log capturing the UPDATE during heartbeat window;
      assert WHERE clause contains both id=$1 predicate AND status='running' predicate;
      assert last_heartbeat_at updated
  thresholds:
    unconditional_updates_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-006]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool — real SQL execution needed to verify WHERE clause semantics"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-BEAT-006-NEG
  name: "NEG: heartbeat UPDATE rowcount is 0 when status is not 'running' (fencing precondition)"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-07, R-doc04-BEAT-08]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A real Postgres database where the operation_runs row for run_id has been
      externally flipped to status='interrupted' (simulating a reaper acting on it).
    when: "The heartbeat fires and issues UPDATE ... WHERE id=$1 AND status='running'"
    then:
      - "The UPDATE returns rowcount 0 (the WHERE predicate fails because status != 'running')"
      - "last_heartbeat_at is NOT updated"
      - "The rowcount-0 path triggers the fencing response (is_owner=False, self-terminate)"
  primary_oracle:
    type: deterministic
    artifact: >
      real Postgres: UPDATE externally sets status='interrupted'; trigger next heartbeat;
      assert pool.execute result ends with ' 0'; assert last_heartbeat_at unchanged;
      assert op.is_owner == False after the heartbeat completes
  thresholds:
    fencing_misses_on_interrupted_row: 0
  fault_model_refs: []
  test_ids: [T-BEAT-006-NEG]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-BEAT-007: rowcount 0 → is_owner=False + WARNING log + heartbeat exits ──

- criterion_id: AC-BEAT-007
  name: "Heartbeat rowcount 0 sets is_owner=False, logs WARNING with meeting_id, self-terminates"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-08]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A with_operation_run context where the operation_runs row has been externally
      set to status='interrupted' before the next heartbeat fires.
    when: "The heartbeat executes and the UPDATE returns rowcount 0"
    then:
      - "op.is_owner is set to False"
      - "A WARNING-level log message is emitted containing 'fenced out' and the meeting_id"
      - "The _heartbeat coroutine returns (self-terminates) immediately after setting is_owner=False"
      - "No further heartbeat UPDATEs are issued after the fencing event"
  primary_oracle:
    type: deterministic
    artifact: >
      caplog + asyncio task state: assert op.is_owner == False;
      assert WARNING log captured with 'fenced out' and meeting_id strings;
      assert _heartbeat task finishes (not cancelled — returns naturally);
      assert no subsequent pool.execute calls matching heartbeat UPDATE pattern
  thresholds:
    fencing_failures_allowed: 0
    post_fence_updates_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-007]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-BEAT-007-NEG
  name: "NEG: a fenced-out harness emits NO further speak/send_chat/apply/dispatch calls"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-08, R-doc04-BEAT-20]
  criticality: P0
  blocking: true
  behavior:
    given: "A with_operation_run context where is_owner has been set to False (fencing has occurred)"
    when: "The harness business logic attempts to call speak, send_chat, apply, or dispatch"
    then:
      - "Each side-effect call is blocked by the is_owner guard before execution"
      - "No speak output is delivered"
      - "No send_chat message is sent"
      - "No apply or dispatch call reaches the subsystem"
      - "The fenced harness produces zero externally-observable side-effects"
  primary_oracle:
    type: deterministic
    artifact: >
      unit test: set op.is_owner = False; invoke each side-effect wrapper;
      assert zero external calls in mock stubs for speak/send_chat/apply/dispatch
  thresholds:
    side_effects_after_fence_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-007-NEG]
  dependency_class: null
  mock_boundary: "no external boundary; mock stubs for side-effect functions; is_owner set directly"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-BEAT-008: activity.bump() called on each SUCCESSFUL heartbeat ──────────

- criterion_id: AC-BEAT-008
  name: "activity.bump(meeting_id) is called after each successful heartbeat UPDATE (rowcount > 0)"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-09]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A with_operation_run context with a mock pool that returns rowcount > 0 for
      the heartbeat UPDATE; activity is a mock/spy object.
    when: "Three heartbeat cycles fire successfully"
    then:
      - "activity.bump(meeting_id) is called exactly 3 times"
      - "Each call receives the correct meeting_id argument"
      - "activity.bump() is called after the UPDATE, not before"
  primary_oracle:
    type: deterministic
    artifact: >
      spy on activity.bump; assert call_count == 3 after 3 successful heartbeat cycles;
      assert all calls receive meeting_id as argument
  thresholds:
    bump_calls_missing_per_successful_beat: 0
    bump_calls_with_wrong_meeting_id: 0
  fault_model_refs: []
  test_ids: [T-BEAT-008]
  dependency_class: null
  mock_boundary: "no external boundary; mock pool returning rowcount > 0; spy on activity.bump"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-BEAT-008-NEG
  name: "NEG: activity.bump() is NOT called when heartbeat UPDATE returns rowcount 0 (fenced)"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-09, R-doc04-BEAT-08]
  criticality: P1
  blocking: true
  behavior:
    given: "A with_operation_run context with a mock pool returning rowcount 0 for the heartbeat UPDATE"
    when: "The heartbeat fires and the UPDATE returns rowcount 0"
    then:
      - "activity.bump() is NOT called"
      - "op.is_owner is set to False"
      - "The heartbeat self-terminates without bumping activity"
  primary_oracle:
    type: deterministic
    artifact: >
      spy on activity.bump; assert call_count == 0 after fenced heartbeat cycle;
      assert op.is_owner == False
  thresholds:
    bump_calls_after_fence_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-008-NEG]
  dependency_class: null
  mock_boundary: "no external boundary; mock pool returning rowcount 0; spy on activity.bump"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-BEAT-009: heartbeat exception — log ERROR, loop continues ───────────────

- criterion_id: AC-BEAT-009
  name: "Transient heartbeat exception logs ERROR at run_id level and loop continues"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-10]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A with_operation_run context where the mock pool raises asyncpg.PostgresConnectionError
      on the first heartbeat UPDATE, then succeeds on the second.
    when: "Two heartbeat cycles fire"
    then:
      - "The first heartbeat raises an exception; an ERROR-level log is emitted containing the run_id"
      - "The heartbeat loop does NOT exit after the transient failure"
      - "The second heartbeat fires normally and succeeds"
      - "op.is_owner remains True (no fencing triggered by exception alone)"
  primary_oracle:
    type: deterministic
    artifact: >
      caplog: assert ERROR log with run_id on first cycle;
      assert second heartbeat UPDATE called (spy on pool.execute);
      assert op.is_owner == True after two cycles
  thresholds:
    loop_exits_on_transient_error_allowed: 0
    is_owner_false_on_transient_error_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-009]
  dependency_class: null
  mock_boundary: "no external boundary; mock pool raising then succeeding; caplog captured"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ── AC-BEAT-010: normal exit → status='completed', completed_at set ───────────

- criterion_id: AC-BEAT-010
  name: "Normal exit from with_operation_run body sets status='completed' and completed_at in Postgres"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-11]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A real Postgres database with a pre-created operation_runs row (status='running');
      with_operation_run is entered and the body completes without raising.
    when: "The with_operation_run context exits normally"
    then:
      - "The operation_runs row for run_id has status='completed'"
      - "completed_at is set to a non-NULL timestamp close to the exit time"
      - "The status UPDATE occurs BEFORE hb.cancel() (terminal status written before heartbeat stops)"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT status, completed_at FROM operation_runs WHERE id=$1 after normal exit;
      assert status == 'completed' AND completed_at IS NOT NULL AND
      completed_at >= test_start_time
  thresholds:
    wrong_terminal_status_allowed: 0
    null_completed_at_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-010]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-BEAT-010-NEG
  name: "NEG: exception in with_operation_run body does NOT leave status='running'"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-11, R-doc04-BEAT-12]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A real Postgres database with a pre-created operation_runs row (status='running');
      with_operation_run is entered and the body raises RuntimeError.
    when: "The with_operation_run context exits via exception"
    then:
      - "The operation_runs row does NOT have status='running' after the exception"
      - "The status is 'failed' (not 'running', not 'completed', not 'interrupted')"
      - "The exception propagates to the caller (re-raised)"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT status FROM operation_runs WHERE id=$1 after exception exit;
      assert status == 'failed' AND status != 'running';
      assert RuntimeError re-raised to caller
  thresholds:
    running_status_after_exception_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-010-NEG]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

