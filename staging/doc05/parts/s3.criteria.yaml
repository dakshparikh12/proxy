# Doc 05 (Workroom) — S3 acceptance criteria slice
# Coverage: §3.1 (Sessions & sandbox), §3.2 (Models), §3.3 (Native vs built)
# ID scheme: AC-S3-NNN  (NEG pairs: AC-S3-NNN-NEG)
#
# dependency_class values:
#   null              — pure structural / static analysis; zero external systems
#   db:postgres       — depends on real Postgres (operation_runs table)
#   vendor:claude-sdk — depends on actual SDK behavior (session ids, resume)
#
# NEG-pair rule: every non-null dependency_class criterion has a paired AC-S3-NNN-NEG.
# db:postgres criteria carry {tier: integration} + NEG pair.
# vendor:claude-sdk criteria carry {tier: reality} + NEG pair.
# golden_path: true criteria carry {tier: e2e}.

# ═══════════════════════════════════════════════════════════════════════════
# §3.1 — Task durability: operation_runs row only
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-001
  name: "Task persisted as operation_runs row with workroom operation_type"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S3-01]
  criticality: P0
  blocking: true
  behavior:
    given: "A workroom task is submitted for an active meeting"
    when: "The task is created by the workroom service"
    then:
      - "An operation_runs row exists with operation_type matching 'workroom:<id>'"
      - "The row's progress jsonb contains the full task bundle"
      - "No row exists in any table named workroom_tasks"
  primary_oracle:
    type: deterministic
    artifact: "SELECT count(*) FROM operation_runs WHERE operation_type LIKE 'workroom:%' asserts 1; information_schema.tables asserts no workroom_tasks table exists"
  thresholds: {task_rows_in_workroom_tasks: 0, missing_operation_runs_row: 0}
  dependency_class: db:postgres
  mock_boundary: "Postgres replaced by in-memory SQLite fixture with matching schema"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S3-001]

- criterion_id: AC-S3-001-NEG
  name: "NEG: Task row absent from operation_runs when workroom service skips persistence"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S3-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The workroom service's persistence call is patched to no-op"
    when: "A task is submitted"
    then:
      - "The integration test detects zero matching operation_runs rows"
      - "This confirms the positive test relies on real persistence, not a side-channel"
  primary_oracle:
    type: deterministic
    artifact: "Asserts operation_runs count == 0 when persistence is stubbed out"
  thresholds: {}
  dependency_class: db:postgres
  mock_boundary: "Postgres replaced by in-memory SQLite fixture; persistence call monkey-patched"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S3-001-NEG]

- criterion_id: AC-S3-002
  name: "Terminal Envelope stored in result_ref of the operation_runs row"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S3-01]
  criticality: P0
  blocking: true
  behavior:
    given: "A workroom task completes (success or error)"
    when: "The task terminal state is written"
    then:
      - "The operation_runs row for the task has a non-null result_ref"
      - "result_ref deserializes to a valid Envelope object matching the terminal output"
  primary_oracle:
    type: deterministic
    artifact: "SELECT result_ref FROM operation_runs WHERE operation_type='workroom:<id>' asserts non-null and valid Envelope JSON"
  thresholds: {missing_result_ref: 0}
  dependency_class: db:postgres
  mock_boundary: "Postgres replaced by in-memory SQLite fixture"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S3-002]

- criterion_id: AC-S3-002-NEG
  name: "NEG: result_ref absent when terminal write is bypassed"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S3-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The terminal write path is patched to skip result_ref assignment"
    when: "Task completion fires"
    then:
      - "result_ref remains null in the operation_runs row"
      - "Confirms the positive test exercises the real write path"
  primary_oracle:
    type: deterministic
    artifact: "Asserts result_ref IS NULL when write is stubbed"
  thresholds: {}
  dependency_class: db:postgres
  mock_boundary: "Postgres replaced by in-memory SQLite fixture; terminal write monkey-patched"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S3-002-NEG]

# ═══════════════════════════════════════════════════════════════════════════
# §3.1 — Semaphore [3-5] on sandbox sessions per meeting
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-003
  name: "Concurrent task sessions per meeting capped at semaphore upper bound"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S3-02]
  criticality: P0
  blocking: true
  behavior:
    given: "A meeting sandbox with semaphore limit N (N in [3,5]) and N already-active sessions"
    when: "An (N+1)th task session is requested"
    then:
      - "The (N+1)th session acquisition blocks (or returns a capacity-exceeded signal) until one slot is released"
      - "At no point are more than N sessions simultaneously active for the same meeting"
  primary_oracle:
    type: deterministic
    artifact: "Unit test drives N+1 concurrent coroutines against the semaphore; asserts max_concurrent observed == N"
  thresholds: {sessions_exceeding_cap: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S3-003]

# ═══════════════════════════════════════════════════════════════════════════
# §3.1 — Cached prefix: new task pays only its bundle
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-004
  name: "New task session reuses cached prefix; input tokens charged only for bundle delta"
  evidence_class: "[reality]"
  authority_refs: [R-doc05-S3-03]
  criticality: P1
  blocking: false
  behavior:
    given: "A warm sandbox whose prefix (system prompt + map) has been established"
    when: "A second task session is started against the same sandbox"
    then:
      - "The SDK reports cache_read_input_tokens > 0 for the prefix portion"
      - "The incremental input tokens billed match only the new task bundle size, not the full prefix"
  primary_oracle:
    type: deterministic
    artifact: "SDK usage response: cache_read_input_tokens asserted > 0; incremental tokens asserted < full_prefix_tokens + bundle_tokens"
  thresholds: {cache_miss_on_warm_prefix: 0}
  dependency_class: vendor:claude-sdk
  mock_boundary: "SDK replaced by recorded-response fixture with preset usage fields"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S3-004]

- criterion_id: AC-S3-004-NEG
  name: "NEG: Cold sandbox charges full prefix tokens (no cache hit)"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S3-03]
  criticality: P1
  blocking: false
  behavior:
    given: "A fresh sandbox with no prior prefix established"
    when: "A task session is started"
    then:
      - "cache_read_input_tokens == 0 in the SDK usage response"
      - "Confirms the positive test's cache hit is driven by real prefix caching, not a fixture artefact"
  primary_oracle:
    type: deterministic
    artifact: "Asserts cache_read_input_tokens == 0 against cold-sandbox SDK fixture"
  thresholds: {}
  dependency_class: vendor:claude-sdk
  mock_boundary: "SDK replaced by cold-sandbox recorded-response fixture"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S3-004-NEG]

# ═══════════════════════════════════════════════════════════════════════════
# §3.1 — Shared sandbox filesystem: follow-ups see prior artifacts
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-005
  name: "Follow-up task session observes artifacts written by prior session in same sandbox"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S3-04]
  criticality: P1
  blocking: true
  behavior:
    given: "Session A has written a file to the sandbox filesystem and completed"
    when: "Session B starts in the same sandbox for the same meeting"
    then:
      - "Session B can read the file written by Session A without errors"
      - "File content matches what Session A wrote"
  primary_oracle:
    type: deterministic
    artifact: "Integration test: Session A writes sentinel file; Session B reads it; asserts content equality"
  thresholds: {artifact_visibility_failures: 0}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Sandbox filesystem simulated via shared tmpdir; SDK session mocked"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
    - {tier: e2e}
  test_ids: [T-S3-005]

- criterion_id: AC-S3-005-NEG
  name: "NEG: Isolated sandboxes do not share artifacts across meetings"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S3-04]
  criticality: P0
  blocking: true
  behavior:
    given: "Session A for meeting M1 writes a file; Session B is for a different meeting M2"
    when: "Session B attempts to read Session A's file"
    then:
      - "Session B cannot see the file (file not found or empty directory)"
      - "Confirms per-meeting sandbox isolation is enforced"
  primary_oracle:
    type: deterministic
    artifact: "Asserts file from M1 sandbox is absent in M2 sandbox tmpdir"
  thresholds: {cross_meeting_artifact_leaks: 0}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Two separate tmpdir fixtures, one per meeting; SDK session mocked"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S3-005-NEG]

