# FLOW.criteria.yaml — Doc 04 (Proxy Orchestrator) — §1 (End Goal) + §2 (Design) + The Reactive Flow
# Acceptance criteria. ID scheme: AC-FLOW-NNN (NEG pairs: AC-FLOW-NNN-NEG).
# authority_refs point at R-doc04-FLOW-NN in FLOW.requirements.yaml.
#
# dependency_class conventions:
#   null          → pure in-process logic; ladder: [lint, unit]
#   vendor:*      → cassette-backed; ladder: [lint, unit, reality]; MUST have NEG pair
#   db:postgres   → real Postgres; ladder: [lint, unit, integration]; MUST have NEG pair
#   fs:git        → git clone; ladder: [lint, unit, integration]; MUST have NEG pair
#
# golden_path: true on 3 criteria (ask→ack→answer direct, ask→ack→dispatch→result workroom, parallel no-collision)

# ─────────────────────────────────────────────────────────────────────────────
# DYNAMISM GUARANTEE — no branching on event_type in harness code
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-001
  name: "No if/elif/switch on event_type anywhere in orchestrator harness code"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-FLOW-02]
  criticality: P0
  blocking: true
  behavior:
    given: "The orchestrator harness source files are statically analysed"
    when: "An AST or grep scan is run over the harness package for branching constructs conditioned on event_type"
    then:
      - "Zero matches for if/elif/switch/match constructs whose condition references event_type or an equivalent event-kind discriminator"
      - "The scan covers all .py files under the orchestrator harness package"
  primary_oracle:
    type: static_analysis
    artifact: "AST-level lint rule (libs.lint.naming or equivalent) that fails on event_type branch patterns; zero violations"
  thresholds:
    event_type_branches_allowed: 0
  fault_model_refs: [F-HARDCODED-ROUTING]
  test_ids: [T-FLOW-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-FLOW-001-B
  name: "New tool + BehaviorConfig constant is the ONLY mechanism to add routing capability"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-FLOW-02]
  criticality: P0
  blocking: true
  behavior:
    given: "A simulated new capability is added by registering a new tool and a BehaviorConfig constant"
    when: "The orchestrator harness is exercised with an event that maps to the new capability"
    then:
      - "The agent selects the new tool via model judgment without any new code branch in the harness"
      - "No harness file was modified to wire the new capability"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: add mock tool + BehaviorConfig; send novel event; assert harness code diff == 0 lines changed"
  thresholds:
    harness_lines_changed_for_new_capability: 0
  fault_model_refs: [F-HARDCODED-ROUTING]
  test_ids: [T-FLOW-001-B]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ─────────────────────────────────────────────────────────────────────────────
# ACK REFLEX — 0.5s canned "on it"
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-002
  name: "Canned 'on it' ack fires within 0.5s of confirmed address (reflex, not agent)"
  evidence_class: "[latency]"
  authority_refs: [R-doc04-FLOW-03, R-doc04-FLOW-13]
  criticality: P0
  blocking: true
  behavior:
    given: "The orchestrator is running and the audio pipeline is active"
    when: "A confirmed address to Proxy is detected by the STT/address-detection layer"
    then:
      - "The 'on it' ack is emitted within 500ms of the confirmed-address timestamp"
      - "The ack fires from the reflex layer, before the agent wake turn completes"
      - "The ack text is the canned phrase, not a model-generated response"
  primary_oracle:
    type: latency_measurement
    artifact: "Timestamp delta between confirmed-address event and ack-emitted event; assert delta <= 500ms; ack content matches canned string"
  thresholds:
    ack_latency_ms: 500
    violations_allowed: 0
  fault_model_refs: [F-ACK-LATE, F-ACK-FROM-AGENT]
  test_ids: [T-FLOW-002]
  dependency_class: vendor:assemblyai
  mock_boundary: "AssemblyAI STT cassette; confirmed-address detection is replayed from cassette"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}

- criterion_id: AC-FLOW-002-NEG
  name: "NEG: Ack DOES NOT arrive after 0.5s or from within agent wake turn"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-03, R-doc04-FLOW-13]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched reflex layer that delays ack emission by 600ms OR routes ack through the agent"
    when: "A confirmed address is detected"
    then:
      - "The latency test detects the violation (>500ms or agent-generated) and fails"
      - "This confirms the production reflex path is genuinely sub-500ms and pre-agent"
  primary_oracle:
    type: deterministic
    artifact: "Latency probe catches >500ms; content-source check catches model-generated text"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-ACK-LATE]
  test_ids: [T-FLOW-002-NEG]
  dependency_class: vendor:assemblyai
  mock_boundary: "AssemblyAI STT cassette; patched reflex layer introduces artificial delay"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# DIRECT ANSWER PATH — wake turn, code_intel only, no E2B, no Workroom
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-003
  name: "Direct answer path uses only code_intel tools — no E2B, no Workroom session opened"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-FLOW-04, R-doc04-FLOW-14]
  criticality: P0
  blocking: true
  behavior:
    given: "Proxy is running with mounted code_intel tools and a mock code_intel internal API"
    when: "A simple grounded lookup ask is confirmed (e.g., 'Proxy, where is the auth handler?')"
    then:
      - "The agent wake turn calls only code_intel tool(s) against the host-side internal API"
      - "No E2B sandbox is opened or invoked"
      - "No Workroom session (dispatch_workroom) is called"
      - "The answer is returned within the single wake turn, approximately 1–2 seconds"
  primary_oracle:
    type: deterministic
    artifact: "Tool-call log from wake turn; assert: code_intel_* calls present; dispatch_workroom absent; e2b calls absent; total elapsed <= 2000ms"
  thresholds:
    e2b_calls_allowed: 0
    workroom_dispatch_calls_allowed: 0
    wake_turn_latency_ms: 2000
    violations_allowed: 0
  fault_model_refs: [F-DIRECT-HITS-E2B, F-DIRECT-OPENS-WORKROOM]
  test_ids: [T-FLOW-003]
  dependency_class: fs:git
  mock_boundary: "code_intel internal API backed by local git clone; no live LLM needed for tool dispatch assertion"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}

- criterion_id: AC-FLOW-003-NEG
  name: "NEG: Direct path that opens E2B or Workroom is detected and fails"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-04]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched agent that calls dispatch_workroom or an E2B tool on a simple lookup"
    when: "The simple grounded lookup ask is confirmed"
    then:
      - "The tool-call monitor detects dispatch_workroom or e2b call and fails the criterion"
      - "This confirms the production direct path is genuinely E2B/Workroom-free"
  primary_oracle:
    type: deterministic
    artifact: "Tool-call monitor asserts no dispatch_workroom / e2b calls; fails if present"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-DIRECT-HITS-E2B]
  test_ids: [T-FLOW-003-NEG]
  dependency_class: fs:git
  mock_boundary: "code_intel internal API backed by local git clone; patched agent injects forbidden calls"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# WORKROOM DISPATCH PATH — bundle + notes_ref, mutually exclusive with direct
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-004
  name: "Workroom dispatch bundles ask with notes_ref and calls dispatch_workroom"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-FLOW-05, R-doc04-FLOW-14]
  criticality: P0
  blocking: true
  behavior:
    given: "Proxy receives a non-trivial ask (e.g., 'Proxy, refactor the auth module') that is not a simple grounded lookup"
    when: "The agent wake turn executes"
    then:
      - "The agent calls dispatch_workroom(bundle) where bundle contains the ask text and a notes_ref"
      - "No code_intel-only direct answer is produced"
      - "The dispatch call is mutually exclusive with a direct-answer code_intel call for the same ask"
  primary_oracle:
    type: deterministic
    artifact: "Tool-call log; assert dispatch_workroom called with notes_ref field non-null; no code_intel answer emitted for same ask"
  thresholds:
    violations_allowed: 0
    notes_ref_missing_allowed: 0
  fault_model_refs: [F-MISSING-NOTES-REF, F-DUAL-PATH-COLLISION]
  test_ids: [T-FLOW-004]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for notes_ref resolution; workroom endpoint mocked for dispatch receipt"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}

- criterion_id: AC-FLOW-004-NEG
  name: "NEG: dispatch_workroom called without notes_ref is detected and rejected"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched agent that calls dispatch_workroom with notes_ref=None or omitted"
    when: "A non-trivial ask arrives"
    then:
      - "The contract boundary rejects the call or the test harness detects the missing notes_ref"
      - "An error or assertion failure is raised, not a silent dispatch"
  primary_oracle:
    type: deterministic
    artifact: "Contract assertion in dispatch_workroom stub: raises ValueError if notes_ref is absent"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-MISSING-NOTES-REF]
  test_ids: [T-FLOW-004-NEG]
  dependency_class: db:postgres
  mock_boundary: "Postgres for notes lookup; workroom stub enforces notes_ref contract"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# GOLDEN PATH — full reactive flow (direct): ask → ack → answer
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-005
  name: "GOLDEN: Full reactive flow — spoken ask → 0.5s ack → direct answer within ~2s"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-FLOW-03, R-doc04-FLOW-04, R-doc04-FLOW-14]
  criticality: P0
  blocking: true
  behavior:
    given: "A live meeting session with audio pipeline active and code_intel mounted"
    when: "A participant says 'Proxy, where is the auth handler?' (simple grounded lookup)"
    then:
      - "The 'on it' ack is emitted within 500ms of the confirmed address"
      - "The agent wake turn completes with a code_intel tool call (no E2B, no dispatch_workroom)"
      - "The spoken answer is delivered within approximately 2000ms of the confirmed address"
      - "The answer is tagged resolved (not lower-bound) if the result was exactly verified"
      - "No internal component names appear in the spoken output"
  primary_oracle:
    type: latency_measurement
    artifact: "End-to-end timestamp trace: confirmed_address → ack_emitted (≤500ms) → answer_spoken (≤2000ms); tool log shows code_intel only"
  thresholds:
    ack_latency_ms: 500
    answer_latency_ms: 2000
    e2b_calls_allowed: 0
    workroom_dispatch_calls_allowed: 0
    internal_name_leaks_allowed: 0
    violations_allowed: 0
  fault_model_refs: [F-ACK-LATE, F-DIRECT-HITS-E2B, F-NAMING-LEAK]
  test_ids: [T-FLOW-005]
  dependency_class: fs:git
  mock_boundary: "code_intel API backed by local git clone; vendor:assemblyai and vendor:cartesia via cassette"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}

- criterion_id: AC-FLOW-005-NEG
  name: "NEG: Direct-path golden flow fails if ack exceeds 500ms or E2B is touched"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-04]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched environment where ack reflex is delayed to 600ms or E2B is invoked on a simple lookup"
    when: "The golden direct-path flow is exercised"
    then:
      - "The e2e latency probe detects the ack violation (>500ms) and fails"
      - "OR the tool-call monitor detects E2B invocation and fails"
      - "The failure is reported explicitly, not silently ignored"
  primary_oracle:
    type: deterministic
    artifact: "Latency probe + tool-call monitor; either violation causes test failure"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-ACK-LATE, F-DIRECT-HITS-E2B]
  test_ids: [T-FLOW-005-NEG]
  dependency_class: fs:git
  mock_boundary: "code_intel API backed by local git clone; reflex layer patched to inject violation"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# GOLDEN PATH — full reactive flow (workroom): ask → ack → dispatch → result
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-006
  name: "GOLDEN: Full reactive flow — non-trivial ask → ack → workroom dispatch → async result delivery"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-FLOW-05, R-doc04-FLOW-24, R-doc04-FLOW-25]
  criticality: P0
  blocking: true
  behavior:
    given: "A live meeting session with workroom endpoint available and notes substrate connected"
    when: "A participant says 'Proxy, refactor the auth module' (non-trivial, minutes-scale work)"
    then:
      - "The 'on it' ack fires within 500ms of confirmed address"
      - "The agent calls dispatch_workroom(bundle) with notes_ref; no E2B is touched"
      - "An async-etiquette message is spoken (e.g., 'that'll take ~20 minutes')"
      - "When the workroom result returns, Proxy re-checks relevance before delivering"
      - "The result is persisted to the notes such that a follow-up ask can reference it by notes_ref"
      - "No internal component names appear in any delivered message"
  primary_oracle:
    type: deterministic
    artifact: "Tool-call log: dispatch_workroom present with notes_ref; etiquette speak present; result delivery tagged; notes write confirmed; naming lint passes"
  thresholds:
    ack_latency_ms: 500
    e2b_calls_allowed: 0
    notes_ref_missing_allowed: 0
    internal_name_leaks_allowed: 0
    violations_allowed: 0
  fault_model_refs: [F-MISSING-NOTES-REF, F-NO-ETIQUETTE, F-NAMING-LEAK]
  test_ids: [T-FLOW-006]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for notes persistence; workroom endpoint mocked with configurable latency; vendor STT/TTS via cassette"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}

- criterion_id: AC-FLOW-006-NEG
  name: "NEG: Workroom path without notes persistence fails follow-up compose"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-25]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched orchestrator that skips writing the workroom result to notes"
    when: "A follow-up ask referencing the prior result arrives"
    then:
      - "The notes lookup returns no notes_ref for the prior result"
      - "The test harness detects the missing persistence and fails"
  primary_oracle:
    type: deterministic
    artifact: "notes_ref lookup after patched result delivery returns null; test asserts this is a failure"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-MISSING-NOTES-PERSIST]
  test_ids: [T-FLOW-006-NEG]
  dependency_class: db:postgres
  mock_boundary: "real Postgres; notes write path patched to no-op to simulate missing persistence"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# JUDGE-CLEARED CONTRIBUTION — boundary delivery, human-first
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-007
  name: "Judge-cleared contribution delivered at turn boundary only, never over a human speaker"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-FLOW-06, R-doc04-FLOW-21]
  criticality: P0
  blocking: true
  behavior:
    given: "The proactive judge emits a cleared contribution while a human is speaking"
    when: "The orchestrator receives the judge-cleared event during an active human utterance"
    then:
      - "Proxy does NOT begin voice delivery during the human utterance"
      - "Proxy queues the contribution and delivers it at the next detected turn boundary"
      - "The human's utterance is not interrupted"
  primary_oracle:
    type: deterministic
    artifact: "Timing log: human_speaking_start < judge_cleared < human_speaking_end < proxy_voice_start; assert proxy_voice_start > human_speaking_end"
  thresholds:
    mid-utterance_deliveries_allowed: 0
    violations_allowed: 0
  fault_model_refs: [F-OVER-HUMAN, F-MID-UTTERANCE-DELIVERY]
  test_ids: [T-FLOW-007]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-FLOW-007-NEG
  name: "NEG: Contribution delivered mid-utterance is detected as a violation"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-06]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched orchestrator that delivers judge-cleared contributions immediately without boundary check"
    when: "A judge-cleared event arrives during an active human utterance"
    then:
      - "The timing monitor detects mid-utterance delivery and fails the test"
  primary_oracle:
    type: deterministic
    artifact: "Timing monitor: proxy_voice_start < human_speaking_end → assert failure"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-OVER-HUMAN]
  test_ids: [T-FLOW-007-NEG]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# PARALLEL TASKS — no collision
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-008
  name: "Concurrent tasks (long build + quick ask + Scribe) execute without collision or data loss"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc04-FLOW-07]
  criticality: P0
  blocking: true
  behavior:
    given: "A meeting session with an in-flight workroom dispatch (long build), an active Scribe ticking, and a new simple ask arriving simultaneously"
    when: "All three tasks are in progress concurrently"
    then:
      - "The long workroom build continues uninterrupted and eventually delivers its result"
      - "The Scribe continues ticking without gaps or lost transcript segments"
      - "The new quick ask is acked within 500ms and answered in its own wake turn"
      - "No task's output is dropped, duplicated, or corrupted by another task"
  primary_oracle:
    type: deterministic
    artifact: "Concurrency integration test: inject three simultaneous tasks; assert all three produce their expected outputs with no interleaving corruption; Scribe segment count correct"
  thresholds:
    dropped_outputs_allowed: 0
    corrupted_outputs_allowed: 0
    violations_allowed: 0
  fault_model_refs: [F-TASK-COLLISION, F-SCRIBE-GAP]
  test_ids: [T-FLOW-008]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for Scribe segment storage; workroom endpoint mocked; STT cassette"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-FLOW-008-NEG
  name: "NEG: Shared mutable state causes task collision — detected by property test"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-07]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched orchestrator with a shared mutable state object accessible from all task coroutines"
    when: "Three tasks run concurrently and all write to the shared state"
    then:
      - "The property test detects at least one lost-write or corruption event"
      - "This confirms the production path uses isolated state per task"
  primary_oracle:
    type: deterministic
    artifact: "Property-based concurrency test with injected shared mutation; assert collision detected"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-TASK-COLLISION]
  test_ids: [T-FLOW-008-NEG]
  dependency_class: db:postgres
  mock_boundary: "real Postgres; shared-state patch injected at test layer"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

