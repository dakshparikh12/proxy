      - "Token carries a meeting_id claim equal to mtg-abc123"
      - "Token is stored in the revocation registry so an admin can invalidate it"
  primary_oracle: {type: deterministic, artifact: "Token decode: assert signature valid via token service; assert exp <= NOW() + policy_max_ttl_seconds; assert claims.meeting_id == 'mtg-abc123'; assert claims.scope == 'notes'; assert token_id present in revocation_registry table"}
  thresholds: {violations_allowed: 0}
  dependency_class: db:postgres
  mock_boundary: "Stub token signing key and revocation registry write; assert token fields"
  golden_path: false
  verification_ladder:
