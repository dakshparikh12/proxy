# ════════════════════════════════════════════════════════════════
# CAMERA ↔ SCREENSHARE MUTUAL EXCLUSIVITY
# ════════════════════════════════════════════════════════════════

# ── R-doc08-SCREEN-10: never both active ─────────────────────────────────────

- criterion_id: AC-SCREEN-011
  name: "camera_active and screenshare_active are never simultaneously true"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SCREEN-10]
  criticality: P1
  blocking: true
  behavior:
    given: "Any point in a live session, including during the transition between camera and screenshare"
    when: "The transport FSM state is sampled at every state transition"
    then:
      - "At every sampled state, at most one of camera_active and screenshare_active is true"
      - "The joint state (camera_active=true AND screenshare_active=true) is never reached"
  primary_oracle:
    type: deterministic
    artifact: >
      FSM invariant assertion: assert NOT (camera_active AND screenshare_active) holds
      at every transition in the FSM definition;
      simulation trace over the full swap sequence (idle → announce → screenshare → return)
      confirms the invariant is never violated.
  thresholds: {simultaneous_active_occurrences_allowed: 0}
  fault_model_refs: [F-DUAL-ACTIVE-TRANSPORT]
  test_ids: [T-SCREEN-011]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-SCREEN-011-NEG
  name: "Dual-active transport state is structurally unreachable — forced injection is rejected"
  authority_refs: [R-doc08-SCREEN-10]
  dependency_class: null
  mock_boundary: "negative cassette: directly mutate transport state to camera_active=true while screenshare_active=true; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "The transport FSM"
    when: "An adversarial test forces camera_active=true while screenshare_active=true by direct state mutation"
    then:
      - "The FSM either rejects the mutation (raises InvalidStateError) or corrects to a valid exclusive state"
      - "No path results in both flags remaining true simultaneously after the next guard evaluation"
  primary_oracle:
    type: deterministic
    artifact: >
      Assert FSM raises InvalidStateError or immediately transitions out of dual-active;
      assert post-condition NOT (camera_active AND screenshare_active).
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-DUAL-ACTIVE-TRANSPORT]
  test_ids: [T-SCREEN-011-NEG]

