  authority_refs: [R-doc03-PERF-22]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "QUALITY_GATE_SAMPLE_RATE set to 1.0 (gate every delta) and to 0.0 (gate no delta); plus always-check entries present"
    when:  "Deltas are applied and the quality gate draw is made"
    then:
      - "At rate=1.0: every non-always-check entry is gated"
      - "At rate=0.0: no non-always-check entry is gated"
      - "At rate=0.0: always-check entries (decision.status=final, reversibility=irreversible, contradicts link) are still gated"
      - "When QUALITY_GATE_SAMPLE_RATE is unset, default of ~0.1 applies"
      - "No literal '0.1' sample rate appears outside configuration parsing code"
  primary_oracle:
    type: config_override_assertion
    artifact: >
      set QUALITY_GATE_SAMPLE_RATE=1.0; assert gate_call_count == all_non_always_check_entries;
      set QUALITY_GATE_SAMPLE_RATE=0.0; assert gate_call_count == 0 for non-always-check;
      assert gate_call_count == always_check_count for always-check entries even at rate=0.0;
      grep: no literal 0.1 in gate trigger code outside config
  thresholds:
    always_check_entries_bypassed_by_rate_zero_allowed: 0
    hard_coded_sample_rate_in_non_config_code_allowed: 0
  fault_model_refs: [F-PERF-SAMPLE-RATE-HARD-CODED, F-PERF-ALWAYS-CHECK-BYPASSED-BY-RATE]
  test_ids: [T-PERF-22]
