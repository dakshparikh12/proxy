    Cache-invalidation-on-push is a Doc 01 behavior (acceptance/doc01 R-DOC01-3.5-10). No
    foundation footprint beyond the webhook durability (AC-SUB-022/023).

- disposition_id: D-INV-08
  authority_type: architecture_invariant
  authority_document: AGENTS.md
