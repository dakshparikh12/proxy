- criterion_id: AC-S3-020
  name: "S2 dep-graph answer sourced from get_dependents/who_writes, not raw LLM recall"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S3-08]
  criticality: P1
  blocking: true
  behavior:
    given: "A question asks which callers or writers depend on a named schema element and the dep-graph index is available"
    when: "Proxy computes the answer"
    then:
      - "The answer is backed by a call to get_dependents or who_writes against the dependency graph index"
      - "No answer is produced by direct LLM recall without a tool-call to the dep-graph index"
  primary_oracle: {type: deterministic_simulation, artifact: "Trace asserting at least one get_dependents or who_writes tool-call issued before the answer is returned; assert LLM-only path not taken"}
  thresholds: {dep_graph_tool_calls_min: 1, raw_llm_recall_bypasses_allowed: 0, violations_allowed: 0}
  fault_model_refs: [F-S3-020]
  test_ids: [T-S3-020]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-020

- criterion_id: AC-S3-021
  name: "S2 dep-graph resolved in approximately one tool-call round-trip"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S3-09]
  criticality: P1
  blocking: true
  behavior:
    given: "A dep-graph question is posed and the index is available"
    when: "Proxy resolves the answer"
    then:
      - "The answer is produced within one tool-call round-trip to the dependency index"
      - "Multi-step iterative tool-call chains (≥ 3 sequential dep-graph calls for a single question) are a violation"
  primary_oracle: {type: deterministic_simulation, artifact: "Tool-call trace for the dep-graph question; assert sequential dep-graph tool calls ≤ 2 (allowing one optional follow-up)"}
  thresholds: {dep_graph_sequential_calls_max: 2, violations_allowed: 0}
  fault_model_refs: [F-S3-021]
  test_ids: [T-S3-021]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-021

- criterion_id: AC-S3-022
  name: "S2 coverage honesty: incomplete dep-graph result labeled lower-bound"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S3-10]
  criticality: P1
  blocking: true
  behavior:
    given: "A dep-graph query returns results that may be incomplete (e.g. dynamic ORM patterns not statically traceable)"
    when: "The answer is delivered to the user"
    then:
      - "The answer explicitly labels the result as a lower-bound when completeness cannot be guaranteed"
      - "The answer does not claim the result is exhaustive when it is not"
  primary_oracle: {type: deterministic_simulation, artifact: "Fixture with a known dynamic-ORM caller not in the dep-graph index; assert answer includes lower-bound qualifier; assert no exhaustive claim"}
  thresholds: {missing_lower_bound_labels_allowed: 0, false_exhaustive_claims_allowed: 0, violations_allowed: 0}
  fault_model_refs: [F-S3-022]
  test_ids: [T-S3-022]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-022

