# ═══════════════════════════════════════════════════════════════════════════════
# S5: Hours-long meeting survives an instance recycle
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-501
  name: "Stale operation_runs row is reaped before replacement claim"
  evidence_class: "[integration]"
  authority_refs: [R-doc09-S3-50]
  criticality: P1
  blocking: true
  behavior:
    given: "An orchestrator holds an operation_runs row in running state; HEARTBEAT_S≈10, STALE_AFTER_S≈40; the orchestrator process is killed (SIGKILL)"
    when: "The reconcile sweep (mark_stale_operations_interrupted()) runs after STALE_AFTER_S elapses"
    then:
      - "The stale operation_runs row transitions out of the running state"
      - "A replacement orchestrator's INSERT ... ON CONFLICT DO NOTHING RETURNING id succeeds and returns a row id"
      - "The replacement orchestrator holds the claim exclusively (no second row for the same meeting_id in running state)"
  primary_oracle: {type: deterministic_state_check, artifact: "operation_runs row state after reconcile sweep"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-S3-501]
  test_ids: [T-S3-501]
  dependency_class: db:postgres
  mock_boundary: "may replace Postgres responses via asyncpg test pool; MUST NOT skip the real schema/query path"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-501

- criterion_id: AC-S3-501-NEG
  name: "Atomic-claim reap degrades gracefully when Postgres is unavailable"
  evidence_class: "[integration]"
  authority_refs: [R-doc09-S3-50]
  criticality: P1
  blocking: true
  behavior:
    given: "An orchestrator process has been killed; the reconcile sweep attempts to contact Postgres"
    when: "Postgres refuses the connection or returns a transient error during mark_stale_operations_interrupted()"
    then:
      - "The reconcile sweep logs the failure and retries with backoff; it does NOT panic"
      - "No new claim is granted until Postgres is available and the reap completes successfully"
      - "The meeting remains in a safe suspended state; no duplicate running claim is created"
  primary_oracle: {type: deterministic_state_check, artifact: "operation_runs row state and reconcile retry log"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-S3-501-NEG]
  test_ids: [T-S3-501-NEG]
  dependency_class: db:postgres
  mock_boundary: "inject asyncpg connection failure; MUST exercise real retry/backoff path"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-501-NEG

