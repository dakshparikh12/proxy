# Dispositions — Doc 00 Foundation
# Per GENERATOR.md §1.3 + §5.3: every authority clause is atomized into a requirement OR
# carried here with an explicit disposition. Doc 00 is the foundation doc; the behavioral
# LAWS and several §15 invariants are canonically STATED here but their runtime behavior is
# exercised (and acceptance-tested) in the owning service doc. Those are dispositioned
# covered_downstream so they do not become uncoverable requirements in this bundle.

# ── The five standing laws (§1): behavioral verification lives in the owning service doc ──

- disposition_id: D-LAW-01
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§1 Law 1 — Grounded or silent"
  source_quote: "cite file:line from the current clone or say 'not found by this method'"
  disposition: covered_downstream
  rationale: >
    Cited-or-abstain is a Doc 01 (code_intel citations) + Doc 04 (answer honesty) runtime
    behavior. Doc 00 only establishes the substrate. Acceptance for the law lives in the
    Doc 01/04 bundles (e.g. acceptance/doc01 R-INVARIANT-01). No Doc 00 criterion.

- disposition_id: D-LAW-02
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§1 Law 2 — Never overstate"
  source_quote: "exact results tagged resolved; search-derived tagged lower-bound"
  disposition: covered_downstream
  rationale: >
    Lossless-or-honest tagging is a Doc 01 (who_writes/find_references tiering) + Doc 03/05
    (verification tagging) behavior. Doc 00 establishes the envelope 'verification' field
    (R-DOC00-2-03); the tagging behavior is tested downstream.

- disposition_id: D-LAW-03-BARGE
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§1 Law 3 — barge-in stops speech <200ms"
  source_quote: "barge-in stops speech instantly (<200ms, physics)"
  disposition: covered_downstream
  rationale: >
    The <200ms barge-in reflex is a Doc 02 transport behavior (config barge_in_max_ms=200).
    Doc 00 owns the human-control substrate that IS tested here (pause via operation_runs
    check_pause = AC-SUB-010; staged-drafts-only = AC-INV-006). Barge-in latency itself is
    acceptance-tested in the Doc 02 bundle.

- disposition_id: D-LAW-04
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§1 Law 4 — Dynamic, never hard-coded"
  source_quote: "situation→action mappings live in model judgment ... never in code branches. Config configures the capability surface"
  disposition: covered_downstream
  rationale: >
    Split: the FOUNDATION-structural half — behaviors are typed Python BehaviorConfig constants,
    not YAML, plus config/defaults.toml holding the tunables — is tested HERE (AC-CMP-014 typed-not-YAML;
    AC-CFG-005 tunable home). The RUNTIME half — situation->action mappings live in model judgment,
    never in code branches — is a Doc 04 (wake behaviors) + Doc 05 (dispositions) behavior tested in
    those bundles. (Corrects the earlier claim that AC-CFG-005 alone covered the typed-not-YAML property;
    AC-CFG-005 tests only the config/defaults.toml tunables, not that behaviors are typed Python.)

- disposition_id: D-LAW-05
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§1 Law 5 — Talk-and-glance"
  source_quote: "operable entirely by speaking and glancing; nothing to install or configure mid-meeting"
  disposition: covered_downstream
  rationale: >
    A Doc 08 experience/UX property. No foundation-level structural footprint distinct from
    the tile outbound-only + capability-token surface already carried by AC-INV-012.

# ── §15 agentic-efficiency invariants: enforced in the model-facing service docs ──

- disposition_id: D-EFF-CACHE
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§10.1 / §15 — 1-hr-TTL prompt caching on every stable prefix"
  source_quote: "1-hour-TTL prompt caching on the orchestrator wake prefix + the Workroom prefix"
  disposition: covered_downstream
  rationale: >
    Prompt-cache TTL/breakpoint placement is a Doc 04 (wake prefix) + Doc 05 (Workroom prefix)
    behavior. Doc 00 only records the policy in §13 and provides the cost telemetry that PROVES
    the cache is hitting (AC-OBS-003). No separate Doc 00 caching criterion.

- disposition_id: D-EFF-COMPACT
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§10.2 / §15 — explicit context compaction"
  source_quote: "explicit context compaction on the multi-hour session ... the Notes object is durable memory"
  disposition: covered_downstream
  rationale: >
    Digest regeneration / context-editing is a Doc 04/05 behavior. No foundation footprint.

- disposition_id: D-EFF-TOOLSUBSET
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§10.5 / §15 — per-disposition curated tool subset"
  source_quote: "Each wake-behavior / Workroom disposition declares a curated tool subset"
  disposition: covered_downstream
  rationale: >
    Curated tool subsets are declared per BehaviorConfig in Doc 04/05. Doc 00 provides the
    typed-config home; the subset content is tested downstream.

- disposition_id: D-EFF-THINKING
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§10.6 / §15 — targeted extended thinking"
  source_quote: "enable interleaved/extended thinking only on Workroom build-planning + Opus-escalated answers; explicitly disable on the fast path"
  disposition: covered_downstream
  rationale: >
    Extended-thinking gating is a Doc 04/05 model-config behavior. No foundation footprint.

- disposition_id: D-EFF-QUALITYGATE
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§10.7 / §15 — sampled online quality gate"
  source_quote: "a sampled ... grounding/entailment check on Haiku/Sonnet answers → escalate the miss"
  disposition: covered_downstream
  rationale: >
    The sampled quality gate is a Doc 03 (Scribe tagging) + Doc 09 (verification) behavior
    (config quality_gate_sample_rate). No foundation footprint.

- disposition_id: D-EFF-REUSE
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§10.8 / §15 — within-session tool-result reuse"
  source_quote: "cache identical grep/read/get_dependents results within a meeting"
  disposition: covered_downstream
  rationale: >
    Within-session tool-result reuse is a Doc 01/04 behavior (acceptance/doc01 R-DOC01-3.5-09).
    No separate Doc 00 criterion.

# ── §15 safety-floor items whose runtime enforcement is a downstream service doc ──

- disposition_id: D-SAFE-CONTENTS-READ
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§15 Safety floor — read-only repo access (contents:read)"
  source_quote: "read-only repo access (contents:read)"
  disposition: covered_downstream
  rationale: >
    GitHub App scope enforcement is a Doc 01 behavior (acceptance/doc01 R-DOC01-3.1-01).
    Doc 00 forbids the write path structurally (AC-INV-007 no push; contents:write = Expansion).

- disposition_id: D-SAFE-SDK-TRIAD-RUNTIME
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§15 Safety floor — SDK-isolation triad on every query()"
  source_quote: "the SDK-isolation triad on every workroom/repo query() (tools land in the sandbox, not the host)"
  disposition: covered_downstream
  rationale: >
    Runtime enforcement of the triad (tools land in sandbox) is a Doc 05 behavior. Doc 00 owns
    the CI check that asserts the triad flags on every call site (AC-CI-003); the runtime
    tripwire is tested in the Doc 05 bundle.

- disposition_id: D-SAFE-EGRESS
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§12.9 / §15 — sandbox egress default-deny"
  source_quote: "Sandbox egress: web search/fetch + connectors run host-side ... no arbitrary E2B outbound in core"
  disposition: covered_downstream
  rationale: >
    Sandbox egress policy is a Doc 05 toolbelt/network behavior. Doc 00's hardening script
    (AC-OBS-006) forbids arbitrary code exec on the host; sandbox egress is tested in Doc 05.

- disposition_id: D-SAFE-VERIFIED-BUILD
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§15 Safety floor — build 'verified' only past critic + evidence gate"
  source_quote: "a build is 'verified' only past a separate critic + the deterministic evidence gate"
  disposition: covered_downstream
  rationale: >
    The critic + evidence-gate verification chain is a Doc 05 behavior. Doc 00 establishes the
    envelope 'verification' field (AC-CMP-003); the gate itself is tested in the Doc 05 bundle.

- disposition_id: D-SAFE-CLONE-NOEXEC
  authority_type: architecture_invariant
  authority_document: DOC-00
  source_location: "§15 Safety floor — canonical clones never execute repo code"
  source_quote: "canonical clones never execute repo code"
  disposition: covered_downstream
  rationale: >
    No-repo-code-exec on the canonical clone is a Doc 01 behavior (acceptance/doc01 R-DOC01-3.2-03).
    Doc 00's hardening (AC-OBS-006) enforces the host-side floor (no arbitrary exec on host).

