    - {tier: unit}

# ── AC-CTRL-005: No workroom_tasks table in schema ────────────────────────────

- criterion_id: AC-CTRL-005
  name: "No workroom_tasks table exists in the Postgres schema — workroom tasks are operation_runs rows"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-CTRL-06]
  criticality: P0
  blocking: true
  behavior:
    given: "A Postgres database with the current Alembic migrations applied (alembic upgrade head)"
    when: "The schema is inspected for table names"
    then:
      - "No table named 'workroom_tasks' exists in the public schema"
      - "A table named 'operation_runs' exists"
      - "Rows with operation_type LIKE 'workroom:%' exist in operation_runs (or can be inserted)"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT table_name FROM information_schema.tables WHERE table_schema='public';
      assert 'workroom_tasks' absent; assert 'operation_runs' present
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-WORKROOM-TABLE-EXISTS]
  test_ids: [T-CTRL-005]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres with migrations applied; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-CTRL-005-NEG
  name: "NEG: workroom_tasks table reference in source fails naming lint"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-CTRL-06]
  criticality: P0
  blocking: true
  behavior:
    given: "A source file containing a SQL reference to 'workroom_tasks' table"
    when: "The naming lint (libs.lint.naming) runs over the source tree"
    then:
      - "The lint reports a violation citing the forbidden table name"
      - "The build gate fails"
  primary_oracle:
    type: deterministic
    artifact: "Naming lint with injected workroom_tasks reference; assert lint exit_code != 0 and violation reported"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-WORKROOM-TABLE-EXISTS]
  test_ids: [T-CTRL-005-NEG]
  dependency_class: db:postgres
  mock_boundary: "Static analysis only; no DB required for lint tier"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-CTRL-006: Completion predicate prevents re-run of delivered workroom tasks

- criterion_id: AC-CTRL-006
  name: "Interrupted workroom task is NOT re-run when its deliverable already exists"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-CTRL-07]
  criticality: P1
  blocking: true
  behavior:
    given: >
      An operation_runs row with operation_type='workroom:abc', status='interrupted',
      and a result_ref that points to an already-written deliverable (completion predicate == satisfied)
    when: "The drain loop or boot-recovery processes this row"
    then:
      - "The task is NOT re-executed (no new SDK turn is initiated for it)"
      - "The operation_runs row status is updated to reflect the already-completed state"
      - "Exactly zero additional work is performed for this task instance"
  primary_oracle:
    type: deterministic
    artifact: >
      Drain loop integration test: pre-populate operation_runs with interrupted+completed row;
      run drain loop; assert no SDK invocation for that task_id; assert operation status reflects done
  thresholds:
    duplicate_executions_allowed: 0
    violations_allowed: 0
  fault_model_refs: [F-CTRL-COMPLETION-PREDICATE-SKIP]
  test_ids: [T-CTRL-006]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres; SDK run is mocked with call-count assertion; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-CTRL-006-NEG
  name: "NEG: Interrupted task without deliverable IS re-run by drain loop"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-CTRL-07]
  criticality: P1
  blocking: true
  behavior:
    given: >
      An operation_runs row with operation_type='workroom:xyz', status='interrupted',
      and no deliverable (completion predicate == not satisfied, result_ref is null)
    when: "The drain loop or boot-recovery processes this row"
    then:
      - "The task IS re-executed (a new SDK turn is initiated)"
      - "This confirms the completion predicate gate is the deciding factor, not status alone"
  primary_oracle:
    type: deterministic
    artifact: "Drain loop integration test; assert SDK invocation count == 1 for the undelivered interrupted task"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-COMPLETION-PREDICATE-SKIP]
  test_ids: [T-CTRL-006-NEG]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres with null result_ref fixture; SDK run mocked to record invocations; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-CTRL-007: Crashed task → status='interrupted' ─────────────────────────

- criterion_id: AC-CTRL-007
  name: "A workroom task that crashes mid-execution is written to status='interrupted' in operation_runs"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-CTRL-08]
  criticality: P1
  blocking: true
  behavior:
    given: "An in-progress workroom task (status='running') that encounters an unhandled exception"
    when: "The exception propagates out of the task executor"
    then:
      - "The operation_runs row for that task is updated to status='interrupted'"
      - "The row is not left in status='running'"
      - "The update happens in the exception handler / finally block, not conditionally"
  primary_oracle:
    type: deterministic
    artifact: >
      Integration test: inject RuntimeError into task executor after session start;
      assert SELECT status FROM operation_runs WHERE id=<task_id> returns 'interrupted'
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-NO-INTERRUPTED-STATUS]
  test_ids: [T-CTRL-007]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres; SDK session start mocked; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-CTRL-007-NEG
  name: "NEG: Task left in status='running' after crash is invisible to drain loop recovery"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-CTRL-08]
  criticality: P1
  blocking: true
  behavior:
    given: "An operation_runs row stuck in status='running' (simulating a missing interrupted-status write)"
    when: "The drain loop runs its WHERE operation_type LIKE 'workroom:%' AND status='interrupted' query"
    then:
      - "The stuck row is NOT picked up for recovery"
      - "This confirms that the drain-loop query correctly requires status='interrupted', not 'running'"
  primary_oracle:
    type: deterministic
    artifact: "Query drain-loop SELECT with status='running' fixture; assert row count returned == 0"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-NO-INTERRUPTED-STATUS]
  test_ids: [T-CTRL-007-NEG]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres with status='running' fixture; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

