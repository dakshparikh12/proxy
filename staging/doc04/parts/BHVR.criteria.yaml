# ── Within-Session Tool-Result Cache (§10.8) ──────────────────────────────────

- criterion_id: AC-BHVR-012
  name: "Identical (tool, args, SHA) call returns cached result without re-executing the tool"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-BHVR-13]
  criticality: P1
  blocking: true
  behavior:
    given: "A meeting session is active with a pinned repository SHA; get_dependents('MyClass') was called and returned result R"
    when: "get_dependents('MyClass') is called a second time in the same session with the same pinned SHA"
    then:
      - "The cached result R is returned without invoking the underlying code_intel implementation"
      - "The code_intel MCP server is called exactly once (not twice) for the identical (tool, args, SHA) triple"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with call-count spy on code_intel server — assert server.get_dependents call_count == 1 after two identical client calls"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BHVR-012]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-BHVR-012-NEG
  name: "Cache miss when SHA changes — different SHA forces a fresh tool call"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-BHVR-14]
  criticality: P1
  blocking: true
  behavior:
    given: "get_dependents('MyClass') was called with SHA='abc123'; session SHA is updated to 'def456'"
    when: "get_dependents('MyClass') is called again with the new SHA 'def456'"
    then:
      - "The cached result from SHA='abc123' is NOT returned"
      - "The code_intel MCP server is called again (total call count == 2)"
      - "The new result is stored under the ('get_dependents', 'MyClass', 'def456') cache key"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with SHA rotation: assert server.get_dependents call_count == 2; assert result_2 == fresh_mock_result"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BHVR-012-NEG]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-BHVR-012-SCOPE
