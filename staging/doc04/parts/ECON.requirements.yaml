# ── check_meeting_budget order of checks ─────────────────────────────────────

- requirement_id: R-doc04-ECON-25
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, check_meeting_budget() code block — evaluation order"
  source_quote: >
    def check_meeting_budget(b: MeetingBudget, role: str) -> "Tier":
        if role == "scribe":
            return Tier.FULL
        if b.spent_usd >= b.hard_usd:
            raise BudgetExceeded("notes-only")
        if b.spent_usd >= b.soft_usd:
            return Tier.DEGRADED
        return Tier.FULL
  normalized_statement: >
    THE SYSTEM SHALL evaluate check_meeting_budget conditions in exactly this order: (1) scribe
    exemption check first, returning Tier.FULL immediately; (2) hard-cap check second, raising
    BudgetExceeded; (3) soft-cap check third, returning Tier.DEGRADED; (4) default return of
