# ══════════════════════════════════════════════════════════════════
# M4 — Structural substrate + dependency graph
# ══════════════════════════════════════════════════════════════════

- criterion_id: AC-M4-001
  name: "Every non-excluded source file is parsed by tree-sitter to extract declarations"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.4-01]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo with N non-excluded source files across supported languages.
      Golden declaration set derived mechanically via Python stdlib ast (disjoint from Proxy pipeline).
    when: >
      The structural substrate build completes.
    then:
      - Every file in the non-excluded set has at least one entry in the coverage record.
      - Every declaration in the golden set appears as a graph node.
      - Recall of declarations >= 1.0 across the fixture set.
  applicability:
    fixtures: [fixture-small-repo, fixture-polyglot-small]
    estates: [estate-flask, estate-proxy]
    excluded_estates: [estate-messy]
    rationale: "estate-messy uses abstention goldens; recall is not the primary signal there."
  primary_oracle:
    type: deterministic_golden_graph
    artifact: goldens/fixture-small-repo/declarations.json
  thresholds:
    declaration_recall: 1.0
    uncovered_non_excluded_files: 0
