  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── Extended thinking: capped where on ───────────────────────────────────────

- requirement_id: R-doc04-ECON-08
  authority_type: canonical
  authority_document: CANONICAL-DECISIONS
  source_location: "§3.12, paragraph 7; CANONICAL-DECISIONS §10.6"
  source_quote: >
    Where thinking IS on, cap it (extended thinking shares output-token budget, so uncapped preamble
    can truncate large structured emission mid-object).
  normalized_statement: >
    WHEN extended thinking is enabled on the Opus-escalated grounded-answer path THE SYSTEM SHALL
    apply a finite thinking-token budget cap; the cap SHALL be set such that the thinking preamble
    cannot consume the entire output-token budget; no extended-thinking-enabled call SHALL be issued
    with an uncapped or unbounded thinking budget.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ═══════════════════════════════════════════════════════════════════════════════
# §3.13 — The Live Cost Circuit-Breaker
# ═══════════════════════════════════════════════════════════════════════════════

# ── meeting_cost table schema ─────────────────────────────────────────────────

- requirement_id: R-doc04-ECON-09
  authority_type: canonical
  authority_document: CANONICAL-DECISIONS
  source_location: "§3.13, meeting_cost table block; CANONICAL-DECISIONS §3"
  source_quote: >
    meeting_cost table:
      meeting_id uuid PRIMARY KEY
      model_usd  numeric NOT NULL DEFAULT 0
      cache_read_usd numeric NOT NULL DEFAULT 0
      cache_creation_usd numeric NOT NULL DEFAULT 0
      transport_usd numeric NOT NULL DEFAULT 0
      e2b_usd numeric NOT NULL DEFAULT 0
      started_at timestamptz NOT NULL DEFAULT now()
      updated_at timestamptz NOT NULL DEFAULT now()
  normalized_statement: >
    THE SYSTEM SHALL define the meeting_cost table with exactly the following columns and
    constraints: meeting_id (uuid, PRIMARY KEY), model_usd (numeric, NOT NULL, DEFAULT 0),
    cache_read_usd (numeric, NOT NULL, DEFAULT 0), cache_creation_usd (numeric, NOT NULL,
    DEFAULT 0), transport_usd (numeric, NOT NULL, DEFAULT 0), e2b_usd (numeric, NOT NULL,
    DEFAULT 0), started_at (timestamptz, NOT NULL, DEFAULT now()), updated_at (timestamptz,
    NOT NULL, DEFAULT now()); no additional columns, renamed columns, or different data
    types SHALL be used; no meeting_cost_entries table or reserve/settle pattern SHALL exist.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ── Accumulator PERSISTED: crash-safe ────────────────────────────────────────

- requirement_id: R-doc04-ECON-10
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, paragraph 4"
  source_quote: >
    The accumulator is PERSISTED, not in-memory — a crashed orchestrator must not reset the meter to 0.
  normalized_statement: >
    THE SYSTEM SHALL persist every cost increment to the meeting_cost Postgres row before acknowledging
    that the increment is recorded; WHEN the orchestrator process crashes and restarts THE SYSTEM SHALL
    reload the accumulated spend from the meeting_cost row; the in-process MeetingBudget.spent_usd
    cache SHALL be treated as a write-through cache, never the source of truth; a fresh orchestrator
    process taking over a meeting SHALL NOT start with spent_usd == 0.0 unless the meeting_cost row
    genuinely contains zero.
  requirement_type: safety
  criticality: P0
  testability: executable
  status: qualified

# ── reload_from_db called on harness re-claim ─────────────────────────────────

- requirement_id: R-doc04-ECON-11
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, MeetingBudget.reload_from_db docstring"
  source_quote: >
    async def reload_from_db(self, pool) -> None:
        """On harness re-claim, reload the persisted spend so the meter survives recycle"""
        self.spent_usd = await pool.fetchval(
            "SELECT COALESCE(model_usd,0) + COALESCE(transport_usd,0) + COALESCE(e2b_usd,0) "
            "FROM meeting_cost WHERE meeting_id=$1", self.meeting_id) or 0.0
  normalized_statement: >
    THE SYSTEM SHALL call MeetingBudget.reload_from_db(pool) at the moment a harness process
    re-claims an existing meeting; reload_from_db SHALL set self.spent_usd to the sum of
    COALESCE(model_usd,0) + COALESCE(transport_usd,0) + COALESCE(e2b_usd,0) from the
    meeting_cost row for the meeting_id; cache_read_usd and cache_creation_usd SHALL NOT be
    included in the reloaded sum (they are sub-components of model_usd, not additive meters);
    reload_from_db SHALL NOT be called on every check_meeting_budget invocation.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ── Scribe role: always Tier.FULL ─────────────────────────────────────────────

- requirement_id: R-doc04-ECON-12
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, check_meeting_budget() code block; §3.13 paragraph 6"
  source_quote: >
    def check_meeting_budget(b: MeetingBudget, role: str) -> "Tier":
        if role == "scribe":
            return Tier.FULL                       # notes are never degraded
    Scribe is exempt from degradation (notes are the floor deliverable we never degrade),
    though its spend still counts toward the total.
  normalized_statement: >
    WHEN check_meeting_budget is called with role == "scribe" THE SYSTEM SHALL return Tier.FULL
    unconditionally, regardless of b.spent_usd relative to b.soft_usd or b.hard_usd; no budget
    threshold SHALL cause the Scribe role to be degraded or blocked; Scribe spend SHALL still
    increment the meeting_cost row but SHALL NOT trigger degradation.
  requirement_type: safety
  criticality: P0
  testability: executable
  status: qualified

# ── Hard cap: BudgetExceeded raised → notes-only ─────────────────────────────

- requirement_id: R-doc04-ECON-13
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, check_meeting_budget() code block; §3.13 paragraph 7"
  source_quote: >
    if b.spent_usd >= b.hard_usd:
        raise BudgetExceeded("notes-only")
    Hard cap goes notes-only
  normalized_statement: >
    WHEN check_meeting_budget is called with a non-scribe role and b.spent_usd >= b.hard_usd
    THE SYSTEM SHALL raise BudgetExceeded with a message indicating notes-only mode; the caller
    SHALL NOT proceed with the non-Scribe model call; the system SHALL transition to notes-only
    operation where only Scribe continues running.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

# ── Soft cap: Tier.DEGRADED returned ─────────────────────────────────────────

- requirement_id: R-doc04-ECON-14
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, check_meeting_budget() code block; §3.13 paragraph 7"
  source_quote: >
    if b.spent_usd >= b.soft_usd:
        return Tier.DEGRADED                   # Orchestrator→Haiku, widen Scribe interval, proactive off
    Soft cap degrades: Orchestrator drops to Haiku, Scribe summary interval widens, proactive
    contributions stop — and SAY so in the room
  normalized_statement: >
    WHEN check_meeting_budget is called with a non-scribe role and b.soft_usd <= b.spent_usd < b.hard_usd
    THE SYSTEM SHALL return Tier.DEGRADED; upon receiving Tier.DEGRADED the orchestrator SHALL switch to
    claude-haiku-4-5 for its own model calls, widen the Scribe summary interval, and disable proactive
    contributions; these degradation actions SHALL be announced verbally in the meeting room.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

# ── Below soft cap: Tier.FULL returned ────────────────────────────────────────

- requirement_id: R-doc04-ECON-15
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, check_meeting_budget() code block"
  source_quote: >
    return Tier.FULL
  normalized_statement: >
    WHEN check_meeting_budget is called with a non-scribe role and b.spent_usd < b.soft_usd
    THE SYSTEM SHALL return Tier.FULL; no degradation SHALL occur and the role SHALL proceed
    with its assigned model seat.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── Boundary values: exactly at soft_usd and hard_usd ────────────────────────

- requirement_id: R-doc04-ECON-16
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, check_meeting_budget() code block — >= comparisons"
  source_quote: >
    if b.spent_usd >= b.hard_usd:
        raise BudgetExceeded("notes-only")
    if b.spent_usd >= b.soft_usd:
        return Tier.DEGRADED
  normalized_statement: >
    THE SYSTEM SHALL treat the boundary values inclusively: WHEN b.spent_usd == b.hard_usd
    (exactly) THE SYSTEM SHALL raise BudgetExceeded (not return Tier.DEGRADED); WHEN
    b.spent_usd == b.soft_usd (exactly) and b.spent_usd < b.hard_usd THE SYSTEM SHALL
    return Tier.DEGRADED (not Tier.FULL); the >= comparisons are inclusive at both boundaries.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── Neither cap is silent ─────────────────────────────────────────────────────

- requirement_id: R-doc04-ECON-17
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, paragraph 7"
  source_quote: >
    Two caps, both disclosed (never a silent cliff):
    - Soft cap degrades: Orchestrator drops to Haiku, Scribe summary interval widens, proactive
      contributions stop — and SAY so in the room
    - Hard cap goes notes-only
  normalized_statement: >
    THE SYSTEM SHALL disclose every budget threshold crossing verbally in the meeting room;
    WHEN Tier.DEGRADED is first entered THE SYSTEM SHALL emit a spoken announcement describing
    the degradation (model switch, widened interval, disabled proactive contributions);
    WHEN BudgetExceeded is raised THE SYSTEM SHALL emit a spoken announcement that the session
    is switching to notes-only mode; neither threshold crossing SHALL be silent or log-only.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

# ── Pre-dispatch estimate gate ────────────────────────────────────────────────

- requirement_id: R-doc04-ECON-18
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, paragraph 5"
  source_quote: >
    One pre-dispatch estimate gate on dispatch_workroom: if estimated task cost exceeds remaining
    task budget, Proxy asks-approval or declines (disclosed) before the sandbox spins — task budget
    can't be blown past silently.
  normalized_statement: >
    WHEN dispatch_workroom is called THE SYSTEM SHALL evaluate estimate_gate(b, est_task_usd) before
    spinning up any E2B sandbox or workroom session; IF estimate_gate returns False (i.e.
    b.spent_usd + est_task_usd > b.hard_usd) THE SYSTEM SHALL either ask the human for explicit
    approval or decline the dispatch with a disclosed explanation; the sandbox SHALL NOT be started
    until approval is received or the call is declined; this gate SHALL fire on every dispatch_workroom
    call without exception.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

# ── estimate_gate boundary value ─────────────────────────────────────────────

- requirement_id: R-doc04-ECON-19
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, estimate_gate() code block"
  source_quote: >
    def estimate_gate(b: MeetingBudget, est_task_usd: float) -> bool:
        return b.spent_usd + est_task_usd <= b.hard_usd
  normalized_statement: >
    THE SYSTEM SHALL implement estimate_gate to return True when b.spent_usd + est_task_usd <=
    b.hard_usd and False otherwise; WHEN b.spent_usd + est_task_usd == b.hard_usd (exactly at
    the boundary) THE SYSTEM SHALL return True (the task fits); WHEN b.spent_usd + est_task_usd
    exceeds b.hard_usd by any positive amount THE SYSTEM SHALL return False.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── Two meters write same row ─────────────────────────────────────────────────

- requirement_id: R-doc04-ECON-20
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, paragraph 3"
  source_quote: >
    Both meters write the same row: the Scribe writes model_usd (+ cache split) directly; the
    seam-based meter (Proxy wakes + Workroom, via AgentChunk.RESULT.total_cost_usd) also increments
    model_usd.
  normalized_statement: >
    THE SYSTEM SHALL accumulate model spend in a single meeting_cost row; the Scribe SHALL write
    model_usd (and optionally cache_read_usd, cache_creation_usd) directly via a database upsert
    or increment; the seam-based meter SHALL increment model_usd by reading total_cost_usd from
    AgentChunk RESULT chunks (per §3.3) and writing to the same meeting_cost row; no separate
    ledger, subsidiary table, or duplicate row per call SHALL be created.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── In-process cache write-through ───────────────────────────────────────────

- requirement_id: R-doc04-ECON-21
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, paragraph 8"
  source_quote: >
    Keep in-process cache for hot-path reads, write-through to Postgres.
  normalized_statement: >
    THE SYSTEM SHALL maintain MeetingBudget.spent_usd as an in-process cache for hot-path reads
    of check_meeting_budget; every increment to spent_usd SHALL also be written through to the
    meeting_cost Postgres row atomically (i.e. the Postgres write SHALL occur before the in-process
    value is considered committed); reading spent_usd without a Postgres round-trip on the hot path
    is permitted after reload_from_db has been called.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── check_meeting_budget called before every non-Scribe wake dispatch ─────────

- requirement_id: R-doc04-ECON-22
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.13, paragraph 8"
  source_quote: >
    Harness calls check_meeting_budget() before every wake dispatch and calls reload_from_db() when
