# Fault Model — Doc 01 Code Intelligence
# Per GENERATOR.md §9.5 and §9.6
# Every P0 criterion: >=1 canonical fault per material fault class it protects against.
# Every P1 criterion: >=1 representative behavioral fault.
# Generated: 2026-07-17

---

# ── P0 Security faults ──────────────────────────────────────────────────────

- fault_id: F-SCOPE-EXTRA-PERM
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    GitHub App installation requests additional scopes beyond contents:read + metadata:read
    (e.g., adds repo:write or pull_requests:read).
  must_be_detected_by: [AC-M1-001]
  detection_requirement: 1.0

- fault_id: F-TOKEN-CACHED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    Token minted by Nango is stored in a module-level cache variable and reused across
    operations instead of being minted fresh per operation.
  must_be_detected_by: [AC-M1-002]
  detection_requirement: 1.0

- fault_id: F-TOKEN-LOGGED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    GitHub installation token value is written to the application log (e.g., via
    debug-level logging of the HTTP Authorization header).
  must_be_detected_by: [AC-M1-003]
  detection_requirement: 1.0

- fault_id: F-CROSS-TENANT-VOLUME
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    Clone stored at /tenants/tenant-A/repos/repo/ is readable by a process
    serving tenant-B (missing per-tenant path prefix or incorrect permission bits).
  must_be_detected_by: [AC-M2-001, AC-INV-007]
  detection_requirement: 1.0

- fault_id: F-PUSH-TO-ORIGIN
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    The system performs a git push to the upstream origin (e.g., a git push call
    introduced during delta-pull logic).
  must_be_detected_by: [AC-M2-004]
  detection_requirement: 1.0

- fault_id: F-REPO-CODE-EXEC
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    The canonical clone runs repository code (e.g., executes a setup.py, Makefile,
    or postinstall script found in the repo).
  must_be_detected_by: [AC-M2-005]
  detection_requirement: 1.0

- fault_id: F-EXCLUDED-PATH-IN-INDEX
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    A path in the exclusion set (gitleaks hit or policy glob .env*, node_modules/)
    appears as an indexed node in the dependency graph.
  must_be_detected_by: [AC-M3-003]
  detection_requirement: 1.0

- fault_id: F-EXCLUDED-PATH-IN-RESULT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    A query result (e.g., get_dependents or who_writes) returns a path from
    the exclusion set.
  must_be_detected_by: [AC-M3-004]
  detection_requirement: 1.0

- fault_id: F-SECRET-NOT-REDACTED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    A file containing a gitleaks-detected secret is returned via batch_read or
    another read-path tool with the secret value intact (not redacted).
  must_be_detected_by: [AC-M3-006, AC-M3-007]
  detection_requirement: 1.0

- fault_id: F-SECRET-IN-LOG
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    A detected secret value appears in the application log output (e.g., logged
    during gitleaks scan processing or read-path error handling).
  must_be_detected_by: [AC-M3-008]
  detection_requirement: 1.0

- fault_id: F-CROSS-TENANT-CACHE-KEY
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    Tenant ID is omitted from the meeting-cache key, causing tenant-A's cached
    tool result to be returned to a tenant-B query with identical (tool, args).
  must_be_detected_by: [AC-INV-007]
  detection_requirement: 1.0

- fault_id: F-CROSS-TENANT-GRAPH
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    The graph query for tenant-B resolves to the SQLite file belonging to tenant-A
    (e.g., missing tenant path segment in DB file lookup).
  must_be_detected_by: [AC-INV-008]
  detection_requirement: 1.0

- fault_id: F-CITED-OR-ABSTAIN-FABRICATE
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    The system returns a grounded claim with a file:line citation that does not
    exist in the pinned clone (fabricated citation).
  must_be_detected_by: [AC-INV-001, AC-INV-002]
  detection_requirement: 1.0

- fault_id: F-CITED-OR-ABSTAIN-SILENT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    The system converts an incomplete result into an absolute claim without a
    lower-bound or not-found label (silence instead of honest abstention).
  must_be_detected_by: [AC-INV-003, AC-INV-004]
  detection_requirement: 1.0

# ── P0 Derived-obligation security faults ─────────────────────────────────

- fault_id: F-EXCLUDED-PATH-IN-SANDBOX
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: >
    An excluded path (or gitleaks hit file) is copied into the E2B meeting sandbox.
  must_be_detected_by: [AC-M3-005]
  detection_requirement: 1.0

- fault_id: F-LSP-IN-SANDBOX-MANIFEST
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    find_references or another LSP tool name appears in the E2B sandbox tool manifest.
  must_be_detected_by: [AC-SANDBOX-001]
  detection_requirement: 1.0

- fault_id: F-DUPLICATE-TOOL-NAME
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A code_intel tool name is registered on both the host-side MCP server and the
    sandbox tool manifest simultaneously.
  must_be_detected_by: [AC-SANDBOX-002]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Connection ──────────────────────────────────────

- fault_id: F-REPO-PROVIDER-BYPASS
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    Git-host-specific clone logic is called directly (bypassing the RepoProvider
    interface), making the host abstraction layer dead code.
  must_be_detected_by: [AC-M1-005]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Clone ───────────────────────────────────────────

- fault_id: F-RECLONE-ON-PUSH
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    On a push webhook the system performs a full re-clone instead of a delta pull,
    incurring unnecessary network and disk usage.
  must_be_detected_by: [AC-M2-006]
  detection_requirement: 1.0

- fault_id: F-BLOBLESS-NOT-USED
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A repo above the blobless_threshold (~100k files) is cloned without
    --filter=blob:none, causing full blob download.
  must_be_detected_by: [AC-M2-007]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Exclusions ──────────────────────────────────────

- fault_id: F-GITLEAKS-NOT-RUN-ON-PULL
  category: security
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    After a delta pull, gitleaks is not run on the changed files; new secrets
    introduced by the push are not added to the exclusion set.
  must_be_detected_by: [AC-M3-001, AC-M3-002]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Structural substrate ────────────────────────────

- fault_id: F-NO-TREESITTER-PARSE
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A non-excluded source file is skipped during tree-sitter parsing, producing
    no declaration records for it in the graph.
  must_be_detected_by: [AC-M4-001]
  detection_requirement: 1.0

- fault_id: F-LLM-CALLED-IN-GRAPH-BUILD
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    The dependency graph build path makes a call to src/proxy/llm.py or any
    model endpoint (violating the zero-LLM-calls requirement).
  must_be_detected_by: [AC-M4-005]
  detection_requirement: 1.0

- fault_id: F-COVERAGE-INCOMPLETE
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    The file-coverage record is missing rows for one or more tracked files
    (indexed + flagged != git ls-files count).
  must_be_detected_by: [AC-M4-006, AC-M6-003]
  detection_requirement: 1.0

- fault_id: F-TABLE-NODE-WRONG-ID
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A table node is created with an id that does not use the 'table::<name>' format,
    or is matched with kind endswith instead of kind=='table'.
  must_be_detected_by: [AC-M4-008]
  detection_requirement: 1.0

- fault_id: F-INCREMENTAL-GRAPH-NOT-FULL-REBUILD
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    On a push event the graph is updated incrementally (per-file invalidation)
    rather than performing a full drop + re-extract.
  must_be_detected_by: [AC-M4-009]
  detection_requirement: 1.0

- fault_id: F-GRAMMARLESS-NOT-FLAGGED
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A file using a language with no tree-sitter grammar is silently skipped
    rather than flagged with reason 'unsupported-language' in the coverage record.
  must_be_detected_by: [AC-M4-010]
  detection_requirement: 1.0

# ── P1 Behavioral faults — MCP tools ───────────────────────────────────────

- fault_id: F-SHARED-MCP-SERVER
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    The code_intel MCP server instance is shared across concurrent queries (singleton)
    rather than minted fresh from a factory per query.
  must_be_detected_by: [AC-M5-001]
  detection_requirement: 1.0

- fault_id: F-DEPENDENTS-READS-TRANSITIVE
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    get_dependents traverses 'reads' edges transitively in the closure, inflating
    the blast radius beyond the founder-decision scope (calls/imports/writes/extends/implements).
  must_be_detected_by: [AC-M5-003, AC-M5-004]
  detection_requirement: 1.0

- fault_id: F-WHO-WRITES-SILENT-EXACT
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    who_writes returns results without a confidence tag, or returns 'resolved' on a
    non-tier-1 ORM stack instead of 'lower-bound'.
  must_be_detected_by: [AC-M5-007, AC-M5-008]
  detection_requirement: 1.0

- fault_id: F-OWNER-MISSING-TAG
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    owner() returns results without a confidence tag ('resolved' or 'lower-bound'),
    or returns git-blame results tagged 'resolved' instead of 'lower-bound'.
  must_be_detected_by: [AC-M5-015, AC-M5-016]
  detection_requirement: 1.0

- fault_id: F-BATCH-READ-ABORT-ON-FAILURE
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    batch_read aborts the entire batch when one file fails (instead of returning
    partial results with a per-file error entry).
  must_be_detected_by: [AC-M5-018]
  detection_requirement: 1.0

- fault_id: F-LOOKUP-REFERENT-LLM-CALL
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    lookup_referent makes a model call during term resolution (violates zero-LLM
    requirement for this tool).
  must_be_detected_by: [AC-M5-020]
  detection_requirement: 1.0

- fault_id: F-CACHE-NOT-INVALIDATED-ON-PUSH
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    After a push webhook, cached tool results remain stale (cache invalidation
    not triggered), returning old results.
  must_be_detected_by: [AC-M5-023]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Readiness / Coverage ────────────────────────────

- fault_id: F-WRONG-READINESS-ENUM
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    Readiness is emitted with a value not in the canonical enum
    (connecting|cloning|indexing|ready|not_ready), e.g., 'complete' or 'done'.
  must_be_detected_by: [AC-M6-001]
  detection_requirement: 1.0

- fault_id: F-READINESS-MISSING-SHA
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    The ready Readiness record omits indexed_at or pinned_sha fields.
  must_be_detected_by: [AC-M6-007]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Freshness ───────────────────────────────────────

- fault_id: F-WEBHOOK-NO-SIGNATURE-CHECK
  category: security
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    Incoming push webhook is processed without validating the HMAC signature,
    allowing unauthenticated pushes to trigger graph rebuilds.
  must_be_detected_by: [AC-M7-001]
  detection_requirement: 1.0

- fault_id: F-WEBHOOK-NO-DEDUP
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A duplicate webhook delivery (same delivery-GUID + commit SHA) is processed
    twice, triggering redundant graph rebuilds.
  must_be_detected_by: [AC-M7-002]
  detection_requirement: 1.0

- fault_id: F-NO-RECONCILE-AT-MEETING-START
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A meeting starts without running ls-remote vs local tip reconciliation, allowing
    the session to proceed with a stale graph (missed push webhook).
  must_be_detected_by: [AC-M7-004]
  detection_requirement: 1.0

- fault_id: F-MID-MEETING-PUSH-CHANGES-PIN
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    When a push occurs mid-meeting, the meeting's pinned SHA is updated rather than
    held, causing answers to shift mid-session.
  must_be_detected_by: [AC-M7-007]
  detection_requirement: 1.0

- fault_id: F-GV-NO-GC
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    Graph versions accumulate without garbage collection; old SHA versions are
    retained after all meetings referencing them have ended.
  must_be_detected_by: [AC-GV-002]
  detection_requirement: 1.0

# ── P1 Behavioral faults — LSP ─────────────────────────────────────────────

- fault_id: F-LSP-TIMEOUT-NO-FALLBACK
  category: resilience
  criticality: P1
  mechanism: dependency_timeout
  description: >
    LSP server call exceeds lsp_timeout_s (3s); system returns no result or
    hangs instead of falling back to grep with 'lower-bound' tag.
  must_be_detected_by: [AC-M8-002, AC-LSP-DEG-001]
  detection_requirement: 1.0

- fault_id: F-LSP-TIMEOUT-WRONG-LABEL
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    After LSP timeout, grep fallback result is returned with tag 'resolved'
    instead of 'lower-bound'.
  must_be_detected_by: [AC-M8-003, AC-LSP-DEG-002]
  detection_requirement: 1.0

- fault_id: F-LSP-HUNG-NOT-RESTARTED
  category: resilience
  criticality: P1
  mechanism: process_termination
  description: >
    A hung LSP server process is not restarted after timeout; subsequent calls
    fail or block indefinitely.
  must_be_detected_by: [AC-M8-004]
  detection_requirement: 1.0

# ── P1 Behavioral faults — Canonical contracts ─────────────────────────────

- fault_id: F-CODE-INTEL-IN-LIBS
  category: contract
  criticality: P1
  mechanism: static
  description: >
    Python module under libs/code_intel/ is introduced (violates canonical
    placement requirement: all code-intel code must be under services/code_intel).
  must_be_detected_by: [AC-CANON-001]
  detection_requirement: 1.0

- fault_id: F-NON-RIPGREP-BACKEND
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    A search backend other than ripgrep (e.g., Zoekt, ElasticSearch) is introduced
    as a search call in V0 code.
  must_be_detected_by: [AC-CANON-002]
  detection_requirement: 1.0

- fault_id: F-GRAPH-IN-POSTGRES
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    Dependency graph rows are written to Postgres or a SHA-versioned table rather
    than the per-repo SQLite file.
  must_be_detected_by: [AC-CANON-003]
  detection_requirement: 1.0

- fault_id: F-UNINSTALL-DELETE-LATE
  category: security
  criticality: P1
  mechanism: hand_authored_negative_build
  description: >
    Clone, index, graph, and/or snapshots are not deleted within 15 minutes of
    the uninstall webhook (stale ghost copy persists).
  must_be_detected_by: [AC-CANON-005]
  detection_requirement: 1.0
