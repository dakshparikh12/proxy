  primary_oracle:
    type: deterministic
    artifact: "assert answer classified as no-blocker does not have fabricated_caveat_prefix == true by the ordering linter; spot-check set of no-blocker test cases"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-005]
  dependency_class: null
