# ── High-stakes gate: triggers ────────────────────────────────────────────────

- requirement_id: R-doc03-CORR-10
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Trigger)"
  source_quote: "Trigger (narrow, high-stakes only): the correction sets Decision.status = final, sets Reversibility = irreversible, or closes/finalizes an entry with those properties."
  normalized_statement: >
    WHEN a correction sets Decision.status = final on any entry
    THE SYSTEM SHALL classify that correction as high-stakes and SHALL trigger the
    spoken-confirm gate; the silent-immediate path SHALL NOT be taken for this case.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-11
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Trigger)"
  source_quote: "Trigger (narrow, high-stakes only): the correction sets Decision.status = final, sets Reversibility = irreversible, or closes/finalizes an entry with those properties."
  normalized_statement: >
    WHEN a correction sets Reversibility = irreversible on any entry
    THE SYSTEM SHALL classify that correction as high-stakes and SHALL trigger the
    spoken-confirm gate; the silent-immediate path SHALL NOT be taken for this case.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-12
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Trigger)"
  source_quote: "Trigger (narrow, high-stakes only): the correction sets Decision.status = final, sets Reversibility = irreversible, or closes/finalizes an entry with those properties."
  normalized_statement: >
    WHEN a correction closes or finalizes an entry that already carries Decision.status = final
    OR Reversibility = irreversible
    THE SYSTEM SHALL classify that correction as high-stakes and SHALL trigger the
    spoken-confirm gate; the silent-immediate path SHALL NOT be taken for this case.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

# ── High-stakes gate: behavior (apply-then-confirm, audible receipt) ──────────

- requirement_id: R-doc03-CORR-13
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Behavior)"
  source_quote: "apply the patch (still immediate, still attributed, still superseded-not-erase) AND emit a one-line spoken acknowledgement via Doc 02's mouth (owned by Doc 04's turn) — e.g. \"— corrected: ship Friday, noted.\""
  normalized_statement: >
    WHEN a high-stakes correction triggers the gate
    THE SYSTEM SHALL apply the patch immediately (attributed, superseded-not-erased) AND
    emit exactly one spoken acknowledgement line via Doc 02's speech path, owned by Doc 04's
    turn; the acknowledgement SHALL be emitted after (not before) the patch is committed.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-14
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Behavior)"
  source_quote: "apply the patch (still immediate, still attributed, still superseded-not-erase)"
  normalized_statement: >
    WHEN the high-stakes gate fires
    THE SYSTEM SHALL NOT block or delay the patch application while waiting for
    spoken confirmation; the patch is committed first, and the confirm is emitted after;
    a high-stakes correction SHALL NOT leave the entry in an unpatched state
    pending human approval.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-15
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Behavior)"
  source_quote: "The confirm is an audible receipt, not a blocking approval prompt."
  normalized_statement: >
    WHEN the spoken acknowledgement is emitted for a high-stakes correction
    THE SYSTEM SHALL treat it as an audible receipt only; it SHALL NOT wait for
    participant acknowledgement, SHALL NOT block further pipeline processing,
    and SHALL NOT require a human approval response before completing the correction.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-16
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Behavior)"
  source_quote: "emit a one-line spoken acknowledgement via Doc 02's mouth (owned by Doc 04's turn)"
  normalized_statement: >
    WHEN a spoken acknowledgement is emitted for a high-stakes correction
    THE SYSTEM SHALL emit exactly one line of speech (not zero, not two or more lines)
    via Doc 02's speech path, owned within Doc 04's wake turn; multiple acknowledgement
    lines per single high-stakes correction are a violation.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

# ── Gate boundary: notes corrections only ─────────────────────────────────────

- requirement_id: R-doc03-CORR-17
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3 (Boundary)"
  source_quote: "this gate governs notes corrections only. World-touching actions already require a human click."
  normalized_statement: >
    WHEN the high-stakes correction gate evaluates an incoming correction
    THE SYSTEM SHALL apply the gate only to notes corrections; world-touching actions
    (any action requiring a human click per Law 3) SHALL NOT be subject to this gate
    and SHALL retain their own human-click approval mechanism unaffected.
  requirement_type: architecture_invariant
  criticality: P0
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified
