# ── Single Cartesia voice — positive ─────────────────────────────────────────

- criterion_id: AC-IDTILE-005
  name: "All TTS speech uses a single Cartesia voice configuration; no voice switching"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-IDTILE-05, R-doc08-IDTILE-06]
  criticality: P1
  blocking: true
  behavior:
    given: "A sequence of TTS synthesis calls spanning different response types (technical, brief, conversational)"
    when: "All calls are observed at the call_external Cartesia seam"
    then:
      - "Every call carries the same Cartesia voice_id parameter"
      - "No call carries a voice_id that differs from the configured single voice"
      - "No call carries a voice_id derived from question type, mode, or any runtime variable"
  primary_oracle: {type: deterministic, artifact: "vcrpy cassette over 3+ synthesis calls across response types; assert voice_id is constant across all requests"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-IDTILE-005]
  dependency_class: vendor:cartesia
  mock_boundary: "may mock Cartesia HTTP response via vcrpy cassette at call_external layer; MUST NOT replace the call_external seam with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}

- criterion_id: AC-IDTILE-005-NEG
  name: "Single-voice dispatch degrades honestly when Cartesia errors or times out"
  authority_refs: [R-doc08-IDTILE-05, R-doc08-IDTILE-06]
  criticality: P1
  blocking: true
  behavior:
    given: "The Cartesia TTS seam is configured to return a 503 or connection timeout"
