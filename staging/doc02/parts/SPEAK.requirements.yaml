  requirement_type: performance
  criticality: P1
  testability: executable
  status: qualified
- requirement_id: R-doc02-SPEAK-16
  authority_type: operational_slo
  authority_document: DOC-02
  source_location: "CANONICAL §12.8"
  source_quote: "first-grounded-audio p50<=2.5s/p95<=5s"
  normalized_statement: >
    WHEN a shallow grounded direct answer is spoken THE SYSTEM SHALL meet first-grounded-audio p95 <= 5s.
  requirement_type: performance
  criticality: P1
  testability: executable
  status: qualified
- requirement_id: R-doc02-SPEAK-17
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.7 / §3.9 step 4"
  source_quote: "the text copy posts to chat with every spoken line"
  normalized_statement: >
    IF TTS synthesis fails for a line THE SYSTEM SHALL still post that line's text to chat (a dead engine never makes Proxy both mute and silent).
  requirement_type: resilience
  criticality: P1
  testability: executable
  status: qualified
