# ── R-doc08-SCREEN-05: pin-to-source mode ────────────────────────────────────

- criterion_id: AC-SCREEN-006
  name: "Pin-to-source mode renders the actual indexed file with exactly the cited lines highlighted"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SCREEN-05]
  criticality: P1
  blocking: true
  behavior:
    given: >
      Screenshare is active, pin_to_source mode is selected with
      file_path='src/checkout.py' and line_range=[42, 44]
    when: "The screen canvas is rendered"
    then:
      - "Rendered file content matches the actual file read from the codebase index at the given path"
      - "Lines 42–44 are visually highlighted; no other line range is highlighted instead"
      - "No paraphrased, summarized, or substitute representation replaces the actual file"
  primary_oracle:
    type: deterministic
    artifact: >
      Render snapshot: assert file body matches codebase index read at file_path;
      assert highlight spans cover exactly lines 42–44;
      assert no substitute or summary text present.
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-SCREEN-006]
  dependency_class: gcs:objects
  mock_boundary: "Stub codebase index returning known file content at file_path; assert render uses that content verbatim"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-SCREEN-006-NEG
  name: "Pin-to-source degrades honestly when gcs:objects (file fetch) errors"
  authority_refs: [R-doc08-SCREEN-05]
  dependency_class: gcs:objects
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "Screenshare is active and pin_to_source mode is selected"
    when: "gcs:objects errors or times out when fetching the file content"
    then:
      - "Honest failure is spoken or posted (e.g., 'could not load the file — storage unavailable')"
      - "No silent placeholder or stale content is rendered as the live file"
      - "render_attempted is not flagged as successful"
  primary_oracle:
    type: deterministic
    artifact: >
      Assert honest failure message emitted on gcs error;
      assert render_attempted == false or explicit error content in canvas patch;
      assert no live-looking file content written when GCS unavailable.
  thresholds: {silent_failures_allowed: 0}
  fault_model_refs: []
  test_ids: [T-SCREEN-006-NEG]

