# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 12 · Verbal walkthrough — human-activated only
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-34
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "Off by default, always."
  normalized_statement: >
    WHEN a new meeting session begins THE SYSTEM SHALL initialize the verbal walkthrough mode
    to OFF; narration SHALL NOT occur unless explicitly activated.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-35
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "It turns on only when a human asks — \"walk us through how you're doing it,\" \"talk us through it\" — or says yes to Proxy's offer."
  normalized_statement: >
    WHEN a human explicitly requests walkthrough or responds affirmatively to Proxy's offer
    THE SYSTEM SHALL activate walkthrough mode; walkthrough SHALL NOT activate by any other
    means.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-36
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "silence or no = off, and it doesn't re-offer."
  normalized_statement: >
    WHEN Proxy offers walkthrough and the human responds with silence or "no" THE SYSTEM SHALL
    keep walkthrough mode OFF and SHALL NOT offer walkthrough again for that task instance.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-37
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "when starting a substantial task it may ask once."
  normalized_statement: >
    WHEN starting a substantial task with walkthrough OFF THE SYSTEM SHALL offer walkthrough
    at most once per task instance.
  requirement_type: constraint
  criticality: P2
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-38
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "\"Quiet narration\" (or \"quiet\") ends it instantly."
  normalized_statement: >
    WHEN a participant says "quiet narration" or "quiet" while walkthrough is ON THE SYSTEM
    SHALL immediately deactivate walkthrough mode and cease all narration events.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-39
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "narrate the current action, never the backlog (if the work outruns the voice, stale lines are dropped, not read like a log)."
  normalized_statement: >
    WHEN walkthrough is ON and task actions proceed faster than narration delivery THE SYSTEM
    SHALL narrate only the most-recent action state and SHALL drop stale intermediate lines
    rather than queuing and replaying them.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-40
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "it speaks only into silence, yields mid-word like all voice, and drops to the tile/chat the moment people talk."
  normalized_statement: >
    WHEN walkthrough narration is in progress and another participant begins speaking THE
    SYSTEM SHALL interrupt narration immediately (mid-word if necessary) and yield the floor.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-41
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "every narration line routes through Proxy's normal delivery judgment — so if the room's conversation has genuinely resumed elsewhere, narration drops to tile/chat and the result arrives at the end."
  normalized_statement: >
    WHEN walkthrough is ON and Proxy's delivery judgment determines the room's conversation
    has genuinely resumed THE SYSTEM SHALL route remaining narration to tile and chat rather
    than speaking, delivering the task result via chat at completion.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-42
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 12"
  source_quote: "when narration is on, the worker adds a one-line *why* to its action events."
  normalized_statement: >
    WHEN walkthrough is ON and the worker emits an action event THE SYSTEM SHALL attach a
    non-empty one-line rationale explaining why that action is being taken.
  requirement_type: functional
  criticality: P2
  testability: executable
  status: qualified


# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 13 · Screen sharing — human-activated only
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-43
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 13"
  source_quote: "The screen turns on only in response to a human — an explicit command (\"share your screen,\" \"show us\"), an ask that implies it (\"show us the trace\"), or a yes to Proxy's offer."
  normalized_statement: >
    WHEN a human explicitly commands screen sharing, asks something that implies it, or
    responds affirmatively to Proxy's offer THE SYSTEM SHALL activate screen sharing; screen
    sharing SHALL NOT activate by any other means.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-44
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 13"
  source_quote: "Proxy never self-promotes to the shared screen."
  normalized_statement: >
    WHEN no human has requested screen sharing or responded affirmatively to an offer THE
    SYSTEM SHALL NOT activate screen sharing autonomously under any task state or condition.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-45
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 13"
  source_quote: "\"Stop sharing\" returns to the tile immediately and always wins."
  normalized_statement: >
    WHEN a participant says "stop sharing" THE SYSTEM SHALL immediately deactivate screen
    sharing, return to the tile, and SHALL NOT automatically restore screen sharing until
    a new human request is received.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified


