# ── Barge-in: speak stream stops, send_chat posts remainder — nothing lost ───────

- requirement_id: R-doc08-PROJ-27
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, bullet 'barge-in behaviour'"
  source_quote: "The barge-in behaviour: speak stream stops (Doc 02), model calls send_chat → nothing is lost"
  normalized_statement: >
    WHEN a barge-in event stops the active voice stream (Doc 02) AND the model subsequently
    calls send_chat with the remaining content THE SYSTEM SHALL project that send_chat
    TOOL_USE as a ResponseChunk frame and deliver it to the chat channel, ensuring that no
    answer content is silently dropped on barge-in.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── User turn persisted before stream starts ────────────────────────────────────

- requirement_id: R-doc08-PROJ-28
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, final bullet"
  source_quote: "Persisting the user turn BEFORE the stream (upstream in the harness) — the notes file reads a turn that a mid-stream crash would otherwise have dropped"
  normalized_statement: >
    THE SYSTEM SHALL persist the user's turn to the durable store (Postgres + GCS) BEFORE
    beginning to stream delta chunks in carry_turn; a crash or connection loss during the
    stream SHALL NOT result in the user turn being absent from the notes or transcript.
  requirement_type: data_integrity
  criticality: P1
  testability: executable
  status: qualified
