# Doc 05 (Workroom) — §1 + §2 acceptance criteria
# Coverage: §1 (The end goal) and §2.1–2.6 (The design)
# ID scheme: AC-S1-NNN for §1 items, AC-S2-NNN for §2 items
# NEG pairs emitted for every non-null dependency_class criterion.
# Golden-path criteria: AC-S1-001 (adopt, not build), AC-S2-001 (direct-path latency), AC-S2-025 (staged-draft floor end-to-end)

# ═══════════════════════════════════════════════════════════════════════════════
# §1 · THE END GOAL
# ═══════════════════════════════════════════════════════════════════════════════

# ── Adopt, not build ──────────────────────────────────────────────────────────

- criterion_id: AC-S1-001
  name: "No task-type router or intake classifier exists anywhere in the Workroom codebase"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S1-01, R-doc05-S1-02, R-doc05-S1-04]
  criticality: P0
  blocking: true
  behavior:
    given: "The complete Workroom service source tree."
    when: "The source is inspected for routing logic."
    then:
      - "Zero functions, classes, or branches implement a task-type router or intake classifier."
      - "The SDK's ClaudeAgentOptions is constructed via workroom_options only — no direct construction bypasses it."
      - "No conditional branch routes on detected task type (e.g. 'if task_type == quick else large')."
  primary_oracle:
    type: static_analysis
    artifact: "Grep for router/classifier patterns; AST scan for task_type branching; assert zero hits; assert all ClaudeAgentOptions construction passes through workroom_options."
  thresholds:
    task_type_router_instances: 0
    intake_classifier_instances: 0
    direct_claude_agent_options_constructions_outside_workroom_options: 0
  dependency_class: null
  mock_boundary: null
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: e2e}
  test_ids: [T-S1-001]

- criterion_id: AC-S1-002
  name: "Workroom adds only the prescribed thin shell — no re-implementation of SDK internals"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S1-02, R-doc05-S1-03, R-doc05-S1-04]
  criticality: P0
  blocking: true
  behavior:
    given: "The Workroom service source."
    when: "The source is audited for SDK-internal re-implementations."
    then:
      - "No re-implementation of the SDK agent loop is present."
      - "No re-implementation of planning-within-a-turn logic is present."
      - "No re-implementation of effort-control or adaptive-effort logic is present."
      - "The permitted additions (system prompt, toolbelt declaration, output format, safety/cost floors, big-build discipline shell) are the only additions."
  primary_oracle:
    type: static_analysis
    artifact: "AST scan for loop re-implementation patterns (e.g. manual message-append loops duplicating SDK internals), effort-control scoring, and task-type scoring; assert zero instances."
  thresholds:
    sdk_internal_reimplementations: 0
    effort_control_implementations_outside_sdk: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S1-002]

- criterion_id: AC-S1-003
  name: "V0 executes large-task subtasks sequentially in one resumed SDK session — no concurrent workers"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S1-05, R-doc05-S2-22]
  criticality: P0
  blocking: true
  behavior:
    given: "A large task with 3 subtasks is submitted to the Workroom."
    when: "The task executes to completion."
    then:
      - "Subtasks execute in order: subtask N+1 does not begin until subtask N has committed and published."
      - "All subtasks run in the same resumed SDK session (same session_id)."
      - "No concurrent worker threads or asyncio tasks execute distinct subtasks simultaneously."
  primary_oracle:
    type: deterministic
    artifact: "Instrument subtask start/end events; assert temporal ordering: start(N+1) > end(N) for all N; assert session_id is constant across all subtask query() calls."
  thresholds:
    subtask_concurrency_violations: 0
    session_id_changes_within_task: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK invocation with cassette at LLM boundary; subtask prompts are scripted; session_id checked from SDK response metadata."
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S1-003]

- criterion_id: AC-S1-003-NEG
  name: "Removing the sequential guard allows concurrent subtasks — confirms guard is load-bearing"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S1-05]
  criticality: P0
  blocking: true
  behavior:
    given: "The sequential subtask guard is removed (control experiment); 3 subtasks are submitted."
    when: "The tasks execute."
    then:
      - "At least two subtasks execute with overlapping timelines — confirming the guard prevented this."
  primary_oracle:
    type: deterministic
    artifact: "Remove sequential gate; run 3 subtasks; assert at least one overlap: start(N+1) < end(N) for some N."
  thresholds:
    concurrent_subtask_pairs_in_control: {minimum: 1}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cassette; guard disabled in test harness only."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S1-003-NEG]

- criterion_id: AC-S1-004
  name: "Mid-task human correction rewrites the live plan artifact without restarting the SDK session"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S1-07, R-doc05-S2-20]
  criticality: P0
  blocking: true
  behavior:
    given: "A large task is executing subtask 2 of 4; subtask 1 is committed."
    when: "A human correction ('cap at 100/min, not 60') arrives."
    then:
      - "The live plan artifact on disk is updated to reflect the correction in the relevant unit."
      - "The SDK session_id does not change after the correction."
      - "Subtask 1 is not re-executed; execution continues from subtask 2 with the amended plan."
      - "The final artifact reflects the correction, not the original value."
  primary_oracle:
    type: deterministic
    artifact: "Read plan artifact before and after correction injection; diff shows correction applied; assert session_id unchanged; assert subtask 1 commit unchanged in git log."
  thresholds:
    session_restarts_on_correction: 0
    completed_subtask_reruns_on_correction: 0
  dependency_class: db:postgres
  mock_boundary: "Postgres test instance; E2B sandbox replaced by temp dir fixture; SDK cassette at LLM boundary."
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S1-004]

- criterion_id: AC-S1-004-NEG
  name: "Without live plan update, correction is lost after restart — confirms plan persistence is required"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S2-20]
  criticality: P0
  blocking: true
  behavior:
    given: "Correction is applied only to in-context memory, not to the persisted plan artifact."
    when: "The session is interrupted and resumed."
    then:
      - "The correction is absent from the resumed execution — confirming plan persistence is the durable record."
  primary_oracle:
    type: deterministic
    artifact: "Simulate interruption + resume without plan-artifact update; assert final artifact uses original value, not corrected value."
  thresholds:
    corrections_surviving_resume_without_plan_update: 0
  dependency_class: db:postgres
  mock_boundary: "Postgres test instance; SDK cassette."
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S1-004-NEG]

- criterion_id: AC-S1-005
  name: "Workroom does not touch the canonical repo copy or execute outside its sandbox"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S1-08]
  criticality: P0
  blocking: true
  behavior:
    given: "A Workroom session is running with a declared sandbox MCP."
    when: "The agent is prompted to modify the canonical repo or execute outside the sandbox."
    then:
      - "No write to the canonical repo path occurs."
      - "No file operation executes on the orchestrator host filesystem."
      - "All effects are confined to the E2B sandbox (detectable via sandbox file receipts)."
  primary_oracle:
    type: deterministic
    artifact: "Monitor orchestrator host filesystem writes; assert zero writes to canonical repo paths during session; assert all artifact_hashes receipts reference sandbox paths only."
  thresholds:
    canonical_repo_writes: 0
    host_filesystem_writes_outside_sandbox: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cassette at LLM boundary; filesystem watcher on host canonical path."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S1-005]

- criterion_id: AC-S1-005-NEG
  name: "Without sandbox confinement, agent can write to orchestrator host — confirms confinement is the gate"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S1-08]
  criticality: P0
  blocking: true
  behavior:
    given: "Sandbox confinement (triad) is disabled; agent is prompted to write a file."
    when: "The write tool is invoked."
    then:
      - "The write executes on the orchestrator host filesystem — confirming confinement prevents this."
  primary_oracle:
    type: deterministic
    artifact: "Control: disable triad; prompt file write; assert host filesystem write count >= 1."
  thresholds:
    host_writes_in_control: {minimum: 1}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK in isolated test env; cassette at LLM boundary; no sensitive data on host."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S1-005-NEG]

# ═══════════════════════════════════════════════════════════════════════════════
# §2.1 · HOW QUICK ASKS ARE QUICK
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S2-001
  name: "Direct-path quick ask (host-side code_intel, no sandbox) completes in ~1–2 seconds"
  evidence_class: "[latency]"
  authority_refs: [R-doc05-S2-01, R-doc05-S2-06]
  criticality: P0
  blocking: true
  behavior:
    given: "A warm meeting session: sandbox pre-provisioned, system prompt cached, code_intel LSP warm."
    when: "A code-lookup quick ask (e.g. 'where is the retry logic?') is submitted via the direct path."
    then:
      - "End-to-end response time from request receipt to first envelope returned is <= 2000ms (p50 across 5 runs)."
      - "No sandbox tool calls are made (only host-side code_intel tools appear in the trace)."
      - "The response includes at least one file:line citation."
  primary_oracle:
    type: latency_measurement
    artifact: "Measure wall-clock time from task dispatch to envelope delivery; assert p50 <= 2000ms; inspect tool call trace for absence of mcp__code__* sandbox tools."
  thresholds:
    p50_latency_ms: {maximum: 2000}
    sandbox_tool_calls_on_direct_path: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cassette at LLM boundary for reproducibility; real code_intel service against test repo."
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: e2e}
  test_ids: [T-S2-001]

- criterion_id: AC-S2-001-NEG
  name: "Direct-path latency degrades to >2s when prompt cache is cold — confirms warm cache is the SLA gate"
  evidence_class: "[latency]"
  authority_refs: [R-doc05-S2-05, R-doc05-S2-06]
  criticality: P0
  blocking: true
  behavior:
    given: "A cold session: prompt cache is cleared, system prompt not yet cached."
    when: "The same quick ask is submitted."
    then:
      - "End-to-end response time exceeds 2000ms — confirming the cached prefix is required to hit the SLA."
  primary_oracle:
    type: latency_measurement
    artifact: "Clear prompt cache; measure latency; assert p50 > 2000ms; confirms the positive SLA depends on the warm cache."
  thresholds:
    p50_latency_ms_cold: {minimum: 2001}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cleared cache; cassette at LLM boundary with cache-miss response timing."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S2-001-NEG]

- criterion_id: AC-S2-002
  name: "Sandbox-reaching quick ask completes in single-digit seconds (no sandbox cold-start mid-meeting)"
  evidence_class: "[latency]"
  authority_refs: [R-doc05-S2-02, R-doc05-S2-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A warm meeting session with pre-provisioned sandbox."
    when: "A quick ask requiring a sandbox tool call (e.g. ripgrep) is submitted."
    then:
      - "End-to-end response time is <= 8000ms (p50 across 5 runs)."
      - "No sandbox cold-boot occurs (sandbox health check shows already-running state)."
  primary_oracle:
    type: latency_measurement
    artifact: "Wall-clock timing from task dispatch to envelope; sandbox /health hit before timing shows warm; assert p50 <= 8000ms."
  thresholds:
    p50_latency_ms: {maximum: 8000}
    sandbox_cold_boot_events: 0
  dependency_class: vendor:e2b
  mock_boundary: "Real E2B sandbox (pre-provisioned in test fixture); SDK cassette at LLM boundary."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S2-002]

- criterion_id: AC-S2-002-NEG
  name: "Cold-sandbox quick ask breaches SLA — confirms pre-provisioning is required"
  evidence_class: "[latency]"
  authority_refs: [R-doc05-S2-05]
  criticality: P0
  blocking: true
  behavior:
    given: "Sandbox is not pre-provisioned (cold start)."
    when: "A sandbox-reaching quick ask is submitted."
    then:
      - "End-to-end latency exceeds 8000ms — confirming cold start violates the SLA."
  primary_oracle:
    type: latency_measurement
    artifact: "Start from cold E2B sandbox; measure latency; assert p50 > 8000ms."
  thresholds:
    p50_latency_ms_cold_start: {minimum: 8001}
  dependency_class: vendor:e2b
  mock_boundary: "Real E2B cold-start; SDK cassette at LLM boundary."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S2-002-NEG]

- criterion_id: AC-S2-003
  name: "No router, classifier, or extra overhead code exists on the quick-ask path"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S2-03, R-doc05-S2-06, R-doc05-S1-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The Workroom source code."
    when: "The hot path from task receipt to query() is traced."
    then:
      - "No task-type classification function is called before query()."
      - "No routing decision branch dispatches to a different handler based on estimated task type."
      - "No effort-scoring or complexity-scoring code exists on the hot path."
  primary_oracle:
    type: static_analysis
    artifact: "Trace call graph from task ingress to query(); assert zero classification or routing calls; grep for 'classifier', 'router', 'task_type', 'effort_score' on the hot path returns 0."
  thresholds:
    classification_calls_before_query: 0
    routing_branches_by_task_type: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S2-003]

- criterion_id: AC-S2-004
  name: "System prompt and map are prompt-cached with the 1-hour TTL breakpoint"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S2-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A Workroom session is initialized."
    when: "The ClaudeAgentOptions is constructed and the first query() is made."
    then:
      - "A cache_control breakpoint with a 1-hour TTL is set on the stable prefix (system prompt + map tool defs)."
      - "Per-task volatile content (bundle, transcript tail) is placed after the breakpoint."
      - "The SDK's token usage response shows cache_read_input_tokens > 0 on the second query() (confirming the prefix was cached)."
  primary_oracle:
    type: deterministic
    artifact: "Inspect ClaudeAgentOptions system_prompt for cache_control breakpoint with ttl=3600; on second query() assert cache_read_input_tokens > 0 in usage response."
  thresholds:
    cache_control_breakpoint_present: 1
    cache_ttl_seconds: 3600
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK invocation with cassette that returns realistic usage.cache_read_input_tokens values."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S2-004]

- criterion_id: AC-S2-004-NEG
  name: "Without the 1-hour cache breakpoint, cache misses between subtasks — confirms TTL is required"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S2-05]
  criticality: P1
  blocking: false
  behavior:
    given: "cache_control breakpoint TTL is set to the SDK default 5 minutes instead of 1 hour."
    when: "A multi-subtask build runs with inter-subtask delays > 5 minutes."
    then:
      - "cache_read_input_tokens == 0 on the second query() after the TTL expiry — confirming cache miss."
  primary_oracle:
    type: deterministic
    artifact: "Set TTL to 300s; simulate 6-minute delay; assert cache_read_input_tokens == 0 on resumed query()."
  thresholds:
    cache_hits_after_ttl_expiry: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK cassette with simulated TTL expiry behavior."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S2-004-NEG]

# ═══════════════════════════════════════════════════════════════════════════════
# §2.2 · THE DISPOSITION
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S2-005
  name: "System prompt verbatim opening line is present and exact"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S2-07]
  criticality: P0
  blocking: true
  behavior:
    given: "The Workroom system prompt construction code or template."
    when: "The generated system prompt text is inspected."
    then:
      - "The first substantive instruction in the system prompt is exactly: 'If this can be answered with a straight lookup, a single tool call, or one step — answer it quickly and simply, now. Otherwise: plan, build, and verify.'"
      - "No word, punctuation, or character differs from the verbatim text above."
  primary_oracle:
    type: deterministic
    artifact: "Extract system_prompt string from workroom_options output; assert prompt.lstrip().startswith('If this can be answered with a straight lookup, a single tool call, or one step — answer it quickly and simply, now. Otherwise: plan, build, and verify.')."
  thresholds:
    verbatim_opening_line_present: 1
    character_deviations_from_verbatim: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S2-005]

- criterion_id: AC-S2-006
  name: "System prompt contains all required disposition instructions"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S2-08, R-doc05-S2-09, R-doc05-S2-10, R-doc05-S2-11, R-doc05-S2-12, R-doc05-S2-13, R-doc05-S2-14, R-doc05-S2-15, R-doc05-S2-16]
  criticality: P0
  blocking: true
  behavior:
    given: "The Workroom system prompt."
    when: "The full system prompt text is inspected."
    then:
      - "The prompt contains an instruction prohibiting task-type classification ('never classify into task types')."
      - "The prompt contains a file:line citation instruction."
      - "The prompt contains a no-fabrication instruction with clearly-marked-defaults fallback."
      - "The prompt contains a one-clarifying-question limit instruction."
      - "The prompt contains a world-touching acts → staged draft instruction."
      - "The prompt contains a speakable headlines instruction."
      - "The prompt contains a budget/replan cap → honest state instruction."
      - "The prompt contains an honest decline with named missing access instruction."
      - "The prompt contains map-orient / parallel tool calls / big outputs in files instructions."
  primary_oracle:
    type: deterministic
    artifact: "Assert each of the 9 required instruction topics is present by substring/keyword match in the system_prompt string; assert none of the 9 is absent."
  thresholds:
    required_disposition_instructions_present: 9
    required_disposition_instructions_absent: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S2-006]

- criterion_id: AC-S2-007
  name: "Engine asks at most one clarifying question per task and only when alternatives change the action"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S2-11]
  criticality: P1
  blocking: false
  behavior:
    given: "A task that admits a clarifying question but for which a reasonable default exists."
    when: "The engine processes the task."
    then:
      - "The engine asks at most one clarifying question."
      - "If the engine can proceed without ambiguity, it does not ask any clarifying question."
  primary_oracle:
    type: simulation
    artifact: "Run 5 test tasks designed to elicit over-clarification; assert total clarifying questions per task <= 1; assert tasks with unambiguous defaults produce 0 questions."
  thresholds:
    clarifying_questions_per_task: {maximum: 1}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cassette at LLM boundary; test tasks scripted."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S2-007]

- criterion_id: AC-S2-007-NEG
  name: "Without the one-question limit in the system prompt, engine over-clarifies — confirms instruction is required"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S2-11]
