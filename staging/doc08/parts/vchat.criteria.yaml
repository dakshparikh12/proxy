# ══════════════════════════════════════════════════════════════════════
# §2.3 bullet 3 — Everything spoken is also posted as text
# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-006
  name: "every speak() call produces a corresponding send_chat() mirror in the same turn"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-06]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy has issued one or more speak() calls in a turn"
    when: "All tool calls for the turn are captured"
    then:
      - "For every speak(text) call there is a corresponding send_chat(text) call where the text is identical to the spoken text"
      - "No speak() call exists without a paired send_chat() containing the same content"
      - "The send_chat() mirror is issued within the same turn, not a future turn"
  primary_oracle:
    type: deterministic
    artifact: "assert for each speak_call in turn_log: exists send_chat_call in same turn where send_chat_call.text == speak_call.text; violations_count == 0"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-006]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-007
  name: "chat mirror is derived from speak() source text without a second model synthesis call"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-07]
  criticality: P1
  blocking: true
  behavior:
    given: "A speak() call has been issued with a specific text argument"
    when: "The harness mirror logic runs to produce the chat counterpart"
    then:
      - "No additional LLM/model call is made to produce the chat text"
      - "The send_chat() argument is produced by passing the same string from speak() to the mirror path, not by re-inferring"
  primary_oracle:
    type: deterministic
    artifact: "assert model_calls_in_mirror_path == 0; the mirror function is a pass-through, testable as a pure function with no side-effects to external APIs"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-007]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ══════════════════════════════════════════════════════════════════════
# §2.3 bullet 4 — <0.5s acknowledgment (latency boundary-value criteria)
# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-008
  name: "acknowledgment fires within 500ms of ask arrival (passing boundary)"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-08, R-doc08-VCHAT-09]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy receives a voice or chat ask"
    when: "Time is measured from ask receipt to first acknowledgment speak() or send_chat() call"
    then:
      - "The elapsed time from ask receipt to acknowledgment dispatch is strictly less than 500ms"
      - "The acknowledgment is the first tool call in the turn, preceding any substantive answer work"
  primary_oracle:
    type: deterministic
    artifact: "assert ack_dispatch_time - ask_receipt_time < 500; measured in test harness by recording monotonic timestamps at ask receipt and first ack tool call; mock answer latency to isolate ack path"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-008]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-009
  name: "acknowledgment at exactly 500ms is a FAIL (boundary: <500ms required, not ≤)"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-08]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy receives an ask and the acknowledgment dispatch is simulated to arrive at exactly T+500ms"
    when: "The timing gate evaluates the ack"
    then:
      - "The timing gate classifies the ack as a violation (not a pass)"
      - "The threshold is strictly less-than 500ms, so 500ms itself is a failure"
  primary_oracle:
    type: deterministic
    artifact: "inject mock clock; set ack_dispatch_time = ask_receipt_time + 500; assert timing_gate.result == FAIL; confirms strict inequality enforced"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-009]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-010
  name: "acknowledgment absent (dead air) is always a FAIL regardless of system load"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-10]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy receives an ask and no acknowledgment speak() or send_chat() call is emitted before substantive answer processing begins"
    when: "The turn log is inspected at T+500ms"
    then:
      - "The dead-air condition is detected and logged as a P1 violation"
      - "No scenario (slow answer, high load, model timeout) excuses the absence of an acknowledgment"
  primary_oracle:
    type: deterministic
    artifact: "assert ack_present_in_first_500ms == true for all ask inputs; inject delayed answer path; confirm ack still fires within 500ms independent of answer completion"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-010]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-011
  name: "acknowledgment is independent of substantive answer completion time"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-09]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy receives an ask where the substantive answer requires 5 seconds to produce"
    when: "The turn unfolds"
    then:
      - "The acknowledgment is emitted within 500ms of ask receipt"
      - "The substantive answer arrives at T+5s"
      - "The late answer does not cause the ack to be retroactively reclassified or suppressed"
  primary_oracle:
    type: deterministic
    artifact: "mock answer path with 5000ms artificial delay; assert ack_time < 500ms; assert answer arrives at T+5000ms; both conditions must hold simultaneously"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-011]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ══════════════════════════════════════════════════════════════════════
# §2.3 bullet 5 — Interrupted mid-answer → finishes in chat
# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-012
  name: "barge-in stops speak() within 200ms and posts remainder to chat with prefix"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-11]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is mid-way through a speak() voice turn delivering a known planned answer"
    when: "A barge-in interrupt event is received"
    then:
      - "The speak() call is halted within 200ms of the interrupt signal"
      - "A send_chat() call is issued with the remainder of the planned answer"
      - "The send_chat() content begins with the prefix '(finishing here —)'"
  primary_oracle:
    type: deterministic
    artifact: "inject barge-in interrupt at midpoint of a scripted speak() turn; assert speak() stops within 200ms; assert send_chat(text) where text starts with '(finishing here —)' and contains the un-spoken remainder"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-012]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-013
  name: "no content is lost or silently dropped when barge-in occurs"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-12]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is delivering a planned answer consisting of N known content units (sentences or segments)"
    when: "A barge-in interrupt occurs after unit K (K < N)"
    then:
      - "Units 1..K that were spoken appear in the chat mirror record"
      - "Units K+1..N appear in the chat remainder posted after barge-in"
      - "The union of spoken-mirror and chat-remainder covers all N content units with no gaps"
  primary_oracle:
    type: deterministic
    artifact: "scripted N-unit answer; inject barge-in at varying K values; assert coverage(spoken_mirror ∪ chat_remainder) == all_N_units for each K; zero content-loss violations"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-013]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

