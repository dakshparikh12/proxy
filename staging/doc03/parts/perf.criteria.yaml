      advance to 61s; assert flag==true; unset env var; advance to 89s; assert flag==false;
      advance to 91s; assert flag==true; grep: no literal 90 as threshold in non-config code
  thresholds:
    flag_set_below_threshold_allowed: 0
    flag_absent_above_threshold_allowed: 0
    hard_coded_freshness_threshold_in_non_config_code_allowed: 0
  fault_model_refs: [F-PERF-FRESHNESS-THRESHOLD-HARD-CODED, F-PERF-FRESHNESS-FLAG-WRONG-TRIP-POINT]
