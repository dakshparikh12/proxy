      - The tier for the Django area == 'exact-supported' (matches the golden pre-computed tiers).
      - The tiers are present in the persisted record (pre-computed at index time, not derived at query time).
  applicability:
    fixtures: [fixture-mixed-stack-tiers]
    estates: [estate-cova]
    excluded_estates: []
    rationale: "Honesty labels must be pre-computed at index time, per §3.7 gate bullet 3."
  primary_oracle:
    type: deterministic_golden_record_field_check
    artifact: goldens/fixture-mixed-stack-tiers/capability-tiers.json
  thresholds:
