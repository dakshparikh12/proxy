# ─────────────────────────────────────────────────────────────────────────────
# JWT SECURITY — per-sandbox secret
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-S5-003
  name: "Per-sandbox HS256 secret: each provisioned sandbox receives a distinct secret"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-04, R-doc05-S5-05]
  criticality: P0
  blocking: true
  behavior:
    given: "Two sandboxes provisioned for different meetings"
    when: "Their JWT secrets are compared"
    then:
      - "The two secrets are distinct (probability-one randomness from provision-time generation)"
      - "The host sandbox-to-secret map holds both entries separately"
  primary_oracle: {type: deterministic, artifact: "provisioning unit test asserts secrets are distinct UUIDs/random bytes"}
  thresholds: {shared_secret_reuse_allowed: 0}
  dependency_class: vendor:e2b
  mock_boundary: "E2B sandbox provisioning mocked; secret generation logic tested directly"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
  test_ids: [T-S5-003]

- criterion_id: AC-S5-003-NEG
  name: "NEG: Fleet-shared secret rejected — in-sandbox code cannot exfiltrate cross-sandbox token"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-04, R-doc05-S5-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A simulated in-sandbox attacker that reads the JWT_SECRET environment variable of sandbox A"
    when: "The attacker mints a JWT using that secret and presents it to sandbox B"
    then:
      - "Sandbox B returns 401 (signature verification fails against its own distinct secret)"
  primary_oracle: {type: deterministic, artifact: "integration test: sandbox B returns 401 for sandbox A–minted token"}
  thresholds: {cross_sandbox_auth_allowed: 0}
  dependency_class: vendor:e2b
  mock_boundary: "Two sandbox instances instantiated with distinct secrets in test harness"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: reality}
  test_ids: [T-S5-003-NEG]

