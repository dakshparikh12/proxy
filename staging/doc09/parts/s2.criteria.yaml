- criterion_id: AC-S2-004
  name: "No shared wire type re-declared outside libs/contracts"
  evidence_class: "[static]"
  authority_refs: [R-doc09-S2-03]
  criticality: P1
  blocking: true
  behavior:
    given: "The repo tree is scanned for class/dataclass/TypedDict definitions of Bundle, Envelope, AgentChunk, NotesDelta, Readiness, and EnvelopeStatus"
    when: "A static grep or AST scan is run across all service and app directories"
    then:
      - "No definition of these types exists outside libs/contracts"
      - "Every import of these types resolves to libs.contracts"
  primary_oracle: {type: static_grep_ast, artifact: "grep -rn 'class Bundle|class Envelope|class AgentChunk|class NotesDelta|Readiness =|EnvelopeStatus =' services/ apps/ libs/ --include='*.py' | grep -v libs/contracts"}
  thresholds: {re_declared_shared_types: 0}
  fault_model_refs: [F-S2-004]
  test_ids: [T-S2-004]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - static:T-S2-004

