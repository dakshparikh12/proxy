  status: qualified

- requirement_id: R-DOC00-2-12
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§11.5 Envelope Pydantic model + §1.2"
  source_quote: "class Envelope(BaseModel): headline: str; detail: str | None = None; artifact: dict | None = None; receipts: list[str] = []; status: EnvelopeStatus; verification: Literal[\"verified\",\"unverified\"] | None = None; draft_id: UUID | None = None; task_id: UUID"
  normalized_statement: >
    WHEN the 05->04 Envelope model is defined in libs/contracts
    THE SYSTEM SHALL declare exactly the fields {headline, detail, artifact, receipts, status, verification, draft_id, task_id}
    with verification a separate optional Literal["verified","unverified"]|None (NOT a status value), draft_id an optional UUID, and task_id a UUID.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-13
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§1.1 AgentChunk metadata keys + §11.3 cost-meter read"
  source_quote: "RESULT -> {\"session_id\", \"num_turns\", \"total_cost_usd\", \"structured_output\"} ... The cost meter reads RESULT.metadata[\"total_cost_usd\"] off this same stream."
  normalized_statement: >
    WHEN an AgentChunk is emitted
    THE SYSTEM SHALL carry the canonical per-variant metadata keys (INIT->{session_id,tools,mcp_servers}; TEXT->{msg_id};
    TOOL_USE->{id,name,input}; TOOL_RESULT->{tool_use_id,is_error,structured}; RESULT->{session_id,num_turns,total_cost_usd,structured_output}; ERROR->{message}),
    so the cost meter can read RESULT.metadata["total_cost_usd"] off the stream_deltas output.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-14
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§12.5 typed BehaviorConfig + DOC-00 §3 libs/agentkit"
  source_quote: "Replace the YAML behavior registry + loader/schema with typed Python BehaviorConfig module constants (the BehaviorRunner/REGISTRY/register() are unchanged)."
  normalized_statement: >
    THE SYSTEM SHALL express the behavior/disposition registry as typed Python BehaviorConfig module constants driven by BehaviorRunner/REGISTRY/register(),
    and SHALL NOT ship a YAML behavior registry, loader, or schema (the YAML pattern is the documented Expansion path only).
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-15
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§11.3 stream_deltas delta-izing behavior"
  source_quote: "Delta-izes TEXT (yields only the new suffix per msg_id, resets on a new msg_id); passes INIT/TOOL_USE/TOOL_RESULT/RESULT/ERROR through UNCHANGED."
  normalized_statement: >
    WHEN stream_deltas processes an upstream AgentChunk iterable
    THE SYSTEM SHALL yield for each TEXT chunk ONLY the new suffix appended since the last TEXT chunk of the same msg_id
    (resetting the per-msg_id accumulator when a new msg_id starts) and SHALL pass
    INIT/TOOL_USE/TOOL_RESULT/RESULT/ERROR chunks through unchanged.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-16
  authority_type: specification
  authority_document: DOC-00
  source_location: "§2 the envelope — progress events"
  source_quote: "progress events same shape minus finality."
  normalized_statement: >
    WHEN the Workroom emits a progress event (an in-flight update rather than a terminal Envelope)
    THE SYSTEM SHALL give it the same field shape as the Envelope minus finality — it does NOT carry a finalized
    terminal EnvelopeStatus — so a consumer distinguishes an in-flight progress event from a finalized envelope.
  requirement_type: contract
  criticality: P2
  testability: executable
  status: qualified

