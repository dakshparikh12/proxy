# ── AC-SEAM-016: pick_provider returns Claude for unknown model ────────────────

- criterion_id: AC-SEAM-016
  name: "pick_provider returns the Claude provider for any unrecognized model identifier"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-SEAM-07]
  criticality: P1
  blocking: true
  behavior:
    given: "A model identifier 'some-unknown-model-xyz' that no registered provider's matches() returns True for"
    when: "pick_provider('some-unknown-model-xyz') is called"
    then:
      - "A provider is returned (no exception raised)"
      - "The returned provider is the Claude provider (provider.name == 'claude' or equivalent)"
