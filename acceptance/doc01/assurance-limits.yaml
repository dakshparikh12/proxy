# Assurance Limits — Doc 01 Code Intelligence
# Per GENERATOR.md §2.2
# Generated: 2026-07-17

---

what_a_green_bundle_means:
  - Every identified authority has been atomized and dispositioned.
  - Every mandatory requirement and derived obligation has at least one linked blocking acceptance criterion.
  - All P0 and P1 blocking criteria passed under every applicable environment.
  - The mandatory fault model was detected by the verifier (all P0/P1 canonical faults injected and caught).
  - Probabilistic and performance claims met their pinned statistical protocols (latency p50/p95).
  - Structural and mutation signals contain no unexplained critical gaps.
  - The evidence exactly matches the sealed acceptance-bundle and implementation hashes.

what_it_does_not_mean:
  - Does not prove the source specification contains every real-world requirement.
    The estate portfolio covers 6 repositories; correctness on other repos is not certified.
  - Does not prove no unmodeled state or environment can fail.
    Dynamic-dispatch and config-routed indirection (as in estate-messy) produce honest abstentions,
    not coverage; failure modes in that space are expected and not detected by this bundle.
  - Does not prove mutation operators represent every possible implementation defect.
    Surviving mutants classified as equivalent or irrelevant are excluded from the kill count;
    the verifier cannot distinguish all semantic defects from structural ones.
  - Does not prove sampled performance proves behavior under all workloads.
    Latency SLOs are sampled on pilot-scale repos (10–100× smaller than future monorepo estates);
    behavior at ≥1M-LOC scale is not certified.
  - Does not prove the real-repository portfolio represents every repository.
    Six estates with specific capability profiles are used; unusual repo structures, obscure languages,
    deep submodule trees, and binary-heavy repos are not in the portfolio.
  - Does not prove a calibrated learned evaluator is infallible.
    The citation-correctness evaluator is calibrated on the DEV estate set; holdout calibration
    is bounded to the stated confusion matrix; edge cases outside the calibration domain are not covered.
  - Does not prove the software contains no defects.

known_limits_of_the_estate_portfolio:
  - estate_gap: large-monorepo (>=1M LOC)
    status: deferred
    rationale: "Added on measured failure, not before. Pilot repos are 10-100x smaller."
  - estate_gap: polyglot (TS + Python mixed)
    status: deferred
    rationale: "Deferred per ESTATES.md §Deferred; no pilot repo stresses this combination."
  - estate_gap: deep-history
    status: deferred
    rationale: "Deferred per ESTATES.md §Deferred."
  - estate_gap: lfs-heavy
    status: deferred
    rationale: "Not in current pilot scope."
  - estate_gap: dynamic-dispatch paths in estate-messy
    status: by-design-abstention
    rationale: >
      estate-messy exists to produce honest abstention goldens (right answer = 'not found
      by this method'). High Unknown rates there are CORRECT behavior, not a coverage gap.

known_limits_of_security_verification:
  - The test harness verifies tenant isolation via injected cross-tenant cache keys and
    path substitutions on fixture repos. It does not simulate OS-level container escapes
    or hypervisor vulnerabilities.
  - Secret redaction is verified on the gitleaks fixture set; novel secret patterns
    not recognized by the pinned gitleaks version are not caught.
  - Nango credential storage is verified via contract tests against the Nango interface;
    Nango's own internal security is out of scope.

known_limits_of_performance_verification:
  - Latency SLOs are measured in the ENV-ESTATE environment on the six pinned repos.
    Cold-start behavior and resource-constrained environments are tested separately
    with a minimum resource-limit fixture; production fleet variance is not certified.
  - The 15-minute readiness bound is a pilot-scale target (PROVISIONAL-UNTIL-BASELINE).
    After first baseline measurements, the bound shall be tightened or adjusted per
    founder review.

dev_holdout_gap_requirement:
  - The dev-to-holdout score gap is a tracked metric reported in every section's evidence folder.
  - A gap exceeding 0.15 (15 percentage points) on any criterion triggers a mandatory
    investigation before ACCEPTED can be declared.
