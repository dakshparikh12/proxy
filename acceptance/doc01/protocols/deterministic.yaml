# Deterministic Protocol — Doc 01 Code Intelligence
# Per GENERATOR.md §11.1
# Generated: 2026-07-17

---

protocol_id: PROTO-DETERMINISTIC-01
name: "Deterministic exact-oracle protocol"
version: "1.0"

description: >
  Used for all criteria where identical inputs in the same environment must produce
  identical outputs. Covers: graph correctness, schema validation, security invariants,
  contract checks, exclusion enforcement, scope checks, cache invalidation, and
  any criterion with a deterministic oracle.

requirements:
  - Inputs and environment must be fully specified and pinned before execution.
  - Any randomness (e.g., PageRank tie-breaking) must use a pinned seed.
  - Exact or invariant-based oracle; no learned evaluator as primary decision.
  - Isolated setup (fresh DB, fresh clone state) and verified cleanup after each test.
  - Repeat only as needed to detect environmental flakiness (default: 1 run, flakiness budget: 3 retries max).
  - Any divergent result on a repeat run is classified NONDETERMINISTIC_FAILURE unless nondeterminism is explicitly allowed by the criterion.
  - No-op and constant-success baselines SHALL be rejected by the oracle before the test passes.

execution:
  setup:
    - Apply fixture or estate pinned state (repo at pinned SHA, DB seeded).
    - Assert setup integrity (file count, graph node count, or schema check).
  run:
    - Execute the exact operation under test (tool call, webhook delivery, etc.).
    - Capture full output including schema, field values, labels, counts.
  oracle:
    - Compare output to pinned golden or evaluate against invariant.
    - Schema: validate against declared JSON/YAML schema.
    - Citation: verify file path exists in pinned repo at pinned SHA; verify line number is within file bounds.
    - Counts: exact integer comparison (no fuzzy match).
    - Labels: exact string match ('resolved', 'lower-bound', 'not_found', enum values).
    - Security: assert absence of prohibited data (tenant cross-contamination, secret leakage, excluded-path appearance).
  cleanup:
    - Restore fixture state or dispose of ephemeral resources.
    - Assert no state leaks to subsequent tests.

flakiness_policy:
  max_retries: 3
  retry_classification: "NONDETERMINISTIC_FAILURE after retry budget exhausted"
  retry_permitted_only_for: "INFRASTRUCTURE_FAILURE (confirmed external cause)"

pre_build_negative_validation:
  requirement: >
    Every P0 and P1 criterion using this protocol SHALL demonstrate that its oracle
    rejects the following canonical bad behaviors before implementation begins.
  canonical_bad_behaviors:
    - no-op implementation (returns empty or null)
    - constant-success implementation (always returns same pre-canned result)
    - cross-tenant substitution (returns tenant-A data for tenant-B query)
    - excluded-path leak (returns excluded file content or path in results)
    - secret written to logs (token or secret value appears in log output)
    - stale result (returns result from prior commit SHA, not pinned SHA)
    - fabricated result (returns data not derivable from the pinned repo)
    - omitted required field (schema field absent in response)
    - mislabeled confidence (returns 'resolved' when only 'lower-bound' is warranted)

evidence_format:
  - junit XML with explicit criterion_id and test_id in <properties>
  - executed assertion count recorded per test
  - output artifact hash recorded for golden-based checks
  - no-op baseline rejection result recorded as a separate evidence line
  - fault detection result recorded per mandatory fault

applies_to_criteria:
  # All criteria tagged [unit-example], [contract], or [unit-property] that use
  # a deterministic oracle. Performance criteria use PROTO-PERFORMANCE-01 (separate file).
  tags: [unit-example, contract, unit-property]
  example_criterion_ids:
    - AC-M1-001 through AC-M1-006   # M1 Connection / security
    - AC-M2-001 through AC-M2-008   # M2 Clone
    - AC-M3-001 through AC-M3-009   # M3 Exclusions
    - AC-M4-001 through AC-M4-014   # M4 Structural substrate
    - AC-M5-001 through AC-M5-032   # M5 MCP tools
    - AC-M6-001 through AC-M6-008   # M6 Coverage / Readiness
    - AC-M7-001 through AC-M7-008   # M7 Freshness
    - AC-M8-001 through AC-M8-006   # M8 LSP
    - AC-INV-001 through AC-INV-009 # Invariants
    - AC-CANON-001 through AC-CANON-006  # Canonical contracts
