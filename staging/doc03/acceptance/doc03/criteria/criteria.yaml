  dependency_class: gcs:objects
  mock_boundary: "real GCS bucket or testcontainers-equivalent; MUST NOT replace storage client with Mock()"
  golden_path: false
  behavior:
    given: "A screenshared image of any size"
    when:  "The image grounding path runs end-to-end"
    then:
      - "The Claude API payload does NOT contain a 'type: image_url' with a data URI (data:image/...) or any base64-encoded bytes for the screenshare"
      - "A static grep audit finds zero base64 encoding of images in the grounding code path"
  primary_oracle:
    type: static_plus_integration_negative_assertion
    artifact: "grep image-grounding code for 'base64' in Claude API payload construction → expect zero; integration test: inspect Claude call payload; assert no data: URI present for screenshare"
  thresholds:
    base64_payloads_in_grounding_allowed: 0
