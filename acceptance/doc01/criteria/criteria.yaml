# ══════════════════════════════════════════════════════════════════
# M1 — Connection
# ══════════════════════════════════════════════════════════════════

- criterion_id: AC-M1-001
  name: "GitHub App requests exactly contents:read + metadata:read"
  evidence_class: "[contract]"
  authority_refs: [R-DOC01-3.1-01]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A GitHub App installation is created via the test harness with a mock GitHub
      API endpoint that records the requested OAuth scopes.
    when: >
      The installation flow completes.
    then:
      - The recorded scope set equals exactly {contents:read, metadata:read}.
      - No additional scope is present.
      - If the scope set differs, the installation is rejected.
  applicability:
    fixtures: [fixture-github-app-install]
    estates: [estate-flask, estate-proxy]
    excluded_estates: []
    rationale: "Scope enforcement is independent of repo content."
  primary_oracle:
    type: exact_set_comparison
    artifact: "recorded scopes == {contents:read, metadata:read}"
  thresholds:
    extra_scopes_allowed: 0
    missing_scopes_allowed: 0
  test_ids: [T-M1-001, T-M1-002]
  fault_model_refs: [F-SCOPE-EXTRA-PERM]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M1-001
    - contract:T-M1-002

- criterion_id: AC-M1-002
  name: "Token is minted per-operation via Nango, not cached"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.1-02]
  criticality: P0
  blocking: true
  behavior:
    given: >
      Two sequential operations requiring a GitHub token, with a Nango stub that
      records each mint call and returns distinct token values.
    when: >
      Both operations are executed.
    then:
      - Nango mint is called exactly once per operation (twice total).
      - The token value is not stored in any module-level, class-level, or
        persistent cache between the two operations.
      - The token from operation-1 is not reused by operation-2.
  applicability:
    fixtures: [fixture-nango-stub]
    estates: [estate-flask, estate-proxy]
    excluded_estates: []
    rationale: "Token lifecycle is independent of repo structure."
  primary_oracle:
    type: call_count_and_value_distinctness
    artifact: "nango_stub.mint_call_count == 2; tokens[0] != tokens[1] (stub returns distinct values)"
  thresholds:
    cached_reuse_allowed: 0
  test_ids: [T-M1-003, T-M1-004]
  fault_model_refs: [F-TOKEN-CACHED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M1-003
    - unit:T-M1-004

- criterion_id: AC-M1-003
  name: "GitHub token never written to logs"
  evidence_class: "[unit-property]"
  authority_refs: [R-DOC01-3.1-02]
  criticality: P0
  blocking: true
  behavior:
    given: >
      The Nango stub returns a known token value (sentinel: 'ghp_SENTINEL_TOKEN_VALUE').
      Log output is captured during an operation that uses the token.
    when: >
      The operation executes (clone, API call, etc.).
    then:
      - The sentinel token value does not appear anywhere in log output at any level.
      - The Authorization header value does not appear in log output.
  applicability:
    fixtures: [fixture-nango-stub, fixture-log-capture]
    estates: [estate-flask]
    excluded_estates: []
    rationale: "Log safety is independent of repo content."
  primary_oracle:
    type: log_content_absence
    artifact: "log_output must not contain 'ghp_SENTINEL_TOKEN_VALUE'"
  thresholds:
    token_log_occurrences_allowed: 0
  test_ids: [T-M1-005]
  fault_model_refs: [F-TOKEN-LOGGED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M1-005

- criterion_id: AC-M1-004
  name: "RepoProvider interface encapsulates all git-host-specific operations"
  evidence_class: "[contract]"
  authority_refs: [R-DOC01-3.1-03]
  criticality: P1
  blocking: true
  behavior:
    given: >
      The implementation under test.
    when: >
      Static analysis inspects all call sites for git-host-specific operations
      (clone, pull, webhook parsing, ls-remote).
    then:
      - All such call sites are inside or behind the RepoProvider interface.
      - No git-host-specific logic exists outside the RepoProvider boundary
        (e.g., no raw subprocess('git clone') call outside the provider).
  applicability:
    fixtures: [fixture-static-analysis]
    estates: []
    excluded_estates: []
    rationale: "Structural contract; checked statically."
  primary_oracle:
    type: static_import_and_call_analysis
    artifact: "zero direct git-host calls outside RepoProvider module path"
  test_ids: [T-M1-006]
  fault_model_refs: [F-REPO-PROVIDER-BYPASS]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - static:T-M1-006

- criterion_id: AC-M1-005
  name: "RepoProvider bypasses are rejected by verifier (pre-build negative)"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.1-03]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A negative build in which a git-host clone call is introduced directly
      outside the RepoProvider (simulating a bypass).
    when: >
      The static analysis verifier runs.
    then:
      - The verifier exits non-zero and reports the violation.
  applicability:
    fixtures: [fixture-negative-build-repo-provider]
    estates: []
    excluded_estates: []
    rationale: "Pre-build negative validation per §9.3."
  primary_oracle:
    type: verifier_exit_code
    artifact: "verifier exits non-zero with violation report"
  test_ids: [T-M1-007]
  fault_model_refs: [F-REPO-PROVIDER-BYPASS]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M1-007

# ══════════════════════════════════════════════════════════════════
# M2 — Clone
# ══════════════════════════════════════════════════════════════════

- criterion_id: AC-M2-001
  name: "Clone is stored on per-tenant encrypted volume with no cross-tenant sharing"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.2-01, R-INVARIANT-09]
  criticality: P0
  blocking: true
  behavior:
    given: >
      Two tenants (tenant-A, tenant-B) each triggering a clone in the test harness.
    when: >
      Both clones complete.
    then:
      - tenant-A's clone is stored under /tenants/tenant-A/ path prefix.
      - tenant-B's clone is stored under /tenants/tenant-B/ path prefix.
      - A process serving tenant-B cannot open or stat files under /tenants/tenant-A/.
      - No shared volume, process, or index exists between the two tenants.
  applicability:
    fixtures: [fixture-two-tenant-clone]
    estates: [estate-flask]
    excluded_estates: []
    rationale: "Tenant isolation is a P0 security property."
  primary_oracle:
    type: path_access_control_check
    artifact: "open(/tenants/tenant-A/...) from tenant-B process raises PermissionError"
  thresholds:
    cross_tenant_access_allowed: 0
  test_ids: [T-M2-001, T-M2-002]
  fault_model_refs: [F-CROSS-TENANT-VOLUME]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M2-001
    - security-adversarial:T-M2-002

- criterion_id: AC-M2-002
  name: "Clone produces a valid working tree at pinned SHA"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.2-01]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo at a known commit SHA.
    when: >
      The system clones it.
    then:
      - 'git rev-parse HEAD' in the cloned directory equals the expected SHA.
      - The file tree matches the expected file list for that SHA.
  applicability:
    fixtures: [fixture-small-repo]
    estates: [estate-flask]
    excluded_estates: []
    rationale: "Basic clone correctness."
  primary_oracle:
    type: exact_sha_and_file_tree_comparison
    artifact: "git rev-parse HEAD == expected_sha; file_list == golden_file_list"
  test_ids: [T-M2-003]
  fault_model_refs: []
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M2-003

- criterion_id: AC-M2-003
  name: "Large repo uses blobless clone"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.2-02]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo with file count above blobless_threshold (~100k files),
      with git command interception recording clone arguments.
    when: >
      The clone operation runs.
    then:
      - The recorded git clone command includes '--filter=blob:none'.
  applicability:
    fixtures: [fixture-large-file-count-stub]
    estates: []
    excluded_estates: []
    rationale: "Only applicable when file count exceeds threshold; fixture stubs the count."
  primary_oracle:
    type: command_argument_inspection
    artifact: "'--filter=blob:none' in recorded git clone args"
  test_ids: [T-M2-004]
  fault_model_refs: [F-BLOBLESS-NOT-USED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M2-004

- criterion_id: AC-M2-004
  name: "System never pushes to upstream origin"
  evidence_class: "[unit-property]"
  authority_refs: [R-DOC01-3.2-03]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo with a git command interceptor recording all subprocess calls,
      running through clone, pull-delta, and graph-rebuild operations.
    when: >
      All operations complete.
    then:
      - No 'git push' command appears in the intercepted call log.
      - The remote URL is never written to (no PUT/POST to GitHub API with write payloads).
  applicability:
    fixtures: [fixture-git-interceptor]
    estates: [estate-flask, estate-proxy]
    excluded_estates: []
    rationale: "Push-to-origin prohibition is absolute."
  primary_oracle:
    type: command_log_absence
    artifact: "'git push' does not appear in intercepted subprocess calls"
  thresholds:
    push_calls_allowed: 0
  test_ids: [T-M2-005]
  fault_model_refs: [F-PUSH-TO-ORIGIN]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M2-005

- criterion_id: AC-M2-005
  name: "Canonical clone never executes repository code"
  evidence_class: "[unit-property]"
  authority_refs: [R-DOC01-3.2-03]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo containing an executable script (e.g., setup.py, Makefile, postinstall)
      that writes a sentinel file if executed. Subprocess interceptor records all exec calls.
    when: >
      Clone, pull, and indexing complete.
    then:
      - The sentinel file is not created.
      - No subprocess call matching the repo's executable paths appears in the interceptor log.
  applicability:
    fixtures: [fixture-repo-with-executable-script]
    estates: []
    excluded_estates: []
    rationale: "Code execution from cloned repos is a P0 security property."
  primary_oracle:
    type: sentinel_file_absence_and_command_log
    artifact: "sentinel file absent; no exec call to repo script in interceptor log"
  thresholds:
    repo_code_exec_allowed: 0
  test_ids: [T-M2-006]
  fault_model_refs: [F-REPO-CODE-EXEC]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M2-006
    - security-adversarial:T-M2-006

- criterion_id: AC-M2-006
  name: "Push event triggers delta pull, not re-clone"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.2-04]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo already cloned. A push webhook for that repo is delivered.
      Git command interceptor records subprocess calls.
    when: >
      The push webhook is processed.
    then:
      - A 'git fetch' or 'git pull' command is recorded (delta pull).
      - No 'git clone' command is recorded.
  applicability:
    fixtures: [fixture-git-interceptor, fixture-post-clone-push]
    estates: []
    excluded_estates: []
    rationale: "Re-clone on push is a functional regression."
  primary_oracle:
    type: command_log_presence_and_absence
    artifact: "git fetch/pull recorded; git clone NOT recorded"
  test_ids: [T-M2-007]
  fault_model_refs: [F-RECLONE-ON-PUSH]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M2-007

