# Requirements — Doc 00 Constitution, Architecture & Foundation
# Extracted per GENERATOR.md Phase A + EXHAUSTIVE-COVERAGE.md (total breadth) from:
#   product/v0-spec/00-FOUNDATION.md
#   product/v0-spec/CANONICAL-DECISIONS.md  (overrides where it conflicts — §0-§12)
#   product/v0-spec/config-defaults.toml
#   AGENTS.md (laws + product invariants)
# Scope: Doc 00 is the FOUNDATION doc — the substrate, contracts, boot, config, IaC,
#   Docker, CI, DB layer, observability that every service plugs into (build-order step 1 + 1b).
#   Behaviors whose runtime enforcement lives in a downstream service doc (Doc 01/02/03/04/05)
#   are carried as dispositions.yaml entries (covered_downstream / not_built_here), NOT as
#   uncoverable requirements. Requirements here are the FOUNDATION-provable surface:
#   schemas, substrate mechanisms, contract-registry closure, boot ordering, config/secret
#   structure, IaC discipline, CI guards, DB layer, and the invariants Doc 00 structurally owns.
# Milestone grouping mirrors Doc 00 sections §2-§16.

# ══════════════════════════════════════════════════════════════════
# M1 — System composition & contracts (§2, CANONICAL §1)
# ══════════════════════════════════════════════════════════════════

- requirement_id: R-DOC00-2-01
  authority_type: specification
  authority_document: DOC-00
  source_location: "§2 paragraph 3"
  source_quote: "These six pieces are code packages under services/*, not six network services. They deploy as THREE deployables"
  normalized_statement: >
    THE SYSTEM SHALL package the six mechanism pieces as code packages under services/*
    (not six network services) that deploy as exactly three deployables.
  requirement_type: deployment
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-02
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§11.5 Bundle model + §2 the bundle"
  source_quote: "class Bundle(BaseModel): ask: str; speaker: str; timestamp: datetime; notes_ref: UUID; transcript_tail: str; task_id: UUID"
  normalized_statement: >
    WHEN the 04->05 bundle is defined in libs/contracts
    THE SYSTEM SHALL declare exactly the fields {ask, speaker, timestamp, notes_ref: UUID, transcript_tail, task_id}
    and SHALL carry notes_ref (a handle) rather than the serialized notes object.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-03
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§1.2 + §11.5 Envelope"
  source_quote: "EnvelopeStatus = Literal[\"done\",\"partial\",\"failed\",\"needs_clarification\",\"needs_review\"]  ... verified/draft are not status values."
  normalized_statement: >
    WHEN the 05->04 envelope is defined in libs/contracts
    THE SYSTEM SHALL constrain status to exactly {done, partial, failed, needs_clarification, needs_review}
    and SHALL NOT include 'verified' or 'draft' as status values (verification is a separate optional field).
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-04
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§1.1 AgentChunk"
  source_quote: "ChunkType = Literal[\"INIT\",\"TEXT\",\"TOOL_USE\",\"TOOL_RESULT\",\"RESULT\",\"ERROR\"] ... discriminator is `type` (NOT `.kind`)"
  normalized_statement: >
    WHEN the AgentChunk union is defined
    THE SYSTEM SHALL use exactly the six ChunkType members {INIT, TEXT, TOOL_USE, TOOL_RESULT, RESULT, ERROR}
    with the discriminator field named 'type'.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-05
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§1.1 consumer contract + §11.3"
  source_quote: "Every consumer ... consumes the stream_deltas output, never raw AgentChunk."
  normalized_statement: >
    WHEN a downstream consumer (projector, cost meter, transcript logger) reads the agent stream
    THE SYSTEM SHALL have it read the stream_deltas output, never raw AgentChunk chunks,
    and stream_deltas SHALL be applied exactly once (inside BehaviorRunner.run()), never re-wrapped downstream.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-06
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§1.4 NoteOp"
  source_quote: "NoteOp = Literal[\"add\",\"patch\",\"close\"]   # `note` is dropped (folded into `add`)"
  normalized_statement: >
