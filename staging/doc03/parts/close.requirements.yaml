# close.requirements.yaml — Doc 03 (Notes / Scribe) — §3.7 The close pass (permanent record)
# Atomic EARS requirements. Each carries source_location + verbatim source_quote + criticality.
# ID scheme: R-doc03-CLOSE-NN
# Authority document: DOC-03
#
# Scope: the meeting-end-triggered single strong-model pass that produces the final notes object,
#   writes it to GCS exactly once, posts the chat link, and then tears down.
# Dependency classes used in paired NEG criteria:
#   vendor:anthropic — the Sonnet-class SDK call (claude_agent_sdk generateStructured)
#   db:postgres      — reading gap/pending spans from transcript_segments
#   gcs:objects      — write_finalized_notes to GCS with if_generation_match=0
#   vendor:recall    — posting the chat link (Doc 04 / Recall bot)

# ── Trigger ───────────────────────────────────────────────────────────────────

- requirement_id: R-doc03-CLOSE-01
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 1, sentence 1"
  source_quote: >
    On Doc 02's meeting-end signal: one strong-model pass (Sonnet-class,
    PROXY_MODEL_SCRIBE_CLOSE) reduces over the FOLDED note-delta ledger + the
    gap/pending transcript backfill.
  normalized_statement: >
    WHEN the Doc 02 meeting-end signal is received THE SYSTEM SHALL initiate exactly
    one close pass; the close pass SHALL NOT start before the meeting-end signal and
    SHALL NOT be initiated more than once per meeting (barring crash recovery).
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

# ── Model seat ────────────────────────────────────────────────────────────────

- requirement_id: R-doc03-CLOSE-02
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 1, sentence 1"
  source_quote: >
    one strong-model pass (Sonnet-class, PROXY_MODEL_SCRIBE_CLOSE)
  normalized_statement: >
    THE SYSTEM SHALL invoke the close pass using the model designated by
    PROXY_MODEL_SCRIBE_CLOSE, which MUST resolve to a Sonnet-class (or stronger)
    model; a Haiku-class or cheaper model MUST NOT be used for the close pass.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

# ── Input: folded ledger, NOT full raw transcript ─────────────────────────────

- requirement_id: R-doc03-CLOSE-03
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 1, sentence 1 and paragraph 2"
  source_quote: >
    reduces over the FOLDED note-delta ledger + the gap/pending transcript backfill —
    NOT the full raw transcript as a map-reduce (CANONICAL §12.10). The folded ledger
    is already the comprehension, so the pass reduces over it and pulls raw transcript
    only for the status='gap' / status='pending' spans no live window ever comprehended.
  normalized_statement: >
    THE SYSTEM SHALL use the folded note-delta ledger as the primary input to the
    close pass; the full raw transcript SHALL NOT be used as a map-reduce input;
    raw transcript content SHALL be pulled only for transcript_segments rows whose
    status is 'gap' or 'pending'.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc03-CLOSE-04
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 2"
  source_quote: >
    pulls raw transcript only for the status='gap' / status='pending' spans no live
    window ever comprehended.
  normalized_statement: >
    WHEN the close pass assembles its input THE SYSTEM SHALL query transcript_segments
    for rows with status='gap' AND separately for rows with status='pending'; BOTH
    status values SHALL be backfilled; status='comprehended' rows SHALL NOT be included
    in the raw transcript pull.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

# ── Chunk-reduce threshold ────────────────────────────────────────────────────

- requirement_id: R-doc03-CLOSE-05
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 2, sentence 2"
  source_quote: >
    It chunk-reduces ONLY when the folded ledger exceeds a token threshold —
    a normal meeting folds in one pass.
  normalized_statement: >
    THE SYSTEM SHALL chunk-reduce the folded ledger ONLY when its token count exceeds
    a configured token threshold; WHEN the token count is at or below the threshold
    the close pass SHALL execute as a single model call; chunk-reduction SHALL NOT
    be the default path for a normal meeting.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

# ── SDK: generateStructured, not messages.create ──────────────────────────────

- requirement_id: R-doc03-CLOSE-06
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 3"
  source_quote: >
    the close pass is NOT latency-bound, so it runs as the Agent SDK's generateStructured
    (outputFormat:{type:'json_schema'} → Pydantic re-validate) and inherits their real
    terminal subtypes as typed errors — error_max_turns,
    error_max_structured_output_retries (AgentService.ts:772-777).
  normalized_statement: >
    THE SYSTEM SHALL invoke the close pass via the claude_agent_sdk's generateStructured
    API with an outputFormat of type json_schema, followed by Pydantic re-validation of
    the result; a raw messages.create call SHALL NOT be used for the close pass.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-CLOSE-07
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 3"
  source_quote: >
    inherits their real terminal subtypes as typed errors — error_max_turns,
    error_max_structured_output_retries (AgentService.ts:772-777).
  normalized_statement: >
    THE SYSTEM SHALL treat error_max_turns and error_max_structured_output_retries as
    distinct typed terminal error subtypes from the generateStructured call; both error
    types MUST be caught and handled explicitly, not swallowed or collapsed into a
    generic exception.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

# ── Build-time SDK surface confirmation ──────────────────────────────────────

- requirement_id: R-doc03-CLOSE-08
  authority_type: canonical
  authority_document: CANONICAL
  source_location: "§3.7 Build-time pin (CANONICAL §11.10)"
  source_quote: >
    generateStructured and its outputFormat/json_schema shape are the ~/platform
    TypeScript Agent SDK's; the close pass runs on the Python claude_agent_sdk,
    whose structured-output surface MUST be confirmed against the live
    claude_agent_sdk docs at build — a design doc cannot pin a third-party wire shape.
  normalized_statement: >
    THE SYSTEM SHALL confirm the Python claude_agent_sdk's structured-output surface
    (generateStructured / outputFormat / json_schema equivalents) against the live
    claude_agent_sdk documentation at build time before implementation; the TypeScript
    Agent SDK parameter names SHALL NOT be assumed to be identical in the Python SDK
    without verification.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified

# ── Operation record: operation_runs, NOT close_jobs ─────────────────────────

- requirement_id: R-doc03-CLOSE-09
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7 V0 close output preamble"
  source_quote: >
    run as a single operation_runs row operation_type='meeting-close' — NO close_jobs
