# dependency_manifest.yaml — Doc 03 (Meeting Understanding / Notes)
# Single source of truth for "what is real here and how may a test touch it."
# The ladder_schema_gate.py verifies bidirectional consistency with criteria.yaml.

doc: doc03

dependencies:

  # ─────────────────────────────────────────────────────────────────────────────
  # vendor:anthropic — Haiku Scribe hot loop + quality-gate + rolling-summary
  #                    + Sonnet close pass (all via Anthropic API)
  # ─────────────────────────────────────────────────────────────────────────────
  - dependency_class: vendor:anthropic
    kind: vendor
    seam: >
      anthropic.AsyncAnthropic().messages.create (Scribe hot loop, quality gate,
      rolling-summary generator); claude_agent_sdk.generateStructured (close pass)
    mock_boundary: >
      may mock the Anthropic HTTP response body via a vcrpy cassette at the
      call_external/transport layer; MUST NOT replace messages.create, the tool
      construction, the tool_choice directive, or generateStructured with Mock() —
      the real request must be built and driven through the real seam; negative
      cassettes (5xx/timeout/truncated body) must be pre-recorded against the real
      API before use in negative-tier tests.
    cassette: "tests/cassettes/scribe_*.yaml,tests/cassettes/scribe_close_*.yaml,tests/cassettes/quality_gate_*.yaml,tests/cassettes/rolling_summary_*.yaml"
    criteria:
      # Scribe call mechanics
      - AC-SCRIBE-01
      - AC-SCRIBE-02
      - AC-SCRIBE-02-NEG
      - AC-SCRIBE-07
      - AC-SCRIBE-08
      - AC-SCRIBE-13
      - AC-SCRIBE-15
      # Schema-enforced structured output (tool-forced NoteDelta)
      - AC-SCHEMA-16
      - AC-SCHEMA-16N
      - AC-SCHEMA-18
      - AC-SCHEMA-18N
      - AC-SCHEMA-19
      - AC-SCHEMA-19N
      - AC-SCHEMA-20
      - AC-SCHEMA-20N
      - AC-SCHEMA-21
      - AC-SCHEMA-21N
      - AC-SCHEMA-22
      - AC-SCHEMA-22N
      - AC-SCHEMA-23
      # Quality gate (Haiku entailment + Sonnet escalation)
      - AC-QGATE-02
      - AC-QGATE-03
      - AC-QGATE-04
      - AC-QGATE-07-NEG
      - AC-QGATE-08-NEG
      - AC-QGATE-09
      - AC-QGATE-09-NEG
      - AC-QGATE-10
      - AC-QGATE-10-NEG
      - AC-QGATE-11
      - AC-QGATE-11-NEG
      # Close pass (Sonnet generateStructured)
      - AC-CLOSE-01
      - AC-CLOSE-03
      - AC-CLOSE-04
      - AC-CLOSE-06
      - AC-CLOSE-06-NEG
      - AC-CLOSE-06-NEG2
      - AC-CLOSE-11
      - AC-CLOSE-11-NEG
      - AC-CLOSE-12
      # Performance / configurability (model-seat & cost)
      - AC-PERF-01
      - AC-PERF-01-NEG
      - AC-PERF-06
      - AC-PERF-06-NEG
      - AC-PERF-07
      - AC-PERF-07-NEG
      # Cross-cutting (provenance labeling + injection defense)
      - AC-XCUT-02
      - AC-XCUT-02-NEG
      - AC-XCUT-03
      - AC-XCUT-03-NEG
      # G2 patch: eval criteria for Scribe extraction quality (cassette-backed)
      - AC-EVAL-01
      - AC-EVAL-01-NEG
      - AC-EVAL-02
      - AC-EVAL-02-NEG
      - AC-EVAL-03
      - AC-EVAL-03-NEG
      - AC-EVAL-05
      - AC-EVAL-05-NEG
    golden_path_criteria:
      - AC-SCRIBE-01   # golden: Scribe hot loop end-to-end
      - AC-CLOSE-01    # golden: full close pass

  # ─────────────────────────────────────────────────────────────────────────────
