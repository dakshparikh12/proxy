    THE SYSTEM SHALL preserve full history such that git blame resolves for a tracked file, returning per-line commit attribution.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.6-06
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.6 paragraph 3 / §3.8 build step 7 / §4 failure behavior"
  source_quote: "A force-push, a parser/grammar upgrade, or a large change-set forces the full rebuild ... force-push → safe full rebuild"
  normalized_statement: >
    WHEN a force-push (non-fast-forward / history rewrite), a parser/grammar upgrade, or a large change-set is detected
    THE SYSTEM SHALL perform a safe full per-repo graph rebuild (drop + re-extract off the newly pinned view, atomic pointer swap), never an incremental delta apply against the rewritten history.
  requirement_type: resilience
  criticality: P1
  testability: executable
  status: qualified

