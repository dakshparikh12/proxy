      - "A telemetry event is emitted containing: task_id, meeting_id, total_cost_usd, cache_read_tokens, cache_creation_tokens"
      - "Values are derived from the model API response usage fields, not hardcoded"
      - "Meeting-level aggregation accumulates these fields across all tasks in the meeting"
  primary_oracle:
    type: deterministic
    artifact: "integration test captures telemetry events; asserts all five fields present; asserts meeting aggregate increments correctly across two tasks"
  thresholds: {tasks_missing_cost_telemetry: 0}
  dependency_class: db:postgres
  mock_boundary: "model API responses mocked with usage data; DB write under test"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
  test_ids: [T-S9-009]

- criterion_id: AC-S9-009-NEG
