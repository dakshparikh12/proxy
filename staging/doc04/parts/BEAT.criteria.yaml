# ── AC-BEAT-014: staleness boundary — 39s alive, 41s stale ───────────────────

- criterion_id: AC-BEAT-014
  name: "Staleness boundary: row with last_heartbeat_at 39s ago is NOT reaped; 41s ago IS reaped"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-06, R-doc04-BEAT-15, R-doc04-BEAT-16]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A real Postgres database with two operation_runs rows:
      (A) status='running', last_heartbeat_at = NOW() - INTERVAL '39 seconds'
      (B) status='running', last_heartbeat_at = NOW() - INTERVAL '41 seconds'
    when: "mark_stale_operations_interrupted(pool) is called"
    then:
      - "Row A retains status='running' (39s < 40s threshold, not stale)"
      - "Row B is updated to status='interrupted' (41s > 40s threshold, stale)"
      - "The function returns count=1 (exactly one row reaped)"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT status FROM operation_runs WHERE id IN (A, B) after call;
      assert row_A.status == 'running' AND row_B.status == 'interrupted';
      assert return_value == 1
  thresholds:
    false_reap_of_alive_row_allowed: 0
    missed_reap_of_stale_row_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-014]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool — INTERVAL arithmetic must execute in real Postgres"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-BEAT-014-NEG
  name: "NEG: mark_stale_operations_interrupted returns 0 when no stale rows exist"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-16]
  criticality: P1
  blocking: false
  behavior:
