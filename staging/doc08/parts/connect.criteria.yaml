# ══════════════════════════════════════════════════════════════════════════════
# STATE MACHINE TRANSITIONS — HAPPY PATH SEQUENCE
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-015
  name: "Readiness widget transitions connecting → cloning → indexing → ready in forward order"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-15]
  criticality: P1
  blocking: true
  behavior:
    given: "A sequence of poll responses returning connecting, then cloning, then indexing, then ready"
    when: "Each poll response is applied to the readiness widget in sequence"
    then:
      - "After the first poll response the widget shows connecting"
      - "After the second poll response the widget transitions to cloning (no backward jump)"
      - "After the third poll response the widget transitions to indexing"
      - "After the fourth poll response the widget transitions to ready and shows coverage_pct and flagged file count"
      - "No state is skipped and no backward transition occurs during the happy-path sequence"
  primary_oracle:
    type: deterministic
    artifact: "unit test: drive widget through four successive poll results; assert widget.state sequence equals ['connecting','cloning','indexing','ready']; assert ready render contains coverage_pct"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-015]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-CONN-016
  name: "Readiness widget transitions any in-progress state → not_ready when API returns not_ready"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-16]
  criticality: P1
  blocking: true
  behavior:
    given: "A readiness widget currently showing one of: connecting, cloning, or indexing"
    when: "The next poll response returns not_ready with a non-empty gaps list"
    then:
      - "The widget transitions to the not_ready terminal state"
      - "The gaps list from the response is rendered verbatim"
      - "No connecting, cloning, or indexing indicator remains visible"
      - "The widget does not automatically poll again (not_ready is a terminal state until user action)"
  primary_oracle:
    type: deterministic
    artifact: "parameterized unit test from each of {connecting,cloning,indexing}: drive widget with not_ready response; assert widget.state == 'not_ready'; assert gaps rendered; assert in-progress indicator absent; assert polling halted"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-016]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

