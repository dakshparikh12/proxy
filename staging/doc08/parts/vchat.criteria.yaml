# §2.3 bullet 9 — Private delivery where dm_available (DM routing)
# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-022
  name: "personal delivery routes to DM when dm_available == true"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-21]
  criticality: P1
