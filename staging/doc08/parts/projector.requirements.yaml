    no other frame type for this event.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── TOOL_RESULT + structured=None → yields nothing ──────────────────────────────

- requirement_id: R-doc08-PROJ-11
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), TOOL_RESULT branch guard"
  source_quote: "if chunk.type == \"TOOL_RESULT\" and chunk.metadata.get(\"structured\") is not None:"
  normalized_statement: >
    WHEN ChannelProjector.project() receives a chunk with chunk.type == "TOOL_RESULT" AND
    chunk.metadata.get("structured") is None THE SYSTEM SHALL yield zero frames; a
    TOOL_RESULT with no structured payload is silently dropped by the projector.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── TEXT chunk → not projected to any surface ────────────────────────────────────

- requirement_id: R-doc08-PROJ-12
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), final comment; paragraph 3, sentence 4"
  source_quote: "# TEXT / everything else: NOT projected"
  normalized_statement: >
    WHEN ChannelProjector.project() receives a chunk with chunk.type == "TEXT" THE SYSTEM
    SHALL yield zero frames; raw TEXT (the model's own reasoning) SHALL NOT be projected
    to any surface — voice, chat, or canvas — by the projector.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

