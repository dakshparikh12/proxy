    - {tier: unit}

# ════════════════════════════════════════════════════════════════
# §3.6 · RE-CLAIM AFTER STALE HEARTBEAT (integration)
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-OWNR-007
  name: "Replacement instance becomes new affinity owner after heartbeat reap"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-OWNR-08]
  criticality: P1
  blocking: true
  behavior:
    given: >
      Instance A holds a 'running' operation_runs row for meeting M with created_by='instance-A';
      the §3.8 reaper transitions the row to status='reaped' (simulated by UPDATE);
      instance B then calls claim_meeting(pool, M, 'instance-B')
    when: "claim_meeting returns for instance B"
    then:
      - "A new 'running' operation_runs row exists for M with created_by='instance-B'"
      - "The new row's id is non-NULL (instance B is the winner)"
      - "The old reaped row still exists with its original created_by='instance-A' (unchanged)"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT id, created_by, status FROM operation_runs WHERE scope_id=M ORDER BY started_at;
      assert row[-1].status == 'running' AND row[-1].created_by == 'instance-B';
      assert row[-2].status == 'reaped' AND row[-2].created_by == 'instance-A'
  thresholds:
    reclaim_failures: 0
    running_rows_after_reclaim: 1
  fault_model_refs: [F-PERMANENT-UNCLAIM]
  test_ids: [T-OWNR-007]
  dependency_class: db:postgres
  mock_boundary: >
    Requires real Postgres; the reaper transition is simulated with a direct UPDATE;
    tests the full re-claim SQL path including created_by update
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

# ════════════════════════════════════════════════════════════════
# §3.6 · PG_ADVISORY_XACT_LOCK FOR CRITICAL SECTIONS
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-OWNR-008
  name: "Per-meeting critical section acquires pg_advisory_xact_lock(hashtext(meeting_id), 0)"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-OWNR-09]
  criticality: P1
  blocking: true
  behavior:
    given: >
      Two asyncpg connections connected to the same Postgres instance; both attempt to enter
      the same per-meeting critical section (e.g. notes finalization at close) for meeting M
    when: "Both concurrent attempts execute their critical section logic"
    then:
      - "The second connection's critical section body does not begin executing until the first connection COMMITs its transaction and auto-releases the advisory lock"
      - "All critical-section work runs on the single connection that holds the advisory lock — no second pooled connection is checked out while the lock is held"
      - "After COMMIT the lock is released automatically; no explicit lock-release call is needed"
  primary_oracle:
    type: deterministic
    artifact: >
      Instrument the critical section with a sequence log; assert that the sequence log
      shows strictly non-overlapping execution windows; assert no pg_advisory_unlock call
      exists in the critical-section code (auto-release is the contract)
  thresholds:
    overlapping_critical_section_executions: 0
    second_pooled_connection_while_locked: 0
  fault_model_refs: [F-ADVISORY-LOCK-DEADLOCK, F-CRITICAL-SECTION-RACE]
  test_ids: [T-OWNR-008]
  dependency_class: db:postgres
  mock_boundary: >
    Requires real Postgres for pg_advisory_xact_lock semantics; the two concurrent
    attempts may be coordinated via asyncio.gather with a barrier to ensure lock contention
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-OWNR-008-NEG
  name: "Checking out a second pooled connection while holding the advisory lock deadlocks (documented hazard)"
  evidence_class: "[negative]"
  authority_refs: [R-doc04-OWNR-09]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A connection C1 holds pg_advisory_xact_lock(hashtext(M), 0); the pool has exactly one
      free connection; code inside the critical section attempts to acquire a second connection
      from the pool
    when: "The pool.acquire() call executes inside the locked transaction"
    then:
      - "The pool.acquire() call blocks indefinitely (deadlock) because C1 occupies the only free connection and cannot release it while the transaction is open"
      - "This documents the hazard: all critical-section work must run on the locked connection, never on a second checkout"
  primary_oracle:
    type: deterministic
    artifact: >
      Fault-injection test: pool with max_size=1 + pg_advisory_xact_lock held;
      inner pool.acquire() times out with asyncio.TimeoutError confirming deadlock behavior;
      the production code path must never enter this branch
  thresholds:
    second_pool_acquire_inside_locked_tx: 0
  fault_model_refs: [F-ADVISORY-LOCK-DEADLOCK]
  test_ids: [T-OWNR-008-NEG]
  dependency_class: db:postgres
  mock_boundary: >
    Requires real Postgres and a pool with max_size=1 to reliably reproduce the deadlock;
    this is a hazard-documentation test, not a happy-path test
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ════════════════════════════════════════════════════════════════
# §3.6 · TWO-LAYER MUTEX ARCHITECTURE
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-OWNR-009
  name: "In-process mutex and Postgres advisory lock both present in critical-section path"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-OWNR-10]
  criticality: P1
  blocking: true
  behavior:
    given: "The implementation of the per-meeting critical section (notes finalization at close)"
    when: "The code path is statically inspected and unit-tested"
    then:
      - "An asyncio.Lock (or equivalent in-process mutex) is acquired before the database transaction begins"
      - "pg_advisory_xact_lock(hashtext(meeting_id), 0) is called inside the database transaction"
      - "The in-process mutex is released only after the transaction COMMITs"
      - "Neither layer is used in isolation as a substitute for the other"
  primary_oracle:
    type: deterministic
    artifact: >
      Mock pool.fetchval to capture SQL; assert in-process lock.acquire() called before pool
      entry; assert SQL contains 'pg_advisory_xact_lock'; assert lock.release() called after
      COMMIT; both checks must pass in the same test run
  thresholds:
    missing_in_process_lock: 0
    missing_advisory_lock: 0
  fault_model_refs: [F-MISSING-IN-PROCESS-MUTEX, F-CRITICAL-SECTION-RACE]
  test_ids: [T-OWNR-009]
  dependency_class: null
  mock_boundary: >
    Mock the asyncpg pool to capture advisory lock SQL; the in-process mutex behavior
    is observable without real Postgres — unit-tier is sufficient
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-OWNR-009-NEG
  name: "Removing the in-process mutex allows within-process concurrent critical section (fault injection)"
  evidence_class: "[negative]"
  authority_refs: [R-doc04-OWNR-10]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A variant of the critical section with the in-process asyncio.Lock removed (but
      pg_advisory_xact_lock still present); two coroutines on the same process attempt
      the critical section concurrently
    when: "Both coroutines execute simultaneously in the same event loop"
    then:
      - "Both coroutines enter their critical-section body before either COMMITs (visible via sequence log)"
      - "This is an interleaving that the in-process mutex would have prevented"
      - "Confirms the in-process mutex is necessary and cannot be omitted"
  primary_oracle:
    type: deterministic
    artifact: >
      Sequence log shows overlapping execution windows when in-process lock absent;
      assert interleaved == True (the fault condition) — this is the proof of necessity
  thresholds:
    interleaved_critical_sections_on_fault_injection: 1
  fault_model_refs: [F-MISSING-IN-PROCESS-MUTEX]
  test_ids: [T-OWNR-009-NEG]
  dependency_class: null
  mock_boundary: >
    Pure in-process test with asyncio.gather; pg_advisory_xact_lock may be mocked
    since the test is exercising in-process mutex absence, not the DB lock
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

