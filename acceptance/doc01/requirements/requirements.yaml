# ── M8: Precise navigation (LSP) ──────────────────────────

- requirement_id: R-DOC01-3.5-11
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 find_references tool"
  source_quote: "Exact symbol references via the warm HOST-SIDE language server (Serena/solid-lsp). Tagged 'resolved'; on timeout/unsupported language falls back to grep tagged 'lower-bound'"
  normalized_statement: >
