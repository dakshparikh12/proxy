  normalized_statement: >
    THE SYSTEM SHALL enable extended/adaptive thinking exclusively on the Opus-escalated
    grounded-answer path; extended thinking SHALL be explicitly disabled (not merely absent) on
    the should-I-speak wake gate, all quick-lookup paths, and the Scribe micro-call; no other
