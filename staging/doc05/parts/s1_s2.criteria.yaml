- criterion_id: AC-S2-025
  name: "Golden path: 'push this change' yields a persisted multi-file staged draft, no push, durable after sandbox teardown"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S2-34, R-doc05-S2-35, R-doc05-S2-36, R-doc05-S2-37]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A Workroom session is running with a pre-provisioned warm sandbox seeded from a
      test repo snapshot; the triad is applied; propose_change is mounted as a host-side
      MCP server; the worker disposition is active.
    when: "'Push the rate-limiter change we built' is submitted as a task."
    then:
      - "The engine builds the change in the sandbox (no direct push occurs during build)."
      - "propose_change is called and returns draft_id with status='needs_review'."
      - "A staged_drafts row exists in Postgres with the draft_id."
      - "The GCS bundle contains all modified files."
      - "After sandbox teardown, the draft is still present in Postgres and GCS."
      - "A named human accept action exposes the branch bundle for download."
      - "No git push occurs at any point."
  primary_oracle:
    type: deterministic
    artifact: "End-to-end test: submit task; assert no git push during run; assert propose_change invoked; assert staged_drafts row present; assert GCS bundle present; tear down sandbox; assert draft survives; call accept; assert bundle downloadable; assert git push count == 0."
  thresholds:
    git_pushes_in_golden_path: 0
    staged_drafts_rows_missing: 0
    gcs_bundles_missing: 0
    drafts_surviving_sandbox_teardown: 1
  dependency_class: db:postgres
  mock_boundary: "Postgres test instance; GCS test double; git bare repo for push monitoring; SDK cassette at LLM boundary; E2B replaced by temp dir for file effects."
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}
  test_ids: [T-S2-025]
