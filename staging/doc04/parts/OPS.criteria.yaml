# ═══════════════════════════════════════════════════════════════════════════
# §3.9 · reconcile: list → orphan/TTL check → destroy (tolerates 404)
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-OPS-010
  name: "reconcile() destroys sandboxes for ended meetings (orphan check)"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-OPS-14]
  criticality: P1
  blocking: true
  behavior:
    given: "list_sandboxes() returns two sandboxes: one for an active meeting, one for an ended meeting"
    when: "reconcile() is called"
    then:
      - "destroy() is called for the sandbox belonging to the ended meeting"
      - "destroy() is NOT called for the sandbox belonging to the active meeting"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: mock list_sandboxes returns two metas; mock _is_orphan_or_past_ttl returns True for ended-meeting meta only; assert destroy called once with ended-meeting meta"
  thresholds: {violations_allowed: 0, live_sandboxes_destroyed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-010]
  dependency_class: db:postgres
  mock_boundary: "E2B provider and Postgres replaced by in-memory fakes; meeting status driven by fixture data"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}

- criterion_id: AC-OPS-010-NEG
  name: "NEG: reconcile() does not destroy sandboxes for active meetings"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-OPS-14]
  criticality: P1
  blocking: true
  behavior:
    given: "list_sandboxes() returns only sandboxes for active meetings within TTL"
    when: "reconcile() is called"
    then:
      - "destroy() is never called"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: all metas have _is_orphan_or_past_ttl == False; assert destroy call count == 0"
  thresholds: {}
  fault_model_refs: []
  test_ids: [T-OPS-010-NEG]
  dependency_class: db:postgres
  mock_boundary: "E2B provider and Postgres replaced by in-memory fakes"
