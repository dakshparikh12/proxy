      - "No import or usage of re (regex) or string-search patterns appears inside evidence_backed() or any function it calls for receipt evaluation."
      - "Receipt fields are accessed by key (e.g. receipt['exit_code'], receipt['argv']) not by string parsing."
  primary_oracle:
    type: static_analysis
    artifact: >
      AST scan of evidence_backed() and its call tree: assert zero re.search /
      re.match / re.findall / re.compile / str.find / str.contains calls;
      assert receipt fields accessed as dict keys or dataclass attributes only.
  thresholds:
