  criticality: P1
  blocking: true
  behavior:
    given: "Proxy produces a chat result containing a reference to a code location"
    when: "The send_chat() argument is inspected"
    then:
      - "Every code citation appears in the form 'filepath:linenumber' (colon separator, no spaces)"
      - "No citation uses angle brackets, parentheses, line keyword, or any other separator"
      - "Each citation's filepath resolves to an existing file in the project clone"
  primary_oracle:
    type: deterministic
    artifact: "regex assert all citation tokens match r'[^\\s:]+:\\d+' and no citation matches alternative formats; parameterized test with corpus of citation-bearing responses"
  thresholds: {violations_allowed: 0}
