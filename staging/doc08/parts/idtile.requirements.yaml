# §2.2 — THE TILE STATE MACHINE
# ══════════════════════════════════════════════════════════════════════════════

# ── Platform-agnostic rendering ───────────────────────────────────────────────

- requirement_id: R-doc08-IDTILE-11
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.2 paragraph 1"
  source_quote: "the tile behaves identically on Meet, Zoom, and Teams, and no signal depends on native platform buttons"
  normalized_statement: >
    WHEN the tile is rendered on any supported meeting platform (Meet, Zoom, Teams)
    THE SYSTEM SHALL produce identical tile behaviour across all three platforms,
    deriving no state or signal from native platform buttons.
  requirement_type: ux
  criticality: P1
  testability: executable
  status: qualified

# ── Outbound-only render transport (CANONICAL §12.9) ─────────────────────────

- requirement_id: R-doc08-IDTILE-12
  authority_type: canonical_decision
  authority_document: DOC-08
  source_location: "§3 build rule + CANONICAL §12.9"
  source_quote: "The tile is outbound-only (CANONICAL §12.9): it authenticates its render WS via a meeting-scoped bearer token in the URL handed to Recall — it receives frames, it never originates a message."
  normalized_statement: >
    WHEN the tile render WebSocket is live
    THE SYSTEM SHALL authenticate via a meeting-scoped bearer token in the URL
    and SHALL only receive frames; the tile SHALL NEVER originate a WebSocket
    message.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

# ── TileState driven by backend ProxyMessage frames only ─────────────────────

- requirement_id: R-doc08-IDTILE-13
  authority_type: canonical_decision
  authority_document: DOC-08
  source_location: "§3 build rule + CANONICAL override"
  source_quote: "TileState is driven by tile.state ProxyMessage frames from the backend (never self-driven)"
  normalized_statement: >
    WHEN the tile transitions between states
    THE SYSTEM SHALL transition state only in response to a received
    tile.state ProxyMessage frame from the backend; the tile SHALL NOT
    self-drive any state transition.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

# ── No state without a real source (build rule) ───────────────────────────────

- requirement_id: R-doc08-IDTILE-14
  authority_type: specification
  authority_document: DOC-08
  source_location: "§3 build rule"
  source_quote: "no state without a real source — if a state can't name its driving event, it doesn't exist"
  normalized_statement: >
    WHEN the tile state machine is defined
    THE SYSTEM SHALL bind every state to a named real system event (Doc 04
    session state, Doc 05 progress envelopes, Doc 02 mute/speaking signals);
    no state SHALL exist without a named driving event.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── Exactly the §2.2 state set — no more, no fewer ───────────────────────────

- requirement_id: R-doc08-IDTILE-15
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.2 state table"
  source_quote: "The V0 state set — deliberately few, each legible from across the room and each driven by a real system event, never decorative"
