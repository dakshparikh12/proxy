- requirement_id: R-doc02-SPEAK-20
  authority_type: operational_slo
  authority_document: DOC-02
  source_location: CANONICAL §12.8
  source_quote: 'Targets apply to SHALLOW answers (index/graph/grep, one gather pass, no live-LSP, no Workroom). LSP-bound direct answers are exempt from the audio gate — fire the "checking…" tile ACK (still <=500ms), speak when the LSP returns. Every sample records tool+turn count; a "direct" answer needing >1 pass or an LSP call is reclassified and excluded from the shallow SLO.'
  normalized_statement: 'WHILE measuring any shallow-path latency SLO (ack-audible, first-grounded-text, first-grounded-audio) THE SYSTEM SHALL record tool+turn count on every sample and SHALL exclude from the shallow-SLO population any sample that used more than one gather pass or a live-LSP call (such LSP-bound answers are exempt from the audio gate and instead surface the tile ACK). THE SYSTEM SHALL NOT compute the shallow-SLO percentiles over an undefined/unfiltered population.

    '
  requirement_type: performance
  criticality: P0
  testability: executable
  status: qualified
