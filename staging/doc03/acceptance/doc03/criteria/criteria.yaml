    signed_url_wrong_version_allowed: 0
    signed_url_wrong_expiry_allowed: 0
    signed_url_wrong_method_allowed: 0
  fault_model_refs: [F-IMAGE-INLINE-BASE64, F-SIGNED-URL-WRONG-PARAMS]
  test_ids: [T-STORE-14]
