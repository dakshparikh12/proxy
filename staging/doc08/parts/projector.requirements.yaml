# ── Projector MUST NOT auto-extract headline from TEXT ─────────────────────────

- requirement_id: R-doc08-PROJ-16
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 3, sentence 3"
  source_quote: "It never auto-extracts a headline from raw text and decides to speak — that was a chat-product habit; here the wake turn is the sole delivery authority."
  normalized_statement: >
    THE SYSTEM SHALL NOT contain any code path in ChannelProjector that reads TEXT chunk
    content and decides to speak or post that content to a channel; no headline-extraction,
    summarization, or voice-decision logic SHALL exist in the projector; delivery channel
    decisions belong exclusively to the model's wake-turn tool calls.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

# ── Projector MUST NOT decide which channel to use ──────────────────────────────

- requirement_id: R-doc08-PROJ-17
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 1, sentence 2"
  source_quote: "Delivery is decided by the model's own wake-turn TOOL CALLS (CANONICAL §12.3): Proxy communicates only by speak(text) / send_chat(text, dm?) / show_screen(artifact) — the model chooses the channel."
  normalized_statement: >
    THE SYSTEM SHALL NOT contain any logic in ChannelProjector that selects a delivery
    channel (voice, public chat, DM, or canvas) based on content analysis; the projector
    SHALL only map already-chosen tool events to render frames; channel selection is the
    sole authority of the model's explicit TOOL_USE events.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

# ── carry_turn: ResponseStart sent FIRST ────────────────────────────────────────

- requirement_id: R-doc08-PROJ-18
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 5 (carry_turn code), line 2"
  source_quote: "await send(conn, ResponseStart(meeting_id=meeting.id))     # resolve FIRST"
  normalized_statement: >
    WHEN carry_turn is invoked THE SYSTEM SHALL send ResponseStart(meeting_id=meeting.id)
    as the very first frame, before iterating over any chunk in the delta stream and before
    yielding any projected frame to the client connection.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── carry_turn: ResponseEnd sent LAST ───────────────────────────────────────────

- requirement_id: R-doc08-PROJ-19
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 5 (carry_turn code), final line"
  source_quote: "await send(conn, ResponseEnd(meeting_id=meeting.id))"
  normalized_statement: >
    WHEN carry_turn has finished iterating over all delta chunks THE SYSTEM SHALL send
    ResponseEnd(meeting_id=meeting.id) as the final frame; no projected frame SHALL be
    sent after ResponseEnd, and ResponseEnd SHALL NOT be sent before the delta stream
    is fully consumed.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── carry_turn: DO NOT re-wrap deltas ───────────────────────────────────────────

- requirement_id: R-doc08-PROJ-20
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 5 (carry_turn code), comment on line 4"
  source_quote: "async for chunk in deltas:   # already stream_deltas output — DO NOT re-wrap"
  normalized_statement: >
    WHEN carry_turn iterates over its deltas argument THE SYSTEM SHALL iterate it directly
    without passing it through stream_deltas or any other wrapping adapter; the deltas
    argument is already the output of the single stream_deltas call in BehaviorRunner.run().
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified

# ── conn.ready guard: drop frame, don't crash ───────────────────────────────────

- requirement_id: R-doc08-PROJ-21
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 6 (send function), conn.ready guard"
  source_quote: "if conn.ready:   # readyState guard — tab closed mid-generation ⇒ drop, don't crash"
  normalized_statement: >
    WHEN send() is called with a frame and conn.ready is False THE SYSTEM SHALL drop the
    frame silently and SHALL NOT raise an exception, crash carry_turn, or attempt a retry;
    carry_turn SHALL continue to consume and project remaining chunks after a dropped frame.
  requirement_type: robustness
  criticality: P1
  testability: executable
  status: qualified

# ── Serialization: every outbound frame is a registered ProxyMessage ─────────────

- requirement_id: R-doc08-PROJ-22
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 3, final sentence"
  source_quote: "Every projected frame is a registered ProxyMessage instance (never a hand-built dict, never an unregistered \"speak\" type); send() serializes it via model_dump()."
  normalized_statement: >
    WHEN the projector yields a frame and send() transmits it THE SYSTEM SHALL construct
    that frame as a registered ProxyMessage subclass instance and SHALL serialize it by
    calling frame.model_dump(); no frame SHALL be a hand-built dict, a raw JSON literal,
    or an instance of any unregistered type.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── send() calls frame.model_dump(), not raw dict ────────────────────────────────

- requirement_id: R-doc08-PROJ-23
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 6 (send function), body"
  source_quote: "await conn.send_json(frame.model_dump())   # registered instance → serialized via model_dump()"
  normalized_statement: >
    THE SYSTEM SHALL implement send() to call conn.send_json(frame.model_dump()) and SHALL
    NOT construct the JSON payload by any other means (e.g., vars(), asdict(), manual dict
    construction, or json.dumps()).
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── MESSAGE_PROJECTORS registered for all outbound types ────────────────────────

- requirement_id: R-doc08-PROJ-24
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, bullet 'MESSAGE_PROJECTORS registered for each OUTBOUND type'"
  source_quote: "MESSAGE_PROJECTORS registered for each OUTBOUND type (so assert_registry_closed sees a projector)"
  normalized_statement: >
    THE SYSTEM SHALL register a MESSAGE_PROJECTORS entry for each outbound frame type that
    the projector can yield: VOICE_SPEAK → project_voice, RESPONSE_CHUNK → project_chat,
    CANVAS_PATCH → project_canvas, TOOL_START → project_tile; assert_registry_closed SHALL
    pass for all four types; any missing registration IS a build failure.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── DELIVERY_TOOLS set: exactly {speak, send_chat, show_screen} ─────────────────

- requirement_id: R-doc08-PROJ-25
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), DELIVERY_TOOLS constant"
  source_quote: "DELIVERY_TOOLS = {\"speak\", \"send_chat\", \"show_screen\"}"
  normalized_statement: >
    THE SYSTEM SHALL define DELIVERY_TOOLS as exactly the set {"speak", "send_chat",
    "show_screen"} and SHALL use this constant to distinguish delivery TOOL_USE events from
    work TOOL_USE events; any tool name not in DELIVERY_TOOLS SHALL be routed to the
    ToolStart (working…) branch.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── humanize_tool: non-empty human label for every tool name ────────────────────

- requirement_id: R-doc08-PROJ-26
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), work-tool else branch"
  source_quote: "yield ToolStart(line=humanize_tool(name))"
  normalized_statement: >
    WHEN humanize_tool(name) is called with any valid tool name THE SYSTEM SHALL return a
