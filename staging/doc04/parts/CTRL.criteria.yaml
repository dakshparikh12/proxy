# ── AC-CTRL-009: abort() halts the model loop, not just discards result ───────

- criterion_id: AC-CTRL-009
  name: "Triggering abort() stops the model loop mid-run — the SDK does not continue to maxTurns"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-11]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A running model loop with maxTurns=1000; an AbortController whose abort() is called
      after the first model turn completes (simulated via asyncio task cancellation or
      abort-check insertion)
    when: "abort() is triggered during an in-progress model loop"
    then:
      - "The model loop exits within at most 1 additional turn after abort() is called"
      - "The total number of turns executed is far below maxTurns (e.g., <= 2)"
      - "No further model API calls are issued after the abort is detected"
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test with mocked SDK: inject abort after turn 1; assert total_turns <= 2;
      assert model_api_call_count stops increasing after abort detection
  thresholds:
    max_turns_after_abort: 1
    model_calls_after_abort: 0
    violations_allowed: 0
  fault_model_refs: [F-CTRL-ABORT-RESULT-IGNORE]
  test_ids: [T-CTRL-009]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ── AC-CTRL-010: Abort-is-final — aborted task never retried (P0 invariant) ──

- criterion_id: AC-CTRL-010
  name: "Aborted task is never retried, resumed, or resurrected — abort-is-final"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-12]
  criticality: P0
  blocking: true
  behavior:
    given: "A task whose AbortController has been triggered (aborted==True)"
    when: "Any retry, stale-session-resume, or drain-loop recovery path inspects the task"
    then:
      - "The task is not re-queued, re-run, or resumed by any code path"
      - "The aborted==True state is checked before any retry or resume attempt"
      - "Zero new SDK turns are initiated for the aborted task instance"
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: abort a task; run retry path + stale-session-resume path + drain-loop recovery;
      assert SDK turn count == 0 across all three paths for the aborted task
  thresholds:
    retry_executions_after_abort: 0
    violations_allowed: 0
  fault_model_refs: [F-CTRL-ABORT-RETRY]
  test_ids: [T-CTRL-010]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ── AC-CTRL-011: AbortRegistry.make() cancels existing controller first ────────

- criterion_id: AC-CTRL-011
  name: "AbortRegistry.make(key) aborts the existing controller before creating the new one"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-13]
  criticality: P1
  blocking: true
  behavior:
    given: "An AbortRegistry with an existing controller registered under key 'task-123'"
    when: "AbortRegistry.make('task-123') is called a second time"
    then:
      - "The existing controller's .aborted property is True before make() returns"
      - "A new, un-aborted controller is returned by make()"
      - "The registry holds exactly one controller for 'task-123' after the call (not two)"
      - "The sequence is: cancel existing → create new (never create new → then cancel existing)"
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: make('k'), capture ref c1; make('k'), capture ref c2;
      assert c1.aborted==True; assert c2.aborted==False; assert registry['k'] is c2
  thresholds:
