[pytest]
# Self-contained config for the verification harness. Running pytest from within
# verification/ makes THIS the rootdir (not the sealed root pyproject), so the
# arbiter's collection is never perturbed. Property files are named
# hypothesis_props.py, so extend the discovery pattern to pick them up.
python_files = hypothesis_props.py test_*.py
python_classes = Test*
python_functions = test_*
addopts = -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
