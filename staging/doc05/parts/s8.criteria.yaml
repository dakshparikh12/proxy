    - {tier: negative}
  test_ids: [T-S8-015-NEG]

- criterion_id: AC-S8-016
  name: "original content resolved from old_sha when present; falls back to pinned clone at meeting.pinned_sha when absent"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-12]
  criticality: P0
  blocking: true
  behavior:
    given: "Two propose_change calls: call A provides old_sha='abc123' for a file; call B omits old_sha for the same file path"
    when: "Both calls resolve the original content for diff computation"
    then:
      - "Call A's diff is computed against the blob at old_sha='abc123' (not from the pinned clone)"
      - "Call B's diff is computed against the file content read from the pinned clone at meeting.pinned_sha"
      - "No cross-contamination between the two resolution paths"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with mocked git repo and pinned clone: verify call A reads git object by old_sha; verify call B reads from pinned_sha clone path; assert distinct read paths in spy logs"
  thresholds: {wrong_original_resolution_path: 0}
  dependency_class: null
  mock_boundary: "git object store mocked; pinned clone path mocked"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-016]

- criterion_id: AC-S8-017
  name: "Return schema contains draft_id, status='needs_review', files list, and note string"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-18]
  criticality: P0
  blocking: true
  behavior:
    given: "A successful propose_change call"
    when: "The return value is inspected"
    then:
      - "The returned object contains draft_id (non-empty string)"
      - "The returned object contains status == 'needs_review'"
      - "The returned object contains files (a non-empty list of file path strings)"
      - "The returned object contains note (a non-empty string confirming staging for human review)"
      - "No additional top-level fields that imply the change has landed (e.g., 'applied', 'pushed') are present"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: assert result.keys() >= {'draft_id', 'status', 'files', 'note'}; assert result['status'] == 'needs_review'; assert len(result['files']) >= 1; assert 'review' in result['note'].lower() or 'staged' in result['note'].lower()"
  thresholds: {missing_return_fields: 0, wrong_status_value: 0}
  dependency_class: null
  mock_boundary: "GCS and DB mocked"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-017]

- criterion_id: AC-S8-018
  name: "accept handler reads persisted bundle from GCS using draft_id; requires no agent in-memory state"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S8-19, R-doc05-S8-20]
  criticality: P0
