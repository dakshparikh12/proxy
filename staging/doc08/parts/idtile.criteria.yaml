# Acceptance Criteria — Doc 08 Experience, UI & Surfaces · §2.1 Identity + §2.2 Tile state machine
# Source: product/v0-spec/08-BEHAVIOR.md §2.1, §2.2, §3
# ID scheme: AC-IDTILE-NNN
# Authority: DOC-08
#
# dependency_class values used in this file:
#   vendor:cartesia  — Cartesia TTS HTTP API (voice synthesis)
#   db:postgres      — meeting-scoped bearer token validation
#
# mock_boundary rules (MANDATORY when non-null):
#   vendor:cartesia : mock ONLY via vcrpy cassette at call_external layer;
#                     MUST NOT replace the call_external seam with Mock()
#   db:postgres     : real Postgres; MUST NOT mock asyncpg
#
# NEG criteria are MANDATORY for every non-null dependency_class per format rules.
# Golden-path: AC-IDTILE-016 is the core E2E presence promise (Listening state driven by real session-live event).
#
# Verification ladder derivation:
#   lint + unit         : always present
#   integration         : iff dependency_class is db:postgres or gcs:objects
#   reality             : iff dependency_class is vendor:*
#   negative            : ONLY on -NEG criteria
#   e2e                 : ONLY iff golden_path: true

