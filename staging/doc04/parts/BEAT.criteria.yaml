# ── AC-BEAT-012: error truncated to 500 chars (boundary test) ─────────────────

- criterion_id: AC-BEAT-012
  name: "Error string in operation_runs is truncated to at most 500 characters"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-13]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A real Postgres database; with_operation_run body raises an exception whose
      str() representation is 1000 characters long (e.g., 'x' * 1000).
    when: "The with_operation_run context exits via the 1000-char exception"
    then:
      - "The error column in operation_runs contains exactly 500 characters"
      - "The error column does NOT contain the full 1000-character string"
      - "The truncation is at character 500 (str(e)[:500] semantics)"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT length(error) FROM operation_runs WHERE id=$1; assert == 500;
      assert error != ('x' * 1000)
  thresholds:
    error_length_exceeding_500_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-012]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-BEAT-012-NEG
  name: "NEG: a 499-char error is stored untruncated (boundary: exactly at limit)"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-13]
  criticality: P1
  blocking: false
  behavior:
    given: "An exception whose str() is exactly 499 characters"
    when: "The str(e)[:500] truncation is applied"
    then:
      - "The stored error is exactly 499 characters (no truncation at 499)"
      - "A 500-char exception stores exactly 500 characters (upper boundary)"
      - "A 501-char exception stores exactly 500 characters (truncated at 501st char)"
  primary_oracle:
    type: deterministic
    artifact: >
      unit test: assert len(str(e499)[:500]) == 499;
      assert len(str(e500)[:500]) == 500;
      assert len(str(e501)[:500]) == 500
  thresholds:
    boundary_truncation_violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-012-NEG]
  dependency_class: null
  mock_boundary: "no external boundary; pure Python string slicing test"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-BEAT-013: finally always cancels heartbeat task ────────────────────────

- criterion_id: AC-BEAT-013
  name: "Heartbeat asyncio Task is cancelled in finally block on both normal and exception exit"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-14]
  criticality: P0
  blocking: true
  behavior:
