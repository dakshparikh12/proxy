# Acceptance Criteria — Doc 08 Experience, UI & Surfaces · §2.7 The connect page
# Source: product/v0-spec/08-BEHAVIOR.md §2.7
# ID scheme: AC-CONN-NNN
# Authority: DOC-08
#
# dependency_class values used in this file:
#   db:postgres — GET /connect/status reads the code_intel readiness record from Postgres
#
# mock_boundary rules (MANDATORY):
#   db:postgres — real Postgres; MUST NOT mock asyncpg or stub the Readiness row directly
#
# NEG criteria are required for every non-null dependency_class.
# Golden-path item marked golden_path: true.
#
# Ladder rules applied:
#   lint+unit: always
#   integration: iff db:postgres
#   negative: -NEG pair only
#   e2e: iff golden_path:true


# ══════════════════════════════════════════════════════════════════════════════
# THREE SECTIONS ONLY — V0 SCOPE
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-001
  name: "Connect page renders exactly three sections and no additional content in V0"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-01, R-doc08-CONN-02]
  criticality: P1
  blocking: true
  behavior:
    given: "A fully rendered connect page HTML response"
    when: "The rendered page structure is inspected"
    then:
      - "Exactly three top-level content sections are present: GitHub App install, readiness status, and invite instructions"
      - "No analytics section, settings section, or meeting history section is present"
      - "No element with data-section in [analytics, settings, history] exists anywhere in the DOM"
      - "No navigation links or content areas beyond the three setup sections are rendered"
  primary_oracle:
    type: deterministic
    artifact: "assert rendered page contains exactly three named section landmarks; assert no element with data-section in [analytics, settings, history]; assert no extraneous named content regions"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}


