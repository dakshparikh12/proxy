# ═══════════════════════════════════════════════════════════════════════════════
# §3.8 FAILURE HONESTY
# ═══════════════════════════════════════════════════════════════════════════════

- requirement_id: R-doc03-FAIL-01
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, sentence 1"
  source_quote: >
    A failed Scribe call is skipped, not retried (§3.1 — a dropped window is cheap,
    a stalled meeting is not)
  normalized_statement: >
    WHEN a Scribe micro-call fails (any error: API error, timeout, parse failure)
    THE SYSTEM SHALL skip that window and proceed to the next; THE SYSTEM SHALL NOT
    retry the failed call; zero additional messages.create calls SHALL be issued
    for the failed window.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-FAIL-02
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, sentence 1"
  source_quote: >
    the notes mark the gap ("comprehension gap 14:03–14:05 — transcript preserved")
    rather than silently missing it
  normalized_statement: >
    WHEN a Scribe call is skipped due to failure THE SYSTEM SHALL write a gap record
    to transcript_segments with status='gap'; the gap record SHALL include the span's
    start and end timestamps (wall-clock or meeting-relative, e.g. "14:03–14:05") and
    the literal phrase "transcript preserved"; the failed window SHALL NEVER be silently
    omitted from the notes without a corresponding gap record.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-FAIL-03
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, sentence 1"
  source_quote: >
    the raw transcript always has the evidence
  normalized_statement: >
    WHEN a Scribe call fails THE SYSTEM SHALL retain the raw transcript segment for
    the failed window in transcript_segments; the raw transcript bytes SHALL NOT be
    deleted, truncated, or overwritten as a consequence of the Scribe failure; the
    segment MUST remain readable after the gap is recorded.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-FAIL-04
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, sentence 1"
  source_quote: >
    the close pass backfills gaps and any never-comprehended pending spans from
    ground truth.
  normalized_statement: >
    WHEN the close pass runs THE SYSTEM SHALL backfill ALL transcript_segments rows
    whose status is 'gap' AND ALL rows whose status remains 'pending' (never reached
    by a live Scribe call); backfill SHALL use the raw transcript as ground truth;
    no gap or perpetually-pending span SHALL persist after the close pass completes
    without a backfill attempt.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-FAIL-05
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, paragraph 2, sentence 1"
  source_quote: >
    If the notes lag (processing backlog), readers see the object's freshness
    timestamp — never a stale object pretending to be current.
  normalized_statement: >
    WHEN the notes object is served to a reader THE SYSTEM SHALL include a freshness
    timestamp on the notes object reflecting when the object was last updated; a notes
    object that has not been updated within the lag threshold SHALL NEVER be served
    without the staleness being apparent from the timestamp; the notes object SHALL
    NOT misrepresent its own currency.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-FAIL-06
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, paragraph 2, sentence 1 (and §4 tunables)"
  source_quote: >
    If the notes lag (processing backlog), readers see the object's freshness
    timestamp — never a stale object pretending to be current.
  normalized_statement: >
    WHEN the elapsed time since the notes object was last written exceeds the
    notes-lag threshold (default: 90 seconds, tunable via §4 configuration)
