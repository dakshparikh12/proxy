# Criteria — Doc 08 (Experience, UI & Surfaces) — §2.4 Small features (items 1–14)
# ID prefix: AC-FEAT-NNN / AC-FEAT-NNN-NEG
# Authority: DOC-08 §2.4
# Status: qualified
#
# Ladder derivation rules (§8.4):
#   lint + unit: always
#   integration: iff db:postgres or gcs:objects
#   reality:     iff vendor:*
#   negative:    only on -NEG pair
#   e2e:         only iff golden_path: true
#
# MANDATORY -NEG for every non-null dependency_class criterion.
# golden_path: false throughout — these are supporting features, not the core promise.
#
# CANONICAL overrides applied:
#   §12.12 — decision/action chat lines are deterministic harness formatter keyed on committed
#             note_delta; NEVER a model wake, NEVER model-generated.
#   §4     — draft_id from persisted staged_drafts row; in-memory review_session dies at
#             sandbox teardown; never accept from in-memory.
#   §8     — verbal walkthrough is a DELIVERY MODE over progress envelopes, NOT a disposition.
#   §6     — CAPABILITIES is a static dict, not a runtime HTTP endpoint.
#   dm_available bool from Doc 02 channel-report routes private catch-me-up delivery.
#   Timer-forbidden rule: progress updates on real state change only, never on a timer.


# ═════════════════════════════════════════════════════════════════════════════
# FEATURE 1 · Catch-me-up (R-doc08-FEAT-01 … 03)
# ═════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-FEAT-001
  name: "catch-me-up produces a notes-grounded spoken recap of approximately 20 seconds"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-FEAT-01, R-doc08-FEAT-03]
  criticality: P1
  blocking: true
  behavior:
    given: "a meeting with committed note_deltas in the notes object covering discussed topics, decisions, and open questions"
    when: "a participant says 'Proxy, catch me up'"
    then:
      - "a spoken recap is produced"
      - "the recap content is derived from the committed notes object"
      - "the recap covers what has been discussed, decided, and remains open"
      - "the recap word count is consistent with approximately 20 seconds of normal-cadence speech (roughly ≤ 80 words)"
      - "no content absent from the committed notes is fabricated"
  primary_oracle: {type: deterministic, artifact: "assert recap word_count ≤ 80; assert recap content subset of committed notes fields"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-FEAT-001]
  dependency_class: db:postgres
  mock_boundary: "stub note_deltas rows from postgres; MUST NOT replace the db:postgres seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}

- criterion_id: AC-FEAT-001-NEG
  name: "catch-me-up degrades honestly when note_deltas DB read errors or returns empty"
  authority_refs: [R-doc08-FEAT-01, R-doc08-FEAT-03]
  dependency_class: db:postgres
  mock_boundary: "negative cassette: note_deltas read returns DB error or empty result set; MUST NOT replace the db:postgres seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "a catch-me-up request where the notes DB read fails or returns no rows"
    when: "the handler attempts to read note_deltas"
    then:
      - "honest failure spoken or posted (e.g. 'notes not available')"
      - "no fabricated recap generated from model memory"
      - "no silent proceed"
  primary_oracle: {type: deterministic, artifact: "assert honest_failure event emitted; assert no fabricated recap content"}
  thresholds: {silent_failures_allowed: 0}
  fault_model_refs: []
  test_ids: [T-FEAT-001-NEG]

- criterion_id: AC-FEAT-002
  name: "catch-me-up delivers recap privately via DM when DM channel is available"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-FEAT-02]
  criticality: P1
  blocking: true
  behavior:
    given: "a late joiner with dm_available: true in the Doc 02 channel-report"
    when: "catch-me-up is triggered by or for that participant"
    then:
      - "the recap is routed to the participant's DM channel"
      - "the recap is NOT broadcast to the full meeting chat"
  primary_oracle: {type: deterministic, artifact: "assert delivery_channel == participant.dm_channel_id; assert no broadcast_chat event emitted"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-FEAT-002]
  dependency_class: vendor:recall
  mock_boundary: "stub dm_available: true from Doc 02 channel-report cassette; MUST NOT replace the call_external seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}

- criterion_id: AC-FEAT-002-NEG
  name: "catch-me-up degrades honestly when DM channel is unavailable or Recall DM delivery errors"
  authority_refs: [R-doc08-FEAT-02]
  dependency_class: vendor:recall
  mock_boundary: "negative cassette: dm_available false OR Recall DM send returns error/timeout; MUST NOT replace the call_external seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "a late joiner where DM is unavailable or the Recall DM delivery call fails"
    when: "catch-me-up is triggered"
    then:
      - "honest fallback or failure posted (e.g. delivered to meeting chat with note, or 'DM unavailable')"
      - "no silent proceed claiming private delivery without actually delivering privately"
      - "no fabricated delivery confirmation"
  primary_oracle: {type: deterministic, artifact: "assert honest_fallback or honest_failure event; assert no fabricated private_delivery confirmation"}
  thresholds: {silent_failures_allowed: 0}
  fault_model_refs: []
  test_ids: [T-FEAT-002-NEG]


