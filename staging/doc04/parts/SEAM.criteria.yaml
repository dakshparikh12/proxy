# SEAM.criteria.yaml — Doc 04 (Proxy Orchestrator) — §3.3 Provider Seam + AgentChunk + stream_deltas
# Acceptance criteria paired to SEAM.requirements.yaml.
# ID scheme: AC-SEAM-NNN (positive), AC-SEAM-NNN-NEG (negative/off-state)
# Test IDs: T-SEAM-NNN
#
# dependency_class legend:
#   null       — pure in-process logic; ladder: [lint, unit]
#   db:postgres — cost meter persistence; ladder: [lint, unit, integration]
# Every non-null dependency_class gets a paired NEG criterion: ladder [lint, unit, negative]

# ── AC-SEAM-001: SDK import absent from harness business logic (structural) ────

- criterion_id: AC-SEAM-001
  name: "SDK client never imported or instantiated in harness business-logic modules"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-SEAM-01]
  criticality: P1
  blocking: true
  behavior:
    given: "The complete source tree of harness business-logic modules (excluding provider seam impl and Scribe module)"
    when: "A static grep/AST scan for SDK client instantiation patterns runs across all harness modules"
    then:
      - "Zero matches found outside the provider seam implementation and the Scribe micro-call module"
      - "The provider seam implementation is the sole owner of SDK client construction in harness code"
  primary_oracle:
    type: deterministic
    artifact: "grep/AST scan of harness modules; assert zero SDK instantiation sites outside seam + scribe"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-SEAM-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}


