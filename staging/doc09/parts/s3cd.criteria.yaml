- criterion_id: AC-S3-520
  name: "Soft-cap triggers Haiku downgrade + spoken disclosure before execution"
  evidence_class: "[simulation]"
  authority_refs: [R-doc09-S3-57]
  criticality: P1
  blocking: true
  behavior:
    given: "A meeting's cumulative cost (model_usd + transport_usd + e2b_usd) is below the soft cap; the next cost increment crosses the soft cap"
    when: "check_meeting_budget() runs and detects the soft-cap breach"
    then:
      - "A speak() call with a cost-disclosure message is emitted to participants before or simultaneously with the model downgrade"
      - "The orchestrator model is switched to Haiku for subsequent LLM calls"
      - "The Scribe interval is widened"
      - "The disclosure is not deferred, suppressed, or omitted under any execution order"
  primary_oracle: {type: simulation_trace, artifact: "event trace showing speak() call happens before or at the same tick as model-config change to Haiku"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-S3-520]
  test_ids: [T-S3-520]
  dependency_class: db:postgres
  mock_boundary: "may replace Postgres responses via asyncpg test pool; MUST NOT skip real check_meeting_budget() path"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-520

