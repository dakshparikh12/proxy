# Doc 09 (End-to-End Integration Scenarios) — S1–S4 acceptance criteria slice
# Every criterion has a deterministic-preferred oracle; authority_refs point at real
# requirement_ids in s3ab.requirements.yaml. Numeric thresholds explicit; zeros stated.
# Negative criteria (NEG) paired for every non-null dependency_class.
# S1 end-to-end golden path marked golden_path: true with e2e tier.

# ══════════════════════════════════════════════════════════════════════════════
# S1 — THE HAPPY ARC
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-001
  name: "S1 golden path: grounded answer + notes file posts end-to-end"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S3-01, R-doc09-S3-05, R-doc09-S3-06, R-doc09-S3-07]
  criticality: P1
  blocking: true
  behavior:
    given: "A repo is connected, Proxy is admitted to a meeting, and a grounded question is asked aloud"
    when: "The full meeting arc runs: question → answer → meeting ends"
    then:
      - "The answer cites at least one file:line drawn from the live repository clone"
      - "A voice headline is spoken and a chat-detail answer is posted in the meeting chat"
      - "After meeting end a notes file is posted containing decisions, actions, questions, and receipts"
      - "The notes bundle envelope contains notes_ref equal to the meeting_id"
  primary_oracle: {type: deterministic_simulation, artifact: "End-to-end trace asserting file:line citation present, voice + chat outputs emitted, notes file posted with required sections, notes_ref == meeting_id"}
  thresholds: {file_line_citations_min: 1, missing_notes_sections_allowed: 0, notes_ref_mismatch_allowed: 0, violations_allowed: 0}
  fault_model_refs: [F-S3-001]
  test_ids: [T-S3-001]
  dependency_class: vendor:recall
  mock_boundary: "Recall.ai bot join and audio stream replaced by a pre-recorded fixture; STT/TTS mocked at their respective seams"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: e2e}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-001

- criterion_id: AC-S3-001-NEG
  name: "S1 Recall outage: honest partial failure propagated, no phantom answer"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S3-01]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is mid-meeting when the Recall.ai bot connection errors or times out"
    when: "The Recall dependency returns an error or non-recoverable timeout"
    then:
      - "No grounded answer is fabricated from the unavailable audio stream"
      - "The envelope status is set to failed or partial with an honest error reason"
      - "The notes file is not silently omitted without an error signal to the caller"
  primary_oracle: {type: deterministic_simulation, artifact: "Recall mock forced to error; assert no phantom answer produced, envelope status in {failed, partial}, error reason populated"}
  thresholds: {phantom_answers_allowed: 0, silent_failures_allowed: 0, violations_allowed: 0}
  fault_model_refs: [F-S3-001-NEG]
  test_ids: [T-S3-001-NEG]
  dependency_class: vendor:recall
  mock_boundary: "Recall.ai mock forced to return connection-error / timeout at the bot-join seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-001-NEG

