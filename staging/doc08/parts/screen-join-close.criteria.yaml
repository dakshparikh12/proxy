# ════════════════════════════════════════════════════════════════

- criterion_id: AC-SJCL-009
  name: "Camera and screenshare are never simultaneously active on the transport"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SJCL-09]
  criticality: P1
  blocking: true
  behavior:
    given: "Any point in a live session"
    when: "The transport state is sampled"
    then:
      - "At most one of camera_active and screenshare_active is true at any sample"
      - "The state (camera_active=true AND screenshare_active=true) never occurs"
  primary_oracle: {type: deterministic, artifact: "FSM invariant: assert NOT (camera_active AND screenshare_active) holds at every state transition; simulation trace over swap sequence confirms invariant"}
  thresholds: {simultaneous_active_occurrences_allowed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
  fault_model_refs: [F-DUAL-ACTIVE-TRANSPORT]
  test_ids: [T-SJCL-009]

