  thresholds:
    violations_allowed: 0
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT mock asyncpg"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}
  fault_model_refs: []
  test_ids: [T-SURF-011]

