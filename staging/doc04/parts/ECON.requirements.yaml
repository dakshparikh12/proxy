# ── Cheap-first seat assignments ──────────────────────────────────────────────

- requirement_id: R-doc04-ECON-04
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.12, model seats table; paragraph 4"
  source_quote: >
    Inverted to cheap-first (unlike the platform which defaults Opus-everywhere): cheap-first and let
    the spend live where it earns its keep (the big build).
    | Scribe micro-call (Doc 03) | Haiku (claude-haiku-4-5) | not agentic — one structured extraction |
    | Proactive gate (V1 — dormant in V0) | Haiku | small structured classifier |
    | Orchestrator wake / grounded answer | Sonnet (claude-sonnet-4-6) | fast + real reasoning |
    | Workroom quick | Haiku / Sonnet | a lookup or pointed explanation |
    | Workroom big build | Opus (claude-opus-4-8) | real code work, verified |
    | Code-intel fan-out (Doc 01) | Haiku / cheap-open-weight | bounded parallel summarization |
  normalized_statement: >
    THE SYSTEM SHALL assign model seats cheap-first by default: the Scribe micro-call role SHALL map
    to claude-haiku-4-5; the proactive-gate role SHALL map to claude-haiku-4-5; the orchestrator
    wake/grounded-answer role SHALL map to claude-sonnet-4-6; the workroom-quick role SHALL map to
    claude-haiku-4-5 or claude-sonnet-4-6; the workroom-big-build role SHALL map to claude-opus-4-8;
    the code-intel fan-out role SHALL map to claude-haiku-4-5 or a cheap open-weight model; no role
    SHALL default to a more expensive model than its seat specifies.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── Output-token clamp ────────────────────────────────────────────────────────

- requirement_id: R-doc04-ECON-05
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.12, paragraph 5"
  source_quote: >
    min(env_max_output, model_ceiling) output-token clamp (one MAX_OUTPUT_TOKENS, each model self-clamps).
  normalized_statement: >
    WHEN constructing any model call THE SYSTEM SHALL apply an output-token limit equal to
    min(env_max_output, model_ceiling), where env_max_output is the value of the MAX_OUTPUT_TOKENS
    environment variable and model_ceiling is the per-model ceiling defined in the routing table;
    there SHALL be exactly one MAX_OUTPUT_TOKENS constant per model seat; no model call SHALL be
    issued without an explicit max_tokens cap derived from this formula.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── 1-hour TTL cache_control breakpoint ──────────────────────────────────────

- requirement_id: R-doc04-ECON-06
  authority_type: canonical
  authority_document: CANONICAL-DECISIONS
  source_location: "§3.12, paragraph 6; CANONICAL-DECISIONS §10.1"
  source_quote: >
    Manual 1-hour-TTL cache_control breakpoint on the Scribe/Orchestrator stable prefix (placed by
    us on the raw Messages call with the volatile tail after the breakpoint — CANONICAL §10.1).
  normalized_statement: >
    THE SYSTEM SHALL place a cache_control breakpoint with a 1-hour TTL on the stable prefix of the
    Scribe and Orchestrator Messages calls; the breakpoint SHALL be placed such that the stable
    prefix (system prompt, codebase context, standing instructions) appears BEFORE the breakpoint
    and the volatile tail (wake event, current transcript, task context) appears AFTER the breakpoint;
    the TTL SHALL be 1 hour (3600 seconds), not the SDK default of 5 minutes.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

