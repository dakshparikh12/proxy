  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-11
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§11.8"
  source_quote: "The Doc 02 signal surface ... are in-process/over-transport internal events ... They are out of assert_registry_closed()'s scope"
