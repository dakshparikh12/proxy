# §3.12 — Per-Role Model Routing
# ═══════════════════════════════════════════════════════════════════════════════

# ── One definition, one file ──────────────────────────────────────────────────

- requirement_id: R-doc04-ECON-01
  authority_type: canonical
  authority_document: CANONICAL-DECISIONS
  source_location: "§3.12, paragraph 3; CANONICAL-DECISIONS §11.9"
  source_quote: >
    DRY (CANONICAL §11.9): the one per-role model table lives in libs/llm/routing.py and is imported,
    not redefined per doc.
  normalized_statement: >
    THE SYSTEM SHALL define the per-role model table exactly once, in libs/llm/routing.py; no other
    module (service, harness, doc, or test helper) SHALL redefine an inline MODELS dict, per-role
    model mapping, or equivalent data structure; all consumers SHALL import from libs/llm/routing.py.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── Model-router separate from capability-router ──────────────────────────────

- requirement_id: R-doc04-ECON-02
  authority_type: specification
  authority_document: DOC-04
  source_location: "§3.12, paragraph 2"
  source_quote: >
    Model-router (which model runs a role) stays SEPARATE from capability-router (which behavior fires).
  normalized_statement: >
    THE SYSTEM SHALL implement model selection (which model runs a role) and behavior selection (which
    behavior fires for a given event) as separate, non-entangled code paths; the model-router SHALL NOT
    encode behavioral logic, and the capability-router SHALL NOT encode model-selection logic; no single
    function or class SHALL conflate both concerns.
  requirement_type: architectural
  criticality: P1
  testability: executable
  status: qualified

