# Doc 05 (Workroom) — S7 acceptance criteria slice
# Coverage: §3.7 (The verify-loop — the builder NEVER grades itself)
# ID scheme: AC-S7-NNN (NEG pairs: AC-S7-NNN-NEG)
#
# Structure mirrors §3.7 sub-sections:
#   ① Separate fresh-context critic (AC-S7-001 … AC-S7-016)
#   ② Deterministic evidence gate   (AC-S7-017 … AC-S7-031)
#   ③ Hard gate                      (AC-S7-032 … AC-S7-038)
#   ④ Expansion exclusions (V0)      (AC-S7-039 … AC-S7-044)
#
# NEG-pair rule: every non-null dependency_class criterion has a paired -NEG criterion.
# vendor:claude-sdk criteria carry {tier: reality} in their verification_ladder.
# golden_path: true criteria: AC-S7-015 (critic integration) + AC-S7-030 (offline+live end-to-end)

# ═══════════════════════════════════════════════════════════════════════════════
# ① — SEPARATE FRESH-CONTEXT CRITIC
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S7-001
  name: "Critic is invoked as a separate query() with no shared session state from the builder"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-01]
  criticality: P0
  blocking: true
  behavior:
    given: "A completed build pass; the verify-loop is triggered."
    when: "The critic query() call is constructed and issued."
    then:
      - "The critic uses a freshly constructed ClaudeAgentOptions / session — not the builder's running session object."
      - "The critic's context contains no tool history, memory references, or variable bindings from the builder's session."
      - "Inspecting the critic call site shows no passing of the builder's session_id, conversation_id, or context bag."
  primary_oracle:
    type: static_analysis
    artifact: >
      AST / call-graph scan of the verify-loop invocation: assert critic is called via
      query() on a freshly constructed options object; assert no builder session object
      is passed as argument to the critic call; grep for session reuse patterns returns 0 matches.
  thresholds:
    builder_session_objects_passed_to_critic: 0
    shared_tool_history_objects: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-001]

- criterion_id: AC-S7-002
  name: "Critic model is strictly stronger (higher capability tier) than the builder model"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-02]
  criticality: P0
  blocking: true
  behavior:
    given: "The verify-loop configuration; the builder is assigned a model tier."
    when: "The critic query() options are constructed."
    then:
      - "The model field in the critic's ClaudeAgentOptions resolves to a capability tier strictly above the builder's model."
      - "A model-tier comparison function (e.g. MODEL_TIER_RANK[critic_model] > MODEL_TIER_RANK[builder_model]) returns True."
      - "Using the same model for both critic and builder raises a configuration error at startup."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: instantiate verify-loop with builder_model=TIER_N; assert
      MODEL_TIER_RANK[critic_model] > MODEL_TIER_RANK[builder_model]; assert that
      critic_model == builder_model raises ConfigurationError.
  thresholds:
    critic_tier_minus_builder_tier_minimum: 1
    same_model_configurations_allowed: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-002]

- criterion_id: AC-S7-003
  name: "Builder success log and self-narration are absent from the critic's context"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-03]
  criticality: P0
  blocking: true
  behavior:
    given: "A build pass that produced a success log containing the string 'BUILD PASSED' and builder narration."
    when: "The critic's prompt and system_prompt are assembled."
    then:
      - "The string 'BUILD PASSED' (or any builder-declared success token) does NOT appear in the critic's prompt or system_prompt."
      - "The builder's self-narration messages are not included in the critic's message list."
      - "The critic's context contains only: the task specification, the artifact under review, and the AC-tag list."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: run a build pass that emits a known success-log token; capture the
      critic's assembled prompt object; assert success-log token absent from
      prompt + system_prompt + any injected message content; assert builder
      narration message count in critic context == 0.
  thresholds:
    builder_success_tokens_in_critic_context: 0
    builder_narration_messages_in_critic_context: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-003]

- criterion_id: AC-S7-004
  name: "Critic prompt enforces the four-phase judgment order: AC-tags → runs → cited → scope"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-04]
  criticality: P0
  blocking: true
  behavior:
    given: "The critic's system_prompt or instruction template."
    when: "The prompt template is inspected statically."
    then:
      - "The prompt explicitly lists the four judgment phases in order: (i) each AC-tag met; (ii) artifact runs/parses/typechecks; (iii) load-bearing claims cited at file:line; (iv) stayed in scope."
      - "No phase is absent, reordered, or merged with another."
      - "The instruction to re-run commands via run_command (not accept claims) appears in phase (ii)."
  primary_oracle:
    type: static_analysis
    artifact: >
      Static read of the critic system_prompt template; assert all four phase labels
      present in order; assert run_command instruction present in phase-ii section;
      assert no 'accept the builder's claim' or equivalent shortcut present.
  thresholds:
    judgment_phases_present_in_order: 4
    shortcut_accept_claim_instructions: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-004]

- criterion_id: AC-S7-005
  name: "Critic re-runs pytest/typecheck/parse via run_command and reads exit code — does not accept prose claims"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-05, R-doc05-S7-10]
  criticality: P0
  blocking: true
  behavior:
    given: "An artifact where the builder narrated 'all tests pass' but the artifact actually fails pytest; critic is invoked."
    when: "The critic evaluates phase (ii) of its judgment."
    then:
      - "The critic issues a run_command call to execute pytest (or equivalent) and receives the actual exit code."
      - "The critic's verdict for the runs-check reflects the actual exit code, NOT the builder's prose claim."
      - "A failing exit code (non-zero) causes the criterion to be marked FAILED in the verdict."
  primary_oracle:
    type: deterministic
    artifact: >
      Simulation test: supply a broken artifact + builder prose claim of 'tests pass';
      cassette the run_command response with exit_code=1; assert critic verdict marks
      runs-check FAILED; assert verdict does not reference the builder's prose claim
      as evidence.
  thresholds:
    builder_prose_claims_used_as_evidence: 0
    run_command_calls_for_phase_ii: {minimum: 1}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cassette at LLM boundary and stubbed run_command exit_code."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S7-005]

- criterion_id: AC-S7-005-NEG
  name: "NEG: critic with run_command stubbed as always-pass marks runs-check PASSED (confirms gate is exit-code-driven)"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A broken artifact; run_command stubbed to always return exit_code=0."
    when: "The critic evaluates phase (ii)."
    then:
      - "The critic marks runs-check PASSED — confirming that the verdict is driven entirely by the exit code, not prose content."
      - "This validates that the positive criterion (AC-S7-005) is non-vacuous: swapping exit code changes the verdict."
  primary_oracle:
    type: deterministic
    artifact: >
      Control: same broken artifact + run_command stubbed exit_code=0; assert
      critic verdict marks runs-check PASSED; confirms exit-code causality.
  thresholds:
    runs_check_passed_with_exit_code_zero: 1
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with cassette; run_command exit_code=0 stub."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S7-005-NEG]

- criterion_id: AC-S7-006
  name: "Critic has run_command in its tool set and does NOT have write_file or edit_file"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-10, R-doc05-S7-27]
  criticality: P0
  blocking: true
  behavior:
    given: "The critic's ClaudeAgentOptions or allowed_tools list is assembled."
    when: "The effective tool set is inspected."
    then:
      - "run_command is present in the critic's allowed_tools."
      - "write_file, edit_file, Write, Edit, and any analogous mutation tools are absent from the critic's tool set."
      - "No mutation tool can be added to the critic via any configuration path."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: inspect the critic's assembled options.allowed_tools;
      assert 'run_command' in allowed_tools;
      assert set(allowed_tools).isdisjoint({'write_file', 'edit_file', 'Write', 'Edit'});
      static scan confirms no conditional code path adds mutation tools to critic.
  thresholds:
    run_command_in_critic_tools: 1
    mutation_tools_in_critic_tools: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-006]

- criterion_id: AC-S7-007
  name: "Critic verdict is schema-constrained via json_schema output format"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-06]
  criticality: P1
  blocking: true
  behavior:
    given: "The critic query() call construction."
    when: "The critic options are inspected statically and at runtime."
    then:
      - "The ClaudeAgentOptions (or equivalent structured-output config) carries a json_schema that constrains the verdict object."
      - "The schema requires at minimum: a 'criteria' array (each item with criterion_id and status), a top-level 'verification' field, and a top-level 'status' field."
      - "The SDK's structured-output mechanism is used — not post-hoc JSON parsing of free-text."
  primary_oracle:
    type: static_analysis
    artifact: >
      AST scan of critic call site: assert json_schema (or output_schema / outputFormat
      equivalent per live SDK docs) is provided; assert schema contains 'criteria',
      'verification', 'status' fields as required; assert no fallback 'json.loads(response.text)'
      code path for verdict extraction.
  thresholds:
    json_schema_present_on_critic_call: 1
    free_text_json_parse_fallback_paths: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-007]

- criterion_id: AC-S7-008
  name: "Emitted verdict is independently re-validated against the declared json_schema after emission"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-06, R-doc05-S7-28]
  criticality: P1
  blocking: true
  behavior:
    given: "The verify-loop has received a structured verdict object from the critic."
    when: "The verdict is processed."
    then:
      - "A second independent schema validation (e.g. jsonschema.validate) is run on the emitted verdict object."
      - "This validation is separate from the SDK's own schema enforcement (belt-and-suspenders)."
      - "A verdict object that passes the SDK but fails the independent check is treated as unparseable → unverified/needs_review."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: inject a verdict that satisfies the SDK schema minimally but violates
      an additional constraint in the independent validator; assert verify-loop returns
      verification='unverified' and status='needs_review'.
  thresholds:
    independent_schema_validations_run: 1
    sdk_pass_independent_fail_allowed: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-008]

- criterion_id: AC-S7-009
  name: "Structured-output API call shape is confirmed against live SDK docs at build (not assumed)"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-07]
  criticality: P1
  blocking: false
  behavior:
    given: "The critic call site implementation."
    when: "A build-time check or code comment is inspected."
    then:
      - "The source file contains a dated confirmation comment (or a build-time assertion) citing the live SDK documentation URL and confirming the structured-output parameter name and call shape."
      - "The confirmation is dated within the current build cycle — it is not a one-time historical note."
      - "An automated CI step (or test fixture) imports the SDK and asserts the structured-output kwarg name matches what the code uses."
  primary_oracle:
    type: static_analysis
    artifact: >
      Read the critic call-site source: assert confirmation comment with SDK doc URL
      and structured-output parameter name is present; assert CI step or fixture
      asserts the kwarg name via introspection of the SDK's query() signature.
  thresholds:
    sdk_doc_confirmation_comments: {minimum: 1}
    ci_kwarg_assertion_steps: {minimum: 1}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-009]

- criterion_id: AC-S7-010
  name: "Unparseable or uncertain verdict → verification='unverified', status='needs_review', never 'verified'"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-08]
  criticality: P0
  blocking: true
  behavior:
    given: "The verify-loop's parse_verdict() function."
    when: "A malformed JSON verdict (missing required field, wrong types) is injected."
    then:
      - "parse_verdict() sets verification='unverified' on the envelope."
      - "parse_verdict() sets status='needs_review' on the envelope."
      - "verification is never set to 'verified' when the verdict is malformed or contains uncertainty."
      - "No exception propagates to the caller — the fail-closed handling is graceful."
  primary_oracle:
    type: deterministic
    artifact: >
      Parameterized unit tests: inject (a) JSON missing 'criteria' key, (b) JSON with
      verification field set to null, (c) JSON with an 'uncertain' flag set; for each
      assert envelope.verification == 'unverified' and envelope.status == 'needs_review'
      and no exception raised.
  thresholds:
    verified_set_on_malformed_verdict: 0
    exceptions_from_parse_verdict_on_bad_input: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S7-010]

- criterion_id: AC-S7-011
  name: "Total parse failure → every individual criterion is set to FAILED"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-09]
  criticality: P0
  blocking: true
  behavior:
    given: "parse_verdict() is called with a completely unparseable payload (not valid JSON at all)."
    when: "The payload is processed."
    then:
      - "Every criterion in the verification run is set to status='failed'."
      - "No criterion is left in an unknown, partial-pass, or default-pass state."
      - "The envelope receives verification='unverified' and status='needs_review'."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: pass b'NOT JSON AT ALL <<<' to parse_verdict(); assert
      all criteria in the returned result have status == 'failed';
      assert envelope.verification == 'unverified' and envelope.status == 'needs_review'.
  thresholds:
    criteria_not_set_to_failed_on_total_parse_failure: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S7-011]

- criterion_id: AC-S7-012
  name: "Builder cannot author or modify the checker, the harness, or the verdict (anti-gaming)"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-11]
  criticality: P0
  blocking: true
  behavior:
    given: "The full Workroom source tree; the builder's allowed tool set."
    when: "The tool permissions and code ownership are inspected statically."
    then:
      - "The builder worker's tool set contains no write_file or edit_file permission over the verification harness path."
      - "The verification harness (parse_verdict, evidence_backed, the critic invocation) is in a separate, read-only-to-builder module."
      - "No code path allows the builder to emit a verdict object directly or to set verification='verified' itself."
  primary_oracle:
    type: static_analysis
    artifact: >
      Static check: assert the builder's allowed_tools list excludes write/edit over
      the harness module; assert harness module is not imported by the builder-side
      code in a writable context; grep for builder calling parse_verdict() or
      evidence_backed() directly returns 0 matches.
  thresholds:
    builder_write_access_to_harness_module: 0
    builder_direct_verdict_emissions: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-012]

- criterion_id: AC-S7-013
  name: "Fixed deterministic tool is used as judge when output is mechanically checkable"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-11]
  criticality: P0
  blocking: true
  behavior:
    given: "The critic's phase-(ii) evaluation for a compilable/testable artifact."
    when: "The judgment mechanism is inspected."
    then:
      - "For artifacts with a runnable test suite, mypy typecheck, or schema validation, the verdict for that criterion is derived from the fixed tool's exit code — not from LLM prose assessment."
      - "A criterion that could be checked deterministically is not left to LLM prose judgment."
  primary_oracle:
    type: static_analysis
    artifact: >
      Audit the critic system_prompt + verdict schema: assert all mechanically checkable
      criteria (runs, typechecks, validates) specify the check command and require
      run_command exit_code as evidence; assert no criterion of this type is
      marked 'evaluated_by: llm_prose_only'.
  thresholds:
    deterministically_checkable_criteria_left_to_prose: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-013]

- criterion_id: AC-S7-014
  name: "Critic invocation is a real live SDK query() call (vendor:claude-sdk dependency confirmed)"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S7-01, R-doc05-S7-02, R-doc05-S7-06]
  criticality: P0
  blocking: true
  behavior:
    given: "The verify-loop integration test suite with a cassette at the network boundary."
    when: "The verify-loop is exercised end-to-end."
    then:
      - "The SDK's query() is called with the correct model tier (stronger than builder) and json_schema output format."
      - "The returned structured verdict is a valid Python object matching the declared schema."
      - "No stubbed/mocked verdict is returned from a non-SDK code path."
  primary_oracle:
    type: deterministic
    artifact: >
      Integration test with cassette: assert query() is called once with
      model==CRITIC_MODEL and json_schema in options; assert returned verdict
      passes independent schema validation; assert no stub intercepts the call.
  thresholds:
    critic_query_calls_in_integration_test: 1
    schema_validation_passes: 1
    stubbed_verdict_injections: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK call with cassette at HTTP boundary; LLM response pre-recorded."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: reality}
  test_ids: [T-S7-014]

- criterion_id: AC-S7-014-NEG
  name: "NEG: Downgrading critic model to builder tier causes a ConfigurationError at startup"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-02]
  criticality: P0
  blocking: true
  behavior:
    given: "The verify-loop configuration where critic_model is set to the same model as the builder."
    when: "The verify-loop is initialized."
    then:
      - "A ConfigurationError (or equivalent startup guard) is raised before any query() call is made."
      - "No verification run proceeds with a same-or-weaker critic model."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: construct verify-loop with critic_model == builder_model;
      assert ConfigurationError raised during __init__ before first query().
  thresholds:
    verification_runs_with_same_tier_critic: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "SDK import only; no actual query() call made."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S7-014-NEG]

- criterion_id: AC-S7-015
  name: "Golden path: critic completes a full four-phase verification and returns a schema-valid verdict"
  evidence_class: "[eval]"
  authority_refs: [R-doc05-S7-01, R-doc05-S7-04, R-doc05-S7-05, R-doc05-S7-06, R-doc05-S7-10]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A valid artifact with all criteria passing; builder context contains a known
      success-log token; critic is invoked via the full verify-loop.
    when: "The verify-loop runs to completion."
    then:
      - "The critic is a fresh query() call — builder session not shared."
      - "The builder success-log token is absent from the critic's assembled context."
      - "The critic issues at least one run_command call for phase-(ii) checks."
      - "The verdict passes independent schema validation."
      - "All criteria in the verdict are marked 'passed'."
      - "The envelope receives verification='verified' and status='done'."
  primary_oracle:
    type: deterministic
    artifact: >
      Integration test with cassette (real SDK, pre-recorded LLM response for all-pass
      verdict): assert builder-session not reused; assert success-log absent from critic
      prompt; assert run_command called >= 1 time; assert verdict schema-valid; assert
      envelope.verification == 'verified' and envelope.status == 'done'.
  thresholds:
    builder_session_reuse: 0
    success_log_in_critic_context: 0
    run_command_calls: {minimum: 1}
    schema_validation_errors: 0
    envelope_verification_value: "verified"
    envelope_status_value: "done"
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK invocation with cassette at HTTP boundary."
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: reality}
    - {tier: e2e}
  test_ids: [T-S7-015]

- criterion_id: AC-S7-015-NEG
  name: "NEG: When critic cannot be invoked (SDK unavailable), verify-loop returns unverified/needs_review — never verified"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-08]
  criticality: P0
  blocking: true
  behavior:
    given: "The SDK's query() raises an exception (network error, auth failure, timeout)."
    when: "The verify-loop attempts the critic call."
    then:
      - "The verify-loop catches the exception without propagating it."
      - "All criteria default to status='failed'."
      - "The envelope receives verification='unverified' and status='needs_review'."
      - "verification is never set to 'verified' due to a SDK call failure."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: stub query() to raise RuntimeError; assert all criteria set to
      'failed'; assert envelope.verification == 'unverified'; assert no uncaught
      exception reaches the caller.
  thresholds:
    verified_set_on_sdk_failure: 0
    uncaught_exceptions_from_verify_loop: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "SDK query() stubbed to raise RuntimeError."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S7-015-NEG]

- criterion_id: AC-S7-016
  name: "Critic system_prompt and tool list are read-only at runtime — cannot be mutated by agent output"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-11, R-doc05-S7-27]
  criticality: P0
  blocking: true
  behavior:
    given: "The verify-loop implementation; any processing of the critic's output."
    when: "The critic's output is processed and subsequent critic calls are made."
    then:
      - "The critic's system_prompt is assembled once from a fixed template and never modified based on a previous critic output."
      - "The critic's allowed_tools list is never extended or modified based on the artifact or builder output."
      - "No code path exists where a critic output value is fed back into the next critic call's configuration."
  primary_oracle:
    type: static_analysis
    artifact: >
      AST scan: assert system_prompt is constructed from a constant template with
      only artifact-derived substitutions (not prior-critic-output substitutions);
      assert allowed_tools is assigned from a constant list, not from any runtime
      variable derived from model output.
  thresholds:
