# Acceptance Criteria — Doc 08 Experience, UI & Surfaces · §2.8 The authenticated /m/{meeting_id} home
# Source: product/v0-spec/08-BEHAVIOR.md §2.8
# ID scheme: AC-HOME-NNN
# Authority: DOC-08
#
# dependency_class values used in this file:
#   db:postgres   — note_deltas fold, staged_drafts, tenant check, token revocation,
#                   draft/tenant check, accept/reject handler, audit records
#   gcs:objects   — diff bundle download artifact_ref in staged_drafts
#
# mock_boundary rules (MANDATORY when non-null):
#   db:postgres   : real Postgres; MUST NOT mock asyncpg or stub the tenant-check query
#   gcs:objects   : real GCS client or VCR cassette at GCS seam; MUST NOT stub at the
#                   staged_drafts read layer
#
# NEG criteria are MANDATORY for every non-null dependency_class per format rules.
# Golden-path: AC-HOME-013 is the full draft-approval E2E (tenant opens home → sees
#              notes + draft → accepts → Doc 04 apply → status == accepted).
#
# Verification ladder derivation:
#   lint + unit        : always present
#   integration        : iff dependency_class is db:postgres or gcs:objects
#   reality            : iff dependency_class is vendor:*
#   negative           : ONLY on -NEG criteria
#   e2e                : ONLY iff golden_path: true

# ══════════════════════════════════════════════════════════════════════════════
# GET /m/{meeting_id} — Authenticated tenant member
# ══════════════════════════════════════════════════════════════════════════════

# ── Notes + drafts rendered for authenticated member ─────────────────────────

- criterion_id: AC-HOME-001
  name: "GET /m/{meeting_id} returns folded notes markdown and staged_drafts for authenticated member"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A tenant member with a valid session and a meeting_id that belongs to their tenant"
    when: "GET /m/{meeting_id} is requested"
    then:
      - "The response is HTTP 200"
      - "The rendered page contains notes markdown folded server-side from note_deltas via internal notes reader"
      - "The rendered page contains staged_drafts cards (at least one card per pending draft)"
      - "No raw GCS URI appears in any href or src attribute of the response HTML"
  primary_oracle: {type: deterministic, artifact: "integration test: real Postgres with note_deltas + staged_drafts rows; assert HTTP 200, notes content present, draft cards present, no gs:// in HTML"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-001]
  dependency_class: db:postgres
  mock_boundary: "real Postgres in integration; MUST NOT stub the tenant-check query or the internal notes reader"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-001-NEG
  name: "GET /m/{meeting_id} degrades honestly when Postgres is unavailable"
  authority_refs: [R-doc08-HOME-01]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT replace the DB connection with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "The Postgres connection is severed before the GET /m/{meeting_id} handler executes the tenant check or notes fold"
    when: "A valid tenant member requests the page"
    then:
      - "The response is a structured HTTP 5xx error (never a partial render or a silent empty page)"
      - "The error response does not expose internal stack traces or DB connection strings to the user"
      - "No GCS URI or draft content is partially returned"
  primary_oracle: {type: deterministic, artifact: "negative cassette at db:postgres seam; assert HTTP 5xx; assert no partial HTML; assert no internal detail in body"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-001-NEG]

# ── Tenant isolation: wrong-tenant → 404 (P0 security) ──────────────────────

- criterion_id: AC-HOME-002
  name: "GET /m/{meeting_id} returns 404 for a tenant-B member accessing a tenant-A meeting"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-02]
  criticality: P0
  blocking: true
  behavior:
    given: "A valid session for tenant-B and a meeting_id that belongs to tenant-A"
    when: "GET /m/{meeting_id} is requested by the tenant-B member"
    then:
      - "The response is HTTP 404 Not Found"
      - "The body is identical to the body returned for a non-existent meeting_id (no existence oracle)"
      - "No notes, draft cards, or meeting metadata from tenant-A's meeting appear in the response"
  primary_oracle: {type: deterministic, artifact: "integration test: two tenants in real Postgres; assert HTTP 404 with body indistinguishable from non-existent-meeting 404; assert zero tenant-A data in response"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-002]
  dependency_class: db:postgres
  mock_boundary: "real Postgres with two distinct tenants; MUST NOT stub the tenant-check query"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-002-NEG
  name: "Cross-tenant check degrades honestly (fail-closed) when Postgres is unavailable"
  authority_refs: [R-doc08-HOME-02]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT replace the tenant-check query with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "Postgres is unavailable when the meeting→tenant check is executed"
    when: "Any GET /m/{meeting_id} request is processed"
    then:
      - "The request is rejected with HTTP 5xx (fail-closed, not fail-open to 200)"
      - "No notes or draft content is returned without a completed tenant check"
  primary_oracle: {type: deterministic, artifact: "negative cassette at db:postgres seam; assert HTTP 5xx; assert no meeting content returned before tenant check completes"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-002-NEG]

# ── Non-existent meeting → 404 indistinguishable from wrong-tenant ────────────

- criterion_id: AC-HOME-003
  name: "GET /m/{meeting_id} returns 404 for a non-existent meeting, body indistinguishable from wrong-tenant 404"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-03]
  criticality: P0
  blocking: true
  behavior:
    given: "A valid tenant session and a meeting_id that does not exist in the database"
    when: "GET /m/{meeting_id} is requested"
    then:
      - "The response is HTTP 404 Not Found"
      - "The HTTP status code, response body structure, and content are byte-for-byte identical to the wrong-tenant 404 case"
      - "No hint in the response body distinguishes 'meeting does not exist' from 'meeting belongs to another tenant'"
  primary_oracle: {type: deterministic, artifact: "integration test: compare HTTP 404 response bytes for non-existent meeting_id vs wrong-tenant meeting_id; assert identical status + body"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-003]
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT stub the tenant-check query"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-003-NEG
  name: "Non-existent meeting check degrades honestly when Postgres is unavailable"
  authority_refs: [R-doc08-HOME-03]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT replace the DB connection with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "Postgres is unavailable when the meeting existence check runs"
    when: "A request with any meeting_id is processed"
    then:
      - "The request fails with HTTP 5xx (fail-closed)"
      - "HTTP 404 is never returned speculatively without the DB check completing"
  primary_oracle: {type: deterministic, artifact: "negative cassette; assert HTTP 5xx not HTTP 200 or 404; assert no data returned"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-003-NEG]

# ── Non-UUID meeting_id rejected before DB lookup ────────────────────────────

- criterion_id: AC-HOME-004
  name: "Non-UUID path segment is rejected before any database query is issued"
