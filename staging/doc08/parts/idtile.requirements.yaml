# ── Accessibility law (cross-cutting) ────────────────────────────────────────

- requirement_id: R-doc08-IDTILE-25
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.2 accessibility law"
  source_quote: "The accessibility law: motion is an enhancement, never the only channel. Every state the tile expresses is also carried in speech or chat — a dial-in participant or screen-reader user loses the ambience, never the substance. This is a hard rule reviewed per feature."
  normalized_statement: >
    WHEN the tile expresses any state change
    THE SYSTEM SHALL also carry that same state information in speech or chat
    output, so that a participant receiving audio only or using a screen reader
    loses no informational substance.
  requirement_type: ux
  criticality: P0
  testability: executable
  status: qualified

# ── Has-something = polite availability, not interruption ────────────────────

- requirement_id: R-doc08-IDTILE-26
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.2 paragraph after state table"
  source_quote: "Proxy never interrupts, but the room can see it has something and invite it."
  normalized_statement: >
    WHEN the tile is in Has-something state
    THE SYSTEM SHALL NOT cause Proxy to interrupt the current speaker;
    Proxy SHALL wait until invited (turn boundary) before delivering its result.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

