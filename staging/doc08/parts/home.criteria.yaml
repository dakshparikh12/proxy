# ── Token cannot reach accept/reject routes (P0) ─────────────────────────────

- criterion_id: AC-HOME-009
  name: "Capability token presenting to POST accept or reject returns 401/403 without invoking the Doc 04 handler"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-09, R-doc08-HOME-16]
  criticality: P0
  blocking: true
  behavior:
    given: "A valid, unexpired capability token (no active session cookie)"
    when: "POST /m/{meeting_id}/drafts/{draft_id}/accept or .../reject is attempted using only the capability token"
    then:
      - "The response is HTTP 401 or 403"
      - "The Doc 04 accept/reject handler is not invoked"
      - "No audit record is created for the attempted action"
      - "The protected() middleware intercepts the request before the handler body executes"
  primary_oracle: {type: deterministic, artifact: "unit test: POST accept/reject with only a capability token; assert HTTP 401 or 403; assert doc04_accept_handler call count == 0; assert no audit row written"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-009]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for session check; MUST NOT stub the protected() middleware"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-009-NEG
  name: "Token-to-accept/reject guard degrades honestly when Postgres session check errors"
  authority_refs: [R-doc08-HOME-09, R-doc08-HOME-16]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT stub the protected() middleware"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "Postgres is unavailable when the session authentication check runs on a POST accept/reject"
    when: "A POST is attempted with any credential"
    then:
      - "The request fails with HTTP 5xx or 401/403 (fail-closed)"
      - "The Doc 04 handler is never invoked without a verified session"
  primary_oracle: {type: deterministic, artifact: "negative cassette at session-check DB query; assert HTTP 5xx or 401/403; assert handler not called"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-009-NEG]

# ══════════════════════════════════════════════════════════════════════════════
# POST /m/{meeting_id}/drafts/{draft_id}/accept
# ══════════════════════════════════════════════════════════════════════════════

# ── Accept: Doc 04 handler called, idempotent, audited ───────────────────────

- criterion_id: AC-HOME-010
  name: "POST accept calls Doc 04 accept handler exactly once per new acceptance; idempotent on repeat"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-10, R-doc08-HOME-14]
  criticality: P1
  blocking: true
  behavior:
    given: "An authenticated tenant member with a valid CSRF token and a draft_id in staged_drafts that belongs to their tenant and is in a pending state"
    when: "POST /m/{meeting_id}/drafts/{draft_id}/accept is submitted"
    then:
      - "The response is HTTP 200 or 204"
      - "doc04_accept_handler is called exactly once with draft_id and actor=user_id"
      - "An audit record is created recording actor, draft_id, and action=accept"
      - "If the same POST is submitted a second time, the response is still 200/204 and doc04_accept_handler is NOT called a second time (idempotent)"
  primary_oracle: {type: deterministic, artifact: "integration test with real Postgres: first accept asserts handler call + audit row; second identical accept asserts handler call count still == 1; audit row count still == 1"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-010]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for staged_drafts and audit; MUST NOT stub the tenant-check or idempotency query"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-010-NEG
  name: "Accept handler degrades honestly when Postgres is unavailable during the accept write"
  authority_refs: [R-doc08-HOME-10]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection after tenant check but during handler write; MUST NOT replace the DB connection with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "Postgres fails after the tenant check succeeds but before the accept write commits"
    when: "POST accept is submitted"
    then:
      - "The response is HTTP 5xx (structured failure)"
      - "No partial accept state is written (the audit row is absent)"
      - "The draft remains in its original state"
  primary_oracle: {type: deterministic, artifact: "negative cassette at accept write; assert HTTP 5xx; assert no audit row; assert draft state unchanged in subsequent GET"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-010-NEG]

# ── Reject: Doc 04 handler called, idempotent, audited ───────────────────────

- criterion_id: AC-HOME-011
  name: "POST reject calls Doc 04 reject handler exactly once per new rejection; idempotent on repeat"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-11, R-doc08-HOME-14]
  criticality: P1
  blocking: true
  behavior:
    given: "An authenticated tenant member with a valid CSRF token and a pending draft_id in staged_drafts belonging to their tenant"
    when: "POST /m/{meeting_id}/drafts/{draft_id}/reject is submitted"
    then:
      - "The response is HTTP 200 or 204"
      - "doc04_reject_handler is called exactly once with draft_id and actor=user_id"
      - "An audit record is created recording actor, draft_id, and action=reject"
      - "A second identical POST returns 200/204 without calling the handler again"
  primary_oracle: {type: deterministic, artifact: "integration test: first reject asserts handler call + audit row; second identical reject asserts handler call count still == 1"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-011]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for staged_drafts and audit; MUST NOT stub the tenant-check or idempotency query"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-011-NEG
  name: "Reject handler degrades honestly when Postgres is unavailable during the reject write"
  authority_refs: [R-doc08-HOME-11]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT replace the DB connection with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "Postgres fails during the reject write"
    when: "POST reject is submitted"
    then:
      - "The response is HTTP 5xx"
      - "No audit row is written"
      - "The draft remains in its original state"
  primary_oracle: {type: deterministic, artifact: "negative cassette at reject write; assert HTTP 5xx; assert no audit row; assert draft state unchanged"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-011-NEG]

