- criterion_id: AC-S9-004
  name: "Output tokens clamped to min(MAX_OUTPUT_TOKENS, model_ceiling) per role"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S9-05]
  criticality: P1
  blocking: true
  behavior:
    given: "MAX_OUTPUT_TOKENS env is set to value E and the role's model has ceiling C"
    when: "A model call is constructed for that role"
    then:
      - "max_tokens in the API request equals min(E, C)"
      - "If E > C, the model ceiling wins; if E < C, the env value wins"
  primary_oracle:
    type: deterministic
    artifact: "parametric unit test with (E=low, C=high), (E=high, C=low), (E=C) cases; asserts correct min() selection in request object"
  thresholds: {tokens_exceeding_min_clamp: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S9-004]

- criterion_id: AC-S9-005
  name: "Context-overflow retry uses attempt-2 shrink hint on second attempt"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S9-06, R-doc05-S9-07]
  criticality: P1
  blocking: true
  behavior:
    given: "A query fails with a context-length overflow error on the first attempt"
    when: "The retry logic constructs the second attempt"
    then:
      - "The prompt for attempt 2 includes the hint: 'grep first; always read with start/end lines; max 10 files'"
      - "The context window size is NOT widened relative to attempt 1"
  primary_oracle:
    type: deterministic
    artifact: "unit test injects context-overflow error on attempt 1; captures prompt sent on attempt 2; asserts hint string present and no window-widen directive"
  thresholds: {missing_shrink_hint_on_attempt_2: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S9-005]

- criterion_id: AC-S9-006
  name: "Context-overflow retry uses attempt-3 shrink hint on third attempt"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S9-06, R-doc05-S9-08]
  criticality: P1
  blocking: true
  behavior:
    given: "A query fails with context-length overflow on both attempts 1 and 2"
    when: "The retry logic constructs the third attempt"
    then:
      - "The prompt for attempt 3 includes the hint: 'max 5 files, 100 lines each; grep exclusively — do not browse'"
      - "The context window is NOT widened"
  primary_oracle:
    type: deterministic
    artifact: "unit test injects overflow on attempts 1 and 2; asserts attempt-3 prompt contains the exact hint string"
  thresholds: {missing_shrink_hint_on_attempt_3: 0}
  dependency_class: null
