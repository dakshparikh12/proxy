# §2.6 · CAPABILITY TOKEN — SECURITY
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-SJCL-020
  name: "Capability token is signed, short-TTL, meeting-scoped, and revocable"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SJCL-20]
  criticality: P1
  blocking: true
  behavior:
    given: "The close line link is being generated for meeting_id=mtg-abc123"
    when: "The capability token is created"
    then:
      - "Token has a valid cryptographic signature (verifiable by the token service)"
      - "Token carries an expiry (exp) claim set to policy-defined short TTL"
      - "Token carries a meeting_id claim equal to mtg-abc123"
      - "Token is stored in a revocation registry so it can be invalidated by an admin"
  primary_oracle: {type: deterministic, artifact: "Token decode: assert signature valid; assert exp < NOW() + policy_max_ttl; assert claims.meeting_id == meeting_id; assert token_id present in revocation_registry"}
  thresholds: {violations_allowed: 0}
  dependency_class: db:postgres
  mock_boundary: "Stub token signing service and revocation registry"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
  fault_model_refs: []
  test_ids: [T-SJCL-020]

- criterion_id: AC-SJCL-020-NEG
  name: "Capability token generation degrades honestly when db:postgres (revocation registry) errors"
  authority_refs: [R-doc08-SJCL-20]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "The system is generating a capability token for the close line"
    when: "db:postgres errors when writing to the revocation registry"
    then:
      - "Honest failure logged; token is not issued"
      - "Close line falls back to authenticated-only link (no token appended) rather than issuing an un-revocable token"
      - "No silent proceed that issues a non-revocable token"
  primary_oracle: {type: deterministic, artifact: "assert token_issued == false on registry write error; assert fallback to auth-only link; assert failure logged"}
  thresholds: {silent_failures_allowed: 0}
  fault_model_refs: []
  test_ids: [T-SJCL-020-NEG]

