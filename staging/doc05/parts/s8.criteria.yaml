    when: "The accept handler is called with {draft_id: D} and no agent process is running"
    then:
      - "The handler looks up artifact_ref=R from the staged_drafts row using draft_id=D"
      - "The handler reads the bundle from GCS at path R"
      - "The handler returns the bundle contents for download without requiring any live agent state"
  primary_oracle:
    type: deterministic
    artifact: "Integration test: pre-seed staged_drafts row and GCS object; call accept handler cold (no agent running); assert bundle bytes returned match pre-seeded content; assert DB lookup uses draft_id, not any in-memory map"
  thresholds: {accept_failures_requiring_live_agent: 0}
  dependency_class: db:postgres
  mock_boundary: "Postgres fixture with pre-seeded row; GCS spy with pre-seeded object"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-018]

- criterion_id: AC-S8-018-NEG
