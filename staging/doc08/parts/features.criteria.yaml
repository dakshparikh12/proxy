# ─────────────────────────────────────────────
# FEATURE 1 · Catch-me-up (R-doc08-FEAT-01 … 03)
# ─────────────────────────────────────────────

- criterion_id: AC-FEAT-001
  name: "catch-me-up trigger produces a ~20-second notes-grounded spoken recap"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-FEAT-01, R-doc08-FEAT-03]
  criticality: P1
  blocking: true
  behavior:
    given: "a meeting with committed notes containing discussed topics, decisions, and open questions"
    when: "a participant says 'Proxy, catch me up'"
    then:
      - "a spoken recap is produced"
      - "the recap covers what has been discussed, decided, and remains open"
      - "the recap text corresponds to content from the committed notes object"
      - "the recap word count is consistent with approximately 20 seconds at normal cadence (roughly ≤ 80 words)"
  primary_oracle: {type: deterministic, artifact: "assert recap content subset of committed notes; assert word count ≤ 80"}
  thresholds: {violations_allowed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  fault_model_refs: []
  test_ids: [T-FEAT-001]

- criterion_id: AC-FEAT-002
  name: "catch-me-up delivers recap privately via DM when DM channel is available"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-FEAT-02]
  criticality: P1
  blocking: true
  behavior:
    given: "a late joiner with an available DM channel in the meeting platform"
    when: "catch-me-up is triggered by or for that participant"
    then:
      - "the recap is routed to the participant's DM channel"
      - "the recap is NOT broadcast to the full meeting chat"
  primary_oracle: {type: deterministic, artifact: "assert delivery channel == dm_channel_id for participant; assert no broadcast event emitted"}
  thresholds: {violations_allowed: 0}
  dependency_class: vendor:recall
  mock_boundary: "stub DM availability flag; cassette for presence of DM channel; MUST NOT replace the call_external seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  fault_model_refs: []
  test_ids: [T-FEAT-002]

- criterion_id: AC-FEAT-002-NEG
  name: "catch-me-up degrades honestly when DM channel is unavailable"
  authority_refs: [R-doc08-FEAT-02]
  dependency_class: vendor:recall
  mock_boundary: "negative cassette: DM channel returns unavailable; MUST NOT replace the call_external seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "a late joiner where the DM channel is not available"
    when: "catch-me-up is triggered"
    then:
      - "honest failure or fallback (e.g. deliver to meeting chat) posted or spoken"
      - "no silent proceed with a fabricated private delivery claim"
  primary_oracle: {type: deterministic, artifact: "assert honest failure or explicit fallback; assert no fabrication of DM delivery"}
  thresholds: {silent_failures_allowed: 0}
  fault_model_refs: []
  test_ids: [T-FEAT-002-NEG]

