# BEAT.criteria.yaml — Doc 04 (Proxy Orchestrator) — §3.7 The Harness as a Heartbeated Durable-Operation Row
# Acceptance criteria. All infrastructure slice criteria are golden_path: false.
# ID scheme: AC-BEAT-NNN
# Authority: DOC-04 §3.7, CANONICAL-DECISIONS §2, §12.10, §12.12
#
# dependency_class conventions:
#   null       → pure in-process (is_owner flag, fencing gate, struct checks); ladder: [lint, unit]
#   db:postgres → real Postgres via Cloud SQL Auth-Proxy or test container; ladder: [lint, unit, integration]
#
# mock_boundary rules (MANDATORY):
#   db:postgres : real Postgres or testcontainers; MUST NOT mock the asyncpg pool;
#                 the real SQL heartbeat UPDATE rowcount-return behaviour must be exercised
#   null        : no external boundary; pure Python unit test with fakes permitted
#
# Every non-null dependency_class has a paired NEG criterion.
# golden_path: false for all (heartbeat is infrastructure).

# ── AC-BEAT-001: with_operation_run adopts claimed run_id (no second INSERT) ──

- criterion_id: AC-BEAT-001
  name: "with_operation_run adopts §3.6 run_id and issues no INSERT INTO operation_runs"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-02]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A real Postgres database with an operation_runs row pre-created by §3.6 claim_meeting
      (status='running', operation_type='meeting-harness', last_heartbeat_at set);
      no other rows exist for this meeting_id.
    when: "with_operation_run(pool, meeting_id, run_id, activity) is entered"
    then:
      - "No INSERT INTO operation_runs statement is issued during context manager entry"
      - "The operation_runs row count for the meeting_id remains exactly 1 after entry"
      - "The adopted row has the same run_id passed to with_operation_run"
  primary_oracle:
    type: deterministic
    artifact: >
      pg_stat_activity / statement log: assert zero INSERT statements against operation_runs
      during the context-entry window; assert SELECT count(*) WHERE meeting_id=$1 == 1
  thresholds:
    insert_statements_on_entry: 0
    operation_runs_rows_per_meeting: 1
  fault_model_refs: []
  test_ids: [T-BEAT-001]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool — real SQL rowcount must be verified"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-BEAT-001-NEG
  name: "NEG: a second INSERT for the same meeting_id during harness entry would violate the unique claim"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-BEAT-02]
  criticality: P0
  blocking: true
  behavior:
    given: "An operation_runs row already exists for meeting_id with operation_type='meeting-harness'"
    when: "Any code path attempts a duplicate INSERT for the same (meeting_id, operation_type) during harness entry"
    then:
      - "The duplicate INSERT is rejected by the database (unique constraint violation)"
      - "with_operation_run does NOT issue such a duplicate INSERT (verifying the adopt-only contract)"
      - "The error is surfaced rather than silently swallowed"
  primary_oracle:
    type: deterministic
    artifact: >
      inject a duplicate INSERT attempt; assert UniqueViolationError raised;
      assert with_operation_run code path never triggers this path
  thresholds:
    duplicate_insert_violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-001-NEG]
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or testcontainers; MUST NOT mock the asyncpg pool"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

