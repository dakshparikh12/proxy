# Acceptance Criteria — Doc 08 Behavior · §2.5 The shared screen — show the work
# ID prefix: AC-SCREEN-NNN / AC-SCREEN-NNN-NEG
# Paired requirements: R-doc08-SCREEN-01 through R-doc08-SCREEN-13
# Authority: DOC-08 §2.5; CANONICAL §12.3 (show_screen); CANONICAL §12.12 (V0 scope)
#
# Dependency classes in use:
#   db:postgres  — staged_drafts (final artifact preview fetch)
#   gcs:objects  — file content for pin-to-source mode
#
# Golden-path: 0 — screen is a supporting surface; core E2E golden paths live elsewhere.

# ════════════════════════════════════════════════════════════════
# ACTIVATION GATE
# ════════════════════════════════════════════════════════════════

# ── R-doc08-SCREEN-01 / -02: only human ask or human yes activates ────────────

- criterion_id: AC-SCREEN-001
  name: "Screenshare activates only on human ask or human yes-to-offer"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SCREEN-01, R-doc08-SCREEN-02]
  criticality: P1
  blocking: true
  behavior:
    given: "A live session with screenshare inactive and no pending human trigger"
    when: "An internal trigger fires (task completion, timer, progress event, or any non-human source)"
    then:
      - "Screenshare does NOT activate"
      - "Activation gate returns rejected with reason=no-human-trigger"
      - "screenshare.active remains false"
  primary_oracle:
    type: deterministic
    artifact: >
      Assert screenshare.active == false for every non-human trigger path;
      FSM activation edge guard asserts trigger_class in {human_ask, human_yes_to_offer};
      static scan confirms every screenshare.activate() call site passes through the gate.
  thresholds: {self_initiated_activations_allowed: 0}
  fault_model_refs: [F-SCREEN-SELF-INITIATED]
  test_ids: [T-SCREEN-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-SCREEN-002
  name: "Screenshare activates when human explicitly asks"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SCREEN-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A live session with screenshare inactive"
    when: "A human participant issues an explicit ask event (trigger_class=human_ask)"
    then:
      - "The activation gate accepts the trigger"
      - "screenshare.active becomes true"
      - "trigger_class is logged as human_ask"
  primary_oracle:
    type: deterministic
    artifact: >
      Assert screenshare.active == true after human_ask event;
      assert logged trigger_class == 'human_ask'.
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-SCREEN-002]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-SCREEN-003
  name: "Screenshare activates when human says yes to Proxy's offer"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SCREEN-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A live session where Proxy has offered to share the screen (§2.4 #13) and screenshare is inactive"
    when: "A human participant responds with an acceptance (trigger_class=human_yes_to_offer)"
    then:
      - "The activation gate accepts the trigger"
      - "screenshare.active becomes true"
      - "trigger_class is logged as human_yes_to_offer"
  primary_oracle:
    type: deterministic
    artifact: >
      Assert screenshare.active == true after human_yes_to_offer event;
      assert logged trigger_class == 'human_yes_to_offer'.
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-SCREEN-003]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ════════════════════════════════════════════════════════════════
# STOP-SHARING — HUMAN CONTROL ABSOLUTE (P0)
# ════════════════════════════════════════════════════════════════

# ── R-doc08-SCREEN-03: "Stop sharing" wins immediately, no condition blocks it ─

- criterion_id: AC-SCREEN-004
  name: "Stop-sharing signal deactivates screenshare immediately — no condition can block it"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SCREEN-03]
  criticality: P0
  blocking: true
  behavior:
    given: "Screenshare is active and a task render is in progress on the canvas"
    when: "Any participant (host or guest) issues a stop-sharing signal"
    then:
      - "screenshare.active becomes false within the same event loop tick"
      - "No confirmation prompt, modal, or delay is interposed"
      - "Camera (tile) view resumes as the active transport output"
      - "In-progress canvas render is abandoned, not completed first"
  primary_oracle:
    type: deterministic
    artifact: >
      FSM invariant: stop_sharing event unconditionally transitions to screenshare_inactive
      state regardless of current render_in_progress flag;
      assert NOT (screenshare.active == true) one tick after stop event;
      assert no confirmation_required gate exists on this transition in the FSM definition;
      assert camera.active == true after deactivation.
  thresholds: {stop_delay_ticks_allowed: 1, violations_allowed: 0}
  fault_model_refs: [F-STOP-SHARING-BLOCKED]
  test_ids: [T-SCREEN-004]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

