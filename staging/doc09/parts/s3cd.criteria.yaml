# ═══════════════════════════════════════════════════════════════════════════════
# S8: Honest failure
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-530
  name: "Index not_ready surfaces gap list labeled lower-bound — no fabricated answer"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S3-61]
  criticality: P1
  blocking: true
  behavior:
    given: "The codebase index readiness is not_ready or partial (coverage_pct < 100, gaps list non-empty)"
    when: "A participant asks a question about code that falls within a gap"
    then:
      - "Proxy's response includes the gap list or a description of what is not indexed"
      - "The response is labeled lower-bound (Law 2: Never overstate)"
      - "Proxy does NOT provide a confident answer about code in the gap"
      - "No response for gap-affected code is tagged resolved"
