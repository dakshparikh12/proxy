# ── Registry and register() ───────────────────────────────────────────────────

- criterion_id: AC-BHVR-005
  name: "REGISTRY is a plain dict and register() is a single-assignment one-liner"
  evidence_class: "[unit-structural]"
  authority_refs: [R-doc04-BHVR-06]
