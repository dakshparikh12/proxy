# BHVR.criteria.yaml — Doc 04 (Proxy Orchestrator) — §3.4 Wake-Behaviors
# Acceptance criteria for typed BehaviorConfig constants + one generic runner.
# ID scheme: AC-BHVR-NNN (positive), AC-BHVR-NNN-NEG (negative)
# Every criterion carries: dependency_class, mock_boundary, golden_path, verification_ladder.

# ── BehaviorConfig as Typed Python Constants ──────────────────────────────────

- criterion_id: AC-BHVR-001
  name: "Each wake-behavior is a module-level typed BehaviorConfig constant"
  evidence_class: "[unit-structural]"
  authority_refs: [R-doc04-BHVR-01, R-doc04-BHVR-20]
  criticality: P0
  blocking: true
  behavior:
    given: "The behaviors module is imported at test time"
    when: "All wake-behavior identifiers are enumerated (catchup, answer-question, surface-risk, propose-action, plus Workroom dispositions)"
    then:
      - "Each identifier resolves to a module-level constant whose type is BehaviorConfig or Behavior (containing a BehaviorConfig)"
      - "No behavior identifier resolves to a YAML file path, a parsed dict, or a lazy factory"
      - "All required fields (role, rules, inputs, config.model, config.tools, config.max_turns) are present and typed"
  primary_oracle:
    type: deterministic
    artifact: "inspect.getmembers(behaviors_module) filtered by isinstance(v, Behavior) — count == expected_behavior_count; type annotations verified via dataclasses.fields()"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BHVR-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-BHVR-001-NEG
  name: "No wake-behavior is declared by parsing a YAML file at import time"
  evidence_class: "[unit-structural]"
  authority_refs: [R-doc04-BHVR-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The behaviors module and its transitive imports are loaded"
    when: "All module-level constant definitions are inspected for YAML parsing calls"
    then:
      - "No call to yaml.safe_load, yaml.load, or any YAML parser appears in the module-level constant definitions"
      - "No BehaviorConfig or Behavior instance is constructed from a parsed YAML dict"
  primary_oracle:
    type: deterministic
    artifact: "AST parse of behaviors.py — assert no ast.Call nodes resolving to yaml.safe_load/yaml.load at module scope"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BHVR-001-NEG]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

