# ══════════════════════════════════════════════════════════════════════════════
# READY STATE: REAL COVERAGE NUMBER + FLAGGED FILES
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-007
  name: "ready state displays the real coverage_pct and flagged file count from the Readiness payload"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-09]
  criticality: P1
  blocking: true
  behavior:
    given: "A Readiness payload with state=ready, coverage_pct=94.0, and a flagged_files list of 12 entries each labeled 'generated'"
    when: "The connect page readiness widget renders the ready state"
    then:
      - "The rendered output contains '94%' (or '94.0%') derived from coverage_pct=94.0"
      - "The rendered output states '12 files flagged' (count derived from len(flagged_files))"
      - "The rendered output includes the reason label 'generated'"
      - "No hard-coded placeholder such as '100%', 'N/A', or '0 files flagged' is substituted"
  primary_oracle:
    type: deterministic
    artifact: "unit test: assert str(coverage_pct) present in rendered output; assert str(len(flagged_files)) + ' files flagged' present; assert reason label present; assert no placeholder strings"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-007]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}


# ══════════════════════════════════════════════════════════════════════════════
# COVERAGE NUMBER DERIVES FROM REAL INDEXING RESULT (SOURCE HONESTY)
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-008
  name: "coverage_pct in /connect/status response is derived from the real indexing result, not hardcoded"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-10]
  criticality: P1
  blocking: true
  behavior:
    given: "The /connect/status route handler source code and the readiness record storage"
    when: "The source is statically analyzed for coverage_pct assignment"
    then:
      - "coverage_pct is read from the stored readiness record (Postgres row) — not set to a literal float constant in the handler"
      - "No line in the handler assigns coverage_pct = 100, coverage_pct = 0, or any other literal numeric default"
      - "The readiness record's coverage_pct field is populated by the indexing pipeline, not by the route handler"
  primary_oracle:
    type: deterministic
    artifact: "grep for 'coverage_pct\s*=' literal assignments in /connect/status handler; assert zero literal numeric assignments; assert coverage_pct sourced from DB row field"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-008]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}


