# ══════════════════════════════════════════════════════════════════════════════
# GET /m/{meeting_id} — Capability-token path
# ══════════════════════════════════════════════════════════════════════════════

# ── Valid token: notes-only view, no drafts ───────────────────────────────────

- criterion_id: AC-HOME-005
  name: "Valid capability token returns notes-only view with no draft cards or accept/reject controls"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-05]
  criticality: P1
  blocking: true
  behavior:
    given: "A valid, unexpired, unrevoked capability token scoped to meeting_id, presented as ?token= without an authenticated session"
    when: "GET /m/{meeting_id}?token=<valid_token> is requested"
    then:
      - "The response is HTTP 200"
      - "The rendered page contains the notes markdown for that meeting"
      - "The rendered page contains zero staged_drafts cards"
      - "No accept or reject button/form is present in the response HTML"
      - "No raw GCS URI appears in the HTML"
  primary_oracle: {type: deterministic, artifact: "integration test: valid HMAC token, real Postgres; assert HTTP 200, notes present, no draft card HTML, no accept/reject form elements, no gs:// URIs"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-005]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for token revocation check and notes fold; MUST NOT stub the revocation lookup"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-005-NEG
  name: "Capability-token notes view degrades honestly when Postgres is unavailable"
  authority_refs: [R-doc08-HOME-05]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT replace the DB connection with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "A valid capability token is presented but Postgres is unavailable"
    when: "GET /m/{meeting_id}?token=<valid_token> is requested"
    then:
      - "The response is HTTP 5xx (fail-closed; not a partial notes render)"
      - "No meeting data is returned without the revocation and tenant checks completing"
  primary_oracle: {type: deterministic, artifact: "negative cassette at db:postgres seam; assert HTTP 5xx; assert no meeting HTML in response body"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-005-NEG]

# ── Token cross-meeting: token for A on path B → 404 (P0) ────────────────────

- criterion_id: AC-HOME-006
  name: "Capability token scoped to meeting A cannot read meeting B (token cross-meeting isolation)"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-HOME-06]
  criticality: P0
  blocking: true
  behavior:
    given: "A valid HMAC capability token whose signed meeting_id is meeting_id_A"
    when: "GET /m/{meeting_id_B}?token=<token_for_A> is requested where meeting_id_B ≠ meeting_id_A"
    then:
      - "The response is HTTP 404 Not Found"
      - "No data from meeting B is returned"
      - "The token meeting_id field is re-verified against the URL path segment before any DB query for meeting B"
  primary_oracle: {type: deterministic, artifact: "unit test: construct valid HMAC token for meeting_id_A; present to /m/{meeting_id_B}; assert HTTP 404; assert no SQL issued for meeting_id_B content"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-HOME-006]
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT stub the path vs token meeting_id comparison"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-HOME-006-NEG
  name: "Cross-meeting token check degrades honestly when Postgres is unavailable"
  authority_refs: [R-doc08-HOME-06]
  dependency_class: db:postgres
  mock_boundary: "real Postgres fault injection; MUST NOT replace the DB connection with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  behavior:
    given: "Postgres is unavailable during capability token meeting_id verification"
    when: "Any token-authenticated GET request is processed"
    then:
      - "The request fails closed with HTTP 5xx"
      - "No meeting data is returned without the path-vs-token check completing"
  primary_oracle: {type: deterministic, artifact: "negative cassette; assert HTTP 5xx not HTTP 200"}
  thresholds: {violations_allowed: 0}
  test_ids: [T-HOME-006-NEG]

