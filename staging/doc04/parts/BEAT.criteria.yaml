# ── AC-BEAT-003: HEARTBEAT_S constant = 10 (not <10, not >20) ─────────────────

- criterion_id: AC-BEAT-003
  name: "HEARTBEAT_S constant is defined as exactly 10 seconds"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-BEAT-05]
  criticality: P0
  blocking: true
  behavior:
    given: "The harness module defining with_operation_run is imported"
    when: "The HEARTBEAT_S constant is read"
    then:
      - "HEARTBEAT_S == 10 (integer or float 10)"
      - "HEARTBEAT_S >= 10 (not less than 10)"
      - "HEARTBEAT_S <= 20 (not more than STALE_AFTER_S / 2, ensuring at least two beats before staleness)"
  primary_oracle:
    type: deterministic
    artifact: "assert module.HEARTBEAT_S == 10 in unit test; assert 10 <= module.HEARTBEAT_S <= 20"
  thresholds:
    heartbeat_s_violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BEAT-003]
  dependency_class: null
  mock_boundary: "no external boundary; pure Python constant check"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

