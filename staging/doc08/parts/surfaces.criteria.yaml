# §2.7 · THE CONNECT PAGE
# ══════════════════════════════════════════════════════════════════════════════

# ── Three sections only ───────────────────────────────────────────────────────

- criterion_id: AC-SURF-001
  name: "Connect page renders exactly three sections and nothing else in V0"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-01, R-doc08-SURF-09]
  criticality: P1
  blocking: true
  behavior:
    given: "A fully rendered connect page response"
    when: "The page HTML is inspected"
    then:
      - "Exactly three top-level sections are present: GitHub App install, readiness status, and invite instructions"
      - "No analytics section, no settings section, and no meeting history section is rendered"
      - "No other named content sections beyond the three exist"
  primary_oracle:
    type: deterministic
    artifact: "assert rendered page contains exactly three named section landmarks; assert no element with data-section in [analytics, settings, history]"
  thresholds:
    violations_allowed: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  fault_model_refs: []
  test_ids: [T-SURF-001]

# ── Five readiness states ─────────────────────────────────────────────────────

- criterion_id: AC-SURF-002
  name: "Connect page renders all five Readiness enum states and no others"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-02, R-doc08-SURF-05]
  criticality: P1
  blocking: true
  behavior:
    given: "The readiness-status widget is parameterized with each value of the Doc 01 Readiness enum"
    when: "Each state value is passed to the widget renderer in turn"
    then:
      - "State 'connecting' renders a connecting indicator"
      - "State 'cloning' renders a cloning indicator"
      - "State 'indexing' renders an indexing indicator"
      - "State 'ready' renders a ready indicator"
      - "State 'not_ready' renders a not_ready terminal indicator"
      - "No 'mapping' state is handled or displayed; passing 'mapping' is either rejected or falls through to an unrecognized-state error"
  primary_oracle:
    type: deterministic
    artifact: "parameterized unit test over all five enum values; assert each produces a distinct, named rendered block; assert 'mapping' produces no valid render"
  thresholds:
    violations_allowed: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  fault_model_refs: []
  test_ids: [T-SURF-002]

