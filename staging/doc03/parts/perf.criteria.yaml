- criterion_id: AC-PERF-21
  name: "NOTES_FRESHNESS_LAG_THRESHOLD_S (90) is configurable; flag set on lag > threshold, not below"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-PERF-21]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "NOTES_FRESHNESS_LAG_THRESHOLD_S set to a non-default value (e.g., 60)"
    when:  "The lag reaches various levels: 59s, 61s, 90s, 91s"
    then:
      - "At 59s lag: freshness flag is NOT set (below the 60s overridden threshold)"
      - "At 61s lag: freshness flag IS set (above the 60s overridden threshold)"
      - "When env var is unset, default threshold of 90s applies (flag set at 91s, not at 89s)"
      - "The threshold is not hard-coded: changing the env var changes the trip point"
