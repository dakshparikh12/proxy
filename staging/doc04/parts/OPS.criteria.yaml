  thresholds: {}
  fault_model_refs: []
  test_ids: [T-OPS-007-NEG]
  dependency_class: vendor:e2b
  mock_boundary: "E2B provider replaced by in-memory fake; health() stubbed to return transient"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}

