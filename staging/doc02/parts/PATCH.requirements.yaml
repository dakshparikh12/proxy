  normalized_statement: 'WHEN any latency/SLO criterion pins a numeric threshold that CANONICAL §12.8 also pins THE SYSTEM SHALL use exactly the §12.8 value (ack-audible p95<=500ms; first-grounded-text p50<=2s/p95<=4s; first-grounded-audio p50<=2.5s/p95<=5s) and SHALL NOT assert a bound that diverges from the pinned source-of-truth. (Guard added because review-gaps.md item 2 — a threshold contradicting the pinned source-of-truth — was truncated from the gaps file; this makes §12.8 authoritative and fails any drift.)

