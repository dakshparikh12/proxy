- requirement_id: R-doc03-STORE-09
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.3, boot-time stale-row reaping paragraph, sentence 1"
  source_quote: >
    On boot, orphaned rows are healed.
  normalized_statement: >
    WHEN the service boots THE SYSTEM SHALL run a stale-row reaper that heals orphaned
    rows left by previously interrupted meeting-harness processes.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-STORE-10
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.3, boot-time stale-row reaping paragraph, sentences 2–3"
  source_quote: >
    The reaper must NOT key off meetings.last_heartbeat_at — that column does not
    exist. The heartbeat is written to operation_runs.last_heartbeat_at.
  normalized_statement: >
    THE SYSTEM SHALL NOT use a meetings.last_heartbeat_at column in the boot reaper
    because that column does not exist; the heartbeat is recorded in
    operation_runs.last_heartbeat_at and that is the sole authoritative heartbeat
    column for staleness determination.
  requirement_type: correctness
  criticality: P0
