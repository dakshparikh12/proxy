- criterion_id: AC-EVENTS-06
  name: Explicit meeting-end webhook emits meeting-end signal
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-07
  - R-doc02-EVENTS-13
  criticality: P1
  blocking: true
  behavior:
    given: An open meeting
    when: A Recall meeting-closed or bot-removed webhook is received
    then:
    - Exactly one meeting-end signal is emitted
    - The signal is emitted only in response to the explicit webhook, not on any other trigger
  primary_oracle:
    type: state_machine_assertion
    artifact: assert exactly one meeting-end signal follows the explicit close/bot-removed webhook
  thresholds:
    meeting_end_signals_per_close: 1
  fault_model_refs:
  - F-MEETING-END-NOT-EMITTED
  test_ids:
  - T-EVENTS-06
- criterion_id: AC-EVENTS-07
  name: Meeting-end is NEVER inferred from silence (negative frontier)
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-09
  criticality: P0
  blocking: true
  behavior:
    given: An open meeting with NO close webhook and NO bot-removed webhook
    when: The meeting goes fully silent (no transcript, no roster, no traffic) for an extended simulated duration, then well beyond any plausible timeout
    then:
    - No meeting-end signal is emitted at any point during the silence
    - The close sequence is never triggered; a meeting-end signal appears ONLY after an explicit close/bot-removed webhook is later injected
  primary_oracle:
    type: simulation_trace
    artifact: long-silence simulation trace scanned for any meeting-end signal prior to explicit close webhook
  thresholds:
    meeting_end_from_silence_allowed: 0
  fault_model_refs:
  - F-MEETING-END-INFERRED-FROM-SILENCE
  test_ids:
  - T-EVENTS-07
- criterion_id: AC-EVENTS-08
  name: Meeting-end triggers the close sequence (ordering/atomicity)
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-08
  criticality: P1
  blocking: true
  behavior:
    given: An open meeting
    when: An explicit meeting-end signal is emitted
    then:
    - The close sequence (Doc 04 §3.16 ordering) is triggered causally after the meeting-end signal
    - No close-pass / close-sequence step is observed before the meeting-end signal in the trace
  primary_oracle:
    type: simulation_trace
    artifact: 'causal-ordering assertion: index(meeting_end_signal) < index(first close-sequence step)'
  thresholds:
    close_steps_before_meeting_end_allowed: 0
  fault_model_refs:
  - F-CLOSE-BEFORE-SIGNAL
  test_ids:
  - T-EVENTS-08
- criterion_id: AC-EVENTS-09
  name: Recall webhooks land durably in webhook_events (insert-then-200-then-drain)
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-10
  - R-doc02-EVENTS-05
  criticality: P0
  blocking: true
  behavior:
    given: The webhook endpoint and a webhook_events table
    when: A Recall roster / meeting-end / bot-status webhook is delivered
    then:
    - A webhook_events row is written via INSERT ... ON CONFLICT (delivery_guid) DO NOTHING before processing
    - The endpoint returns 200 and the event is drained/processed only after the durable write
  primary_oracle:
    type: contract_schema
    artifact: assert webhook_events row exists with delivery_guid PK and ON CONFLICT DO NOTHING semantics; response==200; drain occurs post-commit
  thresholds:
    webhooks_processed_before_durable_write_allowed: 0
  fault_model_refs:
  - F-WEBHOOK-NOT-DURABLE
  test_ids:
  - T-EVENTS-09
- criterion_id: AC-EVENTS-10
  name: Duplicate delivery_guid processed exactly once (idempotent dedupe)
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-11
  criticality: P0
  blocking: true
  behavior:
    given: A webhook with delivery_guid G already processed once
    when: The same delivery_guid G is delivered a second time
    then:
    - The second INSERT conflicts and is a no-op (row count unchanged for G)
    - Exactly one downstream signal was emitted across both deliveries; no duplicate roster/meeting-end signal
  primary_oracle:
    type: state_machine_assertion
    artifact: count(webhook_events where delivery_guid=G)==1 and count(downstream signals for G)==1 after two deliveries
  thresholds:
    duplicate_webhook_double_processed_allowed: 0
  fault_model_refs:
  - F-WEBHOOK-DOUBLE-PROCESSED
  test_ids:
  - T-EVENTS-10
- criterion_id: AC-EVENTS-11
  name: Roster/meeting-end/bot-status are internal events, NOT in client registry closure
  evidence_class: '[unit]'
  authority_refs:
  - R-doc02-EVENTS-12
