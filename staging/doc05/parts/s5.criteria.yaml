# Doc 05 (Workroom) — S5 acceptance criteria slice
# Coverage: §3.5 (The sandbox tool transport — JWT-gated MCP-over-HTTP)
# ID scheme: AC-S5-NNN  (NEG pairs: AC-S5-NNN-NEG)
# All security criteria are P0 / blocking: true.
# vendor:e2b criteria include {tier: reality} + NEG pair per rule 2.

# ─────────────────────────────────────────────────────────────────────────────
# TRANSPORT — stateless per-request server
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-S5-001
  name: "Stateless: no session state leaks between consecutive POST requests"
  evidence_class: ""
  authority_refs: [R-doc05-S5-01]
  criticality: P0
  blocking: true
  behavior:
    given: "Two sequential POST requests to the sandbox MCP endpoint carrying distinct request bodies"
    when: "The second request is processed"
    then:
      - "The server creates a fresh MCP server and transport for the second request"
      - "No state from the first request (tool results, context variables) is visible in the second response"
  primary_oracle: {type: deterministic, artifact: "server logs show fresh server instantiation per POST; no shared transport object across requests"}
  thresholds: {cross_request_state_leak_allowed: 0}
  dependency_class: vendor:e2b
  mock_boundary: null
  golden_path: true
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: reality}
  test_ids: [T-S5-001]

- criterion_id: AC-S5-001-NEG
  name: "NEG: Stateless — shared transport object fails request isolation"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-01]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched server that re-uses the same transport object across requests"
    when: "Two sequential POST requests are sent"
    then:
      - "The test harness detects state leakage (e.g., tool result from request 1 appears in request 2)"
      - "This confirms that the production stateless path is genuinely enforced"
  primary_oracle: {type: deterministic, artifact: "state-leakage detection in integration test harness"}
  thresholds: {}
  dependency_class: vendor:e2b
  mock_boundary: "e2b sandbox mocked; only Node server under test"
  golden_path: false
  verification_ladder:
    - {tier: unit}
  test_ids: [T-S5-001-NEG]

- criterion_id: AC-S5-002
  name: "Server binds to port 8081 inside the sandbox"
  evidence_class: ""
  authority_refs: [R-doc05-S5-03]
  criticality: P0
  blocking: true
  behavior:
    given: "A freshly started sandbox MCP server with JWT_SECRET set"
    when: "The process initializes"
    then:
      - "The server is listening on port 8081"
      - "A TCP connection to localhost:8081 succeeds from within the sandbox"
  primary_oracle: {type: deterministic, artifact: "netstat / ss output inside sandbox confirms port 8081 LISTEN"}
  thresholds: {}
  dependency_class: vendor:e2b
  mock_boundary: null
  golden_path: true
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
  test_ids: [T-S5-002]

- criterion_id: AC-S5-002-NEG
  name: "NEG: Server startup with wrong port fails /health from host"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-03]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched server bound to port 9999 instead of 8081"
    when: "The host preflight calls /health at port 8081"
    then:
      - "Connection refused — confirming that port 8081 is the required binding"
  primary_oracle: {type: deterministic, artifact: "connection-refused error at 8081 from host preflight"}
  thresholds: {}
