  primary_oracle:
    type: latency_measurement
    artifact: "Latency probe: delta > 200ms triggers assertion failure"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-BARGE-IN-SLOW]
  test_ids: [T-FLOW-009-NEG]
  dependency_class: vendor:cartesia
  mock_boundary: "Cartesia TTS cassette; reflex layer patched to introduce 250ms delay"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ─────────────────────────────────────────────────────────────────────────────
# FAILURE HANDLING — spoken plainly, never silent
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FLOW-010
  name: "Any component failure produces a plain spoken disclosure — no silent failure"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-FLOW-08, R-doc04-FLOW-20]
  criticality: P0
  blocking: true
  behavior:
    given: "A meeting session running with all components active"
    when: "A component failure is injected (e.g., STT disconnect, workroom timeout, Scribe crash)"
    then:
      - "Proxy produces a spoken or chat disclosure to the room within one wake turn"
      - "The disclosure is plain text describing the failure — not a stack trace or internal name"
      - "No internal component name (Orchestrator, Scribe, workroom) appears in the disclosure"
      - "The system does NOT remain silent on the failure"
  primary_oracle:
    type: deterministic
    artifact: "Failure injection test: inject each failure class; assert speak() or send_chat() called within one wake turn; content contains no internal names"
  thresholds:
    silent_failures_allowed: 0
    internal_name_leaks_allowed: 0
    violations_allowed: 0
  fault_model_refs: [F-SILENT-FAILURE, F-NAMING-LEAK]
  test_ids: [T-FLOW-010]
