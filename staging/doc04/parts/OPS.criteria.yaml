    given: "A sandbox row exists for the meeting_id and health() returns gone"
    when: "ensure_running() is called"
    then:
      - "provision() is called to create a fresh sandbox"
      - "repo.upsert is called with the new Meta"
      - "No restart or reconnect to the gone sandbox is attempted"
  primary_oracle:
    type: deterministic
