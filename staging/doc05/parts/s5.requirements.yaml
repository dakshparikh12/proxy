  source_location: "§3.5 paragraph 4 (Disposition curated subsets)"
  source_quote: "plan: same read + map subset as quick."
  normalized_statement: >
    WHEN the Workroom is configured for plan disposition THE SYSTEM SHALL apply
    the identical allowed and disallowed tool sets as the quick disposition:
    read_file, list_files, grep, glob, and map tools allowed; all write tools and
    propose_change blocked via disallowed_tools.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

