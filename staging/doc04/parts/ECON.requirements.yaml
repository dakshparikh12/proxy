  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ── Two honest meters, not a false all-in $1 ─────────────────────────────────

- requirement_id: R-doc04-ECON-23
  authority_type: canonical
  authority_document: CANONICAL-DECISIONS
  source_location: "§3.13, paragraph 1; CANONICAL-DECISIONS §12.7"
  source_quote: >
    Two honest meters, never the false all-in $1 (CANONICAL §12.7): the listening baseline
    (~$0.95–1.25/hr: transport + Scribe + orch idle) is the SLA ceiling for listening + notes +
    quick answers; substantive work (Workroom builds, E2B runtime, Opus deep answers) is a separate,
