    when:  "Both deltas are applied"
    then:
      - "The notes object contains exactly 2 entries, one for F1 and one for F2"
      - "Patch-in-place does not collapse the two distinct facts into one entry"
  primary_oracle: {type: state_machine_assertion, artifact: "assert notes.entries_for_fact_F1 == 1 AND notes.entries_for_fact_F2 == 1 AND total_entries == 2"}
  thresholds: {distinct_facts_collapsed_to_single_entry_allowed: 0}
  fault_model_refs: [F-DISTINCT-FACTS-COLLAPSED]
  test_ids: [T-COAL-16-NEG]

# ── Transactional coupling ────────────────────────────────────────────────────

- criterion_id: AC-COAL-17
  name: "Delta append AND pending→comprehended flip occur in ONE Postgres transaction (atomicity)"
  evidence_class: "[integration]"
  authority_refs: [R-doc03-COAL-17]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: "Real Postgres required for integration tier; unit tier stubs the transaction boundary with an in-memory two-phase commit mock"
  verification_ladder: [lint, unit, integration]
  behavior:
    given: "A window being applied with both a delta to append and a transcript_segments status to flip from pending to comprehended"
    when:  "The apply runs against Postgres"
    then:
      - "Both the delta insert and the transcript_segments status flip execute within the same Postgres transaction"
      - "They are not in separate transactions (two-statement single transaction, not two separate commits)"
  primary_oracle: {type: state_machine_assertion, artifact: "intercept Postgres transaction boundary; assert exactly ONE commit contains both the notes delta INSERT and the transcript_segments UPDATE where status='comprehended'"}
  thresholds: {split_transactions_allowed: 0, operations_in_separate_commits_allowed: 0}
  fault_model_refs: [F-SPLIT-TRANSACTION]
  test_ids: [T-COAL-17]

- criterion_id: AC-COAL-17-NEG
  name: "Crash mid-apply leaves window pending and notes unchanged (atomicity enforced by rollback)"
  evidence_class: "[integration]"
  authority_refs: [R-doc03-COAL-17, R-doc03-COAL-18]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: "Real Postgres required for integration tier; unit tier uses an in-memory rollback harness"
  verification_ladder: [lint, unit, integration, negative]
  behavior:
    given: "A crash (simulated by injecting an exception) that fires after the delta INSERT but before the transcript_segments UPDATE within the transaction"
    when:  "The transaction is rolled back by Postgres"
    then:
      - "The notes object does not contain the partially-applied delta"
      - "The transcript_segments row for the window remains 'pending' (not 'comprehended')"
      - "The system state is as if the apply never started (full rollback)"
  primary_oracle: {type: fault_injection, artifact: "inject crash mid-transaction; after rollback: assert notes_delta_absent==true AND transcript_segments.status=='pending' for the window"}
  thresholds: {partial_applies_after_crash_allowed: 0, notes_advanced_without_comprehended_flip_allowed: 0}
  fault_model_refs: [F-PARTIAL-APPLY-AFTER-CRASH]
  test_ids: [T-COAL-17-NEG]

- criterion_id: AC-COAL-18
  name: "Pending window is reprocessed exactly once by re-claimed harness or close pass — no double-count"
  evidence_class: "[integration]"
  authority_refs: [R-doc03-COAL-18]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: "Real Postgres required for integration tier (requires actual transcript_segments status check + re-claim logic); unit tier uses in-memory status store"
  verification_ladder: [lint, unit, integration]
  behavior:
    given: "A window left in 'pending' status after a crash mid-apply (post rollback)"
    when:  "A re-claimed harness or the close pass discovers the pending window and reprocesses it"
    then:
      - "The window is reprocessed exactly once — its delta is applied and its status is flipped to 'comprehended'"
      - "A second attempt to reprocess the same window is rejected (idempotency: the comprehended status blocks double-apply)"
      - "No content is double-counted in the notes object as a result of the re-claim"
  primary_oracle: {type: state_machine_assertion, artifact: "after re-claim: assert transcript_segments.status=='comprehended' AND notes_entry_count_delta==1 (not 2); inject second re-claim attempt; assert second attempt is a no-op (no additional notes entries, no second comprehended flip)"}
  thresholds: {double_applies_allowed: 0, notes_rows_from_reprocessing_max: 1}
  fault_model_refs: [F-DOUBLE-COUNT-ON-RECLAIM]
  test_ids: [T-COAL-18]

- criterion_id: AC-COAL-18-NEG
  name: "A successfully comprehended window is NOT reprocessed by the re-claimed harness (idempotency guard)"
  evidence_class: "[integration]"
  authority_refs: [R-doc03-COAL-18]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: "Real Postgres required for integration tier; unit tier uses in-memory status store"
  verification_ladder: [lint, unit, integration, negative]
  behavior:
    given: "A window whose transcript_segments status is already 'comprehended' (successfully applied)"
    when:  "The re-claimed harness scans for pending windows"
    then:
      - "The comprehended window is not selected for reprocessing"
      - "No second apply is triggered for the comprehended window"
  primary_oracle: {type: state_machine_assertion, artifact: "assert re-claim scan predicate: only status=='pending' rows are selected; comprehended window appears zero times in re-claim candidate set"}
  thresholds: {comprehended_windows_reprocessed_allowed: 0}
  fault_model_refs: [F-COMPREHENDED-WINDOW-REPROCESSED]
  test_ids: [T-COAL-18-NEG]
