# §1 — The End Goal (normative behaviors)
# §4 — The Full Demo Arc (atomized per clause)

# ── §1 criteria ───────────────────────────────────────────────────────────────

- criterion_id: AC-S4-001
  name: "grounded answer latency ≤ 2 seconds"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S4-01]
  criticality: P1
  blocking: true
  behavior:
    given: "repo is connected and Proxy is in ready state during a live meeting"
    when: "a participant asks a code question"
    then:
      - "Proxy returns an answer within 2 seconds wall-clock from question receipt"
      - "the answer contains at least one file:line citation"
  primary_oracle: {type: simulation_trace, artifact: "demo_arc_trace.jsonl"}
  thresholds:
    p99_latency_s: 2.0
    violations_allowed: 0
    uncited_confident_answers: 0
  fault_model_refs: [F-S4-001]
  test_ids: [T-S4-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S4-001

