- disposition_id: D-INV-03
  authority_type: architecture_invariant
  authority_document: AGENTS.md
  source_location: "Product invariant 3 — Tenant-held code, hard-deleted"
  source_quote: "Tenant-held code, hard-deleted ... hard-deleted ≤15 min on App uninstall"
