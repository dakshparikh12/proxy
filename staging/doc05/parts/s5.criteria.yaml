# ─────────────────────────────────────────────────────────────────────────────
# PATH VALIDATION — symlink escape via ancestor walk
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-S5-013
  name: "Symlink escape via not-yet-existing path is caught by ancestor walk"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-15]
  criticality: P0
  blocking: true
  behavior:
    given: "A symlink at /workspace/link → /etc; a write_file call targeting /workspace/link/newfile (which does not exist)"
    when: "validate_path walks up to the nearest existing ancestor (/workspace/link) and resolves its realpath"
    then:
      - "realpath of /workspace/link resolves to /etc"
      - "The check against allowed roots fails"
      - "The tool returns an error; /etc/newfile is never created"
  primary_oracle: {type: deterministic, artifact: "unit test with controlled symlink confirms error and no file creation at escape path"}
  thresholds: {symlink_escapes_allowed: 0}
  dependency_class: fs:git
  mock_boundary: "tmpdir with controlled symlink structure"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
  test_ids: [T-S5-013]

- criterion_id: AC-S5-013-NEG
  name: "NEG: Without ancestor walk, symlink escape is possible (confirms guard necessity)"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-15]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched validate_path that skips the ancestor walk for non-existing paths"
    when: "write_file is called with /workspace/link/newfile"
    then:
      - "The write proceeds and creates /etc/newfile — confirming that the ancestor walk is the decisive guard"
  primary_oracle: {type: deterministic, artifact: "patched test creates file at escape path; confirms guard is non-redundant"}
  thresholds: {}
  dependency_class: fs:git
  mock_boundary: "tmpdir with controlled symlink; patched validate_path"
  golden_path: false
  verification_ladder:
    - {tier: unit}
  test_ids: [T-S5-013-NEG]

# ─────────────────────────────────────────────────────────────────────────────
# ATOMIC WRITES — exclusive-create for new files
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-S5-014
  name: "New file write uses exclusive-create (wx): concurrent creation fails gracefully"
  evidence_class: ""
  authority_refs: [R-doc05-S5-16]
  criticality: P1
  blocking: true
  behavior:
    given: "Two concurrent write_file calls targeting the same new file path"
    when: "Both execute simultaneously"
    then:
      - "Exactly one succeeds; the other receives an error (file already exists)"
      - "No partial or corrupt file is produced"
  primary_oracle: {type: deterministic, artifact: "concurrent test: one success + one EEXIST error; file integrity verified by hash"}
  thresholds: {partial_write_allowed: 0}
  dependency_class: fs:git
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
  test_ids: [T-S5-014]

- criterion_id: AC-S5-014-NEG
  name: "NEG: Without wx flag, concurrent creates silently overwrite — confirming atomic guard"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-16]
  criticality: P1
  blocking: false
  behavior:
    given: "A patched write_file using 'w' (non-exclusive) mode"
    when: "Two concurrent creates run"
    then:
      - "Both succeed but one silently overwrites the other — data loss confirmed"
      - "This demonstrates that wx is the required mode"
  primary_oracle: {type: deterministic, artifact: "patched test detects silent overwrite (hash comparison)"}
  thresholds: {}
  dependency_class: fs:git
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
  test_ids: [T-S5-014-NEG]

