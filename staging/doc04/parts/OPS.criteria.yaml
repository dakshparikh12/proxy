  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-007]
  dependency_class: vendor:e2b
  mock_boundary: "E2B provider replaced by in-memory fake; health() stubbed to return gone"
  golden_path: false
  verification_ladder:
