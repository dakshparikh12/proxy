- criterion_id: AC-S5-011
  name: "Null byte in path argument is rejected before any filesystem access"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S5-13]
  criticality: P0
  blocking: true
  behavior:
    given: "A sandbox tool invocation (any of the 8) where the path argument contains a null byte (e.g., '/workspace/foo\x00/../etc/passwd')"
    when: "validate_path is called"
    then:
      - "The tool returns an error response without touching the filesystem"
      - "No filesystem syscall for the supplied path is made"
  primary_oracle: {type: deterministic, artifact: "strace / fs-mock confirms zero filesystem calls; error message contains 'null byte' or equivalent"}
  thresholds: {null_byte_paths_processed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
