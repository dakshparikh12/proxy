  authority_document: CANONICAL-DECISIONS
  source_location: "§3.12, paragraph 7; CANONICAL-DECISIONS §10.6"
  source_quote: >
    Targeted extended/adaptive thinking (CANONICAL §10.6): enabled ONLY on Opus-escalated
    grounded-answer path; EXPLICITLY DISABLED on fast path (should-I-speak wake gate, quick lookups,
