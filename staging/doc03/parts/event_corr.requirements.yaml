# ── The Scribe: pipe, not the mouth (CANONICAL §12.3) ────────────────────────

- requirement_id: R-doc03-EVENT-12
  authority_type: architecture_invariant
  authority_document: DOC-03
  source_location: "§3.5, paragraph 3"
  source_quote: "This layer is a pipe, never the mouth (CANONICAL §12.3). The Scribe supplies notes context + material-change events to Doc 04; it does not deliver anything to the room itself."
  normalized_statement: >
    AT ALL TIMES the event emitter layer SHALL NOT deliver any output directly to the meeting room;
    its sole output is notes context and material-change events forwarded to Doc 04 (the Orchestrator);
    room delivery exclusively uses Proxy's wake-turn tools (speak/send_chat/show_screen) owned by Doc 04.
  requirement_type: architecture_invariant
  criticality: P0
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

- requirement_id: R-doc03-EVENT-13
  authority_type: architecture_invariant
  authority_document: DOC-03
  source_location: "§3.5, paragraph 3"
  source_quote: "The Scribe emits no speech and holds no delivery authority."
  normalized_statement: >
    AT ALL TIMES the Scribe SHALL emit zero speech acts and SHALL hold no delivery authority;
    the Scribe MUST NOT invoke speak, send_chat, or show_screen directly; any path through
    this layer that produces room-audible or room-visible output is a violation.
  requirement_type: architecture_invariant
  criticality: P0
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

# ── Chat record lines: deterministic formatter, dedupe, disable toggle ────────

- requirement_id: R-doc03-EVENT-14
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 4"
  source_quote: "a decision-final or action-item-created event MAY drive a one-line record post in the meeting chat (\"✓ Decision: ship checkout Friday\" / \"☐ Action: Sam — fix the retry test\")"
  normalized_statement: >
    WHEN a decision-final event is emitted AND the room's chat record posting is enabled
    THE SYSTEM MAY drive a one-line chat record post in the meeting chat; such a post
    SHALL be produced by the deterministic harness formatter and SHALL NOT be produced
    in response to a disabled toggle.
  requirement_type: functional
  criticality: P2
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

- requirement_id: R-doc03-EVENT-15
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 4"
  source_quote: "a decision-final or action-item-created event MAY drive a one-line record post in the meeting chat"
  normalized_statement: >
    WHEN an action-item-created event is emitted AND the room's chat record posting is enabled
    THE SYSTEM MAY drive a one-line chat record post in the meeting chat; such a post
    SHALL be produced by the deterministic harness formatter and SHALL NOT be produced
    in response to a disabled toggle.
  requirement_type: functional
  criticality: P2
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

- requirement_id: R-doc03-EVENT-16
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 4"
  source_quote: "that line is produced by a deterministic harness formatter keyed on the committed note-delta — NEVER a Proxy wake and NEVER model-generated."
  normalized_statement: >
    WHEN a chat record line is produced from a decision-final or action-item-created event
    THE SYSTEM SHALL produce that line via a deterministic harness formatter keyed on the
    committed note-delta; the chat record line SHALL NOT be produced by a Proxy wake turn
    and SHALL NOT be model-generated.
  requirement_type: architecture_invariant
  criticality: P0
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

- requirement_id: R-doc03-EVENT-17
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 4"
  source_quote: "It dedupes by meeting_revision (a re-fold of the same committed delta emits nothing new)"
  normalized_statement: >
    WHEN a chat record line would be produced for a given committed note-delta
    AND that delta's meeting_revision has already been used to produce a chat record line
    THE SYSTEM SHALL NOT emit a second chat record line; deduplication SHALL be keyed
    on meeting_revision and SHALL suppress all duplicate outputs for the same revision.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

- requirement_id: R-doc03-EVENT-18
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 4"
  source_quote: "and honors the room's disable toggle."
  normalized_statement: >
    WHEN the room's chat record posting disable toggle is active
    THE SYSTEM SHALL NOT post any chat record lines regardless of how many decision-final
    or action-item-created events are emitted; disabling the toggle immediately suppresses
    all subsequent chat record line posts.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

# ══════════════════════════════════════════════════════════════════════════════
# §3.6 LIVE CORRECTIONS (TRUST BEHAVIOR)
# ══════════════════════════════════════════════════════════════════════════════

# ── Correction apply: immediate, attributed, superseded-not-erased ────────────

- requirement_id: R-doc03-CORR-01
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 1"
  source_quote: "this layer applies it as an immediate, attributed patch: the entry updates, the correction is noted (who corrected, when), and the old value is kept superseded-not-erased (the record never silently rewrites history)."
  normalized_statement: >
    WHEN a correction is received from Doc 04
    THE SYSTEM SHALL apply it as an immediate patch to the target entry, recording
    attribution (who corrected, timestamp), and persisting the old value as a superseded
    record; the record SHALL NOT silently overwrite or erase the prior value.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-02
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 1"
  source_quote: "the correction is noted (who corrected, when)"
  normalized_statement: >
    WHEN a correction patch is written to Postgres
    THE SYSTEM SHALL persist with the patch: (a) the identity of the corrector (participant),
    and (b) the timestamp of the correction; a correction record lacking either field
    SHALL NOT be considered complete.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-03
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 1"
  source_quote: "the old value is kept superseded-not-erased (the record never silently rewrites history)."
  normalized_statement: >
    WHEN a correction is applied
    THE SYSTEM SHALL retain the prior entry value in a superseded state in Postgres;
    the prior value SHALL be queryable after the correction; no correction path SHALL
    delete or overwrite the prior value in place.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-04
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 1"
  source_quote: "The next Scribe call sees the corrected notes in its prefix — the correction sticks."
  normalized_statement: >
    WHEN a correction has been applied
    THE SYSTEM SHALL ensure the next Scribe micro-call receives the corrected entry value
    in its notes prefix (Segment B / rolling context); the correction SHALL be durable
    across Scribe invocations and SHALL NOT revert to the prior value on the next call.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

# ── Ordinary corrections: silent-immediate path ───────────────────────────────

- requirement_id: R-doc03-CORR-05
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 2"
  source_quote: "Most corrections apply silently-and-immediately — that is the right, low-friction behavior for the ordinary case."
  normalized_statement: >
    WHEN a correction is classified as ordinary (a firmness bump, an action-item tweak,
    a forming-decision lean, or an open-question edit)
    THE SYSTEM SHALL apply that correction silently and immediately without emitting
    a spoken confirmation; no confirmation audio path SHALL be triggered for ordinary corrections.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-06
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3"
  source_quote: "Ordinary firmness bumps, action-item tweaks, forming-decision leans, and open-question edits stay on the silent-immediate path — the gate must not add friction to the common case."
  normalized_statement: >
    WHEN a correction sets a firmness level on a non-final, non-irreversible entry
    THE SYSTEM SHALL apply the patch on the silent-immediate path; no gate check
    and no spoken confirmation SHALL be triggered.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
  golden_path: false
  status: qualified

- requirement_id: R-doc03-CORR-07
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.6, paragraph 3"
  source_quote: "Ordinary firmness bumps, action-item tweaks, forming-decision leans, and open-question edits stay on the silent-immediate path — the gate must not add friction to the common case."
  normalized_statement: >
    WHEN a correction tweaks an action-item (assignee, due date, wording) without closing
    or finalizing it THE SYSTEM SHALL apply the patch on the silent-immediate path;
    no gate check and no spoken confirmation SHALL be triggered.
  requirement_type: functional
  criticality: P0
  testability: executable
  dependency_class: db:postgres
