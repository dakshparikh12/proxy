  thresholds:
    unredacted_occurrences_allowed: 0
  test_ids: [T-M3-009]
  fault_model_refs: [F-SECRET-NOT-REDACTED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-009

