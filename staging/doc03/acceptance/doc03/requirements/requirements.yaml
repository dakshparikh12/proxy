  normalized_statement: >
    THE SYSTEM SHALL preserve the transcript and note_delta planes as the authoritative
    replay source for Orchestrator Tier-3 session recovery; replaying transcript_segments
    and note_deltas in id order SHALL reconstruct a stale or killed session's context
