- criterion_id: AC-S9-010
  name: "Sandbox environment built from allow-list, not deny-list"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S10-04]
  criticality: P0
  blocking: true
  behavior:
    given: "The sandbox environment assembly function is invoked"
    when: "The result is inspected"
    then:
      - "Only variables present in the declared allow-list appear in the environment"
      - "No variable-stripping or deny-list logic is used to produce the final environment"
  primary_oracle:
    type: static_analysis
    artifact: "grep/AST check confirms no deny-list pattern (e.g., no 'if key not in DENY_LIST'); unit test asserts injected env equals allow-list projection of input env"
  thresholds: {deny_list_patterns_found: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
