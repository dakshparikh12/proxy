    - {tier: unit}

# ════════════════════════════════════════════════════════════════
# §3.6 · OPERATION_RUNS ROW FIELDS COMPLETENESS
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-OWNR-011
  name: "claim_meeting INSERT populates all required fields: scope_id, operation_type, status, created_by, last_heartbeat_at, started_at"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-OWNR-03, R-doc04-OWNR-06]
  criticality: P0
  blocking: true
  behavior:
    given: >
      claim_meeting called with meeting_id M and instance_id 'instance-X' against a real
      test Postgres; no existing 'running' row for M
    when: "claim_meeting returns a non-NULL id"
    then:
      - "scope_id = str(M) (the text-cast UUID)"
      - "operation_type = 'meeting-harness'"
      - "status = 'running'"
      - "created_by = 'instance-X'"
      - "last_heartbeat_at is a recent timestamp (within 5 seconds of NOW())"
      - "started_at is a recent timestamp (within 5 seconds of NOW())"
  primary_oracle:
    type: deterministic
    artifact: >
      SELECT scope_id, operation_type, status, created_by, last_heartbeat_at, started_at
      FROM operation_runs WHERE id=<returned_id>;
      assert all six fields match expected values with timestamp tolerance of 5s
  thresholds:
    missing_required_fields: 0
    violations_allowed: 0
  fault_model_refs: [F-MISSING-FIELDS]
  test_ids: [T-OWNR-011]
  dependency_class: db:postgres
  mock_boundary: >
    Requires real Postgres to verify the persisted row contents; all field values
    are supplied as literals or NOW() by the INSERT — no additional mocking needed
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
