  source_location: "§3.3, Plane 2 description, sentence 1"
  source_quote: >
    the finalized notes artifact lives in GCS with native Object Versioning
  normalized_statement: >
    THE SYSTEM SHALL store finalized notes artifacts in GCS using a bucket with
    native Object Versioning enabled at the bucket level; Object Versioning SHALL
