# ═══════════════════════════════════════════════════════════════════════════
# §3.2 — MAX_OUTPUT_TOKENS self-clamp
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-012
  name: "max_tokens passed to SDK equals min(MAX_OUTPUT_TOKENS_env, model_ceiling)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S3-10]
  criticality: P1
  blocking: true
  behavior:
    given: "MAX_OUTPUT_TOKENS env var set to a value V and a model with ceiling C"
    when: "A model call is constructed for any role"
    then:
      - "The max_tokens field passed to the SDK equals min(V, C)"
      - "When V > C the value is C (ceiling enforced)"
      - "When V <= C the value is V (env respected)"
  primary_oracle:
    type: deterministic
    artifact: "Parametric unit test over (V=high, C=low), (V=low, C=high), (V=C) asserts SDK call max_tokens == min(V,C) in all cases"
  thresholds: {ceiling_exceeded_calls: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S3-012]

