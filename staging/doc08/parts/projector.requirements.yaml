# ── TOOL_USE + work tool (non-delivery) → ToolStart "working…" only ────────────

- requirement_id: R-doc08-PROJ-09
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), work-tool else branch"
  source_quote: "# work tool → tile \"working…\" line only\nyield ToolStart(line=humanize_tool(name))"
  normalized_statement: >
    WHEN ChannelProjector.project() receives a chunk with chunk.type == "TOOL_USE" AND
    chunk.metadata["name"] is NOT in DELIVERY_TOOLS THE SYSTEM SHALL yield exactly one
    ToolStart instance with line set to humanize_tool(chunk.metadata["name"]); it SHALL NOT
    yield any delivery frame (VoiceSpeak, ResponseChunk, or CanvasPatch) for this event.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── TOOL_RESULT + structured non-null → CanvasPatch ────────────────────────────

- requirement_id: R-doc08-PROJ-10
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), TOOL_RESULT branch"
  source_quote: "if chunk.type == \"TOOL_RESULT\" and chunk.metadata.get(\"structured\") is not None:\n    yield CanvasPatch(patch=chunk.metadata[\"structured\"])"
  normalized_statement: >
