      - "The two drafts are independently approvable"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: two sequential calls; assert two distinct draft_ids; assert staged_drafts count == 2; assert GCS object count == 2"
  thresholds: {}
  dependency_class: gcs:objects
  mock_boundary: "GCS spy; DB fixture"
  golden_path: false
  verification_ladder:
