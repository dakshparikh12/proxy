  primary_oracle: {type: deterministic, artifact: "Event log: assert tile_state_listening_at < consent_line_posted_at; assert TileState == LISTENING after join event; assert no post_chat call precedes tile_state_transition in event sequence"}
  thresholds: {violations_allowed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  fault_model_refs: []
