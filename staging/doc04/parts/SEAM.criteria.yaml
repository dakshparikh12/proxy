# ── AC-SEAM-006: TEXT delta — suffix per msg_id, reset on new msg_id (GOLDEN PATH) ──

- criterion_id: AC-SEAM-006
  name: "stream_deltas emits correct suffix deltas for TEXT and resets accumulator on new msg_id"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-SEAM-08, R-doc04-SEAM-09]
  criticality: P1
  blocking: true
  behavior:
    given: >
      Synthetic provider stream: TEXT(msg_id=A, text='Hello'), TEXT(msg_id=A, text='Hello world'),
      TEXT(msg_id=B, text='Bye'), TEXT(msg_id=B, text='Bye now'), RESULT(metadata={total_cost_usd: 0.01})
    when: "stream_deltas is applied and all yielded chunks are collected"
    then:
      - "Chunk 1: type=TEXT, msg_id=A, text='Hello' (first chunk for A — full text is the delta)"
      - "Chunk 2: type=TEXT, msg_id=A, text=' world' (suffix only)"
      - "Chunk 3: type=TEXT, msg_id=B, text='Bye' (accumulator reset; full text is the delta for B)"
      - "Chunk 4: type=TEXT, msg_id=B, text=' now' (suffix only)"
      - "Chunk 5: type=RESULT — passed through unchanged"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with synthetic fixture; assert exact .text values on each yielded AgentChunk in order"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-SEAM-006]
  dependency_class: null
  mock_boundary: null
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

