# Acceptance Criteria — Doc 00 Constitution, Architecture & Foundation
# Per GENERATOR.md §8.2 + EXHAUSTIVE-COVERAGE.md density tiers.
# Serious behaviors (security boundary, concurrency, money, irreversible write, ordering)
# have their exact accept/reject boundary decomposed into sub-criteria.
# Oracles are cost-free wherever possible: static analysis, schema validation, state-machine
# assertion, config inspection, simulation trace — no LLM judge where a deterministic oracle exists.
# authority_refs are single-line lists so the RTM coverage gate parses them.
#
# Criterion-ID prefixes (section-aligned):
#   AC-CMP-*  composition & contracts (§2)      AC-REPO-* repo structure (§3)
#   AC-HOST-* hosting/deployables (§4)          AC-SUB-*  durable substrate (§5)
#   AC-BOOT-* server boot (§6)                  AC-CFG-*  config/secrets (§7)
#   AC-IAC-*  Terraform (§8)                    AC-DOCK-* Dockerfile (§9)
#   AC-CI-*   CI/CD (§10)                       AC-DB-*   database layer (§11)
#   AC-REG-*  contracts registry (§12)          AC-OBS-*  observability (§13)
#   AC-CON-*  CLAUDE.md constitution (§14)      AC-INV-*  consolidated invariants (§15)
#   AC-BLD-*  build order (§16)                 AC-TEN-*  cross-cutting tenant/creds

# ══════════════════════════════════════════════════════════════════
# CMP — System composition & contracts (§2)
# ══════════════════════════════════════════════════════════════════

