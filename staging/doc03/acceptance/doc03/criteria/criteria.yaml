# ═══════════════════════════════════════════════════════════════════════════════
# §3.9 COST TELEMETRY
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# RATE CONSTANTS — exact values enforced by arithmetic fixture
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-01
  name: "HAIKU_INPUT, HAIKU_OUTPUT, HAIKU_CACHE_WRITE, HAIKU_CACHE_READ are exact values"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-01, R-doc03-COST-02, R-doc03-COST-03, R-doc03-COST-04]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "The rate constants as defined in the cost module"
    when:  "Their values are asserted in a unit test"
    then:
      - "HAIKU_INPUT == 1.00e-6 (exactly 1.00 / 1e6)"
      - "HAIKU_OUTPUT == 5.00e-6 (exactly 5.00 / 1e6)"
      - "HAIKU_CACHE_WRITE == 1.25e-6 (exactly HAIKU_INPUT * 1.25)"
      - "HAIKU_CACHE_READ == 1.00e-7 (exactly HAIKU_INPUT * 0.10)"
  primary_oracle:
    type: constant_value_assertion
    artifact: >
      from cost_module import HAIKU_INPUT, HAIKU_OUTPUT, HAIKU_CACHE_WRITE, HAIKU_CACHE_READ;
      assert HAIKU_INPUT == 1.00e-6;
      assert HAIKU_OUTPUT == 5.00e-6;
      assert abs(HAIKU_CACHE_WRITE - 1.25e-6) < 1e-15;
      assert abs(HAIKU_CACHE_READ - 1.00e-7) < 1e-15
  thresholds:
    constant_value_deviations_allowed: 0

# ─────────────────────────────────────────────────────────────────────────────
# scribe_call_cost_usd — correct arithmetic, graceful on missing cache fields
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-02
  name: "scribe_call_cost_usd computes correct total from all four usage fields"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-05]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: >
      A usage object with:
        input_tokens=1000, output_tokens=200,
        cache_creation_input_tokens=800, cache_read_input_tokens=0
      (first-call scenario)
    when:  "scribe_call_cost_usd(u) is called"
    then:
      - >
        The result equals exactly:
        (1000 * 1.00e-6) + (200 * 5.00e-6) + (800 * 1.25e-6) + (0 * 1.00e-7)
        = 0.001000 + 0.001000 + 0.001000 + 0.000000
        = 0.003000 USD
      - "No floating-point error exceeds 1e-12 USD"
  primary_oracle:
    type: arithmetic_fixture_assertion
    artifact: >
      fixture_usage = SimpleNamespace(input_tokens=1000, output_tokens=200,
        cache_creation_input_tokens=800, cache_read_input_tokens=0);
      result = scribe_call_cost_usd(fixture_usage);
      assert abs(result - 0.003000) < 1e-12
  thresholds:
    arithmetic_error_usd: 1e-12

- criterion_id: AC-COST-03
  name: "scribe_call_cost_usd does not raise AttributeError when cache fields are absent"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-05]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit, negative]
  behavior:
    given: >
      A usage object that has only input_tokens and output_tokens (no cache fields),
      as might be returned by a non-cache-enabled call
    when:  "scribe_call_cost_usd(u) is called on this object"
    then:
      - "The function returns a positive float without raising AttributeError or KeyError"
      - "cache_creation_input_tokens and cache_read_input_tokens default to 0"
      - "The result equals (input_tokens * HAIKU_INPUT + output_tokens * HAIKU_OUTPUT)"
  primary_oracle:
    type: exception_absence_assertion
    artifact: >
      fixture_usage = SimpleNamespace(input_tokens=500, output_tokens=100);
      result = scribe_call_cost_usd(fixture_usage);  # must not raise
      assert abs(result - (500*1e-6 + 100*5e-6)) < 1e-12
  thresholds:
    attribute_errors_on_missing_cache_fields_allowed: 0

- criterion_id: AC-COST-03-NEG
  name: "scribe_call_cost_usd with all-zero cache tokens produces only input+output cost"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-05]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit, negative]
  behavior:
    given: >
      A usage object with cache_creation_input_tokens=0 and cache_read_input_tokens=0
      (non-cache call with fields explicitly present)
    when:  "scribe_call_cost_usd(u) is called"
    then:
      - "The cache write and cache read terms contribute exactly $0.000000 to the total"
      - "The total equals input_tokens * HAIKU_INPUT + output_tokens * HAIKU_OUTPUT"
  primary_oracle:
    type: arithmetic_fixture_assertion
    artifact: >
      u = SimpleNamespace(input_tokens=500, output_tokens=100,
        cache_creation_input_tokens=0, cache_read_input_tokens=0);
      assert abs(scribe_call_cost_usd(u) - (500*1e-6 + 100*5e-6)) < 1e-12
  thresholds:
    arithmetic_error_usd: 1e-12

# ─────────────────────────────────────────────────────────────────────────────
# IN-PROCESS MEETING_COST ACCUMULATOR — updated on every call
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-04
  name: "MEETING_COST[meeting_id] incremented by total on every record_scribe_cost call"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-06]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: >
      MEETING_COST is initialized to {} (empty dict); record_scribe_cost is called
      three times for the same meeting_id with usage objects whose individual
      totals are $0.001, $0.002, and $0.003
    when:  "All three calls complete"
    then:
      - "MEETING_COST[meeting_id] == 0.006 (sum of all three totals)"
      - "The accumulator was incremented after each call (not only the last)"
  primary_oracle:
    type: accumulator_state_assertion
    artifact: >
      MEETING_COST = {}; mid = uuid4();
      for cost in [0.001, 0.002, 0.003]:
        record_scribe_cost(mid, usage_for_cost(cost), MEETING_COST=MEETING_COST, ...db_stub...)
      assert abs(MEETING_COST[mid] - 0.006) < 1e-12
  thresholds:
    accumulator_error_usd: 1e-12

# ─────────────────────────────────────────────────────────────────────────────
# WRITE-THROUGH TO POSTGRES — UPSERT with additive increment
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-05
  name: "record_scribe_cost writes model_usd, cache_read_usd, cache_creation_usd to Postgres via UPSERT"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-07, R-doc03-COST-08]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration]
  behavior:
    given: >
      A meeting with no existing row in meeting_cost; record_scribe_cost is called
      with a usage object producing model_usd=$0.001200, cache_read_usd=$0.000080,
      cache_creation_usd=$0.001000
    when:  "record_scribe_cost completes"
    then:
      - "A row exists in meeting_cost for meeting_id with model_usd=0.001200, cache_read_usd=0.000080, cache_creation_usd=0.001000"
      - "The row was inserted (no prior row existed)"
  primary_oracle:
    type: db_row_content_assertion
    artifact: >
      truncate meeting_cost; call record_scribe_cost with known usage;
      SELECT model_usd, cache_read_usd, cache_creation_usd FROM meeting_cost WHERE meeting_id=X;
      assert model_usd == 0.001200; assert cache_read_usd == 0.000080; assert cache_creation_usd == 0.001000
  thresholds:
    missing_rows_after_first_call_allowed: 0

- criterion_id: AC-COST-05-NEG
  name: "Second record_scribe_cost call increments meeting_cost row (does not overwrite)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-07, R-doc03-COST-08]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration, negative]
  behavior:
    given: >
      A meeting_cost row already exists with model_usd=0.001200;
      a second record_scribe_cost call arrives with model_usd contribution of $0.000800
    when:  "The second call's UPSERT executes"
    then:
      - "meeting_cost.model_usd for the meeting is 0.002000 (0.001200 + 0.000800)"
      - "The row was NOT overwritten with 0.000800 alone"
      - "Exactly one row exists in meeting_cost for that meeting_id"
  primary_oracle:
    type: db_upsert_additive_assertion
    artifact: >
      insert meeting_cost row with model_usd=0.001200; call record_scribe_cost contributing 0.000800;
      SELECT model_usd FROM meeting_cost WHERE meeting_id=X;
      assert model_usd == 0.002000; assert count(*) == 1
  thresholds:
    rows_overwritten_instead_of_incremented_allowed: 0
    duplicate_rows_allowed: 0

# ─────────────────────────────────────────────────────────────────────────────
# CRASH RECOVERY — Postgres is the canonical meter (reload, not reset)
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-06
  name: "After orchestrator restart, MEETING_COST is reloaded from Postgres (not reset to 0)"
  evidence_class: "[simulation]"
  authority_refs: [R-doc03-COST-07]
  criticality: P0
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration]
  behavior:
    given: >
      A meeting has accumulated $0.050000 in meeting_cost (Postgres); the orchestrator
      process is restarted (in-process MEETING_COST dict is cleared); the orchestrator
      re-initializes for the same meeting
    when:  "The orchestrator loads state for the existing meeting after restart"
    then:
      - "MEETING_COST[meeting_id] is initialized to $0.050000 (loaded from Postgres)"
      - "MEETING_COST[meeting_id] is NOT 0.0 (reset) after restart"
      - "The first record_scribe_cost call after restart increments from $0.050000, not from $0.000000"
  primary_oracle:
    type: restart_state_reload_assertion
    artifact: >
      seed meeting_cost with 0.050000; simulate MEETING_COST = {} (restart);
      call orchestrator.init_meeting(meeting_id); assert MEETING_COST[meeting_id] == 0.050000;
      then call record_scribe_cost contributing 0.001; assert MEETING_COST[meeting_id] == 0.051000
  thresholds:
    post_restart_accumulator_resets_to_zero_allowed: 0

- criterion_id: AC-COST-06-NEG
  name: "New meeting (no prior Postgres row) initializes MEETING_COST to 0.0, not a stale value"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-07]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration, negative]
  behavior:
    given: >
      A brand new meeting_id with no row in meeting_cost (truly new meeting);
      the orchestrator initializes for this meeting
    when:  "MEETING_COST[meeting_id] is read after init"
    then:
      - "MEETING_COST[meeting_id] == 0.0 (not a stale value from another meeting)"
      - "No meeting_cost row exists for this meeting_id after init alone (row created on first record_scribe_cost)"
  primary_oracle:
    type: new_meeting_init_assertion
    artifact: >
      ensure no meeting_cost row for new_meeting_id; call orchestrator.init_meeting(new_meeting_id);
      assert MEETING_COST.get(new_meeting_id, 0.0) == 0.0;
      assert SELECT count(*) FROM meeting_cost WHERE meeting_id=new_meeting_id == 0
  thresholds:
    stale_values_on_new_meeting_init_allowed: 0

# ─────────────────────────────────────────────────────────────────────────────
# CACHE-HIT RATIO — computation, division-by-zero safety, alert
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-07
  name: "Cache-hit ratio uses max(prefix, 1) guard (division-by-zero safe)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-09]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: >
      A usage object where both cache_creation_input_tokens=0 and
      cache_read_input_tokens=0 (non-cache call; prefix is zero)
    when:  "The cache-hit ratio is computed"
    then:
      - "No ZeroDivisionError is raised"
      - "The computed ratio is 0.0 (0 / max(0, 1) == 0)"
  primary_oracle:
    type: exception_absence_and_value_assertion
    artifact: >
      u = SimpleNamespace(cache_creation_input_tokens=0, cache_read_input_tokens=0);
      ratio = compute_cache_hit_ratio(u);
      assert ratio == 0.0  # no exception
  thresholds:
    zero_division_errors_allowed: 0

- criterion_id: AC-COST-08
  name: "First call produces near-zero hit ratio (cache_creation dominates)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-10]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: >
      A usage object from the first Scribe call of a meeting:
      cache_creation_input_tokens=2000, cache_read_input_tokens=0
    when:  "The cache-hit ratio is computed"
    then:
      - "hit_ratio = 0 / max(2000, 1) = 0.0"
      - "The ratio is below any low-ratio alert threshold (expected behavior for call #1)"
      - "No alert is emitted for the first call, regardless of ratio value"
  primary_oracle:
    type: ratio_value_and_no_alert_assertion
    artifact: >
      u = SimpleNamespace(cache_creation_input_tokens=2000, cache_read_input_tokens=0);
      ratio = compute_cache_hit_ratio(u);
      assert ratio == 0.0;
      assert not alert_emitted_for_call_number(1)
  thresholds:
    first_call_false_positive_alerts_allowed: 0

- criterion_id: AC-COST-09
  name: "Steady-state calls produce near-1 hit ratio (cache_read dominates)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-11]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: >
      A usage object from the fifth Scribe call of a meeting (prefix cached):
      cache_creation_input_tokens=0, cache_read_input_tokens=2000
    when:  "The cache-hit ratio is computed"
    then:
      - "hit_ratio = 2000 / max(2000, 1) = 1.0"
      - "No low-ratio alert is emitted (ratio is at or near 1)"
  primary_oracle:
    type: ratio_value_assertion
    artifact: >
      u = SimpleNamespace(cache_creation_input_tokens=0, cache_read_input_tokens=2000);
      ratio = compute_cache_hit_ratio(u);
      assert abs(ratio - 1.0) < 1e-9
  thresholds:
    steady_state_ratio_min: 0.90

- criterion_id: AC-COST-10
  name: "Low hit ratio on call #2+ triggers alert (prefix not byte-identical)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-12]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit, negative]
  behavior:
    given: >
      Call #3 of a meeting (past the first call) has
      cache_creation_input_tokens=1800, cache_read_input_tokens=200,
      producing hit_ratio = 200 / 2000 = 0.10 (anomalously low)
    when:  "record_scribe_cost or a co-located observer evaluates the ratio for call #3"
    then:
      - "An alert is emitted (log at ERROR level or equivalent monitored signal) indicating the prefix is not byte-identical"
      - "The alert distinguishes this as a call-#3 anomaly (not the expected first-call low-ratio)"
      - "The alert is loggable and monitorable (not silently swallowed)"
  primary_oracle:
    type: alert_emission_assertion
    artifact: >
      simulate call_number=3, cache_creation=1800, cache_read=200;
      assert alert_log_contains('prefix not byte-identical') or alert_metric_emitted();
      assert no alert suppressed for call_number > 1
  thresholds:
    missed_low_ratio_alerts_after_first_call_allowed: 0

- criterion_id: AC-COST-10-NEG
  name: "Low hit ratio on call #1 does NOT trigger alert (expected first-call behavior)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-12, R-doc03-COST-10]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit, negative]
  behavior:
    given: >
      Call #1 of a meeting has cache_creation_input_tokens=2000, cache_read_input_tokens=0,
      producing hit_ratio=0.0 (expected, cache cold)
    when:  "The ratio is evaluated for call #1"
    then:
      - "No alert is emitted for the low ratio on call #1"
      - "The system correctly identifies this as the first call and suppresses the alert"
  primary_oracle:
    type: no_alert_assertion
    artifact: >
      simulate call_number=1, cache_creation=2000, cache_read=0;
      assert zero alerts emitted with message containing 'prefix not byte-identical'
  thresholds:
    first_call_false_positive_alerts_allowed: 0

