# ── M1: Connection ──────────────────────────────────────────────

- requirement_id: R-DOC01-3.1-01
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.1 paragraph 1"
  source_quote: "The App requests exactly contents:read + metadata:read — nothing else."
  normalized_statement: >
    WHEN a GitHub App installation is created
    THE SYSTEM SHALL request only the contents:read and metadata:read scopes.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.1-02
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.1 paragraph 2"
  source_quote: "Nango stores the App credentials and mints the short-lived installation token for each operation (tokens expire ~hourly — mint per operation, never cache, never log)."
  normalized_statement: >
    WHEN an operation requires a GitHub token
    THE SYSTEM SHALL mint a short-lived token per operation via Nango and SHALL NOT cache or log it.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.1-03
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.1 paragraph 3"
  source_quote: "All git-host-specific logic (clone, pull, webhook parsing) lives behind one thin RepoProvider interface"
  normalized_statement: >
    WHEN git-host operations are performed
    THE SYSTEM SHALL route them through a RepoProvider interface that encapsulates host-specific logic.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

# ── M2: Clone ──────────────────────────────────────────────

- requirement_id: R-DOC01-3.2-01
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.2 paragraph 1"
  source_quote: "a per-tenant, encrypted persistent volume (e.g. /tenants/<tenant>/repos/<repo>/), one tenant never sharing a volume, process, or index with another"
  normalized_statement: >
    WHEN a repo is cloned
    THE SYSTEM SHALL store it on a per-tenant encrypted volume with no cross-tenant sharing of volume, process, or index.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.2-02
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.2 paragraph 2"
  source_quote: "repos above [~100k files] clone blobless (git clone --filter=blob:none)"
  normalized_statement: >
    WHEN the repo file count exceeds the blobless_threshold (config: ~100k files)
    THE SYSTEM SHALL use blobless clone (--filter=blob:none).
  requirement_type: functional
  criticality: P2
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.2-03
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.2 paragraph 3"
  source_quote: "we never push to origin, and the canonical copy never executes repository code"
  normalized_statement: >
    THE SYSTEM SHALL NEVER push to the upstream origin AND SHALL NEVER execute repository code on the canonical clone.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.2-04
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.2 paragraph 2"
  source_quote: "After the first clone we only ever pull deltas — never re-clone"
  normalized_statement: >
    WHEN a cloned repo receives a push
    THE SYSTEM SHALL pull only the delta, never re-clone.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── M3: Exclusions ──────────────────────────────────────────────

- requirement_id: R-DOC01-3.3-01
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.3 paragraph 1"
  source_quote: "gitleaks scans the changed files. Its hits plus policy globs — .env*, keys/keystores, node_modules/, vendor/, linguist-generated paths — form the repo's exclusion set"
  normalized_statement: >
    AFTER clone and after every delta pull
    THE SYSTEM SHALL run gitleaks on changed files and combine hits with policy globs to form the exclusion set.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.3-02
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.3 paragraph 1"
  source_quote: "Excluded paths ... are never indexed, never in the graph, never in any result, never copied into a meeting sandbox, never logged"
  normalized_statement: >
    WHEN a path is in the exclusion set
    THE SYSTEM SHALL exclude it from the index, the dependency graph, all query results, sandbox copies, and logs.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.3-03
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.3 paragraph 1"
  source_quote: "detected secret values are additionally redacted at the read path"
  normalized_statement: >
    WHEN a file containing detected secrets is read through any tool
    THE SYSTEM SHALL redact detected secret values.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

# ── M4: Structural substrate + dependency graph ──────────────────

- requirement_id: R-DOC01-3.4-01
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 1"
  source_quote: "For every non-excluded source file we parse with tree-sitter using each language's tag queries to extract declarations"
  normalized_statement: >
    WHEN building the structural substrate
    THE SYSTEM SHALL parse every non-excluded source file with tree-sitter to extract declarations.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.4-02
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 1"
  source_quote: "rank importance with the aider-style PageRank over the tag-reference graph"
  normalized_statement: >
    WHEN building the ranked overview
    THE SYSTEM SHALL rank symbols by PageRank over the tag-reference graph.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.4-03
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 1"
  source_quote: "No LLM anywhere (verifiable from logs: zero model calls)"
  normalized_statement: >
    WHEN building the structural substrate and dependency graph
    THE SYSTEM SHALL make zero LLM/model calls.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.4-04
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 2"
  source_quote: "The file-coverage record — one row per file: {path, status: indexed | flagged, flag_reason...}. Invariant: indexed + flagged accounts for every tracked file."
  normalized_statement: >
    WHEN the file-coverage record is computed
    THE SYSTEM SHALL produce one row per tracked file where indexed + flagged == the full git ls-files set.
  requirement_type: data_integrity
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.4-05
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 3"
  source_quote: "Table node id = table::<name>, match kind=='table' (kills the endswith collision)"
  normalized_statement: >
    WHEN a table node is created in the dependency graph
    THE SYSTEM SHALL use the canonical id format 'table::<name>' and match on kind=='table'.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.4-06
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 4"
  source_quote: "On every relevant push we rebuild the whole per-repo graph (drop + re-extract all rows)"
  normalized_statement: >
    WHEN a relevant push is received
    THE SYSTEM SHALL perform a full graph rebuild (drop + re-extract all rows), not incremental per-file invalidation.
  requirement_type: data_integrity
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.4-07
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.4 paragraph 2"
  source_quote: "Grammarless languages are flagged in the coverage record and stay covered by the file tree + live search"
  normalized_statement: >
    WHEN a source file uses a language with no tree-sitter grammar
    THE SYSTEM SHALL flag it with reason 'unsupported-language' and still expose it to live search.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── M5: code_intel MCP tools ──────────────────────────────────

- requirement_id: R-DOC01-3.5-01
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 paragraph 2"
  source_quote: "the graph is wrapped as a fresh, connection-bound, in-memory SDK MCP server, minted per query from a factory"
  normalized_statement: >
    WHEN the code_intel MCP server is used
    THE SYSTEM SHALL mint a fresh server instance per query from a factory (never shared across concurrent workers).
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-02
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 get_dependents tool"
  source_quote: "Transitive REVERSE-dependency set of a symbol OR table — top-N by PageRank, + truncated_count"
  normalized_statement: >
    WHEN get_dependents(symbol, limit) is called
    THE SYSTEM SHALL return the transitive reverse-dependency set over calls/imports/writes/extends/implements edges
    (NOT reads — reads edges are reported at depth-1 only, never traversed transitively),
    ranked by PageRank, capped at limit (default 50), with truncated_count.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified
  # FOUNDER DECISION 2026-07-17: closure over calls/imports/writes/extends/implements only;
  # reads edges depth-1 only. Recorded in dispositions.yaml D-FOUNDER-A003.

- requirement_id: R-DOC01-3.5-03
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 who_writes tool"
  source_quote: "EXACT (tag 'resolved') only on supported (lang,ORM): Django ORM / SQLAlchemy / Rails ActiveRecord; a labeled 'lower-bound' everywhere else — never a silent exact"
  normalized_statement: >
    WHEN who_writes(table) is called
    THE SYSTEM SHALL return writers tagged 'resolved' on tier-1 stacks (Django/SQLAlchemy/Rails) and 'lower-bound' on all others, never a silent exact.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-04
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 shares_table tool"
  source_quote: "Which INDEPENDENT modules/services both touch a given table — the hidden cross-module coupling"
  normalized_statement: >
    WHEN shares_table(table) is called
    THE SYSTEM SHALL return independent modules co-accessing the table with confidence tiering matching who_writes.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-05
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 list_entry_points tool"
  source_quote: "Graph roots — nodes with no incoming edges (routes/jobs/handlers/top-level entry points)"
  normalized_statement: >
    WHEN list_entry_points() is called
    THE SYSTEM SHALL return graph root nodes (zero in-degree).
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-06
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 owner tool"
  source_quote: "CODEOWNERS is authoritative (tagged 'resolved'); recent git blame on the path is a HINT fallback (tagged 'lower-bound')"
  normalized_statement: >
    WHEN owner(path) is called
    THE SYSTEM SHALL return CODEOWNERS matches tagged 'resolved' or git-blame fallback tagged 'lower-bound'.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-07
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 batch_read tool"
  source_quote: "Read up to [N=10] related files in ONE call — internally parallel, partial-failure-tolerant"
  normalized_statement: >
    WHEN batch_read(paths, max_lines_per_file) is called
    THE SYSTEM SHALL read up to 10 files in parallel, returning partial results on per-file failure (never aborting the batch).
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-08
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 lookup_referent tool"
  source_quote: "Deterministic (no LLM) map from a meeting term to what it refers to — a graph node id, a core-overview area name, or None"
  normalized_statement: >
    WHEN lookup_referent(term) is called
    THE SYSTEM SHALL deterministically resolve the term to a node_id, area, or None with zero LLM calls.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-09
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 paragraph 5"
  source_quote: "A simple per-meeting in-memory cache keyed on (tool, args) returns the stored result for a repeat call"
  normalized_statement: >
    WHEN a code_intel tool call is repeated with identical arguments within one meeting
    THE SYSTEM SHALL return the cached result without re-executing.
  requirement_type: performance
  criticality: P2
  testability: executable
  status: qualified

- requirement_id: R-DOC01-3.5-10
  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.5 paragraph 5"
  source_quote: "invalidated on a repo change (the push webhook)"
  normalized_statement: >
    WHEN a push webhook is received for a repo
    THE SYSTEM SHALL invalidate all cached tool results for that repo's meetings.
  requirement_type: data_integrity
  criticality: P1
  testability: executable
  status: qualified

