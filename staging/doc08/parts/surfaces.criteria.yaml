# ── GET /connect/status is a public REST poll ─────────────────────────────────

- criterion_id: AC-SURF-005
  name: "GET /connect/status responds without session auth and returns a Readiness value"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-06]
  criticality: P1
  blocking: true
  behavior:
    given: "A request to GET /connect/status with no session cookie and no auth header"
    when: "The request is processed"
    then:
      - "The response is 200 (not 401 or 403)"
      - "The response body contains a readiness field whose value is one of: connecting, cloning, indexing, ready, not_ready"
      - "The response is not delivered over a WebSocket — it is a plain HTTP response"
  primary_oracle:
    type: deterministic
    artifact: "integration test: unauthenticated GET /connect/status; assert 200; assert response.readiness in valid_enum_values"
  thresholds:
    violations_allowed: 0
  dependency_class: fs:git
  mock_boundary: "real or fixture clone at code_intel; MUST NOT stub Readiness enum value directly in the route handler"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  fault_model_refs: []
  test_ids: [T-SURF-005]

- criterion_id: AC-SURF-005-NEG
  name: "GET /connect/status degrades honestly when code_intel is unavailable"
  authority_refs: [R-doc08-SURF-06]
  dependency_class: fs:git
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "The code_intel service is unreachable when GET /connect/status is called"
    when: "code_intel errors or times out"
    then:
      - "The response body returns a readiness value of not_ready or an explicit error payload"
      - "The route does NOT return 200 with a stale or fabricated ready state"
      - "No silent proceed; the caller can observe the degraded state"
  primary_oracle:
    type: deterministic
    artifact: "assert response body does not contain readiness=ready when code_intel faults; assert honest failure displayed"
  thresholds:
    silent_failures_allowed: 0
  fault_model_refs: []
  test_ids: [T-SURF-005-NEG]

