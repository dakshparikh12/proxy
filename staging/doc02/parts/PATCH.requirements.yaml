  source_quote: 'The big simplification: no voice framework. We deliberately skip Pipecat/LiveKit-class voice-agent frameworks ... explicitly no Pipecat/LiveKit (Recall owns transport).'
  normalized_statement: 'WHILE the transport layer is built THE SYSTEM SHALL depend on NO voice-agent framework (Pipecat/LiveKit-class): no such package appears in the workspace dependency set, lockfile, or imports; the loop is a thin glue loop only.

    '
