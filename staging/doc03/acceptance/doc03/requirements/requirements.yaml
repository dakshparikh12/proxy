  source_quote: >
    CREATE UNIQUE INDEX ON note_deltas (meeting_id, window_start_s, entry_id, op);  -- ON CONFLICT DO NOTHING
  normalized_statement: >
    THE SYSTEM SHALL enforce a UNIQUE INDEX on note_deltas over the composite key
