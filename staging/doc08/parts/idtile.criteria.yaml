# Golden-path: proves the tile renders Listening driven by a real session-live event

- criterion_id: AC-IDTILE-015
  name: "End-to-end: tile enters and sustains Listening state driven by a real session-live backend event"
  evidence_class: "[integration]"
  authority_refs: [R-doc08-IDTILE-16, R-doc08-IDTILE-13]
  criticality: P1
  blocking: true
  behavior:
    given: "A real backend session is started and a tile.state{Listening} ProxyMessage frame is emitted over the render WS"
    when: "The tile page receives the frame"
    then:
      - "The tile transitions to Listening state within 200 ms of frame receipt"
      - "The orb breathes slowly for the duration of the session"
      - "No internal name (Orchestrator/Scribe/workroom) appears in any rendered string"
  primary_oracle: {type: deterministic, artifact: "E2E headless browser test: real WS frame dispatch, screenshot + DOM assertion confirming Listening state orb and absence of forbidden strings"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-IDTILE-015]
  dependency_class: db:postgres
  mock_boundary: "real Postgres for session creation; MUST NOT mock asyncpg; tile render WS may use an in-process test server"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}

- criterion_id: AC-IDTILE-015-NEG
  name: "Listening E2E degrades honestly when Postgres is unavailable at session creation"
  authority_refs: [R-doc08-IDTILE-16, R-doc08-IDTILE-13]
  criticality: P1
  blocking: true
  behavior:
    given: "The Postgres connection is severed before the session-live event is persisted"
    when: "The backend attempts to create the session and emit the tile.state frame"
    then:
      - "The error is returned to the caller as a structured failure"
      - "The tile does not enter a spurious state (it remains in a safe default or shows no active session)"
      - "No forbidden internal name leaks into any error message rendered on the tile"
  primary_oracle: {type: deterministic, artifact: "negative cassette / real fault at db:postgres seam; assert tile shows no spurious active state; assert no forbidden name in rendered strings"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-IDTILE-015-NEG]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at seam only; MUST NOT replace the seam with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

