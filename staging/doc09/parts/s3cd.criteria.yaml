    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-511-NEG

- criterion_id: AC-S3-512
