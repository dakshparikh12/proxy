# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 1 · Catch-me-up
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-01
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 1"
  source_quote: "\"Proxy, catch me up\" → a ~20-second recap from the notes (what's been discussed, decided, and is open)."
  normalized_statement: >
    WHEN a participant says "Proxy, catch me up" THE SYSTEM SHALL produce a spoken recap
    of approximately 20 seconds covering what has been discussed, decided, and remains open,
    sourced from the committed notes object.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-02
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 1"
  source_quote: "A late joiner gets it privately where DM exists."
  normalized_statement: >
    WHEN a catch-me-up is triggered for a late joiner AND a DM channel is available in the
    meeting platform THE SYSTEM SHALL deliver the recap privately to that participant's DM
    channel and SHALL NOT broadcast it to the full meeting chat.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-03
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 1"
  source_quote: "Rides: the notes object."
  normalized_statement: >
    WHEN producing a catch-me-up recap THE SYSTEM SHALL derive all content exclusively from
    the committed notes object and SHALL NOT fabricate content absent from the notes.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified


# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 2 · Where-are-we
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-04
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 2"
  source_quote: "\"Proxy, where did we land?\" → the current decisions + open questions, spoken briefly."
  normalized_statement: >
    WHEN a participant asks "where did we land?" THE SYSTEM SHALL produce a brief spoken
    response listing the current committed decisions and open questions from the notes object,
    omitting full narrative discussion content.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-05
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 2"
  source_quote: "Same machinery as catch-me-up, different slice."
  normalized_statement: >
    WHEN producing a where-are-we response THE SYSTEM SHALL use the same notes-retrieval
    machinery as catch-me-up, selecting only the decisions and open-questions slice of the
    notes object.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified


# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 3 · Decision + action-item acknowledgments
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-06
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 3"
  source_quote: "When the Scribe commits a decision or action-item note-delta, a quiet chat line marks it: \"— noted: decision — ship Friday (Priya, Sam agreed)\" · \"— action: Sam → fix the retry test (by Fri)\"."
  normalized_statement: >
    WHEN the Scribe commits a decision note-delta THE SYSTEM SHALL post exactly one quiet
    chat line matching the pattern "— noted: decision — <text> (<names agreed>)", and WHEN
    the Scribe commits an action-item note-delta THE SYSTEM SHALL post exactly one quiet chat
    line matching the pattern "— action: <assignee> → <task> (by <deadline>)".
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-07
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 3"
  source_quote: "This line is a deterministic harness formatter keyed on a committed `note_delta` (CANONICAL §12.12) — never a wake, never model-generated — so it is free, race-free, and cannot hallucinate a decision."
  normalized_statement: >
    WHEN a decision or action-item chat acknowledgment line is produced THE SYSTEM SHALL
    generate it by a deterministic harness formatter keyed exclusively on the committed
    note_delta fields and SHALL NOT invoke any model inference call or non-deterministic
    generator in the formatter path.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-08
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 3"
  source_quote: "Never spoken, never interrupting — just visible bookkeeping."
  normalized_statement: >
    WHEN a decision or action-item acknowledgment chat line is emitted THE SYSTEM SHALL NOT
    produce any TTS or voice event for that line, and SHALL NOT generate any barge-in or
    speech-interrupt event.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-09
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 3"
  source_quote: "it honors the session disable (§2.4 #9 \"stop posting decision notes\")."
  normalized_statement: >
    WHEN the session preference "stop posting decision notes" is active THE SYSTEM SHALL
    suppress all decision and action-item acknowledgment chat lines for the remainder of
    that session.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-10
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 3"
  source_quote: "Rides: Doc 03's committed note-deltas, rendered as chat lines."
  normalized_statement: >
    WHEN generating a decision or action-item acknowledgment line THE SYSTEM SHALL key the
    formatter exclusively on a Doc 03 committed note_delta row and SHALL NOT trigger any
    new notes read or model wake to produce the line.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified


# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 4 · Live corrections, acknowledged
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-11
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 4"
  source_quote: "\"Proxy, it's Friday, not Monday\" → the notes patch instantly (Doc 03 §3.6) and it confirms in one line: \"— corrected: ship Friday.\""
  normalized_statement: >
    WHEN a participant speaks a correction to a value in the notes THE SYSTEM SHALL apply a
    notes patch via Doc 03 §3.6 and post exactly one confirmation line matching the pattern
    "— corrected: <new value>".
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-12
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 4"
  source_quote: "Trust behavior, made visible."
  normalized_statement: >
    WHEN a correction is acknowledged THE SYSTEM SHALL ensure the confirmation line reflects
    the new corrected value and SHALL NOT confirm a correction that was not committed to the
    notes.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified


