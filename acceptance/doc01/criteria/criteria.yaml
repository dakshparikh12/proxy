    excluded_estates: []
    rationale: "Sandbox copy of excluded paths is P0."
  primary_oracle:
    type: sandbox_file_list_membership_check
    artifact: "no sandbox_file in exclusion_set"
  thresholds:
    excluded_paths_in_sandbox_allowed: 0
  test_ids: [T-M3-007]
  fault_model_refs: [F-EXCLUDED-PATH-IN-SANDBOX]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-007

- criterion_id: AC-M3-006
  name: "Detected secret values are redacted in batch_read output"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.3-03]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture file containing a gitleaks-detectable secret (sentinel value:
      'AKIAIOSFODNN7EXAMPLE'). The file is in the non-excluded set (gitleaks hit
