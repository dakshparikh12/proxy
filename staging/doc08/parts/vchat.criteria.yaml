# Acceptance Criteria — Doc 08 Behavior · §2.3 Voice & Chat (how it communicates)
# Source: product/v0-spec/08-BEHAVIOR.md §2.3
# ID prefix: AC-VCHAT-NNN / AC-VCHAT-NNN-NEG
# Authority: DOC-08
#
# Dependency classes in use:
#   vendor:recall  — per-meeting channel report (dm_available bool signal from Doc 02)
#
# mock_boundary rules:
#   vendor:recall  : cassette-backed; MUST NOT replace the call_external seam in libs/http
#
# NEG criteria are mandatory for every non-null dependency_class.
# Golden-path: AC-VCHAT-030 — full Q&A turn (voice ask → ACK ≤500ms → spoken + chat receipt).
#
# Verification ladder abbreviations used below:
#   lint        : always present
#   unit        : always present
#   integration : iff dependency_class in {db:postgres, gcs:objects}
#   reality     : iff dependency_class == vendor:*  (cassette-backed)
#   negative    : only on -NEG pairs
#   e2e         : only iff golden_path: true

# ══════════════════════════════════════════════════════════════════════
# §2.3 bullet 1 — Speak the headline; detail lives in chat
# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-001
  name: "structured content (links, code, lists, tables, receipts) routes to send_chat() only"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-01]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is composing a response that contains at least one of: a URL link, a code block, a list, a numerical table, or a receipt"
    when: "The response is dispatched through the delivery tools"
    then:
      - "The structured content appears in a send_chat() call"
      - "The speak() call contains no links, code blocks, list items, tabular data, or receipt tokens"
      - "No structured-content element appears in any speak() argument"
  primary_oracle:
    type: deterministic
    artifact: "assert speak() arg contains zero occurrences of URL pattern, code-fence marker, list prefix, pipe-table row, or receipt token; assert send_chat() carries the structured content"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-002
  name: "speak() voice turn is bounded to one or two sentences"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-02]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy produces a voice turn response"
    when: "The speak() call is captured and its argument parsed"
    then:
      - "The spoken text contains at most two sentence-terminating punctuation boundaries (period, exclamation mark, question mark)"
      - "The spoken text contains no more than two natural-language sentences by any reasonable sentence-split"
  primary_oracle:
    type: deterministic
    artifact: "assert sentence_count(speak_arg) <= 2 using regex-based sentence splitter; parameterized over a test corpus of simple/complex responses"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-002]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-003
  name: "TTS character cost bounded: speak() receives only headline, never full detail"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-03]
  criticality: P2
  blocking: false
  behavior:
    given: "A response whose full detail (chat portion) is ≥100 characters"
    when: "Proxy dispatches the response"
    then:
      - "The character count of the speak() argument is strictly less than the character count of the full answer"
      - "The speak() argument does not duplicate detail already placed in send_chat()"
  primary_oracle:
    type: deterministic
    artifact: "assert len(speak_arg) < len(full_answer_text); assert speak_arg content not duplicated verbatim in send_chat arg beyond the mirrored text record"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-003]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ══════════════════════════════════════════════════════════════════════
