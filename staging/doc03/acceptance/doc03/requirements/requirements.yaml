  normalized_statement: >
    THE SYSTEM SHALL ship with the following pinned defaults: QUALITY_GATE_SAMPLE_RATE=0.1,
    always-check entries are decision.status=final / reversibility=irreversible / has-contradicts-link,
    PROXY_MODEL_QUALITY_GATE=claude-haiku-4-5, and escalation tier is Sonnet-class; each
