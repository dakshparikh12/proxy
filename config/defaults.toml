# Proxy tunables — one value + unit + range per key; code reads this file.
# Env overrides are for secrets/seats only (never these operational tunables).

[ops]
# A running operation_runs row whose last_heartbeat_at is older than this many
# seconds is considered orphaned and swept to 'interrupted' (lazy on read + boot
# bulk sweep + reconcile cron). unit: seconds. range: 10..300.
stale_after_s = 40
# Heartbeat cadence for a live owner's fencing UPDATE. unit: seconds. range: 1..30.
heartbeat_s = 10
# Reconcile cron cadence (scale-to-zero safe). unit: seconds. range: 60..900.
reconcile_interval_s = 300

[sandbox]
# E2B-native sandbox timeout backstop set at provision. unit: seconds. range: 300..7200.
timeout_s = 3600
# TTL past which the reconcile sweep destroys a leaked sandbox. unit: seconds. range: 300..7200.
ttl_s = 3600

[stt]
# In-process STT credential refresh cadence (availability-critical; never the
# reconcile cron). unit: seconds. range: 60..3600.
refresh_interval_s = 600

[llm]
# Per-meeting model-call fan-out (distinct from the process-wide
# PROXY_MAX_INFLIGHT_LLM=16 semaphore). unit: concurrent calls. range: 3..5.
per_meeting_concurrency = 4

[latency_slo]
# Direct-answer shallow-path SLOs (CANONICAL §12.8) — the pinned foundation
# latency contract the pre-build spike gate (M15) and the answer path measure
# against. unit: seconds.
first_text_p50_s = 2.0    # first streamed text, median. range: 1.0..4.0
first_text_p95_s = 4.0    # first streamed text, tail. range: 2.0..8.0
first_audio_p50_s = 2.5   # first audible token, median. range: 1.0..5.0
first_audio_p95_s = 5.0   # first audible token, tail. range: 2.0..10.0
# The "on it" acknowledgement reflex SLO — Proxy must be audibly acking within
# this budget of a wake. unit: milliseconds. range: 200..800.
ack_audible_p95_ms = 500

[code_intel]
# Precise-nav LSP call budget before grep fallback. unit: seconds. range: 1..10.
lsp_timeout_s = 3
# Repo file count above which clone switches to blobless (--filter=blob:none).
# unit: files. range: 10000..1000000.
blobless_file_threshold = 100000
# Repo LOC above which the language server is kept warm after connect/push.
# unit: lines. range: 100000..2000000.
lsp_warm_loc_threshold = 500000
# get_dependents result cap before truncation signalling. unit: nodes. range: 10..200.
get_dependents_limit = 50
# batch_read per-call file cap. unit: files. range: 1..25.
batch_read_max_files = 10
# Readiness deadline from connect. unit: seconds. range: 60..1800.
ready_deadline_s = 900
# Hard-delete deadline after App uninstall. unit: seconds. range: 60..1800.
uninstall_delete_deadline_s = 900

[transport]
# Doc 02 (Voice & Transport) non-§12.8 tunables. The §12.8-pinned latency SLOs stay
# single-homed in [latency_slo] above (reused, never redeclared — AC-XCUT-09); only
# numbers NOT pinned by §12.8 live here.
# Output-Media audio chunk size. Small by design so a barge-in flush drops at most one
# in-flight chunk (§3.3, AC-SPEAK-08). unit: milliseconds. range: 50..250.
tts_chunk_ms = 250
# Max audio buffered ahead in Output Media, so buffered audio can't defeat barge-in
# (§3.3, AC-TURN-10). unit: milliseconds. range: 50..250.
max_buffered_audio_ms = 250
# Barge-in stop budget: human onset → TTS silence (§3.6/§4/Law-3; NOT §12.8-pinned, so
# home here). unit: milliseconds. range: 100..200.
barge_in_budget_ms = 200
