    THE SYSTEM SHALL constrain NoteOp to exactly {add, patch, close} and SHALL NOT include 'note'.
  requirement_type: contract
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-DOC00-2-07
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§1.5 Readiness"
