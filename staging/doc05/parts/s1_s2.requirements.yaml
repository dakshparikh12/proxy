# ── §2.5 · The floors ─────────────────────────────────────────────────────────

- requirement_id: R-doc05-S2-34
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.5 paragraph 1"
  source_quote: "Staged-draft gate: build fully in the sandbox (do the work first); anything world-touching (push/send/file) becomes a draft a named human approves."
  normalized_statement: >
    WHEN the agent completes work that touches the world (push, send, file write)
    THE SYSTEM SHALL first complete the work fully in the sandbox and then stage it as
    a draft requiring a named human's explicit approval before any external effect occurs.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S2-35
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.5 paragraph 1"
  source_quote: "Enforced structurally as propose_change (§3.8): the agent's only 'write to the world' persists the proposed diff durably (GCS Object-Versioned + a staged_drafts row, CANONICAL §4) and returns a draft_id with status=needs_review without landing the change"
  normalized_statement: >
    WHEN the agent writes to the world
    THE SYSTEM SHALL enforce this structurally: propose_change SHALL be the agent's only
    write-to-world path; it SHALL persist the diff durably in GCS (Object-Versioned)
    and a staged_drafts row, and SHALL return a draft_id with status=needs_review
    without landing the change.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S2-36
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.5 paragraph 1"
  source_quote: "a named human's accept click drives the actual apply"
  normalized_statement: >
    WHEN a staged draft exists with status=needs_review
    THE SYSTEM SHALL require an explicit named human accept action to apply the change;
    no automated or timeout-based application SHALL occur without that accept action.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S2-37
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.5 paragraph 2"
  source_quote: "Independent verification (2.3.4 / §3.7 — mandatory shape: ONE fresh-context verifier + deterministic evidence gate, builder never self-grades; the multi-lens panel is Expansion)."
  normalized_statement: >
    WHEN a large build completes
    THE SYSTEM SHALL run independent verification in the mandatory shape: exactly one
    fresh-context verifier plus the deterministic evidence gate; the builder SHALL NOT
    self-grade; the multi-lens panel IS NOT part of V0.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S2-38
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.5 paragraph 3"
  source_quote: "Cost caps: per-task dollar cap + per-worker K-budgets, pre-spend checked; a live per-meeting circuit-breaker (Doc 04); runaway loops structurally impossible."
  normalized_statement: >
    WHEN a task is initiated
    THE SYSTEM SHALL pre-check the per-task dollar cap and per-worker K-budgets before
    spending; the live per-meeting circuit-breaker (Doc 04) SHALL be active; the
    implementation SHALL make runaway loops structurally impossible.
  requirement_type: resilience
  criticality: P0
  testability: executable
  status: qualified

# ── §2.6 · Proactive tasks and follow-ups ─────────────────────────────────────

- requirement_id: R-doc05-S2-39
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.6 paragraph 1"
  source_quote: "Judge-initiated tasks (Doc 06) run the identical loop at read/verify-tier by default, may do bounded real work (mockup, synthetic-data run) when the contribution warrants; surfacing remains the judge's gate."
  normalized_statement: >
    WHEN the Workroom executes a judge-initiated proactive task
    THE SYSTEM SHALL run the identical task loop at read/verify-tier by default; it MAY
    do bounded real work (mockup, synthetic-data run) when warranted; surfacing the
    result SHALL remain gated by the judge (Doc 06), not the Workroom.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc05-S2-40
  authority_type: specification
  authority_document: DOC-05
  source_location: "§2.6 paragraph 1"
  source_quote: "Results land on the notes; the sandbox persists per meeting; 'run it again at 2×' resolves 'it.'"
  normalized_statement: >
    WHEN a proactive task completes
    THE SYSTEM SHALL write results to the meeting notes; the sandbox SHALL persist for
    the duration of the meeting so follow-up references (e.g. "it") resolve to prior
    artifacts; the sandbox SHALL NOT be torn down between tasks within the same meeting.
  requirement_type: state_consistency
  criticality: P1
  testability: executable
  status: qualified
