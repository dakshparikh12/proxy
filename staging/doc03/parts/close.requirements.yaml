# ── Output: dedup, conflict-resolve, polish ───────────────────────────────────

- requirement_id: R-doc03-CLOSE-10
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 2 (output description)"
  source_quote: >
    Output: the final notes object — deduped, conflicts resolved,
    confidence-weighted, human-polished, with the summary/action-items/decisions
    in publishable form.
  normalized_statement: >
    THE SYSTEM SHALL produce from the close pass a final notes object that is: (a)
    deduplicated (no duplicate entries from live tagging redundancies), (b) with
    conflicts resolved rather than left as contradicts links, (c) confidence-weighted,
    and (d) human-polished, with summary, action-items, and decisions in publishable
    form.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-CLOSE-11
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph 4"
  source_quote: >
    It corrects any live-tagging misses and backfills every status='gap' AND
    status='pending' span from the preserved transcript (the Scribe's entries were
    correctable; this is where they get corrected, and any window never comprehended
    live is picked up here).
  normalized_statement: >
    THE SYSTEM SHALL use the close pass to correct live-tagging misses from the
    Scribe; the close pass SHALL backfill every status='gap' AND status='pending'
    span from the preserved transcript; no status='gap' or status='pending' span
    SHALL remain unprocessed after the close pass completes successfully.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

