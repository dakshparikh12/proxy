      A capability token with a valid HMAC and a future expiry (not yet expired);
      the token has been revoked (revoked_tokens row or meeting epoch incremented).
    when: "GET /m/{meeting_id} is requested with the revoked token"
    then:
      - "The revocation check fires before content is fetched"
      - "The response is Not found or 401 — NOT a 200 with notes content"
      - "No notes are disclosed to the revoked-token holder"
  primary_oracle:
    type: deterministic
    artifact: "assert response is not 200; assert revocation check logged before any data query; assert no notes in response"
  thresholds:
    violations_allowed: 0
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT mock asyncpg"
  golden_path: false
