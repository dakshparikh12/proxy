      - "Exactly one cache_control block with type='ephemeral' and ttl=3600 is placed at the boundary between (system prompt + map prefix) and (bundle + transcript tail + subtask turns)"
      - "No cache_control block appears after bundle/transcript content"
  primary_oracle:
    type: deterministic
    artifact: "unit test inspects constructed prompt messages; asserts single cache_control at correct position; asserts no cache_control in volatile tail"
  thresholds: {misplaced_cache_breakpoints: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S9-008]

- criterion_id: AC-S9-009
  name: "Per-task cost telemetry emits total_cost_usd + cache-read/creation split"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S9-12]
  criticality: P1
