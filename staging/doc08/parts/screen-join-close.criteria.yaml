# Acceptance Criteria — Doc 08 Behavior · §2.5 The shared screen + §2.6 Join, consent, and close
# ID prefix: AC-SJCL-NNN / AC-SJCL-NNN-NEG
# Authority: DOC-08 §2.5–§2.6 / requirements in screen-join-close.requirements.yaml
# Dependency classes in use:
#   vendor:recall  — roster events (late-joiner), meeting-end signal, platform chat/pin API
#   db:postgres    — note_deltas, staged_drafts
#   gcs:objects    — notes file storage (before rendered at /m/)

# ════════════════════════════════════════════════════════════════
# §2.5 · SCREEN — ACTIVATION
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-SJCL-001
  name: "Screenshare activates only on human ask or human yes-to-offer"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SJCL-01, R-doc08-SJCL-02]
  criticality: P1
  blocking: true
  behavior:
    given: "A live session with no pending human screenshare request or offer response"
    when: "Any internal trigger fires (task completion, timer, progress event)"
    then:
      - "Screenshare does NOT activate"
      - "Activation gate returns rejected with reason=no-human-trigger"
  primary_oracle: {type: deterministic, artifact: "Assert screenshare.active == false for all non-human trigger paths; FSM guard on activation edge requires human_trigger in {ask, yes_to_offer}"}
  thresholds: {self_initiated_activations_allowed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  fault_model_refs: [F-SCREEN-SELF-INITIATED]
  test_ids: [T-SJCL-001]

- criterion_id: AC-SJCL-002
  name: "Screenshare activates when human explicitly asks"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SJCL-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A live session"
    when: "A human participant issues an explicit ask to share the screen"
    then:
      - "The activation gate receives trigger_type=ask"
      - "Screenshare activates"
  primary_oracle: {type: deterministic, artifact: "Assert screenshare.active == true after human ask event; trigger_type logged as 'ask'"}
  thresholds: {violations_allowed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
  fault_model_refs: []
  test_ids: [T-SJCL-002]

- criterion_id: AC-SJCL-003
  name: "Stop-sharing signal causes immediate return to tile"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SJCL-03]
  criticality: P1
  blocking: true
  behavior:
    given: "Screenshare is active"
    when: "Any participant issues a stop-sharing signal"
    then:
      - "Screenshare deactivates immediately (zero-delay, no confirmation prompt)"
