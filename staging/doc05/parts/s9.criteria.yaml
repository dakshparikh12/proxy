    - {tier: unit}
  test_ids: [T-S9-006]

- criterion_id: AC-S9-007
  name: "Retry bounded to 3 attempts; non-recoverable errors fail fast without retry"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S9-09]
  criticality: P0
  blocking: true
  behavior:
    given: "A query encounters repeated context-overflow errors on all three attempts"
    when: "The fourth overflow would occur"
    then:
      - "The retry loop terminates and raises a terminal error after exactly 3 attempts"
      - "No fourth attempt is issued"
    and_given: "A query encounters a non-recoverable error class (e.g., auth failure)"
    and_when: "The error is first raised"
    and_then:
      - "The error propagates immediately with no retry"
  primary_oracle:
    type: deterministic
    artifact: "unit test counts attempts via spy; asserts exactly 3 for overflow; asserts exactly 1 for auth-failure error class"
  thresholds: {retries_beyond_cap: 0, retries_of_non_recoverable_errors: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S9-007]

- criterion_id: AC-S9-008
  name: "Prompt cache breakpoint placed at stable/volatile boundary with 1-hr TTL"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S9-10, R-doc05-S9-11]
