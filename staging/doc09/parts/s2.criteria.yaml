  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S2-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A MessageType is produced by one service but absent from CHANNEL_REGISTRY"
    when: "assert_registry_closed() is called in the CI build"
    then:
      - "The assertion raises an error identifying the unregistered MessageType"
      - "The CI build exits non-zero"
  primary_oracle: {type: deterministic_assertion, artifact: "assert_registry_closed() raises with the specific missing type; CI exits non-zero"}
  thresholds: {unconsumed_message_types_allowed: 0}
  fault_model_refs: [F-S2-002]
  test_ids: [T-S2-002]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S2-002

