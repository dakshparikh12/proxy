  thresholds:
    barge_in_latency_ms: 200
    violations_allowed: 0
  fault_model_refs: [F-BARGE-IN-SLOW]
  test_ids: [T-FLOW-009]
  dependency_class: vendor:cartesia
  mock_boundary: "Cartesia TTS cassette; VAD onset injected synthetically"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}

- criterion_id: AC-FLOW-009-NEG
  name: "NEG: Barge-in latency > 200ms is detected and fails"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-FLOW-16]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched reflex layer that delays barge-in termination by 250ms"
    when: "A human begins to speak while Proxy is mid-sentence"
    then:
