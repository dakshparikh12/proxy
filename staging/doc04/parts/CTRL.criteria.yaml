# ── AC-CTRL-015: AbortController.aborted is a property, not a method ──────────

- criterion_id: AC-CTRL-015
  name: "AbortController.aborted is a @property returning bool, not a callable method"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-18]
  criticality: P0
  blocking: true
  behavior:
    given: "An AbortController instance c"
    when: "c.aborted is accessed without calling it"
    then:
      - "c.aborted returns False before abort() is called"
      - "c.aborted returns True after abort() is called"
      - "Accessing c.aborted does not raise TypeError (i.e., it is not a method requiring ()')"
      - "c.aborted is not callable (callable(c.aborted) == False after abort)"
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: import AbortController from libs/agentkit/abort.py; c = AbortController();
      assert c.aborted == False; assert callable(c.aborted) == False;
      c.abort(); assert c.aborted == True
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-ABORTED-METHOD]
  test_ids: [T-CTRL-015]
  dependency_class: null
