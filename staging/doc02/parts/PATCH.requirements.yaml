  source_quote: 'Three instrumented clocks on the DIRECT-ANSWER path only: ack-audible p95<=500ms · first-grounded-text p50<=2s/p95<=4s · first-grounded-audio p50<=2.5s/p95<=5s.'
  normalized_statement: 'WHEN a shallow grounded direct answer is produced THE SYSTEM SHALL meet first-grounded-text p50 <= 2s (measured pickup -> first grounded-answer text emitted), on the shallow direct-answer population.

