# §4.1 · REGISTRATION AT IMPORT TIME
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-REG-001
  name: "ProxyMessage subclass registers itself in CHANNEL_REGISTRY at import time"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-REG-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A module defining a valid ProxyMessage subclass (with message_type declared) is not yet imported"
    when: "The module is imported"
    then:
      - "CHANNEL_REGISTRY contains an entry mapping the subclass's MessageType to the subclass, visible to any code that runs after the import"
      - "No explicit registration call is made outside __init_subclass__"
  primary_oracle: {type: deterministic, artifact: "assert MessageType.X in CHANNEL_REGISTRY after import"}
  thresholds: {violations_allowed: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: unit}
  fault_model_refs: []
  test_ids: [T-REG-001]

