# ══════════════════════════════════════════════════════════════════════════════
# GET /connect/status IS A PUBLIC REST ENDPOINT (NO SESSION AUTH REQUIRED)
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-010
  name: "GET /connect/status responds without session auth and returns a valid Readiness value"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-12, R-doc08-CONN-14]
  criticality: P0
  blocking: true
  behavior:
    given: "A request to GET /connect/status with no session cookie and no Authorization header"
    when: "The request is processed"
    then:
      - "The response status is 200"
      - "The response body contains a readiness field whose value is one of: connecting, cloning, indexing, ready, not_ready"
      - "The response is NOT delivered over a WebSocket — it is a plain HTTP response"
      - "The route does NOT return 401 or 403 for a missing session"
  primary_oracle:
    type: deterministic
    artifact: "integration test: unauthenticated GET /connect/status; assert 200; assert response.readiness in {'connecting','cloning','indexing','ready','not_ready'}; assert Content-Type is application/json not upgrade/websocket"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-010]
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT stub the Readiness row value directly in the route handler"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-CONN-010-NEG
  name: "GET /connect/status degrades honestly when the readiness record is unavailable"
  authority_refs: [R-doc08-CONN-12, R-doc08-CONN-14]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P0
  blocking: true
  behavior:
    given: "An unauthenticated GET /connect/status request; Postgres is unreachable or the readiness record query fails"
    when: "Postgres errors or times out during the readiness record fetch"
    then:
      - "The response does NOT return readiness=ready with fabricated data"
      - "The response either returns a not_ready payload with an appropriate gap description or returns an explicit error response"
      - "No silent proceed to a stale or invented ready state"
  primary_oracle:
    type: deterministic
    artifact: "assert response.readiness != 'ready' when Postgres faults; assert honest failure payload or error status returned"
  thresholds:
    silent_failures_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-010-NEG]


# ══════════════════════════════════════════════════════════════════════════════
# CONNECT PAGE CALLS ARE UNTRUSTED / HMAC OR CREDENTIALS ENFORCED
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-011
  name: "Connect page backend treats all inbound requests as untrusted — no implicit session assumption"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-12, R-doc08-CONN-13]
  criticality: P0
  blocking: true
  behavior:
    given: "Any request to a connect page backend endpoint (/connect/status, /connect/install/start, or any §4.6-listed connect route)"
    when: "The route handler source code is statically analyzed for session assumptions"
    then:
      - "No handler derives authorization from an implicit session object without first explicitly validating the session or HMAC"
      - "Webhook-type connect routes validate with HMAC before processing any payload"
      - "Authenticated-read connect routes require explicit credentials on an allowlisted endpoint"
      - "No handler proceeds with a privileged action based solely on the presence of a session cookie without explicit validation"
  primary_oracle:
    type: deterministic
    artifact: "code review assertion: grep connect route handlers for implicit session access without explicit validation; assert zero bare session-object reads before validation; assert HMAC check present on webhook routes"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-011]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}


