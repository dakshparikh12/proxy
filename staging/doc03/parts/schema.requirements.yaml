# ── Claim field constraints ──────────────────────────────────────────────────

- requirement_id: R-doc03-SCHEMA-05
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Claim"
  source_quote: "Claim: kind=\"claim\", text (max 1000), speaker, said_at_s (float, meeting-relative seconds, NEVER wall-clock), firmness, provenance, verified=False (default), referents (list, max 8), contradicts (Optional[str] — id of conflicting claim)"
  normalized_statement: >
    THE SYSTEM SHALL define Claim with kind fixed to "claim", text capped at
    1000 characters, speaker (string), said_at_s (float), firmness (Firmness),
    provenance (Provenance), verified defaulting to False, referents (list, max
    8 elements), and contradicts (Optional string — id of a conflicting claim).
  requirement_type: data_integrity
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

- requirement_id: R-doc03-SCHEMA-06
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Claim.said_at_s"
  source_quote: "said_at_s (float, meeting-relative seconds, NEVER wall-clock)"
  normalized_statement: >
    THE SYSTEM SHALL represent said_at_s as a float measuring meeting-relative
    seconds (seconds from meeting start); it SHALL NEVER be populated with a
    wall-clock timestamp (unix epoch or datetime) — any wall-clock value is a
    schema violation.
  requirement_type: data_integrity
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

- requirement_id: R-doc03-SCHEMA-07
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Claim.verified"
  source_quote: "verified=False (default)"
  normalized_statement: >
    THE SYSTEM SHALL default Claim.verified to False for every newly created
    Claim entry; a Claim SHALL NOT be emitted with verified=True unless it has
    been explicitly set after creation.
  requirement_type: data_integrity
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

- requirement_id: R-doc03-SCHEMA-08
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Claim.referents"
  source_quote: "referents (list, max 8)"
  normalized_statement: >
    THE SYSTEM SHALL enforce that Claim.referents contains at most 8 elements;
    a Claim with more than 8 referents SHALL be rejected at validation time.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

- requirement_id: R-doc03-SCHEMA-09
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Claim.text"
  source_quote: "text (max 1000)"
  normalized_statement: >
    THE SYSTEM SHALL enforce that Claim.text is at most 1000 characters; a
    Claim whose text exceeds 1000 characters SHALL be rejected at validation
    time.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

