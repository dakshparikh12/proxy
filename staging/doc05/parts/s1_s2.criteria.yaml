- criterion_id: AC-S2-009
  name: "Engine stops at K-budget and returns honest partial state in the envelope"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S2-14, R-doc05-S2-23]
  criticality: P0
  blocking: true
