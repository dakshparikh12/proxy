# Fault Model — Doc 00 Foundation (Part A: P0 security + durable-substrate faults)
# Per GENERATOR.md §9.5/§9.6. Every P0 criterion detects >=1 canonical fault per material
# class it protects; every P1 detects >=1 representative behavioral fault. detection_requirement
# 1.0 = the paired criterion MUST catch this fault.
---

# ── P0 security / isolation ──────────────────────────────────────────────
- fault_id: F-SHARED-TENANT-KEY
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A single shared envelope key is used across tenants instead of a distinct per-tenant key."
  must_be_detected_by: [AC-HOST-013]
  detection_requirement: 1.0
- fault_id: F-SHRED-AFFECTS-OTHER-TENANT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "Destroying tenant A's key also renders tenant B undecryptable (blast radius not bounded)."
  must_be_detected_by: [AC-HOST-014]
  detection_requirement: 1.0
- fault_id: F-TABLE-NO-TENANT-SCOPE
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A tenant-scoped durable table is created with no tenant_id / no FK chain to tenants."
  must_be_detected_by: [AC-TEN-001]
  detection_requirement: 1.0
- fault_id: F-CROSS-TENANT-READ
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A tenant-B request reads a tenant-A meeting/draft/notes (server-side tenant check missing/bypassed)."
  must_be_detected_by: [AC-TEN-002]
  detection_requirement: 1.0
- fault_id: F-CROSS-TENANT-ACCEPT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A member of tenant B can accept a staged draft belonging to tenant A."
  must_be_detected_by: [AC-INV-011]
  detection_requirement: 1.0
- fault_id: F-UNAUTH-ACCEPT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "An unauthenticated caller can accept/reject a draft (missing protected() guard)."
  must_be_detected_by: [AC-INV-011]
  detection_requirement: 1.0
- fault_id: F-CAP-TOKEN-GRANTS-ACCEPT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A read-only chat-link capability token can invoke the accept route (privilege escalation)."
  must_be_detected_by: [AC-INV-012]
  detection_requirement: 1.0
- fault_id: F-SECRET-IN-LOG
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A detected secret value appears in log output / a query result (no read-path redaction)."
  must_be_detected_by: [AC-INV-008]
  detection_requirement: 1.0
- fault_id: F-FLEET-SHARED-SANDBOX-SECRET
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "Sandboxes share one fleet HS256 secret instead of a per-sandbox random secret; in-sandbox code could exfiltrate it."
  must_be_detected_by: [AC-INV-009]
  detection_requirement: 1.0
- fault_id: F-TRANSCRIPT-TO-SIDE-EFFECT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A transcript-triggered path reaches an outward side-effect (push/apply/outbound) without a human click."
  must_be_detected_by: [AC-INV-004]
  detection_requirement: 1.0
- fault_id: F-UNFENCED-TRANSCRIPT
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "The live transcript is placed unfenced into a prompt, so an injected instruction is honored."
  must_be_detected_by: [AC-INV-005]
  detection_requirement: 1.0
- fault_id: F-WORLD-TOUCHING-ALLOWED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A world-touching tool is present in allowed_tools (not disallowed_tools) on a workroom/repo query()."
  must_be_detected_by: [AC-INV-006]
  detection_requirement: 1.0
- fault_id: F-TOKEN-CACHED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A GitHub token is cached in a module/class variable and reused across operations."
  must_be_detected_by: [AC-TEN-003]
  detection_requirement: 1.0
- fault_id: F-TOKEN-LOGGED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A GitHub token value is written to logs (e.g. logging the Authorization header)."
  must_be_detected_by: [AC-TEN-003]
  detection_requirement: 1.0

# ── P0 concurrency / durability substrate ────────────────────────────────
- fault_id: F-NO-PARTIAL-UNIQUE-INDEX
  category: state_consistency
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "operation_runs lacks the partial unique index, allowing two running rows for one (scope_id, operation_type)."
  must_be_detected_by: [AC-SUB-002]
  detection_requirement: 1.0
- fault_id: F-FULL-UNIQUE-INDEX-BLOCKS-RECLAIM
  category: state_consistency
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A non-partial unique index blocks a new running row when a completed row exists (re-claim broken)."
  must_be_detected_by: [AC-SUB-003]
  detection_requirement: 1.0
- fault_id: F-FENCE-HEARTBEAT-UNGATED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "The heartbeat UPDATE omits the AND status='running' guard, so a reclaimed process still thinks it owns."
  must_be_detected_by: [AC-SUB-007]
  detection_requirement: 1.0
- fault_id: F-FENCE-IGNORES-ROWCOUNT-ZERO
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "rowcount 0 from the fencing heartbeat is ignored; is_owner stays True (zombie survives)."
  must_be_detected_by: [AC-SUB-008]
  detection_requirement: 1.0
- fault_id: F-ZOMBIE-DOUBLE-SPEAK
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A reclaimed (is_owner=False) process emits into the meeting a replacement now owns (double-speak)."
  must_be_detected_by: [AC-SUB-009]
  detection_requirement: 1.0
- fault_id: F-UNGATED-EMIT-VERB
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "One of speak/send_chat/show_screen/apply/dispatch is not gated on is_owner (a leak in the fencing net)."
  must_be_detected_by: [AC-SUB-009, AC-SUB-035]
  detection_requirement: 1.0
- fault_id: F-SHOW-SCREEN-UNGATED
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "show_screen (a §12.3 delivery-authority verb) is not gated on is_owner, so a reclaimed zombie can project to the canvas of a meeting a replacement now owns."
  must_be_detected_by: [AC-SUB-009, AC-SUB-035]
  detection_requirement: 1.0
- fault_id: F-EMIT-FRONTIER-INCOMPLETE
  category: security
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "A new outward emit/delivery/side-effect verb is added outside the is_owner-gated frontier {speak,send_chat,show_screen,apply,dispatch} (the negative frontier is not enumerated as explicitly as it is gated)."
  must_be_detected_by: [AC-SUB-035]
  detection_requirement: 1.0
- fault_id: F-CLAIM-WRONG-OWNER
  category: state_consistency
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "The atomic-claim returns null to the process that actually inserted the running row (ownership inverted)."
  must_be_detected_by: [AC-SUB-011]
  detection_requirement: 1.0
- fault_id: F-DOUBLE-JOIN-OWNER
  category: state_consistency
  criticality: P0
  mechanism: duplicate_delivery
  description: "Two concurrent join events both acquire ownership (two running rows / two harnesses for one meeting)."
  must_be_detected_by: [AC-SUB-012]
  detection_requirement: 1.0
- fault_id: F-COST-RESET-ON-RECYCLE
  category: data_integrity
  criticality: P0
  mechanism: process_termination
  description: "A recycled orchestrator resets the cost meter to 0 instead of reloading persisted spend (defeats the SLA at recovery)."
  must_be_detected_by: [AC-SUB-026]
  detection_requirement: 1.0
- fault_id: F-MEETING-COST-SCHEMA-DRIFT
  category: contract
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "meeting_cost is missing a canonical column (e.g. cache_read_usd) or meeting_id is not uuid."
  must_be_detected_by: [AC-SUB-025]
  detection_requirement: 1.0
- fault_id: F-DRAFT-IN-MEMORY-ONLY
  category: data_integrity
  criticality: P0
  mechanism: hand_authored_negative_build
  description: "propose_change keeps the draft only in the sandbox review_session (not persisted at creation)."
  must_be_detected_by: [AC-SUB-027]
  detection_requirement: 1.0
- fault_id: F-ACCEPT-READS-DEAD-SESSION
  category: data_integrity
  criticality: P0
  mechanism: process_termination
  description: "The accept-handler reads the torn-down in-memory review_session instead of the persisted draft."
  must_be_detected_by: [AC-SUB-028]
  detection_requirement: 1.0

# ── P1 substrate behavioral ──────────────────────────────────────────────
- fault_id: F-DUP-MEETING-HARNESS-TABLE
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A separate meeting_harness table is (re)introduced instead of the one operation_runs table."
  must_be_detected_by: [AC-SUB-001]
  detection_requirement: 1.0
- fault_id: F-OPRUN-COLUMN-DRIFT
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "operation_runs deviates from the canonical column set (missing pause_requested/created_by/etc.)."
  must_be_detected_by: [AC-SUB-001]
  detection_requirement: 1.0
- fault_id: F-NO-HEARTBEAT
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "with_operation_run never advances last_heartbeat_at (crash becomes undetectable)."
  must_be_detected_by: [AC-SUB-004]
  detection_requirement: 1.0
- fault_id: F-STALE-NOT-SWEPT
  category: resilience
  criticality: P1
  mechanism: clock_skew
  description: "A running row past STALE_AFTER_S is never swept to interrupted on read."
  must_be_detected_by: [AC-SUB-005]
  detection_requirement: 1.0
- fault_id: F-BOOT-SWEEP-MISSING
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "The boot-time bulk sweep is absent, leaving orphaned running rows after boot."
  must_be_detected_by: [AC-SUB-006]
  detection_requirement: 1.0
- fault_id: F-PAUSE-IGNORED
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "pause_requested=true is not surfaced by check_pause(); the build cannot be paused/aborted."
  must_be_detected_by: [AC-SUB-010]
  detection_requirement: 1.0
- fault_id: F-BROKER-COORDINATION
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "Cross-process coordination uses an in-memory lock or a broker (Redis/RabbitMQ) instead of a Postgres claim."
  must_be_detected_by: [AC-SUB-013]
  detection_requirement: 1.0
- fault_id: F-CRITICAL-SECTION-UNLOCKED
  category: state_consistency
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A per-meeting critical section runs without pg_advisory_xact_lock or leaks work off the locked connection."
  must_be_detected_by: [AC-SUB-014]
  detection_requirement: 1.0
- fault_id: F-MANAGEDRESOURCE-FSM
  category: contract
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "A ManagedResource provisioning/running/stopped/failed state machine is (re)introduced for sandboxes."
  must_be_detected_by: [AC-SUB-015]
  detection_requirement: 1.0
- fault_id: F-SANDBOX-LEAK
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A sandbox is not bounded (no E2B timeout, or no destroy on meeting-end, or reconcile doesn't kill past-TTL)."
  must_be_detected_by: [AC-SUB-016]
  detection_requirement: 1.0
- fault_id: F-WARM-POOL
  category: contract
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "A warm pool of idle sandboxes is maintained instead of join/creation-event pre-provision."
  must_be_detected_by: [AC-SUB-017]
  detection_requirement: 1.0
- fault_id: F-RECONCILE-NO-TOKEN
  category: security
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "POST /internal/reconcile is reachable without the internal token."
  must_be_detected_by: [AC-SUB-018]
  detection_requirement: 1.0
- fault_id: F-RECONCILE-NONIDEMPOTENT
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "run_reconcile_sweep() is not idempotent (a second run changes end state)."
  must_be_detected_by: [AC-SUB-018]
  detection_requirement: 1.0
- fault_id: F-STT-REFRESH-ON-CRON
  category: resilience
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "An availability-critical loop (STT cred refresh) is placed on the scale-to-zero reconcile cron."
  must_be_detected_by: [AC-SUB-019]
  detection_requirement: 1.0
- fault_id: F-REBUILD-EXISTING-DELIVERABLE
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A workroom task is rebuilt even though the SQL completion check shows its deliverable exists."
  must_be_detected_by: [AC-SUB-020]
  detection_requirement: 1.0
- fault_id: F-HARNESS-RESUME-DEAD-SESSION
  category: resilience
  criticality: P1
  mechanism: process_termination
  description: "A crashed harness attempts to resume the dead media session instead of restart-not-resume."
  must_be_detected_by: [AC-SUB-021]
  detection_requirement: 1.0
- fault_id: F-WEBHOOK-NO-DEDUP
  category: data_integrity
  criticality: P1
  mechanism: duplicate_delivery
  description: "A duplicate delivery_guid is processed twice (missing ON CONFLICT DO NOTHING)."
  must_be_detected_by: [AC-SUB-022]
  detection_requirement: 1.0
- fault_id: F-WEBHOOK-PROCESS-BEFORE-200
  category: resilience
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "The webhook is processed synchronously before returning 200 (no durable land-then-drain)."
  must_be_detected_by: [AC-SUB-023]
  detection_requirement: 1.0
- fault_id: F-MEETING-EVENTS-BUS
  category: contract
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "A general meeting_events bus/table is introduced beyond webhook_events."
  must_be_detected_by: [AC-SUB-024]
  detection_requirement: 1.0
- fault_id: F-WORKROOM-TASKS-TABLE
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A workroom_tasks table is created instead of reusing operation_runs."
  must_be_detected_by: [AC-SUB-029]
  detection_requirement: 1.0
- fault_id: F-CLOSE-JOBS-TABLE
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A close_jobs table is created instead of reusing operation_runs (operation_type='meeting-close')."
  must_be_detected_by: [AC-SUB-029]
  detection_requirement: 1.0
- fault_id: F-IDENTITY-SCHEMA-DRIFT
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "An identity table is missing / drifts (e.g. meetings.pinned_sha absent, status enum wrong, tenant_id missing)."
  must_be_detected_by: [AC-SUB-030]
  detection_requirement: 1.0
- fault_id: F-UNSIGNED-SESSION
  category: security
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "An unsigned/forgeable session cookie is accepted by resolve_session."
  must_be_detected_by: [AC-SUB-031]
  detection_requirement: 1.0
- fault_id: F-BINDING-BOT-ID-UNRESOLVED
  category: functional
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A Recall webhook's bot_id cannot be resolved back to a meetings row (binding broken)."
  must_be_detected_by: [AC-SUB-032]
  detection_requirement: 1.0
- fault_id: F-COST-WRITER-MISSING
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "One cost writer (Scribe direct, or the seam meter) does not increment model_usd / omits the cache split."
  must_be_detected_by: [AC-SUB-033]
  detection_requirement: 1.0
- fault_id: F-TRANSCRIPT-STATUS-DEFAULT
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "transcript_segments.status defaults to 'comprehended' instead of 'pending' (the linchpin)."
  must_be_detected_by: [AC-SUB-034]
  detection_requirement: 1.0
- fault_id: F-NONATOMIC-COMPREHEND
  category: data_integrity
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "The flip to 'comprehended' is committed separately from the note-delta append (non-atomic)."
  must_be_detected_by: [AC-SUB-034]
  detection_requirement: 1.0

# ── Contracts / composition ──────────────────────────────────────────────
- fault_id: F-EXTRA-DEPLOYABLE
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A fourth deployable or a per-service network service is introduced beyond the three deployables."
  must_be_detected_by: [AC-CMP-001]
  detection_requirement: 1.0
- fault_id: F-BUNDLE-EMBEDS-NOTES
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "Bundle embeds the serialized notes object instead of notes_ref (a UUID handle)."
  must_be_detected_by: [AC-CMP-002]
  detection_requirement: 1.0
- fault_id: F-ENVELOPE-STATUS-VERIFIED
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "EnvelopeStatus includes 'verified' or 'draft' as a status member."
  must_be_detected_by: [AC-CMP-003]
  detection_requirement: 1.0
- fault_id: F-CHUNK-KIND-DISCRIMINATOR
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "AgentChunk uses '.kind' as the discriminator or drops/adds a ChunkType member."
  must_be_detected_by: [AC-CMP-004]
  detection_requirement: 1.0
- fault_id: F-DOUBLE-STREAM-DELTAS
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "stream_deltas is applied a second time downstream (double-wrap) or a consumer reads raw AgentChunk."
  must_be_detected_by: [AC-CMP-005]
  detection_requirement: 1.0
- fault_id: F-NOTEOP-HAS-NOTE
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "NoteOp includes 'note' (should be folded into 'add')."
  must_be_detected_by: [AC-CMP-006]
  detection_requirement: 1.0
- fault_id: F-READINESS-HAS-MAPPING
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "Readiness includes 'mapping' (the agentic map is deferred)."
  must_be_detected_by: [AC-CMP-007]
  detection_requirement: 1.0
- fault_id: F-DM-FIELD-NAME
  category: contract
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "channel-report uses 'dm?' / 'dm-available?' instead of dm_available."
  must_be_detected_by: [AC-CMP-008]
  detection_requirement: 1.0
- fault_id: F-ORPHAN-CONTRACT-FIELD
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A contract field is produced but consumed by no side (field-contract check must fail)."
  must_be_detected_by: [AC-CMP-009]
  detection_requirement: 1.0
- fault_id: F-REDEFINED-SHARED-MECHANISM
  category: contract
  criticality: P1
  mechanism: static
  description: "dispatch()/AbortRegistry/resume_with_fallback/provider-seam is re-implemented in a service instead of imported."
  must_be_detected_by: [AC-CMP-010]
  detection_requirement: 1.0
- fault_id: F-SIGNAL-IN-CLIENT-REGISTRY
  category: contract
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "A Doc 02 signal-surface event is placed in the client ProxyMessage registry (assert_registry_closed would over-demand a consumer)."
  must_be_detected_by: [AC-CMP-011]
  detection_requirement: 1.0
- fault_id: F-ENVELOPE-SHAPE-DRIFT
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "The Envelope model drifts from {headline,detail,artifact,receipts,status,verification,draft_id,task_id} (e.g. verification collapsed into status, task_id not UUID, or a field missing/added)."
  must_be_detected_by: [AC-CMP-012]
  detection_requirement: 1.0
- fault_id: F-RESULT-METADATA-MISSING-COST
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "The AgentChunk RESULT variant omits total_cost_usd from metadata (or a variant's metadata keys drift), so the cost meter cannot read spend off the stream."
  must_be_detected_by: [AC-CMP-013]
  detection_requirement: 1.0
- fault_id: F-YAML-BEHAVIOR-REGISTRY
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A YAML behavior registry / loader / schema is (re)introduced instead of typed Python BehaviorConfig constants."
  must_be_detected_by: [AC-CMP-014]
  detection_requirement: 1.0

# ── Repository structure ─────────────────────────────────────────────────
- fault_id: F-MULTIPLE-LOCKFILES
  category: deployment
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A per-package lockfile is added (violates the single shared uv.lock)."
  must_be_detected_by: [AC-REPO-001]
  detection_requirement: 1.0
- fault_id: F-FLAT-LAYOUT
  category: deployment
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "A package uses flat-layout instead of src-layout."
  must_be_detected_by: [AC-REPO-002]
  detection_requirement: 1.0
- fault_id: F-MULTI-REQUIRES-PYTHON
  category: deployment
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "Two distinct requires-python values exist across the workspace."
  must_be_detected_by: [AC-REPO-003]
  detection_requirement: 1.0
- fault_id: F-UNDECLARED-DEP
  category: deployment
  criticality: P2
  mechanism: hand_authored_negative_build
  description: "A member imports a package it did not declare as an explicit dependency."
  must_be_detected_by: [AC-REPO-004]
  detection_requirement: 1.0
- fault_id: F-EDITABLE-PROD-IMAGE
  category: deployment
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "A production image is built with an editable install (missing --no-editable/--package)."
  must_be_detected_by: [AC-REPO-005]
  detection_requirement: 1.0
- fault_id: F-WRONG-SERVICES-SET
  category: contract
  criticality: P1
  mechanism: hand_authored_negative_build
  description: "services/ is missing a mechanism package or adds an extra one."
  must_be_detected_by: [AC-REPO-006]
  detection_requirement: 1.0
