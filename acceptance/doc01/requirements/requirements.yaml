  authority_type: specification
  authority_document: DOC-01
  source_location: "§3.2 paragraph 2 / §3.8 build step 2 (provable)"
  source_quote: "so huge repos clone in minutes and git blame still works (we never use shallow clones; they break history). ... Provable: file set == git ls-files; git blame resolves on a large repo."
  normalized_statement: >
