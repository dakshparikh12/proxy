    artifact: "Patched propose_change; assert staged_drafts count == 0 after call"
  thresholds: {}
  dependency_class: db:postgres
  mock_boundary: "Postgres fixture with patched propose_change"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-012-NEG]

- criterion_id: AC-S8-013
  name: "meeting_id stored as native UUID type in staged_drafts, not a varchar or string"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-17]
  criticality: P0
  blocking: true
  behavior:
    given: "The Alembic migration that defines the staged_drafts table"
    when: "The column definition for meeting_id is inspected"
    then:
      - "The meeting_id column has data type UUID (PostgreSQL uuid type), not VARCHAR, TEXT, or CHAR"
      - "No string-coercion of meeting_id occurs in the INSERT path of propose_change (uuid.UUID objects passed directly)"
  primary_oracle:
    type: static_analysis
    artifact: "grep the staged_drafts Alembic migration: assert meeting_id column type is sa.UUID or equivalent; AST scan of propose_change INSERT: assert meeting_id value is uuid.UUID instance not str()"
  thresholds: {meeting_id_stored_as_string: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-013]

- criterion_id: AC-S8-014
  name: "Bundle survives sandbox teardown: acceptance succeeds after the originating sandbox is gone"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S8-13, R-doc05-S8-19]
  criticality: P0
  blocking: true
  behavior:
    given: "A propose_change call that produces draft_id=D and persists the bundle"
    when: "The E2B sandbox that served the call is torn down, then the accept handler is invoked with draft_id=D"
    then:
      - "The accept handler reads the GCS bundle successfully using draft_id=D (no in-memory state required)"
      - "The acceptance completes and records approval in the staged_drafts row"
      - "No error refers to missing in-memory state or dead session"
  primary_oracle:
    type: deterministic
    artifact: "Integration test: call propose_change via test double; teardown sandbox; call accept handler with returned draft_id; assert GCS read succeeds; assert staged_drafts row updated to status='approved'"
  thresholds: {acceptance_failures_due_to_missing_in_memory_state: 0}
  dependency_class: gcs:objects
  mock_boundary: "GCS client using real GCS or in-process object store; Postgres fixture; sandbox lifecycle controlled by test"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-014]

- criterion_id: AC-S8-014-NEG
