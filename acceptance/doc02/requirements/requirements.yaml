  source_quote: 'any human speech onset during Proxy speech = stop TTS mid-word + flush the queue ... TTS is streamed to Output Media in small chunks, deliberately, so barge-in is not defeated by a large already-buffered stretch of audio.'
  normalized_statement: 'WHILE an audible ack is in flight as voice THE SYSTEM SHALL treat it as ordinary voice output: a human speech onset SHALL stop it mid-word and flush within the barge-in budget ([<200ms]); the latency-privileged ack gets NO barge-in exemption. IF firing the ack THE SYSTEM SHALL NOT block, delay, or extend the barge-in stop path — a flush drops at most one small in-flight chunk (small-chunk Output-Media buffer).

