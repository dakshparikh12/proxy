# System Model — Doc 01 Code Intelligence
# Per GENERATOR.md §5.1
# Generated: 2026-07-17

---

public_inputs:
  - id: IN-WEBHOOK-PUSH
    description: "GitHub push webhook (HMAC-signed HTTP POST)"
    trust_level: untrusted
    validation: HMAC signature + delivery-GUID deduplication
  - id: IN-WEBHOOK-INSTALL
    description: "GitHub App installation event"
    trust_level: untrusted
    validation: HMAC signature
  - id: IN-WEBHOOK-UNINSTALL
    description: "GitHub App uninstall event"
    trust_level: untrusted
    validation: HMAC signature
  - id: IN-TOOL-CALL
    description: "MCP tool invocation from agent (get_dependents, who_writes, shares_table, list_entry_points, owner, batch_read, lookup_referent, find_references)"
    trust_level: tenant-authenticated
    validation: per-tenant authorization, arg schema validation
  - id: IN-MEETING-START
    description: "Meeting session initialization (triggers reconcile + pin)"
    trust_level: tenant-authenticated
    validation: tenant identity, repo reference

public_outputs:
  - id: OUT-TOOL-RESULT
    description: "Structured MCP tool response (JSON, schema-validated)"
  - id: OUT-READINESS
    description: "Canonical Readiness enum: connecting|cloning|indexing|ready|not_ready"
  - id: OUT-COVERAGE-RECORD
    description: "File-coverage rows: {path, status: indexed|flagged, flag_reason}"
  - id: OUT-MID-MEETING-NOTICE
    description: "Notification when repo advances N commits during active meeting"

persistent_stores:
  - id: STORE-TENANT-VOLUME
    description: "Per-tenant encrypted persistent volume at /tenants/<tenant>/repos/<repo>/"
    scope: tenant-isolated
    mutable: true
    irreversible_actions: [clone, delete-on-uninstall]
  - id: STORE-SQLITE-GRAPH
    description: "Per-repo SQLite file holding the dependency graph (nodes, edges, PageRank scores)"
    scope: per-repo, tenant-isolated
    mutable: true
    irreversible_actions: [drop-and-rebuild]
  - id: STORE-SQLITE-COVERAGE
    description: "Per-repo SQLite file holding the file-coverage record (indexed + flagged rows)"
    scope: per-repo, tenant-isolated
    mutable: true
  - id: STORE-MEETINGS-PIN
    description: "meetings.pinned_sha: the single commit SHA a session answers at"
    scope: per-meeting, tenant-isolated
    mutable: false-after-pin

mutable_state:
  - id: STATE-READINESS
    description: "Readiness enum per repo: connecting -> cloning -> indexing -> ready | not_ready"
    transitions:
      - connecting -> cloning
      - cloning -> indexing
      - indexing -> ready
      - indexing -> not_ready
      - ready -> indexing  # triggered by push reconcile
  - id: STATE-EXCLUSION-SET
    description: "Set of paths excluded from indexing (gitleaks hits + policy globs); rebuilt after every pull"
    mutable: true
  - id: STATE-MEETING-CACHE
    description: "Per-meeting in-memory (tool, args) -> result cache; invalidated on push webhook"
    mutable: true
    scope: per-meeting, ephemeral
  - id: STATE-GRAPH-VERSION-INDEX
    description: "Light SQLite index mapping pinned_sha -> graph version; GC when no live meeting pins"
    mutable: true

asynchronous_jobs:
  - id: JOB-CLONE
    description: "Initial repo clone (full or blobless depending on file count threshold)"
    triggered_by: [IN-WEBHOOK-INSTALL]
    produces: [STORE-TENANT-VOLUME, STORE-SQLITE-GRAPH, STORE-SQLITE-COVERAGE]
  - id: JOB-PULL-DELTA
    description: "Git delta pull on push webhook; never re-clone"
    triggered_by: [IN-WEBHOOK-PUSH]
    produces: [STORE-SQLITE-GRAPH, STORE-SQLITE-COVERAGE]
  - id: JOB-GRAPH-REBUILD
    description: "Full graph drop + re-extract all rows after every relevant pull"
    triggered_by: [JOB-PULL-DELTA, JOB-RECONCILE]
    produces: [STORE-SQLITE-GRAPH]
  - id: JOB-GITLEAKS-SCAN
    description: "Runs gitleaks on changed files after clone or delta pull; builds exclusion set"
    triggered_by: [JOB-CLONE, JOB-PULL-DELTA]
    produces: [STATE-EXCLUSION-SET]
  - id: JOB-RECONCILE
    description: "ls-remote vs local tip check at meeting start; pulls drift + rebuilds if needed"
    triggered_by: [IN-MEETING-START]
    produces: [STATE-READINESS, STORE-MEETINGS-PIN]
  - id: JOB-DELETE-ON-UNINSTALL
    description: "Hard-delete clone, index, graph, snapshots within 15 min of uninstall"
    triggered_by: [IN-WEBHOOK-UNINSTALL]
    irreversible: true
    deadline_s: 900

queues_and_event_streams:
  - id: QUEUE-WEBHOOK
    description: "Durable, deduplicated webhook queue (delivery-GUID + commit SHA)"
    deduplication_key: "delivery-GUID + commit SHA"

caches:
  - id: CACHE-MEETING-TOOL
    description: "Per-meeting in-memory cache keyed on (tool, args); invalidated on repo push"
    scope: per-meeting
    invalidation_trigger: push webhook for that repo

external_dependencies:
  - id: EXT-NANGO
    description: "Nango credential store — mints short-lived GitHub installation tokens"
    failure_modes: [timeout, unavailable, invalid-token]
  - id: EXT-GITHUB-API
    description: "GitHub API (ls-remote, webhook delivery)"
    failure_modes: [timeout, rate-limit, 4xx, 5xx]
  - id: EXT-LSP-SERVER
    description: "Host-side language server (Serena/solid-lsp); kept warm for large repos"
    failure_modes: [timeout-3s, crash, unsupported-language]
    timeout_s: 3
    fallback: grep tagged lower-bound

trust_boundaries:
  - id: TB-TENANT
    description: "Each tenant's data (volume, process, index, graph) is isolated from all other tenants"
    enforcement: [per-tenant volume path, per-tenant DB files, per-tenant process]
  - id: TB-REPO-EXEC
    description: "Canonical clone MUST NOT execute repository code; no push to upstream"
  - id: TB-NANGO-TOKEN
    description: "GitHub tokens minted per-operation; never cached; never logged"
  - id: TB-EXCLUSION
    description: "Excluded paths never cross into index, graph, results, sandbox, or logs"
  - id: TB-SANDBOX
    description: "find_references and LSP tools absent from E2B sandbox manifest"

authentication_authorization_boundaries:
  - id: AUTH-GITHUB-APP
    description: "GitHub App installation grants contents:read + metadata:read only"
  - id: AUTH-NANGO
    description: "Nango holds App credentials; tokens are short-lived"
  - id: AUTH-TENANT-TOOL-CALL
    description: "Tool calls are bound to one tenant; cross-tenant dispatch is forbidden"

tenant_boundaries:
  - id: TENANT-VOLUME
    description: "/tenants/<tenant>/ — separate encrypted volume per tenant"
  - id: TENANT-PROCESS
    description: "No shared process between tenants"
  - id: TENANT-INDEX
    description: "SQLite files are per-tenant; no shared index"

secret_bearing_paths:
  - id: SBP-GITHUB-TOKEN
    description: "Installation tokens from Nango — must not be logged, cached, or returned in tool output"
  - id: SBP-GITLEAKS-HITS
    description: "Detected secret values in source files — redacted at read path; excluded from index/graph/results/logs"
  - id: SBP-NANGO-CREDS
    description: "Nango App credentials — stored in Nango/Secret Manager, never in application logs"

irreversible_or_consequential_actions:
  - id: ICA-CLONE
    description: "First clone acquires tenant volume space and external network access"
  - id: ICA-DELETE-ON-UNINSTALL
    description: "Hard-delete of clone, index, graph, snapshots — unrecoverable"
  - id: ICA-GRAPH-REBUILD
    description: "Full drop + re-extract of graph rows — replaces all prior graph state"

cancellation_points:
  - id: CP-LSP-TIMEOUT
    description: "LSP call cancelled at lsp_timeout_s (3s); hung server restarted"
  - id: CP-UNINSTALL
    description: "In-progress clone or rebuild cancellable on uninstall webhook"

recovery_and_retry:
  - id: RR-LSP-RESTART
    description: "Hung LSP server is restarted; caller receives grep fallback tagged lower-bound"
  - id: RR-WEBHOOK-DEDUP
    description: "Duplicate or late webhooks rejected by delivery-GUID + commit SHA"
  - id: RR-RECONCILE
    description: "Meeting-start reconcile recovers from missed push webhooks"

deployment_environments:
  - id: ENV-PROD
    description: "Production: real tenant repos, real GitHub App, encrypted volumes"
  - id: ENV-TEST-FIXTURE
    description: "Test harness: committed fixture repos, controlled clock, injected faults"
  - id: ENV-ESTATE
    description: "Real-estate eval: pinned public repos run through the pipeline"

resource_and_scale_dimensions:
  - id: SCALE-BLOBLESS-THRESHOLD
    description: "~100k files triggers blobless clone (--filter=blob:none)"
  - id: SCALE-LSP-WARMUP-THRESHOLD
    description: "~500k LOC triggers warm LSP keep-alive"
  - id: SCALE-READY-DEADLINE
    description: "Pilot-scale repo must reach ready within 15 minutes of connect"
  - id: SCALE-UNINSTALL-DEADLINE
    description: "Clone + index + graph deleted within 15 minutes of uninstall"
  - id: SCALE-BATCH-READ-MAX
    description: "batch_read reads at most 10 files per call"
  - id: SCALE-GET-DEPENDENTS-LIMIT
    description: "get_dependents default cap = 50; returns truncated_count"
