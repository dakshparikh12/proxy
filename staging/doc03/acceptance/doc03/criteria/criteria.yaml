# fail_cost.criteria.yaml — Doc 03 (Notes / Scribe) · §3.8 Failure honesty + §3.9 Cost telemetry
# Acceptance criteria. Oracles: DB state assertions, log/metric checks, arithmetic fixtures,
# UPSERT replay, cache-hit ratio probes, alert emission checks.
# ID scheme: AC-FAIL-NN (§3.8), AC-COST-NN (§3.9).
# authority_refs point at R-doc03-FAIL-NN / R-doc03-COST-NN in fail_cost.requirements.yaml.
#
# dependency_class rules:
#   null        → zero external systems (pure logic / arithmetic)
#   db:postgres → Postgres meeting_cost or transcript_segments touched
# golden_path: false for all (failure honesty and cost telemetry are infrastructure)
# Every non-null dependency_class criterion has a paired AC-FAIL-NN-NEG or AC-COST-NN-NEG.

# ═══════════════════════════════════════════════════════════════════════════════
# §3.8 FAILURE HONESTY
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# SKIP-NOT-RETRY — failed window produces zero retry calls
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FAIL-01
  name: "Failed Scribe call is skipped (zero retries, consumer continues)"
  evidence_class: "[simulation]"
  authority_refs: [R-doc03-FAIL-01]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit, negative]
  behavior:
    given: >
      A Scribe consumer processing a transcript window; the messages.create call for
      that window is injected to return a 500 Internal Server Error
    when:  "The Scribe pipeline handles the injected failure"
    then:
      - "Exactly zero retry calls are issued for the failed window (messages.create call count for that window stays at 1)"
      - "The consumer does not hang or raise an unhandled exception"
      - "The consumer proceeds to accept the next transcript window after recording the gap"
  primary_oracle:
    type: call_count_and_lifecycle_assertion
    artifact: >
      inject 500 on messages.create via cassette or mock transport;
      assert messages.create call count for failed window == 1 (the original attempt);
      assert no second messages.create call with same window content;
      assert consumer task is alive and processes a subsequent synthetic window
  thresholds:
    retry_calls_per_failed_window_allowed: 0
    consumer_crashes_allowed: 0

- criterion_id: AC-FAIL-01-NEG
  name: "Scribe failure on every window does not stall the consumer indefinitely"
  evidence_class: "[simulation]"
  authority_refs: [R-doc03-FAIL-01]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit, negative]
  behavior:
    given: "A Scribe consumer where every messages.create call is injected to fail with a 503"
    when:  "Ten consecutive windows arrive and all fail"
    then:
      - "The consumer processes all ten windows without blocking (skip, not stall)"
      - "Exactly ten gap records are produced (one per failed window)"
      - "No retry calls are issued for any window"
  primary_oracle:
    type: bulk_failure_trace_assertion
    artifact: >
      inject 503 on all messages.create calls; drive 10 synthetic windows;
      assert gap_records_written == 10; assert total messages.create calls == 10;
      assert consumer task exits normally or awaits next window
  thresholds:
    gap_records_per_failed_window: 1
    retry_calls_allowed: 0

# ─────────────────────────────────────────────────────────────────────────────
# GAP RECORD CONTENT — time span + "transcript preserved" required
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FAIL-02
  name: "Gap record in transcript_segments contains time span and 'transcript preserved'"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-FAIL-02]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration]
  behavior:
    given: >
      A Scribe call fails for the window spanning 14:03–14:05 (meeting-relative timestamps);
      the consumer records the gap to the transcript_segments table
    when:  "The gap row is inspected in transcript_segments"
    then:
      - "The row has status='gap'"
      - "The row's gap_description (or equivalent text field) contains both the start timestamp ('14:03') and the end timestamp ('14:05')"
      - "The row's gap_description contains the literal phrase 'transcript preserved'"
      - "No other row for the same window has status='comprehended' or status='pending'"
  primary_oracle:
    type: db_row_content_assertion
    artifact: >
      insert test meeting; inject failure for 14:03–14:05 window; query transcript_segments
      WHERE meeting_id=X AND window_start covers 14:03; assert status=='gap';
      assert 'transcript preserved' in gap_description; assert start+end timestamps present
  thresholds:
    gap_rows_missing_transcript_preserved_phrase_allowed: 0
    gap_rows_missing_timestamps_allowed: 0

- criterion_id: AC-FAIL-02-NEG
  name: "A successful Scribe call on the same window does NOT produce a gap row"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-FAIL-02]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration, negative]
  behavior:
    given: "A Scribe call that succeeds (returns a valid structured delta) for a window"
    when:  "transcript_segments is queried for that window after processing"
    then:
      - "No row with status='gap' exists for the successfully-processed window"
      - "The row for the window has status='comprehended'"
  primary_oracle:
    type: db_negative_row_assertion
    artifact: >
      drive a successful Scribe call (cassette-backed); query transcript_segments for that window;
      assert count(rows WHERE status='gap') == 0; assert status=='comprehended'
  thresholds:
    spurious_gap_rows_on_success_allowed: 0

# ─────────────────────────────────────────────────────────────────────────────
# RAW TRANSCRIPT PRESERVATION — bytes not deleted on failure
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FAIL-03
  name: "Raw transcript bytes are retained in transcript_segments after a Scribe failure"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-FAIL-03]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration]
  behavior:
    given: >
      A transcript window with known speaker text ("Alice: the retry logic needs rework")
      is inserted into transcript_segments before the Scribe call; the Scribe call for
      that window then fails
    when:  "transcript_segments is queried after the gap is recorded"
    then:
      - "The row for the failed window still has its raw_transcript field populated with the original content"
      - "The raw_transcript content is byte-for-byte identical to the pre-failure insert"
      - "No UPDATE or DELETE on raw_transcript has occurred as a result of the failure"
  primary_oracle:
    type: db_field_preservation_assertion
    artifact: >
      record SHA-256 of raw_transcript before injecting failure; inject failure; re-query;
      assert SHA-256 of raw_transcript after failure equals pre-failure hash;
      assert row count for the window has not decreased
  thresholds:
    raw_transcript_mutation_events_on_failure_allowed: 0

- criterion_id: AC-FAIL-03-NEG
  name: "raw_transcript is not nulled or truncated by the gap-recording path"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-FAIL-03]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration, negative]
  behavior:
