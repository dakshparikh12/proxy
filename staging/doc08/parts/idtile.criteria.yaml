    then:
      - "The error is surfaced to the caller as a structured failure (not a silent empty audio)"
      - "No fallback voice or alternative TTS provider is silently substituted"
      - "Retry + cost telemetry are triggered per the call_external contract"
  primary_oracle: {type: deterministic, artifact: "negative cassette at call_external layer simulating 503; assert error propagated, no fallback voice selected"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-IDTILE-005-NEG]
  dependency_class: vendor:cartesia
  mock_boundary: "negative cassette / real fault at seam only; MUST NOT replace the call_external seam with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

