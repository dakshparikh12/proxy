- requirement_id: R-doc05-S5-33
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.5 paragraph 4 (Disposition curated subsets)"
  source_quote: "Write/propose_change block goes through disallowed_tools (allowed_tools does NOT filter MCP tools — SDK design)."
  normalized_statement: >
    WHEN write tools or propose_change must be blocked for a given disposition THE
    SYSTEM SHALL place them in disallowed_tools; omitting them from allowed_tools
    alone is insufficient because the Claude SDK does not filter MCP tools via
    allowed_tools.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ─────────────────────────────────────────────────────────────────────────────
# token_provider — cached re-mint
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc05-S5-34
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.5 paragraph 5 (token_provider)"
  source_quote: "Mint HS256 JWT {session_id, issued_at} with short TTL, cache it, re-mint only once within ~5-min margin of exp (read exp from token itself — no TTL duplication)."
  normalized_statement: >
    WHEN token_provider is called THE SYSTEM SHALL return a cached HS256 JWT
    containing session_id and issued_at claims if the cached token's exp claim is
    more than approximately 5 minutes in the future; otherwise THE SYSTEM SHALL
    transparently re-mint a new JWT; the expiry decision SHALL be derived solely
    from parsing the cached token's exp claim with no separate TTL constant.
  requirement_type: security
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc05-S5-35
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.5 paragraph 5 (token_provider)"
  source_quote: "always_load calls token_provider() at registration; long runs never hit expiry."
  normalized_statement: >
    WHEN a Workroom session runs for an extended duration (beyond a single JWT TTL)
    THE SYSTEM SHALL ensure that token_provider transparently re-mints the JWT
    before expiry so that no tool call ever fails with a 401 due to an expired
    token during the session.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified
