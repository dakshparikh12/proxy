# ── One Generic Runner — No Per-Behavior Code Branches ────────────────────────

- criterion_id: AC-BHVR-003
  name: "BehaviorRunner.run() contains no per-behavior conditional branches"
  evidence_class: "[unit-structural]"
  authority_refs: [R-doc04-BHVR-04, R-doc04-BHVR-05]
  criticality: P0
  blocking: true
  behavior:
    given: "The BehaviorRunner class source is available for static analysis"
    when: "The AST of BehaviorRunner.run() and all methods it calls are inspected for behavior-name comparisons"
    then:
      - "No if/elif/match branch tests behavior_name against a string literal or enum value"
      - "The only name-based access is a dict lookup: self._registry[behavior_name]"
      - "All behaviors execute through the identical code path post-lookup"
  primary_oracle:
    type: deterministic
    artifact: "AST walk of BehaviorRunner — assert zero ast.Compare or ast.Match nodes where a comparator is a behavior name string literal"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BHVR-003]
  dependency_class: null
  mock_boundary: null
