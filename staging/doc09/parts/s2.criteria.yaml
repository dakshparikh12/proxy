- criterion_id: AC-S2-008
  name: "meeting_cost and staged_drafts rows survive a SIGKILL and are readable by replacement"
  evidence_class: "[integration]"
  authority_refs: [R-doc09-S2-06, R-doc09-S2-07]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A meeting is in progress; meeting_cost and staged_drafts rows have been
      written to Postgres; the owning process receives SIGKILL
    when: "A replacement process re-claims the meeting and reads the Postgres rows"
    then:
      - "Both meeting_cost and staged_drafts rows are present and intact"
      - "All cost columns (model_usd, transport_usd, e2b_usd) retain their pre-kill values — none is reset to 0"
      - "The replacement process can read the draft artifact_ref without error"
  primary_oracle: {type: deterministic_state_check, artifact: "After SIGKILL: SELECT model_usd, transport_usd, e2b_usd FROM meeting_cost WHERE meeting_id=X; assert all equal pre-kill values; SELECT * FROM staged_drafts WHERE meeting_id=X; assert row count unchanged"}
  thresholds: {rows_lost: 0, cost_reset_to_zero_violations: 0, violations_allowed: 0}
  fault_model_refs: [F-S2-008]
  test_ids: [T-S2-008]
  dependency_class: db:postgres
  mock_boundary: >
    may use a real Postgres test database (asyncpg pool against a local or
    containerised Postgres); MUST NOT mock the INSERT/SELECT path or replace
    the asyncpg pool with an in-memory stub — the real persistence path must execute.
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S2-008

- criterion_id: AC-S2-008-NEG
  name: "meeting_cost write degrades honestly when Postgres is unreachable"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S2-06]
  criticality: P1
  blocking: true
  behavior:
    given: "Postgres is unreachable (connection refused or timeout) during a meeting_cost or staged_drafts write"
    when: "The write is attempted"
    then:
      - "The operation raises a structured error rather than silently succeeding"
      - "No partial or phantom row is left in the database"
      - "The caller receives an honest failure indication (exception or error envelope), not a false success"
  primary_oracle: {type: deterministic_state_check, artifact: "Inject Postgres connection-refused at the asyncpg pool; assert write raises; assert no row materialises in the table"}
  thresholds: {silent_failures_allowed: 0, phantom_rows_allowed: 0}
  fault_model_refs: [F-S2-008-NEG]
  test_ids: [T-S2-008-NEG]
  dependency_class: db:postgres
  mock_boundary: >
    negative cassette only: inject a real connection-refused or asyncpg
    OperationalError at the call_external/asyncpg layer; MUST NOT replace the
    asyncpg pool object with Mock() — the real error path must execute.
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S2-008-NEG
