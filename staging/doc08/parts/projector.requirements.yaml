# projector.requirements.yaml — Doc 08 Behavior · §4.5
# Streaming render frames + the per-channel projector (pure rendering, tools are the delivery authority)
# Source: product/v0-spec/08-BEHAVIOR.md §4.5 (CANONICAL §1.1 / §11.3 / §12.3); AMENDMENT C2 2026-07-17
# ID scheme: R-doc08-PROJ-NN
#
# Scope: ChannelProjector event routing (TOOL_USE → VoiceSpeak / ResponseChunk / CanvasPatch / ToolStart;
#        TOOL_RESULT structured → CanvasPatch; TEXT/INIT/ERROR/RESULT → not projected);
#        stream_deltas applied exactly once; field discriminator invariants; carry_turn ordering;
#        conn.ready guard; serialization via model_dump(); ProxyMessage registration;
#        projector-must-not rules (no auto-headline, no channel-decision, no re-accumulation).
# NOT in scope here: BehaviorRunner.run() internals beyond stream_deltas call-site; cost meter;
#        transcript logger; canvas layout (§2.5); TTS synthesis downstream of VoiceSpeak;
#        barge-in wire (Doc 02).

# ── stream_deltas applied exactly once ──────────────────────────────────────────

- requirement_id: R-doc08-PROJ-01
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, sentence 1"
  source_quote: "stream_deltas is applied exactly once, inside BehaviorRunner.run() (Doc 04); every downstream consumer — the projector, the cost meter, the transcript logger — receives deltas and MUST NOT re-wrap"
  normalized_statement: >
    THE SYSTEM SHALL call stream_deltas exactly once, inside BehaviorRunner.run(), and SHALL
    NOT call stream_deltas again in any downstream consumer (projector, cost meter, transcript
    logger, or carry_turn); static analysis SHALL confirm a single call-site.
  requirement_type: constraint
  criticality: P0
  testability: executable
  status: qualified

# ── chunk.text is already a true delta ──────────────────────────────────────────

- requirement_id: R-doc08-PROJ-02
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, sentence 2"
  source_quote: "On that delta stream chunk.text is already a true delta, forwarded as-is and never re-accumulated."
  normalized_statement: >
    WHEN the projector receives a chunk OVER THE DELTA STREAM, THE SYSTEM SHALL forward
    chunk.text as-is to the frame payload and SHALL NOT accumulate, concatenate, or buffer
    chunk.text values across multiple chunks; chunk.text is always a delta, never a running total.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

# ── Field discriminator: chunk.type, not .kind ──────────────────────────────────

- requirement_id: R-doc08-PROJ-03
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, sentence 3"
  source_quote: "Field access is chunk.type (the discriminator — never .kind)"
  normalized_statement: >
    THE SYSTEM SHALL use chunk.type as the sole discriminator field when routing AgentChunk
    events in ChannelProjector.project(), and SHALL NEVER access chunk.kind; any reference
    to the .kind attribute in projector or carry_turn source SHALL be a build error.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ── Field access: chunk.metadata["name"] for TOOL_USE name ────────────────────

- requirement_id: R-doc08-PROJ-04
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, sentence 3"
  source_quote: "chunk.metadata[\"name\"] for a TOOL_USE (never .tool)"
  normalized_statement: >
    WHEN the projector processes a TOOL_USE chunk THE SYSTEM SHALL read the tool name from
    chunk.metadata["name"] and SHALL NEVER access chunk.tool or any other top-level tool
    name attribute; any reference to the deprecated .tool attribute in projector source SHALL
    be a build error.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ── Field access: chunk.metadata["structured"] for TOOL_RESULT ─────────────────

- requirement_id: R-doc08-PROJ-05
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 2, sentence 3"
  source_quote: "chunk.metadata[\"structured\"] for a TOOL_RESULT (never .tool / .structured as top-level attrs)"
  normalized_statement: >
    WHEN the projector processes a TOOL_RESULT chunk THE SYSTEM SHALL read the structured
    payload from chunk.metadata["structured"] and SHALL NEVER access chunk.structured or
    chunk.tool as top-level attributes; any reference to these deprecated field names in
    projector source SHALL be a build error.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

# ── TOOL_USE + delivery tool "speak" → VoiceSpeak ──────────────────────────────

- requirement_id: R-doc08-PROJ-06
  authority_type: specification
  authority_document: DOC-08
  source_location: "§4.5, paragraph 4 (projector code), TOOL_USE branch, speak case"
  source_quote: "if name == \"speak\": yield VoiceSpeak(text=text)   # → TTS"
  normalized_statement: >
    WHEN ChannelProjector.project() receives a chunk with chunk.type == "TOOL_USE" AND
    chunk.metadata["name"] == "speak" THE SYSTEM SHALL yield exactly one VoiceSpeak instance
    with text set to chunk.metadata.get("text_delta", "") and SHALL yield no other frame
    type for this event.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

