  testability: executable
  status: qualified

# ── Acceptance flow and post-approval behavior ───────────────────────────────

- requirement_id: R-doc05-S8-19
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 4"
  source_quote: "Doc 08's accept action (the human click) posts draft_id → the accept handler (Doc 04) reads the persisted bundle"
  normalized_statement: >
    WHEN a human approves a draft via the Doc 08 accept action
    THE SYSTEM SHALL have the accept handler (Doc 04) read the previously-persisted GCS bundle using the draft_id, and SHALL NOT require the agent's in-memory state to be available at accept time.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S8-20
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 4"
  source_quote: "for a code-change draft it records approval and exposes the diff/branch bundle for download — it NEVER pushes"
  normalized_statement: >
    WHEN a code-change draft is accepted
    THE SYSTEM SHALL record approval in the staged_drafts row and SHALL expose the diff/branch bundle for download; it SHALL NEVER push to any git remote.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S8-21
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 4"
  source_quote: "Relocated host-side; the dead review_session is deleted."
  normalized_statement: >
    WHEN a draft is accepted
    THE SYSTEM SHALL delete the (dead) review_session; the review_session SHALL NOT persist after acceptance.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

# ── Three enforcement layers ──────────────────────────────────────────────────

- requirement_id: R-doc05-S8-22
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 5"
  source_quote: "tool-list partitioning — sandbox write tools live in a different, conditionally-included sandbox server, and propose_change lives in its own host-side server mounted only for the worker disposition"
  normalized_statement: >
    WHEN the agent toolset is assembled
    THE SYSTEM SHALL partition write tools so that propose_change lives exclusively in the host-side server and sandbox write tools live in a separate, conditionally-included sandbox server.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S8-23
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 5"
  source_quote: "allowed_tools does NOT filter MCP tools, so any raw-write MCP tool that must be blocked (e.g. a real git push, a connector send) goes through disallowed_tools"
  normalized_statement: >
    WHEN raw-write MCP tools must be blocked from the agent
    THE SYSTEM SHALL block them via the disallowed_tools list, not via allowed_tools, because allowed_tools does NOT filter MCP tools.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S8-24
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 5"
  source_quote: "propose-not-apply — the tool itself never lands the change (it only persists the proposed draft)"
  normalized_statement: >
    WHEN propose_change tool body executes
    THE SYSTEM SHALL only persist the proposed draft and SHALL NOT apply, land, push, or deploy any change; the apply step is the exclusive responsibility of a subsequent human-triggered accept action.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

# ── Demo-scenario constraint (observable end-to-end) ─────────────────────────

- requirement_id: R-doc05-S8-25
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.8 paragraph 5"
  source_quote: "The demo: 'push this change' yields a complete staged code-change draft and no push; the human clicks approve and downloads the branch bundle."
  normalized_statement: >
    WHEN the Workroom agent receives an instruction to push a code change
    THE SYSTEM SHALL produce a complete staged code-change draft accessible as a branch bundle download, and SHALL NOT perform any git push at any point in the flow.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified
