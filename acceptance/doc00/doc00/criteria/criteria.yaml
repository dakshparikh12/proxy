- criterion_id: AC-CMP-015
  name: "stream_deltas emits per-msg_id suffix deltas and passes non-TEXT chunks through unchanged"
  evidence_class: "[model-stateful]"
  authority_refs: [R-DOC00-2-15]
  criticality: P1
  blocking: true
  behavior:
    given: "A scripted upstream AgentChunk stream: TEXT chunks whose .text is the ACCUMULATED text for a msg_id (e.g. 'He','Hello'), a second run under a new msg_id, and interleaved INIT/TOOL_USE/TOOL_RESULT/RESULT/ERROR chunks."
    when: "The stream is passed once through stream_deltas."
    then:
      - "Each TEXT output is only the NEW suffix since the last TEXT of that msg_id ('He' then 'llo'), not the re-accumulated text."
      - "A new msg_id resets the accumulator (its first delta is its full first text)."
      - "INIT/TOOL_USE/TOOL_RESULT/RESULT/ERROR chunks are emitted unchanged, in order."
      - "Applying stream_deltas a SECOND time over its own output corrupts the deltas (exactly-once is semantic, not just structural)."
  applicability: {fixtures: [fixture-agentchunk-stream], estates: [], excluded_estates: [], rationale: "Deterministic simulation of the delta-izer — the behavioral half AC-CMP-005 (static one-call-site) never exercises."}
  primary_oracle: {type: stream_delta_simulation, artifact: "stream_deltas(scripted)==expected deltas; passthrough chunks identical; double-application != single"}
  thresholds: {wrong_text_delta: 0, missing_passthrough_chunk: 0, msgid_reset_missed: 0}
  test_ids: [T-CMP-015]
  fault_model_refs: [F-STREAM-DELTAS-NO-DELTA-IZE]
  protocol_ref: PROTO-DETERMINISTIC-01
  source_quote: "Delta-izes TEXT (yields only the new suffix per msg_id, resets on a new msg_id); passes INIT/TOOL_USE/TOOL_RESULT/RESULT/ERROR through UNCHANGED."
  required_evidence: [model-stateful:T-CMP-015]

