  authority_refs: [R-doc03-STORE-08, R-doc03-STORE-18]
  criticality: P1
  blocking: false
  dependency_class: db:postgres
  mock_boundary: "real Postgres via Cloud SQL proxy or test container; MUST NOT replace asyncpg with an in-memory mock"
  golden_path: false
  behavior:
    given: "A meeting M whose transcript_segments have been artificially deleted (simulated corruption)"
    when:  "Orchestrator Tier-3 session recovery attempts to replay transcript + note-delta plane for M"
    then:
      - "The recovery fails or returns an incomplete context (missing transcript data)"
      - "This proves that transcript_segments must not be deleted for Tier-3 recovery to work"
  primary_oracle:
    type: negative_replay_assertion
    artifact: "Delete transcript_segments for M; run Tier-3 replay; assert result is incomplete or raises; document as evidence that archive is load-bearing"
  thresholds: {}
  fault_model_refs: [F-TRANSCRIPT-DELETED]
  test_ids: [T-STORE-13-NEG]
  verification_ladder: [integration, negative]

# ── Image grounding via GCS + v4 signed URL ───────────────────────────────────

- criterion_id: AC-STORE-14
  name: "Screenshared image uploaded to GCS and passed to Claude API as v4 signed URL (expiry=10min, method=GET)"
  evidence_class: "[integration]"
  authority_refs: [R-doc03-STORE-19, R-doc03-STORE-20]
  criticality: P0
  blocking: true
  dependency_class: gcs:objects
  mock_boundary: "real GCS bucket or testcontainers-equivalent; MUST NOT replace storage client with Mock()"
  golden_path: false
  behavior:
    given: "A screenshared slide image captured during a live meeting"
    when:  "The image grounding path processes the image"
    then:
      - "The image is uploaded to GCS as a blob (not held in memory or sent inline)"
      - "A signed URL is generated via blob.generate_signed_url(version='v4', expiration=timedelta(minutes=10), method='GET')"
      - "The Claude API call receives the signed URL (not base64-encoded image bytes)"
      - "The signed URL expires in exactly 10 minutes (expiration=timedelta(minutes=10))"
  primary_oracle:
    type: gcs_upload_plus_signed_url_assertion
    artifact: "Intercept image grounding path; assert blob exists in GCS; assert signed URL uses version=v4, expiration=600s, method=GET; assert Claude API payload contains URL not base64"
  thresholds:
