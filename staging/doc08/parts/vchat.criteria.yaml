# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-004
  name: "multi-part answer with blocker leads with the blocker, not the positive summary"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-04]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is composing a multi-part answer containing both a blocker/caveat/risk and positive summary material"
    when: "The answer text is assembled and dispatched"
    then:
      - "The first sentence of the spoken turn contains or directly references the blocker, caveat, or risk"
      - "The positive summary appears after the blocker statement, not before"
      - "No spoken or chat turn begins with positive summary material when a blocker is known"
  primary_oracle:
    type: deterministic
    artifact: "assert index_of(blocker_sentinel) < index_of(positive_summary_sentinel) in both speak_arg and send_chat_arg; parameterized test corpus with labelled blocker and summary spans"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-004]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-005
