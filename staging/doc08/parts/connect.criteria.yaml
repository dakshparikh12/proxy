# ══════════════════════════════════════════════════════════════════════════════
# ALL FIVE READINESS STATES RENDER — NO CRASH
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-003
  name: "Connect page readiness widget renders all five Readiness enum states without error"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-04]
  criticality: P1
  blocking: true
  behavior:
    given: "The readiness status widget is parameterized with each value of the CANONICAL §1.5 Readiness enum in turn"
    when: "Each state value — connecting, cloning, indexing, ready, not_ready — is passed to the widget renderer"
    then:
      - "State 'connecting' renders a connecting indicator without raising an exception"
      - "State 'cloning' renders a cloning indicator without raising an exception"
      - "State 'indexing' renders an indexing indicator without raising an exception"
      - "State 'ready' renders a ready indicator without raising an exception"
      - "State 'not_ready' renders a not_ready terminal indicator without raising an exception"
      - "Each rendered output is a distinct, named visual block distinguishable from the others"
  primary_oracle:
    type: deterministic
    artifact: "parameterized unit test over all five enum values; assert each produces a distinct named rendered block with no exception raised; assert each output differs structurally from the others"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-003]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}


