# OPS.criteria.yaml — Doc 04 (Proxy Orchestrator) — §3.8 + §3.9
# Acceptance criteria for the Reconcile Sweep (§3.8) and ManagedResource / Sandbox Lifecycle (§3.9).
# ID scheme: AC-OPS-NNN  (NEG pairs: AC-OPS-NNN-NEG)
#
# dependency_class values:
#   null         — pure in-process / structural; zero external systems
#   db:postgres  — reconcile reads meeting end-status from Postgres
#   vendor:e2b   — E2B sandbox provision / destroy / health / list calls
#
# NEG-pair rule: every non-null dependency_class criterion has a paired AC-OPS-NNN-NEG.
# db:postgres criteria → ladder includes integration + negative.
# vendor:e2b criteria  → ladder includes reality + negative.
# null criteria        → ladder: [lint, unit].

# ═══════════════════════════════════════════════════════════════════════════
# §3.8 · Endpoint security — RECONCILE_TOKEN bearer gate
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-OPS-001
  name: "POST /internal/reconcile rejects requests without valid RECONCILE_TOKEN"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-OPS-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The reconcile endpoint is mounted and RECONCILE_TOKEN is set"
    when: "A POST /internal/reconcile arrives with a missing or invalid bearer token"
    then:
      - "The server responds with HTTP 401"
      - "run_reconcile_sweep() is never invoked"
  primary_oracle:
    type: deterministic
    artifact: "Unit test sends unauthenticated request; asserts status_code == 401 and sweep call count == 0"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-OPS-001-NEG
  name: "NEG: valid RECONCILE_TOKEN allows POST /internal/reconcile through"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-OPS-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The reconcile endpoint is mounted and RECONCILE_TOKEN='secret' is configured"
    when: "A POST /internal/reconcile arrives with Authorization: Bearer secret"
    then:
      - "The server does not return 401"
      - "run_reconcile_sweep() is called once"
  primary_oracle:
    type: deterministic
    artifact: "Unit test sends authenticated request; asserts status_code != 401 and sweep call count == 1"
  thresholds: {}
  fault_model_refs: []
  test_ids: [T-OPS-001-NEG]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ═══════════════════════════════════════════════════════════════════════════
# §3.8 · Single shared function — no drift between prod and dev paths
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-OPS-002
  name: "Prod HTTP path and dev in-process interval both call the same run_reconcile_sweep function"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-OPS-02, R-doc04-OPS-03]
  criticality: P1
  blocking: true
  behavior:
    given: "The reconcile HTTP handler and the dev in-process interval are both configured"
    when: "Each path triggers a reconcile"
    then:
      - "Both paths call the identical run_reconcile_sweep function object (not a copy)"
      - "No reconcile logic duplicated outside run_reconcile_sweep"
  primary_oracle:
    type: deterministic
    artifact: "Static analysis / unit test asserts the HTTP handler and dev interval both reference the same run_reconcile_sweep symbol; grep for sweep steps outside that function returns zero matches"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-002]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

# ═══════════════════════════════════════════════════════════════════════════
# §3.8 · Step isolation — one failure does not abort the sweep
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-OPS-003
  name: "Reconcile step failure does not abort subsequent steps"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc04-OPS-04]
  criticality: P0
  blocking: true
  behavior:
    given: "run_reconcile_sweep() is called and deps.mark_stale_operations_interrupted raises an exception"
    when: "The sweep executes"
    then:
      - "deps.sandbox_orchestrator.reconcile is still called"
      - "deps.notes_retention.reconcile is still called"
      - "The returned dict contains exactly one error entry naming 'stale-harnesses'"
  primary_oracle:
    type: deterministic
    artifact: "Unit test patches step 1 to raise; asserts steps 2 and 3 were called and errors == ['stale-harnesses: <exc>']"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-003]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-OPS-003-MID
  name: "Middle step failure still executes step 3"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc04-OPS-04]
  criticality: P0
  blocking: true
  behavior:
    given: "run_reconcile_sweep() is called and deps.sandbox_orchestrator.reconcile raises an exception"
    when: "The sweep executes"
    then:
      - "deps.mark_stale_operations_interrupted was already called (step 1 completed)"
      - "deps.notes_retention.reconcile is still called after step 2 fails"
      - "The returned dict error list contains exactly one entry naming 'meeting-sandboxes'"
  primary_oracle:
    type: deterministic
    artifact: "Unit test patches step 2 to raise; asserts step 3 was called and errors == ['meeting-sandboxes: <exc>']"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-003-MID]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

