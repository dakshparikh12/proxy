  source_quote: >
    single-writer per meeting
  normalized_statement: >
    THE SYSTEM SHALL enforce a single-writer discipline per meeting for NOTES_CACHE:
    at most one coroutine/task per meeting_id MAY apply deltas to that meeting's cache
