    when:  "The gap-writing code path executes (the record_gap or equivalent function)"
    then:
      - "The code path does not issue UPDATE transcript_segments SET raw_transcript=NULL"
      - "The code path does not issue UPDATE transcript_segments SET raw_transcript=''"
      - "The raw_transcript column value is unchanged by the gap write"
  primary_oracle:
    type: query_log_and_field_inspection_assertion
    artifact: >
      enable Postgres statement log; trigger failure + gap write; grep logs for
      UPDATE...raw_transcript=NULL or similar; assert zero such statements;
      assert raw_transcript non-empty after gap write
  thresholds:
    raw_transcript_null_assignments_allowed: 0

# ─────────────────────────────────────────────────────────────────────────────
# CLOSE PASS BACKFILL — status='gap' AND status='pending' both backfilled
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-FAIL-04
