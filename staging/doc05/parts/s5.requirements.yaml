  source_quote: "critic/verifier: read + map + run_command but NO write_file/edit_file/ast_grep/propose_change."
  normalized_statement: >
    WHEN the Workroom is configured for critic or verifier disposition THE SYSTEM
    SHALL allow read_file, list_files, grep, glob, map tools, and run_command, and
    SHALL block write_file, edit_file, ast_grep, and propose_change via
    disallowed_tools.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc05-S5-32
  authority_type: specification
  authority_document: DOC-05
  source_location: "§3.5 paragraph 4 (Disposition curated subsets)"
  source_quote: "worker (readwrite): full read + map + sandbox-write (run_command, write_file, edit_file, ast_grep) + mcp__propose_change__propose_change."
  normalized_statement: >
    WHEN the Workroom is configured for worker disposition THE SYSTEM SHALL make
    available the full read tool set, all map tools, all sandbox write tools
    (run_command, write_file, edit_file, ast_grep), and
    mcp__propose_change__propose_change, with no tools in disallowed_tools.
  requirement_type: functional
  criticality: P1
  testability: executable
