# ── V0 close sequence (ORDER is mandatory) ───────────────────────────────────

- requirement_id: R-doc03-CLOSE-13
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7 V0 close output, steps 1-4"
  source_quote: >
    1. Render the final object through the notes template to markdown
    2. Write it to GCS via write_finalized_notes(...) with if_generation_match=0
    (create-only — the close deliverable is written exactly once, §3.3/§12.9)
    3. Post the link in the meeting chat
    4. THEN tear down — in that order, so a durable provisional notes URL exists
    before teardown and the bot never leaves without the record posted.
  normalized_statement: >
    THE SYSTEM SHALL execute the four close-pass steps in strict order: (1) render
    the final notes object through the notes template to markdown, (2) write the
    rendered output to GCS via write_finalized_notes, (3) post the GCS link in the
    meeting chat, (4) tear down; teardown SHALL NOT occur before step 3 completes;
    step 3 (chat link post) SHALL NOT occur before step 2 (GCS write) completes.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

# ── GCS write: create-only, exactly once ─────────────────────────────────────

- requirement_id: R-doc03-CLOSE-14
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7 V0 close output, step 2"
  source_quote: >
    Write it to GCS via write_finalized_notes(...) with if_generation_match=0
    (create-only — the close deliverable is written exactly once, §3.3/§12.9)
  normalized_statement: >
    WHEN the close pass writes the final notes to GCS THE SYSTEM SHALL call
    write_finalized_notes with if_generation_match=0; this enforces create-only
    semantics so the close deliverable is written exactly once; a subsequent
    write to the same GCS path SHALL fail (not silently overwrite).
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

# ── Bot must not tear down without posting ───────────────────────────────────

- requirement_id: R-doc03-CLOSE-15
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7 V0 close output, step 4"
  source_quote: >
    THEN tear down — in that order, so a durable provisional notes URL exists
    before teardown and the bot never leaves without the record posted.
  normalized_statement: >
    THE SYSTEM SHALL guarantee the bot never exits the meeting (tears down) without
    having successfully posted the notes chat link; IF the chat link post fails the
    system SHALL retry or surface the error, not proceed to teardown silently; teardown
    blocked on failed step 3 is the safe failure mode.
  requirement_type: safety
  criticality: P0
  testability: executable
  status: qualified

# ── Audit record persistence ──────────────────────────────────────────────────

- requirement_id: R-doc03-CLOSE-16
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, paragraph after V0 close output"
  source_quote: >
    The raw transcript + the workroom's tool-call telemetry persist on the Postgres
    plane as the audit record.
  normalized_statement: >
    THE SYSTEM SHALL retain the raw transcript and the workroom's tool-call telemetry
    on the Postgres plane as the permanent audit record; neither the raw transcript rows
    nor the tool-call telemetry SHALL be deleted or truncated after the close pass
    completes.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

# ── One pass per meeting ──────────────────────────────────────────────────────

- requirement_id: R-doc03-CLOSE-17
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.7, closing line"
  source_quote: >
    One pass, once per meeting — quality where it's permanent, cheap where it's live.
  normalized_statement: >
    THE SYSTEM SHALL execute at most one close pass per meeting; duplicate close-pass
    executions for the same meeting_id SHALL be rejected (e.g., via the
    if_generation_match=0 GCS guard and the operation_runs uniqueness constraint);
    crash recovery that re-runs a partial close MUST detect the existing GCS object
    and not overwrite it.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

