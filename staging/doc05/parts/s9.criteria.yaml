      - "AbortRegistry is imported from libs.agentkit.abort or agentkit.abort (the canonical module)"
      - "No class named AbortRegistry is defined anywhere in services/workroom/"
  primary_oracle:
    type: static_analysis
    artifact: "grep/AST check: (a) finds 'from.*agentkit.*abort import AbortRegistry' in workroom source; (b) finds zero class definitions of AbortRegistry in services/workroom/"
