# Requirements — Doc 08 Behavior · §2.5 The shared screen — show the work
# Source: product/v0-spec/08-BEHAVIOR.md §2.5 + §3 build rule for screen
# ID prefix: R-doc08-SCREEN-NN
# Authority: DOC-08 §2.5; CANONICAL §12.3 (show_screen delivery tool); CANONICAL §12.12 (V0 scope)
# Status: qualified
#
# dependency_class values used downstream:
#   db:postgres  — staged_drafts (final artifact preview fetch)
#   gcs:objects  — file content fetch for pin-to-source mode
#
# Scope:
#   §2.5 — Shared screen: activation gate, three V0 content modes, deferred exclusions,
#           detail-on-screen / ambience-on-tile rule, camera ↔ screenshare mutual exclusivity,
#           swap announcement, show_screen delivery tool wiring.
#   NOT in scope here: §2.6 join/close lines (screen-join-close.criteria.yaml);
