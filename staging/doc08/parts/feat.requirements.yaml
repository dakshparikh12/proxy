- requirement_id: R-doc08-FEAT-46
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 14"
  source_quote: "When Proxy detects the same figure asserted two different ways across time (Doc 03 already catches contradiction-across-time — the detection exists), it doesn't render a spoken \"you're wrong.\" It posts a reconciliation card."
  normalized_statement: >
    WHEN Doc 03's contradiction-across-time detection fires for a figure asserted two
    different ways THE SYSTEM SHALL post a reconciliation card to chat and SHALL NOT
    produce a spoken correction asserting that any participant is wrong.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-47
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 14"
  source_quote: "the two values side by side, each with its as-of source and date — \"deck: $2.4M · Q3 filing: $2.19M, as of Q3 close.\""
  normalized_statement: >
    WHEN a reconciliation card is rendered THE SYSTEM SHALL display both conflicting values
    side by side, each annotated with its source reference and as-of date or temporal context.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-48
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 14"
  source_quote: "a sourced comparison the room resolves for itself, not a correction Proxy delivers at someone."
  normalized_statement: >
    WHEN a reconciliation card is rendered THE SYSTEM SHALL NOT assert which value is correct
    and SHALL present the comparison neutrally, leaving resolution to the room.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-49
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 14"
  source_quote: "It is a render variant of the pin-to-source / draft-card format (§2.4 #8, §2.5), a contested-figure layout on the same card renderer."
  normalized_statement: >
    WHEN rendering a reconciliation card THE SYSTEM SHALL use the same card renderer as
    draft cards and pin-to-source cards, passing a contested-figure layout variant, and
    SHALL NOT implement a separate card rendering pipeline for reconciliation.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified
