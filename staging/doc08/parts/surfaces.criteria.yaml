# ── Golden path: authenticated tenant member sees notes + drafts ──────────────

- criterion_id: AC-SURF-007
  name: "Golden path: authenticated tenant member GETs /m/{meeting_id} and receives notes markdown + draft cards"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-10, R-doc08-SURF-12]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A session authenticated as a tenant member; the meeting belongs to that tenant;
      note_deltas exist for the meeting; staged_drafts rows exist for the meeting.
    when: "GET /m/{meeting_id} is requested"
    then:
      - "The response is 200"
      - "The rendered body contains the §2.6 notes markdown, folded via GET /internal/notes/{meeting_id}"
      - "The rendered body contains at least one staged_drafts card with its draft_id"
      - "Accept and reject buttons are present on each draft card"
      - "The page does not contain a cross-meeting list, analytics, or history index"
  primary_oracle:
    type: deterministic
    artifact: "integration test: assert 200; assert notes section present; assert draft cards present; assert no cross-meeting content"
  thresholds:
    violations_allowed: 0
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT mock asyncpg"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}
  fault_model_refs: []
  test_ids: [T-SURF-007]

- criterion_id: AC-SURF-007-NEG
  name: "GET /m/{meeting_id} degrades honestly when Postgres is unavailable"
  authority_refs: [R-doc08-SURF-10, R-doc08-SURF-12]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "An authenticated session with meeting→tenant membership verified; Postgres is unreachable"
    when: "Postgres errors or times out during note_deltas or staged_drafts fetch"
    then:
      - "The response is an honest error page or 5xx — not a partially rendered page with missing content"
      - "No stale or empty notes section is silently rendered as if data were present"
      - "No silent proceed"
  primary_oracle:
    type: deterministic
    artifact: "assert honest failure displayed; assert no silently empty notes section returned as 200"
  thresholds:
    silent_failures_allowed: 0
  fault_model_refs: []
  test_ids: [T-SURF-007-NEG]

# ── Cross-tenant access → Not found (indistinguishable from absent) ───────────

- criterion_id: AC-SURF-008
  name: "Cross-tenant GET /m/{meeting_id} returns identical Not found as absent meeting"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-11]
  criticality: P0
  blocking: true
  behavior:
    given: >
      Session A belongs to Tenant A; meeting_id M belongs to Tenant B (cross-tenant).
      A separate request with a valid session but meeting_id that does not exist at all.
    when: "Both requests are made: cross-tenant GET and absent-meeting GET"
    then:
      - "Both responses have the same HTTP status code (404 or equivalent Not found)"
      - "Both responses have the same response body shape — no field distinguishes cross-tenant from absent"
      - "No timing side-channel distinguishes the two (within a reasonable tolerance)"
  primary_oracle:
    type: deterministic
    artifact: "assert response_cross_tenant.status == response_absent.status; assert response bodies are structurally identical; assert no tenant or meeting detail leaked"
  thresholds:
    violations_allowed: 0
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  fault_model_refs: []
  test_ids: [T-SURF-008]

- criterion_id: AC-SURF-008-NEG
  name: "GET /m/{meeting_id} degrades honestly when tenant membership check query fails"
  authority_refs: [R-doc08-SURF-11]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P0
  blocking: true
  behavior:
    given: "A valid authenticated session; the meeting→tenant membership check query fails with a DB error"
    when: "Postgres errors during the membership check"
    then:
      - "The response is an error (5xx or honest error page), not a 200 with content"
      - "Access is NOT granted by default when the membership check cannot be completed"
