- criterion_id: AC-JOINCLOSE-002
  name: "Join consent line posted with exact template, live repo name, and computed freshness (E2E)"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-JOINCLOSE-02, R-doc08-JOINCLOSE-03]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is joining a meeting; tenant codebase is repo=acme/checkout; index was completed 20 minutes ago"
    when: "The join flow executes and posts the consent line"
    then:
      - "Posted line matches: \"Hi — I'm Proxy, an AI participant. I can see the `acme/checkout` codebase (indexed 20 minutes ago). I'm observing and taking notes, and anyone here can ask me anything — out loud or with @proxy.\""
      - "The repo name is the live tenant repo name, not a placeholder string"
      - "The freshness string is computed from the actual index timestamp, not hard-coded"
      - "Exactly one consent line is posted on join"
  primary_oracle: {type: deterministic, artifact: "Assert posted_chat_line matches consent template regex with captured {repo} == live_repo_name and {freshness} == computed_elapsed_minutes; assert no hard-coded string literals for repo or freshness in template builder; assert count(join_consent_posts) == 1"}
  thresholds: {violations_allowed: 0}
  dependency_class: db:postgres
  mock_boundary: "Stub codebase_index row returning repo=acme/checkout, last_indexed_at=NOW()-20m"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}
  fault_model_refs: []
  test_ids: [T-JOINCLOSE-002]

- criterion_id: AC-JOINCLOSE-002-NEG
  name: "Consent line degrades honestly when db:postgres (index metadata) errors"
  authority_refs: [R-doc08-JOINCLOSE-02, R-doc08-JOINCLOSE-03]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is joining a meeting"
    when: "db:postgres errors when fetching codebase index metadata (repo name or last_indexed_at)"
    then:
