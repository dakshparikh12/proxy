  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc03-FAIL-07
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.8, paragraph 3, sentence 1"
  source_quote: >
    A referent that won't bind stays unbound-but-named.
  normalized_statement: >
    WHEN the Scribe or close pass identifies a referent candidate that cannot be
    resolved to a specific codebase entity (file, function, class) THE SYSTEM SHALL
    record the referent in the notes as unbound-but-named (preserving the original
    name as spoken); THE SYSTEM SHALL NOT suppress, rename, or drop the referent
