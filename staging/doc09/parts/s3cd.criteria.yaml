# ═══════════════════════════════════════════════════════════════════════════════
# S6: Concurrency — several meetings on one host at once
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S3-510
  name: "No cross-meeting LLM-budget starvation under concurrent load"
  evidence_class: "[integration]"
  authority_refs: [R-doc09-S3-54]
  criticality: P1
  blocking: true
  behavior:
    given: "N meetings (N ≥ 2) are running concurrently on one host, each with active participants; the per-host in-flight bound is set to a value ≥ N"
    when: "All N meetings submit work simultaneously"
    then:
      - "Each meeting makes measurable forward progress (receives at least one LLM response) within the concurrency window"
      - "No meeting is blocked indefinitely while other meetings consume all available LLM budget"
      - "Per-meeting in-flight tracking is independent; one meeting's slowness does NOT block others beyond the configured bound"
  primary_oracle: {type: deterministic_state_check, artifact: "per-meeting response timestamps and in-flight counters under concurrent load"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-S3-510]
  test_ids: [T-S3-510]
  dependency_class: null
  mock_boundary: "no external dependency required; may use in-process mock LLM responders"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-510

- criterion_id: AC-S3-511
  name: "Per-meeting tenant isolation holds under concurrent meetings"
  evidence_class: "[integration]"
  authority_refs: [R-doc09-S3-55]
  criticality: P1
  blocking: true
  behavior:
    given: "Two meetings with distinct tenant_ids (tenant_A and tenant_B) run concurrently; each has its own code index, notes, and cost rows"
    when: "Each meeting queries or writes tenant-scoped data"
    then:
      - "tenant_A's queries never return rows with tenant_B's tenant_id"
      - "tenant_B's queries never return rows with tenant_A's tenant_id"
      - "Concurrent writes by tenant_A do NOT affect tenant_B's readable state"
  primary_oracle: {type: deterministic_state_check, artifact: "tenant_id on all rows returned by each meeting's queries under concurrency"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-S3-511]
  test_ids: [T-S3-511]
  dependency_class: db:postgres
  mock_boundary: "may replace Postgres responses via asyncpg test pool; MUST NOT skip the real tenant_id predicate path"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S3-511

- criterion_id: AC-S3-511-NEG
  name: "Concurrent isolation holds when Postgres returns mixed-tenant data"
  evidence_class: "[integration]"
  authority_refs: [R-doc09-S3-55]
