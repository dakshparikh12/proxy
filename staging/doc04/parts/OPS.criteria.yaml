# ═══════════════════════════════════════════════════════════════════════════
# §3.9 · ensure_running idempotency — no double-provision
# ═══════════════════════════════════════════════════════════════════════════

- criterion_id: AC-OPS-006
  name: "ensure_running returns existing sandbox without re-provisioning when healthy"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc04-OPS-09, R-doc04-OPS-11]
  criticality: P0
  blocking: true
  behavior:
    given: "A meeting_id already has a sandbox row in the repo and health() returns ok"
    when: "ensure_running() is called a second time for the same meeting_id"
    then:
      - "provision() is NOT called"
      - "The returned Meta equals the previously persisted Meta"
      - "At most one sandbox exists for the meeting_id after both calls"
  primary_oracle:
    type: deterministic
    artifact: "Unit test calls ensure_running() twice with in-memory repo and mock provider; asserts provision call count == 1 (from first call only) and both returns are equivalent"
  thresholds: {violations_allowed: 0, double_provisions_allowed: 0}
  fault_model_refs: []
  test_ids: [T-OPS-006]
  dependency_class: vendor:e2b
  mock_boundary: "E2B provider replaced by in-memory fake with call counters"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}
    - {tier: negative}

- criterion_id: AC-OPS-006-NEG
  name: "NEG: ensure_running calls provision exactly once when no sandbox exists"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-OPS-09]
  criticality: P0
  blocking: true
  behavior:
    given: "No sandbox row exists for the meeting_id in the repo"
    when: "ensure_running() is called once"
    then:
      - "provision() is called exactly once"
      - "The repo upsert is called with the returned Meta"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with empty in-memory repo; asserts provision call count == 1 and repo.upsert called once"
  thresholds: {}
  fault_model_refs: []
  test_ids: [T-OPS-006-NEG]
  dependency_class: vendor:e2b
  mock_boundary: "E2B provider replaced by in-memory fake"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}

