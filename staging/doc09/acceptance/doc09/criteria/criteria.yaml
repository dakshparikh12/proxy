  authority_refs: [R-doc09-S3-54]
  criticality: P1
  blocking: true
  behavior:
    given: "N meetings (N ≥ 2) are running concurrently on one host, each with active participants; the per-host in-flight bound is set to a value ≥ N"
    when: "All N meetings submit work simultaneously"
    then:
      - "Each meeting makes measurable forward progress (receives at least one LLM response) within the concurrency window"
      - "No meeting is blocked indefinitely while other meetings consume all available LLM budget"
      - "Per-meeting in-flight tracking is independent; one meeting's slowness does NOT block others beyond the configured bound"
