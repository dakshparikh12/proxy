      - "The write succeeds and creates the GCS object with generation > 0"
      - "No overwrite of an existing object is possible through this call path"
  primary_oracle:
    type: integration_assertion
    artifact: >
      inspect GCS request headers/params: assert ifGenerationMatch == 0 (or equivalent);
      assert GCS object created with non-zero generation after the call
  test_ids: [T-CLOSE-08]

- criterion_id: AC-CLOSE-08-NEG
  name: "NEG: GCS write fails (bucket unavailable) — close pass surfaces error, does not post link"
  evidence_class: "[simulation]"
  authority_refs: [R-doc03-CLOSE-13, R-doc03-CLOSE-14]
  dependency_class: [gcs:objects]
  mock_boundary:
