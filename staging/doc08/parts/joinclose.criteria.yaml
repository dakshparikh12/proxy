# ════════════════════════════════════════════════════════════════

- criterion_id: AC-JOINCLOSE-001
  name: "Tile transitions to Listening (breathing) state immediately on join, before consent line"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-JOINCLOSE-01]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy is joining a meeting"
    when: "The join event is processed"
