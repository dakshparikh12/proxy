      across the codebase; assert count == 1 at the claim_meeting call site;
      mypy --strict on the affected modules passes without UUID/text type errors
  thresholds:
    uuid_to_text_cast_sites_for_scope_id: 1
    violations_allowed: 0
  fault_model_refs: [F-CAST-SCATTERED]
  test_ids: [T-OWNR-006]
  dependency_class: null
  mock_boundary: null
  golden_path: false
