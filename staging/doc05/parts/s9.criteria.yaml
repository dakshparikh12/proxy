# Doc 05 (Workroom) — §3.9 / §3.10 / §3.11 / §3.12 acceptance criteria
# Coverage:
#   §3.9  Cost & latency
#   §3.10 Safety wiring
#   §3.11 Abort discipline
#   §3.12 The envelope
# ID scheme: AC-S9-NNN  (NEG pairs: AC-S9-NNN-NEG)
# Verification ladder rules:
#   dependency_class null → lint + unit
#   dependency_class db:/gcs: → add integration
#   dependency_class vendor:* → add reality
#   golden_path: true → add e2e
#   Every non-null dependency_class → pair with -NEG criterion

# ─────────────────────────────────────────────────────────────────────────────
# §3.9 COST & LATENCY
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-S9-001
  name: "Sandbox pre-provisioned at meeting creation, not first dispatch"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S9-01, R-doc05-S9-02]
  criticality: P0
  blocking: true
  behavior:
    given: "A meeting is being created via the meeting-creation API endpoint"
    when: "The meeting-creation handler completes"
    then:
      - "A sandbox is allocated and in RUNNING state before any task is dispatched"
      - "The sandbox allocation timestamp precedes the meeting's first task dispatch timestamp"
  primary_oracle:
    type: deterministic
    artifact: "meeting-creation handler emits a sandbox_provisioned event before returning; integration test asserts event timestamp < first task dispatch timestamp"
  thresholds: {cold_boots_mid_meeting: 0}
  dependency_class: vendor:e2b
  mock_boundary: "e2b sandbox calls mocked; provisioning hook under test"
  golden_path: true
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: reality}
    - {tier: e2e}
  test_ids: [T-S9-001]

- criterion_id: AC-S9-001-NEG
  name: "NEG: Mid-meeting cold boot detected and rejected"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S9-02]
  criticality: P0
  blocking: true
  behavior:
    given: "A task is dispatched to a meeting whose sandbox allocation was skipped during meeting creation"
    when: "The task dispatch path executes"
    then:
      - "The system raises an error or emits a telemetry event flagging the cold-boot condition"
      - "The cold-boot path does NOT silently succeed"
  primary_oracle:
    type: deterministic
    artifact: "test stubs sandbox as unprovisioned; asserts runtime guard raises ColdBootError or equivalent"
  thresholds: {}
  dependency_class: vendor:e2b
  mock_boundary: "e2b mocked as unprovisioned; dispatch logic under test"
  golden_path: false
  verification_ladder:
    - {tier: unit}
  test_ids: [T-S9-001-NEG]

- criterion_id: AC-S9-002
  name: "Heartbeat activity-bump prevents sandbox reaping during silent build"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S9-03]
  criticality: P0
  blocking: true
  behavior:
    given: "A build task is running and the sandbox activity timer would expire in the next heartbeat window"
    when: "The II.1 heartbeat fires"
    then:
      - "The heartbeat handler calls the sandbox keep-alive / activity-bump API"
      - "The sandbox activity timestamp is extended beyond the previous expiry"
  primary_oracle:
    type: deterministic
    artifact: "unit test spies on sandbox keep-alive call; asserts it is invoked on every heartbeat cycle while a task is active"
  thresholds: {missed_keep_alive_during_active_build: 0}
  dependency_class: vendor:e2b
  mock_boundary: "e2b keep-alive endpoint mocked; heartbeat handler under test"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: reality}
  test_ids: [T-S9-002]

- criterion_id: AC-S9-002-NEG
  name: "NEG: Absent heartbeat allows sandbox to be reaped"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S9-03]
  criticality: P0
  blocking: true
  behavior:
    given: "A build task is running but the heartbeat handler is disabled"
    when: "The sandbox TTL expires"
    then:
      - "The sandbox provider reaps the sandbox (mock confirms no keep-alive was sent)"
      - "This proves the keep-alive path is genuinely necessary"
  primary_oracle:
    type: deterministic
    artifact: "test disables heartbeat; mock confirms zero keep-alive calls; sandbox mock transitions to REAPED state"
  thresholds: {}
  dependency_class: vendor:e2b
  mock_boundary: "e2b keep-alive mocked; heartbeat disabled via feature flag"
  golden_path: false
  verification_ladder:
    - {tier: unit}
  test_ids: [T-S9-002-NEG]

- criterion_id: AC-S9-003
