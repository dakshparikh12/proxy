      - "The stale row is set to status='interrupted' before the new harness makes any claim"
      - "The sweep return value is logged (count of reaped rows)"
  primary_oracle:
    type: deterministic
    artifact: >
      call-order recording in boot sequence: assert mark_stale_operations_interrupted
      call timestamp < first claim_meeting INSERT timestamp;
      assert stale row status == 'interrupted' when first new claim is issued
