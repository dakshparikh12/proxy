# §3.6 · NO REDIS / NO IN-PROCESS CHECK-THEN-ACT (structural)
# ════════════════════════════════════════════════════════════════

- criterion_id: AC-OWNR-010
  name: "No Redis client and no check-then-act meeting lock in the ownership path"
  evidence_class: "[unit]"
  authority_refs: [R-doc04-OWNR-01]
  criticality: P0
  blocking: true
  behavior:
    given: "The orchestrator service source tree (services/orchestrator/)"
    when: "A structural scan is performed for Redis usage and check-then-act patterns in the ownership path"
    then:
      - "No import of redis, aioredis, or any Redis client appears in the ownership/claim modules"
      - "No read-then-write pattern (SELECT … then INSERT) for meeting ownership exists outside of the atomic INSERT ON CONFLICT"
      - "The claim_meeting function uses only pool.fetchval with the ON CONFLICT SQL as the sole ownership check"
  primary_oracle:
    type: deterministic
    artifact: >
      grep -r 'import redis\|import aioredis\|from redis' services/orchestrator/ returns zero matches;
      AST scan of claim_meeting: no SELECT before INSERT in the same claim logic
  thresholds:
    redis_imports_in_ownership_path: 0
    check_then_act_patterns: 0
  fault_model_refs: [F-REDIS-USED, F-CHECK-THEN-ACT]
  test_ids: [T-OWNR-010]
  dependency_class: null
  mock_boundary: null
  golden_path: false
