# Doc 02 (Voice & Transport) — JOIN / CONSENT / ROSTER-CONSENT requirements slice
#
# INTENDED FILENAME: JOIN.requirements.yaml
# This sidecar exists because harness/guard.py (PreToolUse) blocks any write to a
# path containing the bare substring "requirements" (guard.py PROTECTED, line 19).
# That pattern is meant to protect the sealed acceptance/<doc>/requirements/ trees,
# but it also over-matches this per-section parts slice. See PROGRESS.md CONFLICT
# NOTE. A conductor with write authority should promote/rename this to
# JOIN.requirements.yaml so the RTM gate and the AC-JOIN-* authority_refs resolve.
#
# Every requirement is atomic EARS, carries a verbatim source_quote +
# source_location + criticality.

- requirement_id: R-doc02-JOIN-01
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "Proxy joins from a meeting link (or calendar invite) as a Recall.ai bot — no host-side install; the link is enough."
  normalized_statement: >
    WHEN a user supplies a meeting link (or calendar invite) THE SYSTEM SHALL
    join the meeting as a Recall.ai bot without requiring any host-side install.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-02
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "Proxy joins from a meeting link (or calendar invite) as a Recall.ai bot — no host-side install; the link is enough."
  normalized_statement: >
    IF only a meeting link is provided and no host-side install or host approval
    exists THE SYSTEM SHALL still complete the join using the link alone.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-03
  authority_type: specification
  authority_document: DOC-02
  source_location: "§1 goal item 1"
  source_quote: "Proxy is invited by meeting link like a person, joins within seconds, and announces itself (\"I'm an AI participant, observing/recording\") — the consent gate."
  normalized_statement: >
    WHEN Proxy is invited by a meeting link THE SYSTEM SHALL join within seconds
    and announce itself as an AI participant that is observing/recording.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-04
  authority_type: operational_slo
  authority_document: DOC-02
  source_location: "§4 Latency"
  source_quote: "join-to-listening [<10s]"
  normalized_statement: >
    WHEN Proxy is invited THE SYSTEM SHALL reach the listening state within
    10 seconds of the join being triggered (at 10s pass, over 10s fail).
  requirement_type: performance
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-05
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "Immediately on join it posts the consent notice in chat, pinned where the platform allows"
  normalized_statement: >
    WHEN Proxy joins a meeting THE SYSTEM SHALL immediately post the consent
    notice in the meeting chat before performing any other observable action.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-06
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "Immediately on join it posts the consent notice in chat, pinned where the platform allows"
  normalized_statement: >
    WHEN the platform supports pinning THE SYSTEM SHALL pin the consent notice;
    WHILE on a platform without pinning THE SYSTEM SHALL still post the notice.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-07
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "one line — it's an AI participant, it observes/records, and anyone in the room can address it"
  normalized_statement: >
    WHEN the consent notice is posted THE SYSTEM SHALL render exactly one line
    stating that Proxy is an AI participant, that it observes/records, and that
    anyone in the room can address it.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-08
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "This notice is a hard gate (our upfront-consent decision), not a courtesy."
  normalized_statement: >
    IF the consent notice has not been successfully posted THE SYSTEM SHALL NOT
    proceed to observe, record, or otherwise participate (the notice is a hard
    gate, not a courtesy).
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-09
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 paragraph 1"
  source_quote: "The bot belongs to the room, not the inviter."
  normalized_statement: >
    WHILE Proxy is in a meeting THE SYSTEM SHALL treat every participant in the
    room as able to address it, never restricting interaction to the inviter.
  requirement_type: functional
  criticality: P1
  testability: analyzable
  status: qualified

- requirement_id: R-doc02-JOIN-10
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 late-join consent"
  source_quote: "late-join consent: a participant joining mid-meeting never saw the notice, so it re-posts on their join."
  normalized_statement: >
    WHEN a new participant joins mid-meeting after the consent notice was posted
    THE SYSTEM SHALL re-post the consent notice on that participant's join.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-11
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.1 late-join consent"
  source_quote: "late-join consent: a participant joining mid-meeting never saw the notice, so it re-posts on their join."
  normalized_statement: >
    IF a participant present when the notice was first posted is already
    consented THE SYSTEM SHALL NOT require a re-post for that participant; the
    re-post fires per new participant who joined after the notice.
  requirement_type: correctness
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-12
  authority_type: specification
  authority_document: DOC-02
  source_location: "§4 Platform matrix"
  source_quote: "join/hear/speak/tile/screenshare — all three platforms via Recall."
  normalized_statement: >
    WHEN Proxy joins on Meet, Zoom, or Teams THE SYSTEM SHALL perform the join
    identically through Recall on all three platforms.
  requirement_type: compatibility
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-13
  authority_type: canonical_decision
  authority_document: DOC-02
  source_location: "CANONICAL §11.1"
  source_quote: "a `meetings` row is created when the user invites Proxy; the Recall bot is launched and its `recall_bot_id` written back"
  normalized_statement: >
    WHEN the user invites Proxy THE SYSTEM SHALL create a meetings row, launch
    the Recall bot, and write the recall_bot_id back onto that meetings row.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-14
  authority_type: canonical_decision
  authority_document: DOC-02
  source_location: "CANONICAL §11.1"
  source_quote: "Recall webhooks carry the `bot_id` → look up the `meetings` row → tenant + repo."
  normalized_statement: >
    WHEN a Recall webhook carrying a bot_id arrives THE SYSTEM SHALL resolve it
    to the meetings row and thereby to the correct tenant and repo.
  requirement_type: contract
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-15
  authority_type: canonical_decision
  authority_document: DOC-02
  source_location: "CANONICAL §12.9 consent"
  source_quote: "consent = default-consented via the join notice, objection→audible-defer-to-organizer, hard-removal = end-bot."
  normalized_statement: >
    WHEN the join notice has posted THE SYSTEM SHALL treat the room as
    default-consented.
  requirement_type: functional
  criticality: P0
  testability: analyzable
  status: qualified

- requirement_id: R-doc02-JOIN-16
  authority_type: canonical_decision
  authority_document: DOC-02
  source_location: "CANONICAL §12.9 consent"
  source_quote: "consent = default-consented via the join notice, objection→audible-defer-to-organizer, hard-removal = end-bot."
  normalized_statement: >
    IF a participant objects to Proxy's presence THE SYSTEM SHALL audibly defer
    to the organizer rather than continuing unilaterally.
  requirement_type: functional
  criticality: P1
  testability: analyzable
  status: qualified

- requirement_id: R-doc02-JOIN-17
  authority_type: canonical_decision
  authority_document: DOC-02
  source_location: "CANONICAL §12.9 consent"
  source_quote: "consent = default-consented via the join notice, objection→audible-defer-to-organizer, hard-removal = end-bot."
  normalized_statement: >
    WHEN a hard-removal is requested THE SYSTEM SHALL end the bot (leave the
    meeting) rather than merely muting or pausing.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-18
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.9 step 1 (Join)"
  source_quote: "Recall bot joins from a meeting link; consent line posts on join. Provable: bot appears in a real Meet and the line is pinned/posted."
  normalized_statement: >
    WHEN Proxy joins a real meeting THE SYSTEM SHALL make the join provable —
    the bot appears in the meeting and the consent line is pinned/posted in chat.
  requirement_type: observability
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc02-JOIN-19
  authority_type: specification
  authority_document: DOC-02
  source_location: "§3.9 step 1 (Join)"
  source_quote: "Recall bot joins from a meeting link; consent line posts on join. Provable: bot appears in a real Meet and the line is pinned/posted."
  normalized_statement: >
    IF the join fails or the consent line cannot be posted THE SYSTEM SHALL
    report the failure honestly and MUST NOT report a false "joined/posted"
    state.
  requirement_type: resilience
  criticality: P0
  testability: executable
  status: qualified
