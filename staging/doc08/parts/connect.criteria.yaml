# ══════════════════════════════════════════════════════════════════════════════
# GOLDEN PATH — END-TO-END: GITHUB APP CONNECTED → READY WITH REAL COVERAGE
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-CONN-020
  name: "Golden path: GitHub App connected → connect page renders ready with real coverage_pct and flagged file count"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-CONN-04, R-doc08-CONN-09, R-doc08-CONN-10, R-doc08-CONN-14]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A real GitHub App installation has completed and the indexing pipeline has run
      to completion; the Postgres readiness record contains state=ready,
      a real coverage_pct (non-zero, non-100 derived from actual file indexing),
      and a non-empty flagged_files list; GET /connect/status is called unauthenticated.
    when: "The connect page polls GET /connect/status and renders the result"
    then:
      - "The response to GET /connect/status is HTTP 200 with readiness=ready"
      - "The coverage_pct in the response equals the value stored in the Postgres readiness record (not a hardcoded value)"
      - "The connect page renders the ready indicator"
      - "The real coverage percentage is displayed on the page"
      - "The flagged file count derived from the actual flagged_files list is displayed"
      - "No internal component names appear in the rendered page"
      - "The invite instructions section is present"
  primary_oracle:
    type: deterministic
    artifact: "e2e test: complete GitHub App install with fixture repo; await indexing pipeline; call GET /connect/status unauthenticated; assert readiness=ready; assert coverage_pct matches Postgres record; assert rendered page shows real values; assert no internal names; assert invite instructions present"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-020]
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT stub the Readiness row value directly in the route handler"
  golden_path: true
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
    - {tier: e2e}

- criterion_id: AC-CONN-020-NEG
  name: "Golden path degrades honestly when Postgres readiness record is unavailable at e2e boundary"
  authority_refs: [R-doc08-CONN-09, R-doc08-CONN-10]
  dependency_class: db:postgres
  mock_boundary: "negative cassette / real fault at call_external layer; MUST NOT replace the seam"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  criticality: P1
  blocking: true
  behavior:
    given: "The GitHub App install has completed; Postgres is made unavailable before GET /connect/status is called"
    when: "GET /connect/status is called unauthenticated and Postgres faults"
    then:
      - "The response does NOT return readiness=ready with a fabricated coverage_pct"
      - "The response returns a not_ready payload or an honest error — not a synthetic ready result"
      - "No silent proceed to a stale or invented ready state"
      - "The connect page, if rendered, shows an honest failure state"
  primary_oracle:
    type: deterministic
    artifact: "assert response.readiness != 'ready' when Postgres is faulted; assert no fabricated coverage_pct; assert honest failure rendered on connect page"
  thresholds:
    silent_failures_allowed: 0
  fault_model_refs: []
  test_ids: [T-CONN-020-NEG]
