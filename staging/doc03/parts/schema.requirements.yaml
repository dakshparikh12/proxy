# ── Referential integrity ─────────────────────────────────────────────────────

- requirement_id: R-doc03-SCHEMA-19
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Claim.contradicts"
  source_quote: "contradicts (Optional[str] — id of conflicting claim)"
  normalized_statement: >
    WHEN Claim.contradicts is set THE SYSTEM SHALL treat the value as a
    reference to an existing entry id; a contradicts value that points to no
    known entry id SHALL be flagged as a referential integrity violation.
  requirement_type: data_integrity
  criticality: P1
  testability: executable
  status: qualified
