# ── Tool-forcing protocol ────────────────────────────────────────────────────

- requirement_id: R-doc03-SCHEMA-20
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 — tool_choice"
  source_quote: "tool_choice={\"type\": \"tool\", \"name\": \"emit_notes_delta\"}  # force schema-shaped output, no free text"
  normalized_statement: >
    THE SYSTEM SHALL set tool_choice to {"type": "tool", "name":
    "emit_notes_delta"} on every Scribe API call, forcing the model to emit a
    schema-shaped tool_use block and eliminating any free-text path from the
    output.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: vendor:anthropic

- requirement_id: R-doc03-SCHEMA-21
  authority_type: architecture_invariant
  authority_document: DOC-03
  source_location: "§3.2.1 — The Scribe has NO execution tools"
  source_quote: "The Scribe has NO execution tools — the single forced emit_notes_delta is an output shape, not a capability."
  normalized_statement: >
    THE SYSTEM SHALL make emit_notes_delta the only tool registered for the
    Scribe; no execution tools (web fetch, code execution, search, or any other
    capability-granting tool) SHALL be present in the Scribe's tool list.
  requirement_type: architecture_invariant
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

# ── Receipt path ─────────────────────────────────────────────────────────────

- requirement_id: R-doc03-SCHEMA-22
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 — parse_scribe_result"
  source_quote: "extract the forced tool_use, then re-validate with Pydantic ... return NoteDelta.model_validate(block.input)  # belt-and-suspenders"
  normalized_statement: >
    WHEN the Scribe API response is received THE SYSTEM SHALL extract the
    tool_use block named "emit_notes_delta" from the response content and then
    pass block.input to NoteDelta.model_validate, re-validating with Pydantic
    as a belt-and-suspenders check after the tool-forcing at generation time.
  requirement_type: functional
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: vendor:anthropic

# ── Typed error: ScribeMaxTokensError ────────────────────────────────────────

- requirement_id: R-doc03-SCHEMA-23
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 — ScribeMaxTokensError"
  source_quote: "ScribeMaxTokensError: stop_reason == \"max_tokens\" — window/output too big — skip this window"
  normalized_statement: >
    WHEN the Scribe API response has stop_reason equal to "max_tokens" THE
    SYSTEM SHALL raise ScribeMaxTokensError and skip the current window without
    retrying it.
  requirement_type: resilience
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: vendor:anthropic

- requirement_id: R-doc03-SCHEMA-24
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 — Both typed errors are non-retryable"
  source_quote: "Both typed errors are non-retryable at the window level — a dropped window is fine."
  normalized_statement: >
    WHEN ScribeMaxTokensError is raised THE SYSTEM SHALL NOT retry the current
    window; a dropped window is acceptable and the pipeline SHALL proceed to the
    next window.
  requirement_type: resilience
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: vendor:anthropic

