- criterion_id: AC-PERF-14
  name: "COAL_WINDOW_MIN_S and COAL_WINDOW_MAX_S are read from config; defaults 30/60; not hard-coded"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-PERF-14]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "The coalescer with COAL_WINDOW_MIN_S and COAL_WINDOW_MAX_S set to non-default values (e.g., 20 and 45)"
    when:  "The coalescer forms windows under those env-var overrides"
    then:
      - "Windows are cut at the overridden max of 45s, not the default 60s"
      - "The minimum window floor respects the overridden 20s value"
      - "When both env vars are unset, defaults of 30s min and 60s max apply"
      - "No literal '30', '60' window bounds appear in non-configuration source code"
  primary_oracle:
    type: config_override_assertion
    artifact: >
      set COAL_WINDOW_MAX_S=45; run coalescer; assert all windows.duration_s <= 45;
      unset env vars; assert windows.duration_s <= 60; grep: assert no integer literal
      30 or 60 as window bounds outside config parsing code
  thresholds:
    hard_coded_window_bounds_in_non_config_code_allowed: 0
    windows_exceeding_overridden_max_allowed: 0
  fault_model_refs: [F-PERF-WINDOW-HARD-CODED, F-PERF-OVERRIDE-IGNORED]
  test_ids: [T-PERF-14]

- criterion_id: AC-PERF-15
  name: "COAL_WINDOW_CAP_S (45) and COAL_WINDOW_CAP_TOKENS (1200) are configurable; smaller applies"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-PERF-15]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "The coalescer with COAL_WINDOW_CAP_S and COAL_WINDOW_CAP_TOKENS both set; one cap will be hit first"
    when:  "A long or token-dense transcript is processed"
    then:
      - "The window is cut at the cap that is reached first (time or tokens, whichever is smaller)"
      - "Overriding only COAL_WINDOW_CAP_S changes the time cap without affecting the token cap"
      - "Overriding only COAL_WINDOW_CAP_TOKENS changes the token cap without affecting the time cap"
      - "When unset, defaults of 45s and 1200 tokens apply"
  primary_oracle:
    type: config_override_assertion
    artifact: >
      set COAL_WINDOW_CAP_S=30 COAL_WINDOW_CAP_TOKENS=2000; run dense transcript;
      assert window cut at 30s (time cap hit first); set COAL_WINDOW_CAP_S=120
      COAL_WINDOW_CAP_TOKENS=500; run dense transcript; assert window cut at 500 tokens
      (token cap hit first); both caps independently override confirmed
  thresholds:
    wrong_cap_applied_when_other_is_smaller_allowed: 0
    hard_coded_45_or_1200_in_non_config_code_allowed: 0
  fault_model_refs: [F-PERF-WRONG-CAP-APPLIED, F-PERF-CAP-HARD-CODED]
  test_ids: [T-PERF-15]

- criterion_id: AC-PERF-16
  name: "SCRIBE_CALL_TIMEOUT_S (3.5) is configurable; skip-not-retry on timeout"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-PERF-16]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "SCRIBE_CALL_TIMEOUT_S set to a non-default value (e.g., 5.0); a call that stalls for 5.0 + epsilon seconds"
    when:  "The call runs under the configured timeout"
    then:
      - "The call is cancelled at 5.0s (the overridden value), not at 3.5s (the default)"
      - "The window is skipped (not retried) after the timeout"
      - "When SCRIBE_CALL_TIMEOUT_S is unset, the default of 3.5s applies"
      - "No literal '3.5' timeout appears outside configuration parsing code"
  primary_oracle:
    type: config_override_assertion
    artifact: >
      set SCRIBE_CALL_TIMEOUT_S=5.0; inject call that stalls 5.0 + 0.1s; assert cancels
      at ~5.0s not 3.5s; assert retry_count==0; unset env var; assert cancels at ~3.5s;
      grep: assert no literal 3.5 timeout in non-config source
  thresholds:
    timeout_using_non_configured_value_allowed: 0
    retries_after_timeout_allowed: 0
    hard_coded_timeout_in_non_config_code_allowed: 0
  fault_model_refs: [F-PERF-TIMEOUT-HARD-CODED, F-PERF-RETRY-ON-TIMEOUT]
  test_ids: [T-PERF-16]

- criterion_id: AC-PERF-17
  name: "Cache TTL: 5-min ephemeral, exactly two breakpoints (configurable; not one)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-PERF-17]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: null
  mock_boundary: null
  verification_ladder: [lint, unit]
  behavior:
    given: "A Scribe message array assembled under default configuration"
    when:  "The cache_control annotations are inspected"
    then:
      - "Exactly two cache_control breakpoints with type 'ephemeral' are present (never one)"
      - "When SCRIBE_CACHE_BREAKPOINTS is set to 2 (or unset), exactly 2 breakpoints appear"
      - "SCRIBE_CACHE_TTL_S defaults to 300 (5 minutes); the value is read from config, not hard-coded"
      - "Using exactly 1 breakpoint when 2 are configured is rejected as a configuration error"
  primary_oracle:
    type: message_array_structure_assertion
    artifact: >
      assert count(cache_control:{type:'ephemeral'}) == 2 in default config;
      set SCRIBE_CACHE_BREAKPOINTS=1; assert system emits a configuration error;
      grep: assert no literal 300 cache TTL outside config parsing code
  thresholds:
    ephemeral_breakpoints_when_default_config_required: 2
    single_breakpoint_accepted_without_error_allowed: 0
    hard_coded_cache_ttl_in_non_config_code_allowed: 0
  fault_model_refs: [F-PERF-WRONG-BREAKPOINT-COUNT, F-PERF-CACHE-TTL-HARD-CODED]
  test_ids: [T-PERF-17]

