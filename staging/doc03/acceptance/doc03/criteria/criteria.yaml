# ─────────────────────────────────────────────────────────────────────────────
# checkMeetingBudget INTEGRATION — persisted sum readable by Doc 04
# ─────────────────────────────────────────────────────────────────────────────

- criterion_id: AC-COST-12
  name: "checkMeetingBudget reads the cumulative cost from Postgres meeting_cost"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-14]
  criticality: P1
  blocking: true
  golden_path: false
  dependency_class: db:postgres
  mock_boundary: null
  verification_ladder: [lint, unit, integration]
  behavior:
    given: >
      Five Scribe calls have completed for a meeting, each contributing $0.003 to
      meeting_cost (total $0.015 in Postgres); the in-process MEETING_COST dict has
      been cleared (simulating restart)
    when:  "checkMeetingBudget(meeting_id) is called"
    then:
      - "checkMeetingBudget reads from Postgres and returns a budget state reflecting $0.015 spent"
      - "checkMeetingBudget does NOT rely solely on the in-process MEETING_COST dict"
      - "The budget check produces correct over/under-budget determinations based on the persisted sum"
  primary_oracle:
    type: budget_check_db_read_assertion
    artifact: >
      seed meeting_cost with model_usd=0.015; clear MEETING_COST dict;
      result = checkMeetingBudget(meeting_id);
      assert result.spent_usd == 0.015 (or within 1e-9);
      assert result read from Postgres (captured via DB query log)
  thresholds:
    budget_reads_from_in_process_cache_only_allowed: 0

- criterion_id: AC-COST-12-NEG
  name: "checkMeetingBudget handles missing meeting_cost row gracefully (new meeting)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc03-COST-14]
