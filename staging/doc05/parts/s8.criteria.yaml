# Doc 05 (Workroom) — §3.8 acceptance criteria
# Coverage: §3.8 (The propose_change staged-drafts law)
# ID scheme: AC-S8-NNN  (NEG pairs: AC-S8-NNN-NEG)
#
# Three axes:
#   (A) Security architecture — host-side placement, sandbox exclusion, enforcement layers
#   (B) Persistence contract — full bundle before return, GCS path, staged_drafts schema
#   (C) Lifecycle behavior — signature, original resolution, return schema, accept flow
#
# Criticality note: §3.8 is explicitly a LAW (not etiquette). Almost every criterion is P0.
#
# dependency_class values:
#   null              — pure structural / static; zero external systems
#   db:postgres       — depends on real Postgres (staged_drafts table)
#   gcs:objects       — depends on real GCS Object-Versioned bucket
#   vendor:claude-sdk — depends on actual SDK behavior (disallowed_tools MCP filtering)
#
# NEG-pair rule: every non-null dependency_class criterion has a paired AC-S8-NNN-NEG.
# db:postgres criteria carry {tier: integration} + NEG pair.
# gcs:objects criteria carry {tier: integration} + NEG pair.
# vendor:claude-sdk criteria carry {tier: reality} + NEG pair.
# golden_path: true criteria carry {tier: e2e}.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION A — Security architecture (host-side placement, sandbox exclusion)
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S8-001
  name: "propose_change absent from sandbox code toolset (static scan)"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-04, R-doc05-S8-07]
  criticality: P0
  blocking: true
  behavior:
    given: "The sandbox code toolset definition — the list of tool names registered with the E2B sandbox MCP server"
    when: "The toolset definition is inspected statically"
    then:
      - "propose_change (and any variant such as mcp__propose_change__propose_change) does NOT appear in the sandbox code tool name list"
      - "Zero references to propose_change are found in the sandbox server's tool registration paths"
  primary_oracle:
    type: static_analysis
    artifact: "grep -r 'propose_change' <sandbox_tool_registration_paths>; assert 0 matches; AST scan of sandbox tool list definition confirms no propose_change entry"
  thresholds: {propose_change_in_sandbox_toolset: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-001]

- criterion_id: AC-S8-002
  name: "propose_change registered exclusively in host-side in-process SDK MCP server (not sandbox)"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-04, R-doc05-S8-08]
  criticality: P0
  blocking: true
  behavior:
    given: "The Workroom source tree"
    when: "All MCP server registrations are traced statically"
    then:
      - "propose_change appears in exactly one registration path — the host-side in-process SDK MCP server (make_propose_change_server())"
      - "No path registers propose_change on a server that executes inside the E2B sandbox"
      - "The registration site imports host-credential bindings (GCS client, Postgres pool) that are unavailable in the sandbox process"
  primary_oracle:
    type: static_analysis
    artifact: "Call-graph from make_propose_change_server() to propose_change handler; assert handler body imports host-credential modules; grep for propose_change registration outside make_propose_change_server returns 0 matches"
  thresholds: {out_of_host_propose_change_registrations: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-002]

- criterion_id: AC-S8-003
  name: "Sandbox process has no GCS credentials and no Postgres credentials at runtime"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A running E2B sandbox instance provisioned by the Workroom service"
    when: "The sandbox environment is inspected from inside the sandbox process"
    then:
      - "No GCS service-account key, ADC credential file, or GOOGLE_APPLICATION_CREDENTIALS env var is present inside the sandbox"
      - "No DATABASE_URL, PG_DSN, or equivalent Postgres connection variable is present inside the sandbox"
      - "No Cloud SQL proxy socket or Postgres TCP port is reachable from within the sandbox network namespace"
  primary_oracle:
    type: deterministic
    artifact: "Integration test: run a sandbox code tool (run_command) that executes env | grep -E 'GOOGLE|DATABASE|PG_' and asserts empty output; also asserts connection attempt to Postgres host times out or is refused"
  thresholds:
    gcs_credentials_in_sandbox: 0
    postgres_credentials_in_sandbox: 0
    postgres_reachable_from_sandbox: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real E2B sandbox provisioned without credential injection; network egress blocked at provision time"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S8-003]

- criterion_id: AC-S8-003-NEG
  name: "NEG: If credentials were injected into sandbox, propose_change persistence would be reachable from sandbox"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-05]
  criticality: P0
  blocking: true
  behavior:
    given: "A test-only sandbox intentionally provisioned with valid Postgres credentials (control experiment)"
    when: "Sandbox code attempts to connect to Postgres"
    then:
      - "The connection succeeds — confirming that the production sandbox's credential absence is the decisive guard, not code-level restriction alone"
  primary_oracle:
    type: deterministic
    artifact: "Control: sandbox with DATABASE_URL set; assert Postgres connection succeeds from within sandbox; confirms production defense is credential exclusion"
  thresholds:
    postgres_connection_in_control: {minimum: 1}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Isolated test-only sandbox with injected credentials; never run against production DB"
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S8-003-NEG]

- criterion_id: AC-S8-004
  name: "make_propose_change_server() is factory-per-query: two concurrent workers receive independent server instances"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-06]
  criticality: P0
  blocking: true
  behavior:
    given: "Two concurrent worker query sessions starting simultaneously"
    when: "make_propose_change_server() is called once per session"
    then:
      - "The two returned server objects are distinct instances (different object identities)"
      - "State written to one server instance (e.g., a draft_id in progress) is not visible in the other"
      - "No module-level singleton is shared between the two instances"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: call make_propose_change_server() twice concurrently; assert id(server_a) != id(server_b); assert no shared mutable state via introspection of server internals"
  thresholds: {shared_state_between_server_instances: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-004]

- criterion_id: AC-S8-005
  name: "propose_change mounted only for worker disposition; absent for quick, plan, and critic dispositions"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-09]
  criticality: P0
  blocking: true
  behavior:
    given: "The disposition-to-MCP-server mapping in workroom_options or equivalent dispatch logic"
    when: "The mapping is inspected statically for all four dispositions (quick, plan, critic, worker)"
    then:
      - "make_propose_change_server() is called and included in mcp_servers only when disposition == 'worker'"
      - "For quick, plan, and critic dispositions, make_propose_change_server() is NOT called and no propose_change server appears in mcp_servers"
  primary_oracle:
    type: static_analysis
    artifact: "AST scan of disposition dispatch: assert make_propose_change_server() call is gated behind disposition == 'worker'; assert non-worker branches contain no propose_change server inclusion; unit test each disposition's effective mcp_servers list"
  thresholds: {propose_change_server_in_non_worker_disposition: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-005]

- criterion_id: AC-S8-006
  name: "No alternative write-to-world path exists: no raw git push, subprocess push, or direct GCS write outside propose_change"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-01, R-doc05-S8-02, R-doc05-S8-24]
  criticality: P0
  blocking: true
  behavior:
    given: "The full Workroom service source tree (excluding propose_change's own persistence body)"
    when: "The source is scanned for world-touching write patterns"
    then:
      - "Zero occurrences of raw git push commands (subprocess git push, Dulwich push, PyGit2 push) are found outside the propose_change handler"
      - "Zero direct staging_drafts INSERT statements exist outside the propose_change persistence path"
      - "Zero GCS write operations (upload_from_string, upload_from_file, copy_blob) exist outside the propose_change persistence path and the explicit accept handler"
  primary_oracle:
    type: static_analysis
    artifact: "grep -rE 'git push|subprocess.*push|[.]push[(]|gcs.*upload|storage.*upload' <workroom_source> excluding propose_change module; assert 0 matches; additional AST scan for INSERT INTO staged_drafts outside propose_change module"
  thresholds:
    raw_git_push_calls_outside_propose_change: 0
    gcs_writes_outside_propose_change_and_accept: 0
    staged_drafts_inserts_outside_propose_change: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-006]

- criterion_id: AC-S8-007
  name: "tool-list partitioning: propose_change and sandbox write tools live in separate MCP servers"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-22]
  criticality: P0
  blocking: true
  behavior:
    given: "The MCP server construction code for the worker disposition"
    when: "The server list passed to ClaudeAgentOptions is inspected"
    then:
      - "propose_change is registered in a server instance created by make_propose_change_server() (host-side)"
      - "Sandbox write tools (write_file, edit_file, ast_grep, run_command) are registered in a separate sandbox server instance"
      - "The two servers are distinct objects; no server instance carries both propose_change and sandbox write tools"
  primary_oracle:
    type: static_analysis
    artifact: "Trace mcp_servers list construction for worker disposition; assert two distinct server objects; assert propose_change handler is not present in sandbox server's tool registry and vice versa"
  thresholds: {servers_carrying_both_propose_change_and_sandbox_writes: 0}
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S8-007]

- criterion_id: AC-S8-008
  name: "Raw-write MCP tools blocked via disallowed_tools, not allowed_tools omission alone"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-23]
  criticality: P0
  blocking: true
  behavior:
    given: "A read-only Workroom disposition where raw-write MCP tools (e.g. a hypothetical mcp__git__push connector) must be blocked"
    when: "The agent attempts to call such a tool despite it being absent from allowed_tools"
    then:
      - "The SDK allows the call — confirming that omission from allowed_tools alone does NOT block MCP tools"
      - "Only inclusion in disallowed_tools prevents the call"
  primary_oracle:
    type: deterministic
    artifact: "SDK adversarial test: register a canary MCP write tool; omit it from allowed_tools but NOT disallowed_tools; agent calls it successfully — confirms disallowed_tools is the required gate; repeat with tool in disallowed_tools and assert call is blocked"
  thresholds: {raw_write_mcp_tool_blocked_by_allowed_tools_omission_alone: 0}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with canary MCP tool registered; cassette at LLM boundary"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S8-008]

- criterion_id: AC-S8-008-NEG
  name: "NEG: disallowed_tools absent for raw-write MCP tool allows it to be called (confirms disallowed_tools is the gate)"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-23]
  criticality: P0
  blocking: true
  behavior:
    given: "A read-only disposition with a raw-write MCP tool absent from both allowed_tools and disallowed_tools"
    when: "The agent attempts to call the tool"
    then:
      - "The SDK does NOT block the call — confirming the threat is real and disallowed_tools is required"
  primary_oracle:
    type: deterministic
    artifact: "Control: canary write MCP tool omitted from allowed_tools AND disallowed_tools; agent call succeeds; assert tool handler executed"
  thresholds: {canary_tool_executions_in_control: {minimum: 1}}
  dependency_class: vendor:claude-sdk
  mock_boundary: "Real SDK with canary MCP tool; cassette at LLM boundary; isolated test environment only"
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S8-008-NEG]

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION B — Persistence contract (full bundle, GCS, staged_drafts)
# ═══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-S8-009
  name: "Full bundle persisted to GCS before propose_change returns (not deferred)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-13, R-doc05-S8-14]
  criticality: P0
  blocking: true
  behavior:
    given: "A propose_change call with a multi-file bundle"
    when: "The tool body executes"
    then:
      - "The GCS write completes and is confirmed (no exception raised, no deferred write scheduled) before the function's return statement"
      - "If the GCS write raises an exception, the function raises (does not return a draft_id)"
      - "The staged_drafts INSERT also completes before return"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with mocked GCS client: monkey-patch upload to record call order; assert gcs_upload called before propose_change returns; assert that if upload raises, no draft_id is returned; verify with asyncio event-loop ordering for async paths"
  thresholds:
    drafts_returned_without_gcs_write: 0
    drafts_returned_with_deferred_write: 0
  dependency_class: gcs:objects
  mock_boundary: "GCS client replaced by in-memory spy; Postgres replaced by in-memory fixture"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-009]

- criterion_id: AC-S8-009-NEG
  name: "NEG: If GCS write is deferred to accept time, sandbox teardown breaks acceptance"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-13]
  criticality: P0
  blocking: true
  behavior:
    given: "A patched propose_change that skips the GCS write at call time and records only a draft_id"
    when: "The sandbox is torn down and then the accept handler fires using the draft_id"
    then:
      - "The accept handler finds no GCS object at the expected path (KeyError or NotFound)"
      - "Acceptance fails — confirming that deferred writes are not a viable design"
  primary_oracle:
    type: deterministic
    artifact: "Integration test: patched propose_change skips GCS write; teardown sandbox; accept handler fires; assert GCS NotFound error or accept handler error response"
  thresholds: {}
  dependency_class: gcs:objects
  mock_boundary: "GCS client spy; in-memory fixture"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-009-NEG]

- criterion_id: AC-S8-010
  name: "GCS write uses Object-Versioned storage (not plain unversioned GCS)"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S8-14]
  criticality: P0
  blocking: true
  behavior:
    given: "The propose_change persistence code and the GCS bucket configuration used for staged drafts"
    when: "The write path and bucket settings are inspected"
    then:
      - "The target GCS bucket has Object-Versioning enabled (verified via bucket metadata or infrastructure-as-code config)"
      - "The write call does not pass an explicit generation-match precondition that would silence versioning"
  primary_oracle:
    type: static_analysis
    artifact: "Inspect Terraform/IaC config for the staged-drafts bucket: assert versioning { enabled = true }; AST scan of propose_change write call: assert no generation=0 or if_generation_match=0 that would disable versioning semantics"
  thresholds: {staged_drafts_bucket_versioning_disabled: 0}
  dependency_class: gcs:objects
  mock_boundary: "Bucket config inspected from IaC; GCS client mocked for unit tests"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-010]

- criterion_id: AC-S8-010-NEG
  name: "NEG: Without Object-Versioning, overwrite of a bundle silently loses prior version"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-14]
  criticality: P0
  blocking: false
  behavior:
    given: "A test-only GCS bucket with versioning disabled"
    when: "Two propose_change calls write bundles to the same path (UUID collision simulated)"
    then:
      - "The second write silently overwrites the first — the prior version is gone with no recovery path"
      - "This confirms Object-Versioning is the durability guard, not application-level deduplication"
  primary_oracle:
    type: deterministic
    artifact: "Integration test against unversioned bucket: two writes to same path; assert only one version returned by GCS list; confirms versioning is required"
  thresholds: {}
  dependency_class: gcs:objects
  mock_boundary: "Real GCS bucket with versioning disabled; test-only data only"
  golden_path: false
  verification_ladder:
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-010-NEG]

- criterion_id: AC-S8-011
  name: "GCS path matches staged/{meeting_id}/{uuid4()}.bundle format"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-15]
  criticality: P0
  blocking: true
  behavior:
    given: "A propose_change call with meeting_id='aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee'"
    when: "The GCS write is recorded"
    then:
      - "The GCS object path matches the regex: ^staged/[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}/[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\\.bundle$"
      - "The meeting_id segment exactly matches the provided meeting_id UUID"
      - "The filename UUID is freshly generated per call (not derived from meeting_id or draft content)"
  primary_oracle:
    type: deterministic
    artifact: "Unit test with GCS spy: capture blob_name from upload call; assert re.fullmatch(r'^staged/<meeting_id>/<uuid4>.bundle$', blob_name) passes; call twice and assert the two filename UUIDs are distinct"
  thresholds: {gcs_path_format_violations: 0}
  dependency_class: gcs:objects
  mock_boundary: "GCS client replaced by spy recording blob_name; no real GCS call"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-011]

- criterion_id: AC-S8-011-NEG
  name: "NEG: Path without meeting_id prefix makes cross-meeting bundle retrieval ambiguous"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-15]
  criticality: P0
  blocking: false
  behavior:
    given: "A patched propose_change that writes to drafts/{uuid4()}.bundle (no meeting_id prefix)"
    when: "Two meetings each create a draft"
    then:
      - "The accept handler cannot determine which meeting a bundle belongs to without a DB lookup — namespace collision is possible"
      - "This confirms the staged/{meeting_id}/ prefix is a structural requirement, not a cosmetic choice"
  primary_oracle:
    type: deterministic
    artifact: "Test: two patched calls produce paths without meeting_id segment; assert listing staged/ returns both blobs with no disambiguation"
  thresholds: {}
  dependency_class: gcs:objects
  mock_boundary: "GCS spy; in-memory fixture"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S8-011-NEG]

- criterion_id: AC-S8-012
  name: "staged_drafts row inserted with correct fields: meeting_id (UUID), kind, summary, artifact_ref, status='proposed'"
  evidence_class: "[integration]"
  authority_refs: [R-doc05-S8-16, R-doc05-S8-17]
  criticality: P0
  blocking: true
  behavior:
    given: "A propose_change call with meeting_id=UUID('aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee'), kind='code-change', summary='Fix null check', and a two-file bundle"
    when: "The call completes"
    then:
      - "Exactly one row exists in staged_drafts with meeting_id == UUID('aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee')"
      - "The row's kind field == 'code-change'"
      - "The row's summary field == 'Fix null check'"
      - "The row's artifact_ref matches the GCS path written in the same call"
      - "The row's status field == 'proposed'"
  primary_oracle:
    type: deterministic
    artifact: "Integration test: SELECT * FROM staged_drafts WHERE meeting_id='aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee'; assert exactly one row; assert all five fields match expected values"
  thresholds: {missing_staged_drafts_row: 0, wrong_status_on_insert: 0}
  dependency_class: db:postgres
  mock_boundary: "Postgres replaced by in-memory fixture with matching schema for unit tier; real Postgres for integration tier"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-012]

- criterion_id: AC-S8-012-NEG
  name: "NEG: staged_drafts row absent when propose_change persistence is skipped"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S8-16]
