# Sweep-2 gap closure (patch) — appended to acceptance/doc02/criteria/criteria.yaml by the conductor.
# Closes review-gaps.md items: (4) live-work liveness, (5) swap-announcement channel/spoken-path, (6) failure-honesty text-copy parity.
- criterion_id: AC-CANVAS-16
  name: Live-work view advances with progress — not a static frame
  evidence_class: '[simulation]'
  authority_refs: [R-doc02-CANVAS-16]
  criticality: P1
  blocking: true
  behavior:
    given: An active sandbox live-work view while underlying work progresses over a work interval, with N>=1 upstream work-progress events
    when: The rendered content states of the structured progress view are sampled across the whole work interval
    then:
    - The view emits >= 1 new (distinct) content state per upstream work-progress event — the progress view visibly advances as work forms
    - No single static frame spans the entire work interval; the gap between successive content updates never exceeds max_static_interval_ms while work is active (a once-rendered, never-updated card fails)
  primary_oracle:
    type: simulation_trace
    artifact: 'hash the rendered content-state at each sample; assert distinct_states >= progress_events AND max inter-update gap <= max_static_interval_ms while work_active; assert NOT (distinct_states == 1 for a work interval > max_static_interval_ms)'
  thresholds:
    static_full_interval_allowed: 0
    missed_progress_updates_allowed: 0
    max_static_interval_ms: 3000  # cadence not spec-pinned — conservative default, confirm-at-build; independent of fps (AC-CANVAS-15 stays non-gating)
  fault_model_refs:
  - F-LIVEWORK-STATIC-FRAME
  test_ids:
  - T-CANVAS-16
- criterion_id: AC-CANVAS-17
  name: Swap announcement is on a human-observable channel, not a silent log line
  evidence_class: '[simulation]'
  authority_refs: [R-doc02-CANVAS-17, R-doc02-CANVAS-10]
  criticality: P1
  blocking: true
  behavior:
    given: A camera<->screen swap that R-doc02-CANVAS-10 requires to be announced
    when: The announcement emitted for the swap is classified by channel
    then:
    - The announcement is emitted on a human-observable channel (the spoken headline via Output Media, or a chat post)
    - A log-only / telemetry-only emission does NOT satisfy the announcement (a silent log line paired to the swap fails the oracle)
  primary_oracle:
    type: state_machine_assertion
    artifact: 'for each announced swap, assert an announcement artifact exists on channel in {spoken_output_media, chat}; assert 0 swaps whose only paired announcement is a log/telemetry line'
  thresholds:
    silent_log_only_announcement_allowed: 0
    swap_without_observable_announcement_allowed: 0
  fault_model_refs:
  - F-SWAP-ANNOUNCE-SILENT-LOG
  test_ids:
  - T-CANVAS-17
- criterion_id: AC-CANVAS-18
  name: Spoken swap headline is boundary-gated, one-voice, and text-copy parity
  evidence_class: '[simulation]'
  authority_refs: [R-doc02-CANVAS-17, R-doc02-SPEAK-07, R-doc02-SPEAK-03, R-doc02-SPEAK-06]
  criticality: P1
  blocking: true
  behavior:
    given: A swap-to-screen whose announcement is delivered as the spoken headline
    when: The spoken headline is emitted and its speak-path is inspected
    then:
    - Audio for the headline begins only on/after a boundary signal (§3.6 / R-doc02-SPEAK-07) — no pre-boundary audio
    - The headline is synthesized in the single configured voice/register (R-doc02-SPEAK-03)
    - The posted chat copy of the headline is byte-equal to the synthesized text (R-doc02-SPEAK-06 parity) — no paraphrase between spoken and written forms
  primary_oracle:
    type: state_machine_assertion
    artifact: 'assert headline first-audio ts >= boundary ts; assert voice_id == configured_voice; assert chat_post.text == synthesize.input_text for the headline line-id'
  thresholds:
    headline_audio_before_boundary_allowed: 0
    nonconfigured_voice_allowed: 0
    headline_copy_mismatch_allowed: 0
  fault_model_refs:
  - F-SWAP-HEADLINE-UNGATED
  - F-SPEAK-TEXT-COPY-PARAPHRASED
  test_ids:
  - T-CANVAS-18
- criterion_id: AC-FAIL-19
  name: Rejoin gap line, when spoken, keeps byte-equal text-copy parity
  evidence_class: '[fault-injection]'
  authority_refs: [R-doc02-FAIL-03, R-doc02-SPEAK-06]
  criticality: P1
  blocking: true
  behavior:
    given: A forced disconnect and successful rejoin whose honest gap line ("I was disconnected 14:03-14:04 — notes have a gap there") is delivered
    when: The gap line's delivery channels are compared
    then:
    - The gap line is emitted to notes/chat as text (record-safe by construction)
    - If the gap line is also spoken, its chat/text copy is byte-equal to the synthesized text (R-doc02-SPEAK-06 parity) — no paraphrase between the spoken and written gap line
  primary_oracle:
    type: fault_injection
    artifact: 'inject drop@t0, rejoin@t1; assert a gap-line text artifact exists; if a spoken variant exists assert chat_post.text == synthesize.input_text for the gap line-id'
  thresholds:
    gap_line_copy_mismatch_allowed: 0
    spoken_gap_line_without_text_copy_allowed: 0
  fault_model_refs:
  - F-SILENT-AUDIO-GAP
  - F-SPEAK-TEXT-COPY-PARAPHRASED
  test_ids:
  - T-FAIL-19
- criterion_id: AC-FAIL-20
  name: Voice-down notice is text; any spoken variant keeps text-copy parity
  evidence_class: '[fault-injection]'
  authority_refs: [R-doc02-FAIL-12, R-doc02-SPEAK-06]
  criticality: P2
  blocking: true
  behavior:
    given: A TTS/voice outage where the "voice is down — I'll type" notice is emitted
    when: The notice's delivery is inspected
    then:
    - The notice is delivered as chat text (text by construction when voice is down) and is not dropped
    - If a spoken variant of the notice is ever emitted, its text copy is byte-equal to the synthesized text (R-doc02-SPEAK-06 parity) — no paraphrase
  primary_oracle:
    type: fault_injection
    artifact: 'inject TTS outage; assert voice-down notice chat text exists; if a spoken variant exists assert chat_post.text == synthesize.input_text for the notice line-id'
  thresholds:
    voice_down_notice_missing_allowed: 0
    voice_down_notice_copy_mismatch_allowed: 0
  fault_model_refs:
  - F-TTS-DOWN-MUTE
  - F-SPEAK-TEXT-COPY-PARAPHRASED
  test_ids:
  - T-FAIL-20
