# Acceptance Criteria — Doc 08 Experience, UI & Surfaces · §2.6 Join, consent, and close
# ID prefix: AC-JOINCLOSE-NNN / AC-JOINCLOSE-NNN-NEG
# Paired requirements: R-doc08-JOINCLOSE-01 through R-doc08-JOINCLOSE-23
# Authority: DOC-08 §2.6
#
# Dependency classes in use:
#   db:postgres    — codebase index metadata (freshness), note_deltas, staged_drafts,
#                    revocation registry, task log
#   vendor:recall  — platform roster events (late-joiner), meeting-end signal, chat/pin API
#   gcs:objects    — transcript storage (transcript pointer section)
#
# Five laws enforced:
#   Law 1 (Grounded or silent)  — consent line carries repo name + computed freshness
#   Law 2 (Never overstate)     — notes file is a designed artifact, not a dump
#   Law 3 (Human control)       — accept/reject protected(); token is read-only
#   Law 4 (Dynamic not hardcoded) — repo name and freshness computed at runtime
#   Law 5 (Talk-and-glance)     — close line posted before bot leaves; notes scannable in 30s
#
# Golden paths: AC-JOINCLOSE-002 (E2E join consent), AC-JOINCLOSE-016 (close line + drafts)

# ════════════════════════════════════════════════════════════════
