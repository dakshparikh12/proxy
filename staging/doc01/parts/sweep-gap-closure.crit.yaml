# ── Gap 1: 100% parse on exact-supported files IS a readiness gate condition ──
- criterion_id: AC-M6-005
  name: "Readiness withheld when an exact-supported non-flagged file fails to parse (generated/vendor excluded)"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.7-05]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo in an exact-supported (language, ORM) stack where one non-flagged
      source file has a hard parse error, AND a separate generated/vendor file that also
      fails to parse but is legitimately flagged (flag_reason in {generated, vendor}).
    when: >
      The readiness gate evaluates parse coverage.
    then:
      - Readiness is NOT set to 'ready' (the unparsed exact-supported file blocks the gate).
      - The failure is surfaced in gaps, not silently absent.
      - The flagged generated/vendor parse failure does NOT block the gate (it is excluded).
  applicability:
    fixtures: [fixture-exact-supported-parse-fail, fixture-generated-vendor-flagged]
    estates: []
    excluded_estates: []
    rationale: "Parse-clean on exact-supported files is an explicit gate condition, with generated/vendor carved out."
  primary_oracle:
    type: readiness_enum_and_exclusion_check
    artifact: "emitted readiness != 'ready' for unparsed exact-supported file; readiness ignores flagged generated/vendor parse failure"
  thresholds:
    unparsed_exact_supported_allowed_in_ready: 0
  test_ids: [T-M6-005, T-M6-006]
  fault_model_refs: [F-PARSE-GATE-NOT-ENFORCED, F-GENERATED-VENDOR-BLOCKS-GATE]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M6-005
    - junit:T-M6-006

# ── Gap 4: capability tiers recorded per area/stack AT INDEX TIME ──
- criterion_id: AC-M6-006
  name: "who_writes capability tier recorded per area/stack in the readiness record at index time"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.7-06]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo with a mix of areas/stacks (a Django area -> exact-supported,
      a symbol-exact-only stack, and a search-only stack). No query is issued.
    when: >
      The index build completes and the persisted readiness/coverage record is inspected
      directly (before any tool query runs).
    then:
      - Every area/stack row carries a who_writes tier field.
      - Each tier value is exactly one of: exact-supported, symbol-exact, search-only.
      - The tier for the Django area == 'exact-supported' (matches the golden pre-computed tiers).
      - The tiers are present in the persisted record (pre-computed at index time, not derived at query time).
  applicability:
    fixtures: [fixture-mixed-stack-tiers]
    estates: [estate-cova]
    excluded_estates: []
    rationale: "Honesty labels must be pre-computed at index time, per §3.7 gate bullet 3."
  primary_oracle:
    type: deterministic_golden_record_field_check
    artifact: goldens/fixture-mixed-stack-tiers/capability-tiers.json
  thresholds:
    areas_missing_tier_allowed: 0
    wrong_tier_allowed: 0
  test_ids: [T-M6-007]
  fault_model_refs: [F-TIER-NOT-RECORDED, F-TIER-COMPUTED-AT-QUERY-TIME]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M6-007

# ── Gap 5: graph smoke check GATES readiness ──
- criterion_id: AC-M6-007
  name: "Readiness withheld when the graph smoke check fails"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.7-07]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo whose graph is corrupted so a known-symbol sample resolves to the
      wrong file:line (and/or get_dependents/who_writes return wrong callers/writers)
      through the live path.
    when: >
      The readiness gate runs its graph smoke check.
    then:
      - Readiness is NOT set to 'ready' when any smoke-check sample fails.
      - On the mirror-image happy-path fixture (all smoke samples resolve correctly),
        readiness reaches 'ready' (smoke check is a genuine precondition, not a no-op).
      - The smoke check runs at first build AND re-runs per push.
  applicability:
    fixtures: [fixture-graph-smoke-fail, fixture-graph-smoke-pass]
    estates: []
    excluded_estates: []
    rationale: "'ready' requires the smoke check to pass — it must actually gate."
  primary_oracle:
    type: readiness_enum_check
    artifact: "readiness != 'ready' when smoke sample mismatches golden file:line; readiness == 'ready' when all match"
  thresholds:
    smoke_mismatch_allowed_in_ready: 0
  test_ids: [T-M6-008]
  fault_model_refs: [F-SMOKE-CHECK-NOT-GATED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M6-008

# ── Gap 6: coverage_pct is REPORTED, not a gate ──
- criterion_id: AC-M6-008
  name: "Fully-classified repo with honestly-labeled gaps reaches 'ready' despite low coverage_pct"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.7-08]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo that is 100% classified (indexed + flagged == git ls-files), passes
      parse/tier/smoke gates, but has a deliberately LOW coverage_pct (e.g. 0.30) because
      many files are honestly flagged, with the specific gaps listed.
    when: >
      The readiness gate is evaluated.
    then:
      - Readiness == 'ready' (the low coverage_pct does NOT block the join).
      - coverage_pct is still reported (== 0.30) and the gaps list is non-empty.
      - No gate branch reads coverage_pct as a pass/fail threshold.
  applicability:
    fixtures: [fixture-low-coverage-fully-classified]
    estates: []
    excluded_estates: []
    rationale: "coverage_pct is reported for honesty, never a gate (§3.7)."
  primary_oracle:
    type: readiness_enum_and_field_check
    artifact: "readiness == 'ready'; 0 < coverage_pct < 1.0; len(gaps) > 0"
  thresholds:
    coverage_pct_used_as_gate: 0
  test_ids: [T-M6-009]
  fault_model_refs: [F-COVERAGE-PCT-USED-AS-GATE]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M6-009

# ── Gap 7: external references into uninstalled deps labeled, never dropped ──
- criterion_id: AC-M8-005
  name: "find_references labels references into uninstalled third-party deps 'external-references-not-resolved', never dropped"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.5-13]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo importing an uninstalled third-party dependency, with a known symbol
      whose references cross into that uninstalled dep. Golden set enumerates the N
      external references.
    when: >
      find_references(symbol) is called.
    then:
      - All N external references are returned (count == N; none silently dropped).
      - Each external reference is labeled 'external-references-not-resolved'.
      - The label is distinct from the grep-fallback 'lower-bound' tag (not conflated).
  applicability:
    fixtures: [fixture-uninstalled-dep-references]
    estates: []
    excluded_estates: []
    rationale: "External-dep references get a distinct honest label and are never dropped."
  primary_oracle:
    type: result_count_and_label_check
    artifact: "len(external_refs) == N; all labeled 'external-references-not-resolved'"
  thresholds:
    external_refs_dropped_allowed: 0
    external_refs_mislabeled_allowed: 0
  test_ids: [T-M8-006]
  fault_model_refs: [F-EXTERNAL-REF-DROPPED, F-EXTERNAL-REF-MISLABELED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M8-006

# ── Gap 8: partial parse of a broken/mid-edit SUPPORTED-language file ──
- criterion_id: AC-M4-011
  name: "Broken/mid-edit supported-language file: valid spans indexed, broken span flagged, file still searchable"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-4-02]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo containing a supported-language file (has a tree-sitter grammar) that
      is broken mid-edit: some top-level declarations parse cleanly, one span has a syntax
      error. (Distinct from AC-M4-010 grammarless: here the language IS supported.)
    when: >
      The structural substrate build completes.
    then:
      - The valid declarations appear as graph nodes (indexed spans are not lost).
      - The broken span is flagged (recorded, not silently dropped).
      - The file is reachable via live search (ripgrep finds its content).
  applicability:
    fixtures: [fixture-mid-edit-broken-file]
    estates: []
    excluded_estates: []
    rationale: "Partial-parse recovery on supported languages differs from grammarless flagging."
  primary_oracle:
    type: graph_node_and_flag_and_search_check
    artifact: "valid spans present as nodes; broken span flagged; ripgrep finds content"
  thresholds:
    valid_spans_lost_allowed: 0
  test_ids: [T-M4-013]
  fault_model_refs: [F-PARTIAL-PARSE-DROPS-VALID-SPANS, F-BROKEN-SPAN-NOT-FLAGGED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M4-013

# ── Gap 9 (minor): ranked overview produced as a token-budgeted artifact ──
- criterion_id: AC-M4-012
  name: "Ranked overview is produced as a token-budgeted artifact within the configured budget"
  evidence_class: "[unit-property]"
  authority_refs: [R-DOC01-3.4-08]
  criticality: P2
  blocking: false
  behavior:
    given: >
      A fixture repo large enough that an unbudgeted overview would exceed the cap.
    when: >
      The ranked overview is built.
    then:
      - The overview is emitted as a discrete token-budgeted artifact.
      - Its measured token count is <= the configured overview budget (provisional default 6000 tokens).
      - Truncation (when applied) keeps the highest-PageRank areas/symbols (budget spends on importance).
  applicability:
    fixtures: [fixture-large-repo-overview]
    estates: [estate-flask]
    excluded_estates: []
    rationale: "Overview is specified as token-budgeted; a runaway overview breaks session-start injection."
  primary_oracle:
    type: token_count_threshold_check
    artifact: "count_tokens(overview) <= overview_token_budget"
  thresholds:
    overview_token_budget: 6000
  test_ids: [T-M4-014]
  fault_model_refs: [F-OVERVIEW-UNBUDGETED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M4-014
  # Budget is a §4 tunable default (no config-defaults key yet); 6000 is a provisional cap.
