# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 7 · Progress transparency
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-17
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 7"
  source_quote: "Long tasks produce periodic one-line updates in chat (\"still building — tests running, ~3 min\"), and the tile's working line stays current."
  normalized_statement: >
    WHEN a long-running task is in progress THE SYSTEM SHALL post one-line chat updates
    reflecting task state and SHALL keep the tile's working line current.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-18
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 7"
  source_quote: "the render policy is: update on real state change, never on a timer."
  normalized_statement: >
    WHEN the progress-update renderer determines when to post an update THE SYSTEM SHALL
    emit an update only on a real Doc 05 progress-envelope state-change event and SHALL NOT
    use a timer, polling loop, sleep, or scheduled callback to trigger any progress update.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-19
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 7"
  source_quote: "the tile's working line stays current."
  normalized_statement: >
    WHEN a new Doc 05 progress envelope is received THE SYSTEM SHALL update the tile's
    working line within one render cycle to reflect the current state description from the
    envelope.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified


# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 8 · Draft cards
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-20
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "Every staged draft posts as a consistent chat card: what it is → what it changes (one-line summary) → the link → \"approve = your click.\""
  normalized_statement: >
    WHEN a staged draft is produced THE SYSTEM SHALL post a chat card containing in order:
    (1) what the draft is, (2) a one-line summary of what it changes, (3) the review link,
    (4) the text "approve = your click".
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-21
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "The link points at the authenticated `/m/{meeting_id}` home (§2.8), never a raw GCS URI."
  normalized_statement: >
    WHEN a draft card link is set THE SYSTEM SHALL point the link at the authenticated
    /m/{meeting_id} home URL and SHALL NOT use a raw GCS URI or any other unauthenticated
    storage URL as the link target.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-22
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "The card carries the persisted `draft_id` (the `staged_drafts` row Doc 05 wrote at `propose_change` time, CANONICAL §4)."
  normalized_statement: >
    WHEN a draft card is rendered THE SYSTEM SHALL set the card's draft_id to the value
    from the persisted staged_drafts database row written at propose_change time and SHALL
    NOT use any invented or in-memory identifier.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-23
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "the accept click posts that `draft_id` to `POST /m/{meeting_id}/drafts/{draft_id}/accept`, which server-side re-checks `meeting/draft→tenant`, reads the persisted row, and calls Doc 04's accept handler."
  normalized_statement: >
    WHEN POST /m/{meeting_id}/drafts/{draft_id}/accept is called THE SYSTEM SHALL re-check
    that the draft's tenant matches the meeting's tenant, read the persisted staged_drafts
    row, and then call Doc 04's accept handler; THE SYSTEM SHALL reject the request if the
    tenant check fails.
  requirement_type: security
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-24
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "never an in-memory `review_session` object (which dies at sandbox teardown)."
  normalized_statement: >
    WHEN the accept route handles an accept request THE SYSTEM SHALL read draft data from
    the persisted staged_drafts database row and SHALL NOT reference any in-memory
    review_session object to fulfill the accept.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-25
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "the approve/reject buttons live there, tenant-checked and idempotent."
  normalized_statement: >
    WHEN POST /m/{meeting_id}/drafts/{draft_id}/accept is called more than once for the same
    draft_id THE SYSTEM SHALL handle duplicate invocations idempotently, calling Doc 04's
    accept handler at most once and returning a success response on duplicates.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-26
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 8"
  source_quote: "The `draft_id` the card renders is the `Envelope.draft_id` field: the `Bundle` (04→05) and `Envelope` (05→04) Pydantic models both live in `libs/contracts` (CANONICAL §11.5)."
  normalized_statement: >
    WHEN the draft card renderer and the accept route both access draft_id THE SYSTEM SHALL
    read it from the typed Envelope.draft_id or Bundle.draft_id field defined in
    libs/contracts and SHALL NOT define an ad-hoc draft_id field independently in either
    module.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified


# ─────────────────────────────────────────────────────────────────────────────
# FEATURE 9 · Session preferences, spoken
# ─────────────────────────────────────────────────────────────────────────────

- requirement_id: R-doc08-FEAT-27
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 9"
  source_quote: "\"Proxy, keep answers shorter\" / \"stop posting decision notes\" → acknowledged and held for the session (it lands in Proxy's session-state digest — Doc 04 — and shapes behavior)."
  normalized_statement: >
    WHEN a participant speaks a session preference THE SYSTEM SHALL acknowledge the preference
    and store it in the Doc 04 session-state digest for the duration of the session.
  requirement_type: functional
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-28
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 9"
  source_quote: "No settings page; the meeting *is* the settings page."
  normalized_statement: >
    WHEN session preferences are set THE SYSTEM SHALL accept them exclusively via spoken
    commands during the meeting and SHALL NOT require any separate settings page or UI to
    configure session behavior.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-FEAT-29
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.4 item 9"
  source_quote: "Session-scoped only in V0; persistent preferences are V1."
  normalized_statement: >
    WHEN a session ends THE SYSTEM SHALL discard all session preferences and SHALL NOT carry
    them forward to any subsequent session; cross-session preference persistence is not
    implemented in V0.
  requirement_type: constraint
  criticality: P1
  testability: executable
  status: qualified


