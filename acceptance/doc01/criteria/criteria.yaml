# ── Gap 1: 100% parse on exact-supported files IS a readiness gate condition ──
- criterion_id: AC-M6-005
  name: "Readiness withheld when an exact-supported non-flagged file fails to parse (generated/vendor excluded)"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.7-05]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo in an exact-supported (language, ORM) stack where one non-flagged
      source file has a hard parse error, AND a separate generated/vendor file that also
      fails to parse but is legitimately flagged (flag_reason in {generated, vendor}).
    when: >
      The readiness gate evaluates parse coverage.
    then:
      - Readiness is NOT set to 'ready' (the unparsed exact-supported file blocks the gate).
      - The failure is surfaced in gaps, not silently absent.
      - The flagged generated/vendor parse failure does NOT block the gate (it is excluded).
  applicability:
    fixtures: [fixture-exact-supported-parse-fail, fixture-generated-vendor-flagged]
    estates: []
    excluded_estates: []
    rationale: "Parse-clean on exact-supported files is an explicit gate condition, with generated/vendor carved out."
  primary_oracle:
    type: readiness_enum_and_exclusion_check
    artifact: "emitted readiness != 'ready' for unparsed exact-supported file; readiness ignores flagged generated/vendor parse failure"
  thresholds:
    unparsed_exact_supported_allowed_in_ready: 0
  test_ids: [T-M6-005, T-M6-006]
  fault_model_refs: [F-PARSE-GATE-NOT-ENFORCED, F-GENERATED-VENDOR-BLOCKS-GATE]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M6-005
    - junit:T-M6-006

# ── Gap 4: capability tiers recorded per area/stack AT INDEX TIME ──
- criterion_id: AC-M6-006
  name: "who_writes capability tier recorded per area/stack in the readiness record at index time"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.7-06]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A fixture repo with a mix of areas/stacks (a Django area -> exact-supported,
      a symbol-exact-only stack, and a search-only stack). No query is issued.
