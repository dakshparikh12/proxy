- criterion_id: AC-S7-042
  name: "V0: verify-loop invokes exactly one critic query() per verification run (no fan-out)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-23, R-doc05-S7-24]
  criticality: P1
  blocking: true
  behavior:
    given: "The verify-loop with instrumented query() calls."
    when: "A single verification run is triggered."
    then:
      - "Exactly one query() call is made to the critic model."
      - "No asyncio.gather, concurrent.futures, or threading is used to fan out multiple critic calls."
  primary_oracle:
    type: deterministic
    artifact: >
      Integration test: instrument query() with a call counter; run verify-loop once;
      assert critic_query_call_count == 1.
      Static scan: assert no asyncio.gather / concurrent.futures.as_completed in
      verify-loop module.
  thresholds:
    critic_query_calls_per_single_run: 1
    fan_out_primitives_in_verify_loop: 0
  dependency_class: vendor:claude-sdk
  mock_boundary: "SDK query() instrumented with counter; no real HTTP calls."
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: reality}
  test_ids: [T-S7-042]

- criterion_id: AC-S7-042-NEG
  name: "NEG: Call-count assertion correctly fires when query() is called twice (counter guard is real)"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc05-S7-24]
  criticality: P1
  blocking: true
  behavior:
    given: "A patched verify-loop that calls query() twice for one verification run."
    when: "The integration test counter check runs."
    then:
      - "The call-count assertion fires and reports failure with critic_query_call_count == 2."
      - "This confirms the counter guard is non-vacuous."
  primary_oracle:
    type: deterministic
    artifact: >
      Control: patch verify-loop to call query() twice; assert counter == 2;
      assert the assertion 'critic_query_call_count == 1' fails.
  thresholds:
    double_call_detected: 1
  dependency_class: vendor:claude-sdk
  mock_boundary: "SDK query() instrumented; patched verify-loop."
  golden_path: false
  verification_ladder:
    - {tier: reality}
    - {tier: negative}
  test_ids: [T-S7-042-NEG]

