# ══════════════════════════════════════════════════════════════════
# Architecture invariants
# ══════════════════════════════════════════════════════════════════

- criterion_id: AC-INV-001
  name: "Cited-or-abstain: every grounded claim has a file:line citation from current clone"
  evidence_class: "[unit-example]"
  authority_refs: [R-INVARIANT-01]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo. A tool call that returns grounded claims (get_dependents, find_references, etc.).
    when: >
      The tool result is inspected.
    then:
      - Every grounded claim includes a citation with file (repo-relative path) and line number.
      - The cited file exists in the clone at the pinned SHA.
      - The line number is within bounds.
  applicability:
    fixtures: [fixture-small-repo]
    estates: [estate-flask, estate-proxy]
    excluded_estates: []
    rationale: "Cited-or-abstain is a P0 architecture invariant."
  primary_oracle:
    type: citation_file_line_validation
    artifact: "all(exists(clone/path) and 0 < line <= file_line_count for claim in result)"
  thresholds:
    invalid_citations_allowed: 0
  test_ids: [T-INV-001, T-INV-002]
  fault_model_refs: [F-CITED-OR-ABSTAIN-FABRICATE]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-INV-001
    - real-estate:T-INV-002

- criterion_id: AC-INV-002
  name: "Cited-or-abstain: absent grounded claim is labeled not-found, not omitted silently"
  evidence_class: "[unit-example]"
  authority_refs: [R-INVARIANT-01]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture where a symbol has no known callers (empty set is the correct answer).
    when: >
      get_dependents(symbol) is called.
    then:
      - The result explicitly represents the empty set (e.g., results=[]).
      - A 'not-found' or empty-result label is present, not an error or null.
  applicability:
    fixtures: [fixture-isolated-symbol]
    estates: []
    excluded_estates: []
    rationale: "Honest empty result is required by cited-or-abstain."
  primary_oracle:
    type: empty_result_representation_check
    artifact: "result.results == [] (not null; not omitted; not error)"
  test_ids: [T-INV-003]
  fault_model_refs: [F-CITED-OR-ABSTAIN-SILENT]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-INV-003

- criterion_id: AC-INV-003
  name: "Lossless-or-honest: incomplete result is labeled lower-bound or not-found-by-this-method"
  evidence_class: "[unit-example]"
  authority_refs: [R-INVARIANT-02]
