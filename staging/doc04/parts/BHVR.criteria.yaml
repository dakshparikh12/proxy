# ── Tool Mount Enforcement — Curated Subset (§10.5) ─────────────────────────

- criterion_id: AC-BHVR-006
  name: "BehaviorRunner sets allowed_tools = b.config.tools exactly — no additions"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-BHVR-07, R-doc04-BHVR-08]
  criticality: P0
  blocking: true
  behavior:
    given: "A Behavior constant with a known config.tools list of length K is registered"
    when: "BehaviorRunner.run() constructs the ProviderQuery"
    then:
      - "ProviderQuery.allowed_tools equals b.config.tools exactly (same elements, same count K)"
      - "No tool name is appended to allowed_tools inside BehaviorRunner beyond those declared in config.tools"
      - "No tool name is removed from allowed_tools inside BehaviorRunner"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: capture ProviderQuery passed to mocked provider.stream — assert allowed_tools == behavior.config.tools"
  thresholds:
    violations_allowed: 0
  fault_model_refs: []
  test_ids: [T-BHVR-006]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-BHVR-006-NEG
