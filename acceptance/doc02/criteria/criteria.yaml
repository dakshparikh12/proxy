- criterion_id: AC-EVENTS-01
  name: Participant events stream live to the Orchestrator
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-01
  criticality: P1
  blocking: true
  behavior:
    given: A live meeting with the transport connected to the Orchestrator
    when: A sequence of participant join/leave events arrives from Recall during the meeting
    then:
    - Each participant event yields a roster signal delivered to the Orchestrator within the live stream (not batched at end)
    - No roster signal is withheld until meeting-end; live_stream_count == source_event_count
  primary_oracle:
    type: simulation_trace
    artifact: trace of Orchestrator inbound roster signals vs injected source events, ordered by arrival
  thresholds:
    roster_events_dropped_allowed: 0
    roster_events_batched_to_end_allowed: 0
  fault_model_refs:
  - F-ROSTER-NOT-LIVE
  test_ids:
  - T-EVENTS-01
- criterion_id: AC-EVENTS-02
  name: Join emits roster(join, name)
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-02
  - R-doc02-EVENTS-04
  criticality: P1
  blocking: true
  behavior:
    given: A live meeting
    when: Participant 'Sam' joins (Recall participant-join webhook)
    then:
    - Exactly one roster signal tagged join is emitted for Sam
    - The signal carries name == 'Sam'; a join signal with an empty/missing name is not emitted as complete
  primary_oracle:
    type: state_machine_assertion
    artifact: 'assert emitted signal == {kind: roster, event: join, name: ''Sam''}'
  thresholds:
    join_events_missing_name_allowed: 0
    join_events_emitted_per_join: 1
  fault_model_refs:
  - F-JOIN-EVENT-MISSING-NAME
  test_ids:
  - T-EVENTS-02
- criterion_id: AC-EVENTS-03
  name: Leave emits roster(leave, name)
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-03
  - R-doc02-EVENTS-04
  criticality: P1
  blocking: true
  behavior:
    given: A live meeting where 'Sam' is present
    when: Participant 'Sam' leaves (Recall participant-leave webhook)
    then:
    - Exactly one roster signal tagged leave is emitted carrying Sam's identity/name
    - 'No join signal is emitted for this leave (per-branch: leave != join)'
  primary_oracle:
    type: state_machine_assertion
    artifact: 'assert emitted signal == {kind: roster, event: leave, name: ''Sam''}'
  thresholds:
    leave_events_emitted_per_leave: 1
    leave_misclassified_as_join_allowed: 0
  fault_model_refs:
  - F-LEAVE-EVENT-MISCLASSIFIED
  test_ids:
  - T-EVENTS-03
- criterion_id: AC-EVENTS-04
  name: Roster event derived from real Recall participant payload
  evidence_class: '[simulation]'
  authority_refs:
  - R-doc02-EVENTS-14
  criticality: P1
  blocking: true
  behavior:
    given: A recorded real Recall participant-events webhook fixture
    when: The transport ingests the fixture and emits roster signals
    then:
    - Each emitted roster signal's name and join/leave tag are traceable to a field in the source webhook payload
    - No roster signal is emitted for a participant not present in the source payload (no synthetic roster)
  primary_oracle:
    type: simulation_trace
    artifact: 'field-level provenance map: emitted signal -> source webhook JSON path'
  thresholds:
    synthetic_roster_events_allowed: 0
  fault_model_refs:
  - F-ROSTER-SYNTHETIC
  test_ids:
  - T-EVENTS-04
