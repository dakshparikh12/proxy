      - "Doc 02 speech path is never called (speak mock call count == 0)"
      - "The question remains open in Postgres"
  primary_oracle: {type: state_machine_assertion, artifact: "assert speak_mock.call_count == 0; assert question.status == 'open' in db after patch"}
