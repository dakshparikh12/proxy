# ── Cross-meeting token forgery blocked ───────────────────────────────────────

- criterion_id: AC-SURF-012
  name: "Capability token for meeting A is rejected on GET /m/{meeting_id_B}"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-22]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A valid, non-expired capability token whose signed body contains meeting_id=A;
      the request URL path is /m/{meeting_id_B} where B != A.
    when: "The request is validated"
    then:
      - "The token validation rejects the token because signed meeting_id A != path meeting_id B"
      - "The response is Not found or 403 — NOT a 200 with meeting B's notes"
      - "No content from meeting B is disclosed"
  primary_oracle:
    type: deterministic
    artifact: "assert response is not 200; assert no meeting B notes in response body; assert token cross-meeting check fires before any data fetch"
  thresholds:
    violations_allowed: 0
  dependency_class: db:postgres
  mock_boundary: "real Postgres; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}
  fault_model_refs: []
  test_ids: [T-SURF-012]

# ── Revoked capability token rejected ─────────────────────────────────────────

- criterion_id: AC-SURF-013
  name: "Revoked capability token is rejected even when HMAC and expiry are valid"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-SURF-23]
  criticality: P0
  blocking: true
  behavior:
