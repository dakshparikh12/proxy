# Doc 09 — §2 Cross-doc contract checks: acceptance criteria
# Proves the seams from CANONICAL-DECISIONS actually close.

- criterion_id: AC-S2-001
  name: "assert_registry_closed() passes in CI on a correct codebase"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc09-S2-01]
  criticality: P1
  blocking: true
  behavior:
    given: "The codebase has every produced MessageType registered in CHANNEL_REGISTRY"
    when: "assert_registry_closed() is called in the CI build"
    then:
      - "The assertion completes without raising, and the CI step is green"
  primary_oracle: {type: deterministic_assertion, artifact: "assert_registry_closed() raises no exception; CI exits 0"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: [F-S2-001]
  test_ids: [T-S2-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-S2-001

