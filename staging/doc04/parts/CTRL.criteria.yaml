# CTRL.criteria.yaml — Doc 04 (Proxy Orchestrator) — §3.10 Restart-Not-Resume + §3.11 AbortController Discipline
# Acceptance criteria paired to CTRL.requirements.yaml.
# ID scheme: AC-CTRL-NNN (positive), AC-CTRL-NNN-NEG (negative/off-state)
# Test IDs: T-CTRL-NNN
#
# dependency_class legend:
#   null           — pure in-process logic / static analysis; ladder: [lint, unit]
#   db:postgres    — completion predicate or transcript plane read; ladder: [lint, unit, integration]
#   vendor:recall  — Recall re-join after instance death; ladder: [lint, unit, reality]
# Every non-null dependency_class MUST have a paired NEG criterion: ladder [lint, unit, negative]
#
# INVARIANTS:
#   abort-is-final: P0 — a killed task MUST NOT be re-run or resurrected
#   "Proxy, quiet": P0 — human barge-in stops the addressed task unconditionally

# ─────────────────────────────────────────────────────────────────────────────
# FAULT MODELS
# ─────────────────────────────────────────────────────────────────────────────
fault_models:

  - id: F-CTRL-RTP-RESUME
    summary: "The replacement instance attempts to resume the RTP media stream instead of performing a clean re-join via Recall, causing a protocol error or silent data loss."

  - id: F-CTRL-SILENT-RECOVERY
    summary: "The replacement instance recovers without speaking any disclosure line, leaving participants unaware that audio was missed during the outage."

  - id: F-CTRL-MULTI-DISCLOSURE
    summary: "The replacement instance speaks more than one disclosure line (e.g., one per missed segment), creating noise in the meeting."

  - id: F-CTRL-NO-TRANSCRIPT-REPLAY
    summary: "The replacement instance does not read the Postgres transcript plane, rebuilding context from scratch or missing the judgment history."

  - id: F-CTRL-WORKROOM-TABLE-EXISTS
    summary: "A workroom_tasks table exists in the schema alongside operation_runs, violating the §12.10 canonical decision that workroom tasks are operation_runs rows."

  - id: F-CTRL-COMPLETION-PREDICATE-SKIP
    summary: "An interrupted workroom task is re-run even though its deliverable already exists, causing duplicate work or state corruption."

  - id: F-CTRL-NO-INTERRUPTED-STATUS
    summary: "A crashed workroom task is left in status='running' rather than 'interrupted', causing the drain loop to skip it silently."

  - id: F-CTRL-ABORT-REDEFINE
    summary: "Doc 04 or Doc 05 defines its own AbortController or AbortRegistry class locally, violating the DRY §11.9 canonical."

  - id: F-CTRL-ABORT-RESULT-IGNORE
    summary: "Abort is implemented by discarding the SDK result after completion rather than halting the model loop mid-run, burning maxTurns budget."

  - id: F-CTRL-ABORT-RETRY
    summary: "An aborted task is re-queued or resurrected by the stale-session retry path, violating the abort-is-final invariant."

  - id: F-CTRL-MAKE-NO-PREEMPT
    summary: "AbortRegistry.make() creates a new controller without cancelling the existing one, leaving a stale controller active alongside the new one."

  - id: F-CTRL-MEETING-END-PARTIAL
    summary: "cancel_meeting() only cancels some tasks for the meeting rather than all tasks whose key starts with meeting_id."

  - id: F-CTRL-ABORTED-METHOD
    summary: "AbortController.aborted is implemented as a method (requires call syntax) rather than a property, breaking callers that check .aborted as a bool."

  - id: F-CTRL-TIMEOUT-HARDCODED
    summary: "The per-task timeout is hard-coded as a constant rather than a configuration value, and does not match the ~3-4s / ~4-5s spec thresholds."

  - id: F-CTRL-QUIET-IGNORED
    summary: "The 'Proxy, quiet' / barge-in signal is received but the AbortController is not triggered, leaving the model loop running past human cancellation."

# ─────────────────────────────────────────────────────────────────────────────
# §3.10 — Restart-Not-Resume
# ─────────────────────────────────────────────────────────────────────────────

# ── AC-CTRL-001: No RTP resume attempt on crash ───────────────────────────────

- criterion_id: AC-CTRL-001
  name: "Replacement instance performs Recall re-join, never RTP stream resume"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-01, R-doc04-CTRL-02]
  criticality: P1
  blocking: true
  behavior:
    given: >
      The orchestrator instance has died; a replacement instance has re-claimed the meeting
      via §3.6 heartbeat expiry; the Recall vendor client is available (cassette-backed)
    when: "The replacement instance executes its recovery sequence"
    then:
      - "The replacement instance calls Recall re-join (vendor) to enter the meeting"
      - "No attempt is made to resume the RTP stream or re-connect to the previous media session"
      - "The recovery path contains no RTP resume call site"
  primary_oracle:
    type: deterministic
    artifact: >
      Static scan of recovery code path: assert zero RTP resume call sites; integration trace
      showing Recall re-join call present and RTP resume absent
  thresholds:
    rtp_resume_call_sites: 0
    violations_allowed: 0
  fault_model_refs: [F-CTRL-RTP-RESUME]
  test_ids: [T-CTRL-001]
  dependency_class: vendor:recall
  mock_boundary: "Recall re-join via cassette at call_external seam; MUST NOT replace Recall client with Mock()"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: reality}

- criterion_id: AC-CTRL-001-NEG
  name: "NEG: RTP resume call site in recovery path is caught by static scan"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-CTRL-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A recovery module that contains an RTP stream resume call (simulated injection)"
    when: "The static scan runs over the recovery code path"
    then:
      - "The scan reports a violation with the offending file and line number"
      - "The build gate fails"
  primary_oracle:
    type: deterministic
    artifact: "Injected RTP resume stub; assert static scan exit_code != 0 and violation reported"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-RTP-RESUME]
  test_ids: [T-CTRL-001-NEG]
  dependency_class: vendor:recall
  mock_boundary: "Recall client is cassette-backed; RTP stub is synthetic injection"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-CTRL-002: Replacement instance replays transcript from Postgres ────────

- criterion_id: AC-CTRL-002
  name: "Replacement instance reads Postgres transcript plane to rebuild context before speaking"
  evidence_class: "[integration]"
  authority_refs: [R-doc04-CTRL-02, R-doc04-CTRL-04]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A meeting with persisted progress and populated transcript_segments rows in Postgres;
      a replacement orchestrator instance has re-claimed the meeting
    when: "The replacement instance executes the §3.5 Tier-2 replay sequence"
    then:
      - "At least one SELECT is issued against the transcript_segments table (or equivalent Postgres transcript plane) for that meeting"
      - "The judgment history rows are read and used to rebuild the SDK context"
      - "The rebuild completes before any disclosure line is spoken"
  primary_oracle:
    type: deterministic
    artifact: >
      Query log shows SELECT against transcript_segments with correct meeting_id;
      SDK context build event precedes any speech event in the trace
  thresholds:
    transcript_reads_min: 1
    violations_allowed: 0
  fault_model_refs: [F-CTRL-NO-TRANSCRIPT-REPLAY]
  test_ids: [T-CTRL-002]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres with populated transcript_segments fixture; MUST NOT mock asyncpg"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: integration}

- criterion_id: AC-CTRL-002-NEG
  name: "NEG: Missing Postgres transcript read leaves SDK context missing judgment history"
  evidence_class: "[adversarial]"
  authority_refs: [R-doc04-CTRL-04]
  criticality: P1
  blocking: true
  behavior:
    given: "The transcript replay step is monkey-patched to skip the Postgres read"
    when: "The replacement instance runs its recovery sequence"
    then:
      - "The SDK context built is demonstrably missing the prior judgment history"
      - "A test assertion detects the absent history and fails"
  primary_oracle:
    type: deterministic
    artifact: "SDK context inspection after patched no-read recovery; assert judgment history rows == 0"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-NO-TRANSCRIPT-REPLAY]
  test_ids: [T-CTRL-002-NEG]
  dependency_class: db:postgres
  mock_boundary: "Real Postgres with populated fixture; transcript read step patched to no-op"
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}

# ── AC-CTRL-003: Exactly one honest disclosure line spoken on gap ──────────────

- criterion_id: AC-CTRL-003
  name: "Replacement instance speaks exactly one disclosure line when audio was missed — not zero, not many"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-03]
  criticality: P1
  blocking: true
  behavior:
    given: >
      A replacement orchestrator instance that has completed Tier-2 replay and detected that
      audio content was missed during the outage (gap_detected=True)
    when: "The recovery sequence completes"
    then:
      - "Exactly one speech event is emitted with the disclosure text"
      - "The disclosure text honestly acknowledges the gap (contains wording equivalent to 'dropped' or 'catching back up' or similar honest gap acknowledgment)"
      - "The disclosure does not contain internal component names (Orchestrator, Scribe, workroom)"
      - "No second disclosure is emitted (count == 1)"
  primary_oracle:
    type: deterministic
    artifact: >
      Speech event log from recovery sequence; assert count(speech_events) == 1;
      assert disclosure_text matches honest-gap pattern; assert no internal names present
  thresholds:
    disclosure_lines: 1
    violations_allowed: 0
  fault_model_refs: [F-CTRL-SILENT-RECOVERY, F-CTRL-MULTI-DISCLOSURE]
  test_ids: [T-CTRL-003]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-CTRL-003-A
  name: "No disclosure line spoken when no audio was missed (gap_detected=False)"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc04-CTRL-03]
  criticality: P1
  blocking: true
  behavior:
    given: "A replacement instance that has completed Tier-2 replay and detected no gap (gap_detected=False)"
    when: "The recovery sequence completes"
    then:
      - "Zero disclosure speech events are emitted"
      - "The meeting continues without any gap-announcement"
  primary_oracle:
    type: deterministic
    artifact: "Speech event log; assert count(disclosure_speech_events) == 0 when gap_detected=False"
  thresholds:
    violations_allowed: 0
  fault_model_refs: [F-CTRL-MULTI-DISCLOSURE]
  test_ids: [T-CTRL-003-A]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

