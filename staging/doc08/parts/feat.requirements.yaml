# Requirements — Doc 08 (Experience, UI & Surfaces) — §2.4 Small features (items 1–14)
# ID prefix: R-doc08-FEAT-NN
# Authority: DOC-08 §2.4
# Status: qualified
#
# Criticality key:
#   P0 — invariant (no hallucination path, no self-activate, no wrong tenant)
#   P1 — core feature obligation
#   P2 — soft polish / measurement (non-blocking)
#
# CANONICAL overrides applied:
#   §12.12 — decision/action chat line is deterministic harness formatter, never model wake
#   §4     — draft_id from staged_drafts persisted row; in-memory review_session dies at teardown
