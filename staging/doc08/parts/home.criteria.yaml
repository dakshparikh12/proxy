# ══════════════════════════════════════════════════════════════════════════════
# GOLDEN PATH — Full draft-approval E2E (golden_path: true)
# ══════════════════════════════════════════════════════════════════════════════

- criterion_id: AC-HOME-013
  name: "End-to-end: tenant member opens /m/{meeting_id}, sees notes + draft, clicks accept, draft status becomes accepted"
  evidence_class: "[integration]"
  authority_refs: [R-doc08-HOME-01, R-doc08-HOME-02, R-doc08-HOME-10]
