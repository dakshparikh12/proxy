# ══════════════════════════════════════════════════════════════════════
# §2.3 bullet 7 — Correcting the record, not the person
# ══════════════════════════════════════════════════════════════════════

- criterion_id: AC-VCHAT-018
  name: "participant correction leads with receipt (evidence), not verdict, and ends with out-question"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-17]
  criticality: P1
  blocking: true
  behavior:
    given: "A participant has stated a claim that Proxy's grounded evidence contradicts"
    when: "Proxy issues a correction response"
    then:
      - "The first substantive element of the response is the evidence receipt (e.g., 'The trace shows 3.4%')"
      - "No verdict phrase ('that's wrong', 'you are incorrect', 'that is false') appears anywhere in the response"
      - "The response ends with an explicit out-question (e.g., 'am I missing something?', 'does that match what you see?')"
  primary_oracle:
    type: deterministic
    artifact: "assert correction_response starts with evidence_token; assert no verdict_phrase in VERDICT_PHRASES list; assert response ends with out_question_pattern r'\\?\\s*$'; test corpus: correction scenarios"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-018]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

- criterion_id: AC-VCHAT-019
  name: "correction frames as provenance comparison, never as scoring or grading the participant"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-VCHAT-18]
  criticality: P1
  blocking: true
  behavior:
    given: "Proxy has issued a participant correction"
    when: "The full correction text is inspected"
    then:
      - "No phrase scores, grades, or characterizes the participant's statement as an error attributable to them personally"
      - "The framing is 'what the record shows' versus 'what was said', not 'you were wrong'"
      - "Tone-checker finds zero occurrences of forbidden scoring patterns"
  primary_oracle:
    type: deterministic
    artifact: "assert none of SCORING_PATTERNS found in correction_text; SCORING_PATTERNS = ['that's wrong','you are incorrect','you were wrong','that is false','mistake','error on your part']; parameterized over correction corpus"
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-VCHAT-019]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}

