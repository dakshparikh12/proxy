  behavior:
    given: >
      A live meeting whose primary orchestrator instance has died (heartbeat went stale);
      a populated Postgres transcript plane (Doc 03) with persisted progress;
      Recall vendor available (cassette); a replacement instance ready to reclaim
    when: "The replacement instance completes the full §3.10 recovery sequence"
    then:
      - "The replacement instance re-claims the meeting via §3.6 (heartbeat expiry check)"
      - "Recall re-join is called and succeeds (cassette-backed)"
      - "The Postgres transcript plane is read to rebuild SDK context via §3.5 Tier-2 replay"
      - "Exactly one honest disclosure line is spoken (gap acknowledged)"
      - "No RTP stream resume is attempted"
      - "No workroom tasks are re-run if their deliverables already exist"
      - "The meeting continues with full judgment history intact"
  primary_oracle:
    type: integration_trace
    artifact: >
      End-to-end trace showing: (1) heartbeat-expired event, (2) reclaim event,
      (3) Recall re-join call, (4) Postgres transcript read, (5) SDK context rebuild,
      (6) exactly one disclosure speech event, (7) meeting continuation event — all ordered
