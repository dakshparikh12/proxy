- requirement_id: R-doc02-SPEAK-21
  authority_type: specification
  authority_document: DOC-02
  source_location: §3.3 (speak-gate + Ack-audible reflex) / §3.5 tile ACK / §3.6 / CANONICAL §12.8
  source_quote: 'speaking only begins on a boundary signal (3.6) ... A direct answer can fire a <=500ms canned "on it" spoken line the instant it is picked up ... the audible counterpart to the tile "checking..." ACK (3.5) ... a behavior may use either or both.'
  normalized_statement: 'IF the audible "on it" ack is emitted as VOICE THE SYSTEM SHALL subject it to the same boundary gate as all voice output (3.6 / R-doc02-TURN-06/07) — it is NOT exempt: no ack audio before boundary(now). The <=500ms bound is honored because a direct-answer PICKUP is boundary-coincident by construction (the triggering ask reaches AAI end_of_turn at/just-before pickup, and that boundary is what the ack fires into). WHILE no boundary is present within the 500ms budget (continuing/overlapping speech) THE SYSTEM SHALL NOT force an ungated audible ack; the <=500ms reflex degrades to the tile ACK (3.5, a drawn state, boundary-independent). RECONCILIATION (spec §3.3 asserted both the "instant it is picked up" ack and the boundary-only gate without stating precedence; CANONICAL §12.8 pins the <=500ms clock on the post-ask direct-answer path but does not carve the audible ack out of the gate): resolved to gate-wins (P0 no-voice-without-boundary, Law 3 human-control-absolute), with the visual tile ACK as the boundary-independent <=500ms surface.

    '
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified
