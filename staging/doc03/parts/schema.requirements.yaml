# Doc 03 (Note Extraction) — SCHEMA section requirements
# Section: §3.2.1 Note extraction — schema-enforced structured output
# (tool-forced, then Pydantic-revalidated)
#
# Scope: schema field constraints (field types, max lengths, defaults, enum
#        values), tool-forcing protocol, parse_scribe_result receipt path,
#        ScribeMaxTokensError and ScribeNoDeltaError typed errors, and the
#        invariant that emit_notes_delta is output shape only (no capability).
#
# Dependency classes used:
#   null          — purely local: Pydantic model, field definitions, defaults
#   vendor:anthropic — behavior rests on the Claude API (stop_reason, tool_use)
#
# Five standing laws (CLAUDE.md / AGENTS.md) binding this section:
#   Law 1: Grounded or silent — schema field cited to spec line
#   Law 2: Never overstate — no Claim enters as verified=True by default
#   Law 3: Human control — all decisions are staged drafts, not autonomous
#   Law 4: Dynamic, never hard-coded — field constraints live in Pydantic
#   Law 5: Talk-and-glance — every schema value legible at a glance
#
# ID space: R-doc03-SCHEMA-NN (01-based)

# ── Enumeration constraints ──────────────────────────────────────────────────

- requirement_id: R-doc03-SCHEMA-01
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.2.1 schema — Firmness"
  source_quote: "Firmness: firm | hedged | speculative"
  normalized_statement: >
    THE SYSTEM SHALL define Firmness as an enumeration whose only permitted
    values are {firm, hedged, speculative}; any other value SHALL be rejected
    at validation time.
  requirement_type: data_integrity
  criticality: P0
  testability: executable
  status: qualified
  dependency_class: null

