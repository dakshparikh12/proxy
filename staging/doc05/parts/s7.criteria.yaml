- criterion_id: AC-S7-035
  name: "Proof state rides the separate 'verification' field — not the 'status' field"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-21]
  criticality: P0
  blocking: true
  behavior:
    given: "The envelope data model (Envelope TypedDict/dataclass/Pydantic model)."
    when: "The schema is inspected."
    then:
      - "The envelope has a 'verification' field (separate from 'status') that can hold 'verified' or 'unverified'."
      - "The 'status' field is used exclusively for workflow state (done/partial/failed/needs_clarification/needs_review)."
      - "No code path writes verification state into the status field."
  primary_oracle:
    type: static_analysis
    artifact: >
      Static check: assert Envelope has both 'status' and 'verification' fields as
      distinct top-level attributes; assert 'verified'/'unverified' values appear only
      in the 'verification' field assignment; grep for status='verified' returns 0 matches.
  thresholds:
    verification_value_written_to_status_field: 0
    status_field_present: 1
    verification_field_present: 1
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-035]

- criterion_id: AC-S7-036
  name: "Delivery is blocked when any criterion has failed — cannot mark delivered while failures remain"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-22]
  criticality: P0
  blocking: true
  behavior:
    given: "A verify-loop result containing at least one criterion with status='failed'."
    when: "The hard gate attempts to mark the artifact as delivered."
    then:
      - "The delivery is blocked — the hard gate raises DeliveryBlockedError (or equivalent) or returns a non-deliverable status."
      - "The artifact envelope is NOT stamped as delivered or verification='verified'."
      - "The blocking is unconditional regardless of how many criteria passed — a single failure suffices."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: pass result with one criteria.status='failed' to the delivery-gate
      function; assert DeliveryBlockedError (or equivalent) raised or return value
      indicates non-deliverable; assert envelope.verification != 'verified'.
  thresholds:
    deliveries_with_any_failed_criterion: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
    - {tier: negative}
  test_ids: [T-S7-036]

- criterion_id: AC-S7-037
  name: "Hard gate is the single code path that sets verification='verified' — no bypass route"
  evidence_class: "[static]"
  authority_refs: [R-doc05-S7-20, R-doc05-S7-22]
  criticality: P0
  blocking: true
  behavior:
    given: "The full verify-loop and workroom source tree."
    when: "All assignments to the 'verification' field are enumerated statically."
    then:
      - "The string 'verified' is assigned to an envelope's verification field only inside the hard gate function."
      - "No other function, method, or code path sets verification='verified'."
      - "The hard gate function is not callable by the builder worker directly."
  primary_oracle:
    type: static_analysis
    artifact: >
      grep -rn "verification.*=.*['\"]verified['\"]" <source_tree>;
      assert all matches are inside the hard gate module;
      assert zero matches outside the hard gate module.
  thresholds:
    verified_assignments_outside_hard_gate: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-037]

- criterion_id: AC-S7-038
  name: "Hard gate with mixed results (some passed, some failed) sets status='needs_review' not 'partial'"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S7-20]
  criticality: P1
  blocking: true
  behavior:
    given: "A verify-loop result with some criteria passed and some failed."
    when: "The hard gate evaluates the mixed result."
    then:
      - "The envelope status is set to 'needs_review' (not 'partial' or 'failed')."
      - "verification is set to 'unverified' (not 'verified')."
      - "The 'partial' status is not used by the hard gate — it belongs to a different workflow state."
  primary_oracle:
    type: deterministic
    artifact: >
      Unit test: supply mix of passed/failed criteria; assert envelope.status == 'needs_review'
      and envelope.verification == 'unverified'; assert envelope.status != 'partial'.
  thresholds:
    partial_status_used_by_hard_gate_on_mixed_results: 0
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
    - {tier: lint}
    - {tier: unit}
  test_ids: [T-S7-038]

