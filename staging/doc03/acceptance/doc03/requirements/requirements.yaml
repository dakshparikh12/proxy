    THE SYSTEM SHALL NOT generate, infer, or hallucinate content to fill that gap;
    every entry in the notes object SHALL be traceable to actual observed transcript
    content or a truthful absence marker; fabricated bindings, invented decisions,
    or synthesized facts are prohibited.
  requirement_type: safety
  criticality: P0
