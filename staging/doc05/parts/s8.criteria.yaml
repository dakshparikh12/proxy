- criterion_id: AC-S8-015
  name: "propose_change accepts multi-file bundle in a single call (2+ files staged atomically)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-10, R-doc05-S8-11]
  criticality: P0
  blocking: true
  behavior:
    given: "A propose_change call with files=[{path:'a/foo.py', new_content:'...'}, {path:'b/bar.py', new_content:'...'}]"
    when: "The call completes"
    then:
      - "A single GCS bundle is written containing both files (not two separate bundles)"
      - "A single staged_drafts row is inserted (not two rows)"
      - "The returned files list contains both paths"
  primary_oracle:
    type: deterministic
    artifact: "Unit test: spy on GCS write and DB insert; assert gcs_write_count == 1; assert staged_drafts_insert_count == 1; assert len(result.files) == 2"
  thresholds: {gcs_writes_per_call: 1, staged_drafts_inserts_per_call: 1}
  dependency_class: gcs:objects
  mock_boundary: "GCS client spy; DB fixture"
  golden_path: false
  verification_ladder:
    - {tier: unit}
    - {tier: integration}
    - {tier: negative}
  test_ids: [T-S8-015]

- criterion_id: AC-S8-015-NEG
  name: "NEG: Multiple separate calls each produce separate drafts (multi-file is per-call, not merged across calls)"
  evidence_class: "[unit-property]"
  authority_refs: [R-doc05-S8-10]
  criticality: P1
  blocking: false
  behavior:
    given: "Two separate propose_change calls made sequentially, each with one file"
    when: "Both calls complete"
