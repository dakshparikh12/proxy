# M3 — Exclusions
# ══════════════════════════════════════════════════════════════════

- criterion_id: AC-M3-001
  name: "Gitleaks runs on changed files after initial clone"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.3-01]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo containing a known secret in one file (gitleaks-detectable pattern).
      Gitleaks call is instrumented.
    when: >
      Initial clone completes.
    then:
      - Gitleaks is invoked on the changed file set.
      - The secret-bearing file is added to the exclusion set.
  applicability:
    fixtures: [fixture-planted-secrets]
    estates: []
    excluded_estates: []
    rationale: "Secret detection at clone time is P0."
  primary_oracle:
    type: instrumented_call_and_exclusion_set_membership
    artifact: "gitleaks called with changed_files; secret_file in exclusion_set"
  thresholds:
    gitleaks_calls_on_clone: 1
    secret_files_not_excluded: 0
  test_ids: [T-M3-001, T-M3-002]
  fault_model_refs: [F-GITLEAKS-NOT-RUN-ON-PULL]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-001
    - unit:T-M3-002

- criterion_id: AC-M3-002
  name: "Gitleaks runs on changed files after every delta pull"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.3-01]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo already cloned. A delta pull introduces a new file with a secret.
    when: >
      The delta pull completes.
    then:
      - Gitleaks is invoked on the new/changed files.
      - The new secret-bearing file is added to the exclusion set.
  applicability:
    fixtures: [fixture-planted-secrets, fixture-post-clone-push]
    estates: []
    excluded_estates: []
    rationale: "Secrets introduced by push must be caught at pull time."
  primary_oracle:
    type: instrumented_call_and_exclusion_set_membership
    artifact: "gitleaks called after pull; new secret_file in exclusion_set"
  thresholds:
    secret_files_not_excluded_after_pull: 0
  test_ids: [T-M3-003]
  fault_model_refs: [F-GITLEAKS-NOT-RUN-ON-PULL]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-003

- criterion_id: AC-M3-003
  name: "Excluded paths are absent from the dependency graph"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.3-02]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo with known excluded paths (gitleaks hit + .env* + node_modules/).
      Full pipeline run completes.
    when: >
      The dependency graph is queried for nodes whose paths match excluded paths.
    then:
      - Zero graph nodes exist with paths from the exclusion set.
  applicability:
    fixtures: [fixture-planted-secrets, fixture-policy-globs]
    estates: [estate-flask]
    excluded_estates: []
    rationale: "Excluded path leak into graph is P0."
  primary_oracle:
    type: exact_count_zero
    artifact: "SELECT COUNT(*) FROM nodes WHERE path IN (exclusion_set) == 0"
  thresholds:
    excluded_path_graph_nodes_allowed: 0
  test_ids: [T-M3-004]
  fault_model_refs: [F-EXCLUDED-PATH-IN-INDEX]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-004

- criterion_id: AC-M3-004
  name: "Excluded paths are absent from all tool query results"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.3-02]
  criticality: P0
  blocking: true
  behavior:
    given: >
      A fixture repo with known excluded paths. MCP tools are invoked (get_dependents,
      who_writes, list_entry_points, find_references, batch_read for excluded paths).
    when: >
      Each tool returns results.
    then:
      - No result contains a path from the exclusion set.
      - batch_read of an excluded path returns an error entry, not file content.
  applicability:
    fixtures: [fixture-planted-secrets, fixture-policy-globs]
    estates: [estate-flask]
    excluded_estates: []
    rationale: "Excluded path leak into results is P0."
  primary_oracle:
    type: result_path_membership_check
    artifact: "no result.path in exclusion_set; batch_read(excluded) returns error"
  thresholds:
    excluded_paths_in_results_allowed: 0
  test_ids: [T-M3-005, T-M3-006]
  fault_model_refs: [F-EXCLUDED-PATH-IN-RESULT]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-005
    - security-adversarial:T-M3-006

- criterion_id: AC-M3-005
  name: "Excluded paths are never copied into sandbox"
  evidence_class: "[unit-example]"
  authority_refs: [R-DOC01-3.3-02]
  criticality: P0
