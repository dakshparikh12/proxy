# ── Presence orb: visual form ─────────────────────────────────────────────────

- criterion_id: AC-IDTILE-001
  name: "Tile renders exactly one presence orb with teal-ink seed colour on near-black"
  evidence_class: "[unit-example]"
  authority_refs: [R-doc08-IDTILE-01]
  criticality: P1
  blocking: true
  behavior:
    given: "A rendered tile page"
    when: "The tile DOM/canvas is inspected at any point during a session"
    then:
      - "Exactly one orb element is present"
      - "The orb fill/stroke colour resolves to #35c2b8 (or a value within delta-E < 2 of the seed)"
      - "The background colour is near-black (luminance < 0.05 in sRGB)"
      - "No face, avatar, or mascot element is present anywhere in the tile"
  primary_oracle: {type: deterministic, artifact: "snapshot test of rendered tile DOM: assert orb count == 1, assert background luminance, assert no face/avatar/mascot selector present"}
  thresholds: {violations_allowed: 0}
  fault_model_refs: []
  test_ids: [T-IDTILE-001]
  dependency_class: null
  mock_boundary: null
  golden_path: false
  verification_ladder:
