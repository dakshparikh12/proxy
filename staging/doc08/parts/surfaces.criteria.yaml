# Acceptance Criteria — Doc 08 Behavior · §2.7 Connect page + §2.8 /m/{meeting_id} home
# Source: product/v0-spec/08-BEHAVIOR.md §2.7–§2.8
# ID scheme: AC-SURF-NNN
# Authority: DOC-08
#
# dependency_class values used in this file:
#   db:postgres  — meetings, sessions, note_deltas, staged_drafts, revoked_tokens, audit log
#   fs:git       — readiness status from code_intel (connect page status poll)
#
# mock_boundary rules (MANDATORY):
#   db:postgres  : real Postgres; MUST NOT mock asyncpg
#   fs:git       : real or test-fixture clone; MUST NOT stub the code_intel Readiness enum value
#
# NEG criteria are required for every non-null dependency_class per the format rules.
# Golden-path items are marked golden_path: true.

