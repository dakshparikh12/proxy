# ── Boundary dispositions: tools/behaviors named in Doc 00 but built in another doc ──

- disposition_id: D-BOUNDARY-DISPATCH-TEXT
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§5 the one dispatch funnel — canonical text in Doc 08 §4.3"
  source_quote: "dispatch() is specified once, in libs/http (Doc 08 §4.3 is the canonical text)."
  disposition: covered_downstream
  rationale: >
    Doc 00 asserts the DRY home + single definition (AC-CMP-010) and the untrusted-input
    validation (AC-REG-006). The full dispatch behavior (rate-limit -> validate -> isolation ->
    resolution -> handler) is authored/tested in the Doc 08 bundle.

- disposition_id: D-BIND-MULTIREPO
  authority_type: canonical_decision
  authority_document: CANONICAL-DECISIONS
  source_location: "§11.1 binding flow / §5.7"
  source_quote: "V0: if a tenant has one repo, it binds automatically; multi-repo tenants pick at invite time."
  disposition: covered_downstream
  rationale: >
    Doc 00 owns the meetings schema (AC-SUB-030) and the binding-flow requirement (R-DOC00-5-22 =
    meeting bound to (tenant_id, repo_id, pinned_sha=HEAD)). The one-repo-auto-bind vs
    multi-repo-pick-at-invite BRANCH is a connect-page invite-flow (Doc 08) + harness binding (Doc 04)
    behavior: the repo-selection UI and the "which repo?" prompt at invite live there. No distinct
    foundation footprint beyond the meetings.repo_id binding already asserted by AC-SUB-032.
