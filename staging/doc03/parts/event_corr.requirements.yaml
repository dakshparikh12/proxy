# golden_path: false for all (supporting behaviors)

# ══════════════════════════════════════════════════════════════════════════════
# §3.5 THE EVENT EMITTER
# ══════════════════════════════════════════════════════════════════════════════

# ── Events fired on material-change deltas ────────────────────────────────────

- requirement_id: R-doc03-EVENT-01
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 1"
  source_quote: "On applying a delta, the layer emits material-change events — claim-landed (checkable), decision-forming, decision-final, contradiction-detected, action-item-created, question-opened/closed — to the Orchestrator (Doc 04)."
  normalized_statement: >
    WHEN a delta is applied and the resulting entry is classified as a material change
    THE SYSTEM SHALL emit exactly one of the following events to the Orchestrator (Doc 04):
    claim-landed (checkable), decision-forming, decision-final, contradiction-detected,
    action-item-created, question-opened, or question-closed; no other event types are
    emitted by this layer for material changes.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

