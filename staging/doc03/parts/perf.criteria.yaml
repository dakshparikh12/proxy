    then:
      - "The referent field on the relevant entry is non-null and non-empty"
      - "The referent candidate is marked per the judgment rule in §3.2"
      - "The sparse-referent path does not incorrectly fire when a referent is present"
  primary_oracle:
    type: state_machine_assertion
    artifact: >
      run code-referent fixture; assert at least one entry has referent != None/empty;
      assert referent value matches the code element mentioned; assert
      entry.referent_candidate_flag == true for the marked entry
  thresholds:
