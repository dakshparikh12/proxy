      - The returned file content does not contain the sentinel secret value.
      - A redaction marker is present (e.g., '[REDACTED]') at the secret's position.
  applicability:
    fixtures: [fixture-secret-in-non-excluded-file]
    estates: []
    excluded_estates: []
    rationale: "Read-path redaction is P0."
  primary_oracle:
    type: string_absence_and_marker_presence
    artifact: "'AKIAIOSFODNN7EXAMPLE' absent from result; '[REDACTED]' present"
  thresholds:
    unredacted_secret_occurrences_allowed: 0
  test_ids: [T-M3-008]
  fault_model_refs: [F-SECRET-NOT-REDACTED]
  protocol_ref: PROTO-DETERMINISTIC-01
  required_evidence:
    - junit:T-M3-008

- criterion_id: AC-M3-007
  name: "Secret redaction applies to all read-path tools, not only batch_read"
  evidence_class: "[unit-property]"
  authority_refs: [R-DOC01-3.3-03]
