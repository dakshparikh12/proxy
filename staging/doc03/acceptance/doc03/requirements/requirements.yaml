  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc03-STORE-13
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.3, write_finalized_notes, if_generation_match semantics"
  source_quote: >
    write_finalized_notes: if_generation_match: None = unconditional; 0 = create-only;
    <gen> = require exact prior version.
  normalized_statement: >
    THE SYSTEM SHALL implement write_finalized_notes with if_generation_match semantics:
    if_generation_match=None performs an unconditional write; if_generation_match=0
    performs a create-only write (fails if the object already exists);
    if_generation_match=<gen> requires the current object generation to equal <gen>
    before the write proceeds; any other value is invalid.
  requirement_type: correctness
  criticality: P0
  testability: executable
  status: qualified

- requirement_id: R-doc03-STORE-14
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.3, write_finalized_notes, create-only close deliverable"
  source_quote: >
    0 = create-only
  normalized_statement: >
    WHEN writing the close deliverable (final finalized notes) THE SYSTEM SHALL use
    if_generation_match=0 so the object can be created exactly once; a second attempt
    to write the same close deliverable SHALL be blocked by the precondition check
