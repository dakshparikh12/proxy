# ── State: Checking (ACK) — including ≤500ms timing ─────────────────────────

- requirement_id: R-doc08-IDTILE-19
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.2 state table row: Checking (ACK)"
  source_quote: "Checking (ACK) | a fast "checking…" line, fired ≤500ms | an LSP-bound direct answer that can't hit the audio-latency gate: the tile ACKs immediately, Proxy speaks when the LSP returns"
  normalized_statement: >
    WHEN an LSP-bound direct-answer event is received that cannot meet the
    audio-latency gate
    THE SYSTEM SHALL transition to Checking (ACK) state and SHALL render a
    "checking…" line within 500 ms of receiving the event; Proxy SHALL
    withhold speech until the LSP response returns.
  requirement_type: performance
  criticality: P1
  testability: executable
  status: qualified

- requirement_id: R-doc08-IDTILE-20
  authority_type: specification
  authority_document: DOC-08
  source_location: "§2.2 state table row: Checking (ACK)"
  source_quote: "fired ≤500ms"
  normalized_statement: >
    WHEN the Checking (ACK) transition is triggered
    THE SYSTEM SHALL render the "checking…" acknowledgement line in at most
    500 ms from the triggering event; transitions at exactly 500 ms are
    compliant; transitions above 500 ms are violations.
  requirement_type: performance
  criticality: P1
  testability: executable
  status: qualified

