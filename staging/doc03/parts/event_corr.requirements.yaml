# ── Event payload: entry + focused context slice ──────────────────────────────

- requirement_id: R-doc03-EVENT-09
  authority_type: specification
  authority_document: DOC-03
  source_location: "§3.5, paragraph 1, sentence 2"
  source_quote: "Each event carries the entry + a focused context slice."
  normalized_statement: >
    WHEN any material-change event is emitted
    THE SYSTEM SHALL include in that event payload: (a) the full entry that triggered the event,
    and (b) a focused context slice scoped to that entry's relevant surrounding notes context;
    the event SHALL NOT carry full meeting-wide context or an empty context.
  requirement_type: functional
  criticality: P1
  testability: executable
  dependency_class: null
  golden_path: false
  status: qualified

