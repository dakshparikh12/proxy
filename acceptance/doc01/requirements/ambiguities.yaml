# Ambiguities — Doc 01 Code Intelligence
# Extracted per GENERATOR.md Phase A §4.4

- ambiguity_id: A-001
  authority_refs: [R-DOC01-3.4-06]
  severity: minor
  problem: >
    "Full graph rebuild" push-to-queryable target is "[~10s]" but only for
    "pilot-scale repo." No definition of pilot-scale or what happens when
    rebuild exceeds 10s on a larger repo.
  required_resolution: >
    Accepted as minor: config-defaults.toml pins readiness_reindex_target_s = 10.
    Larger repos may exceed this; the target is aspirational not a hard gate.
  disposition: accepted_minor_assumption

- ambiguity_id: A-002
  authority_refs: [R-DOC01-3.2-02]
  severity: minor
  problem: >
    Blobless threshold "[~100k files]" uses tilde — unclear whether this is
    exact 100,000 or approximate.
  required_resolution: >
    Accepted as minor: the tilde means approximate; pin at 100,000 as the
    default; tunable in config.
  disposition: accepted_minor_assumption

- ambiguity_id: A-003
  authority_refs: [R-DOC01-3.5-02]
  severity: material
  problem: >
    get_dependents returns "transitive reverse-dependency set" — the spec
    says "closure" in the code sample but the tool docstring says
    "transitive REVERSE-dependency set." Closure over what edge kinds?
    Reads edges have different semantics — transitive closure over reads
    would inflate blast-radius with false positives.
  required_resolution: >
    FOUNDER DECISION 2026-07-17: transitive closure runs over
    calls/imports/writes/extends/implements ONLY. Reads edges are reported
    at depth-1 (direct readers) but NEVER traversed transitively.
    Recorded in dispositions.yaml as D-FOUNDER-A003.
  disposition: resolved_founder_decision

- ambiguity_id: A-004
  authority_refs: [R-DOC01-3.5-04]
  severity: minor
  problem: >
    shares_table groups touchers by "owning module/service (by top-level
    package / service dir)" — no formal definition of what constitutes a
    "top-level package" boundary for module grouping.
  required_resolution: >
    Accepted as minor: use the first path component under src/ (or
    repo root if no src/) as the module boundary. Criterion tests the
    grouping on a repo where the boundary is unambiguous.
  disposition: accepted_minor_assumption

- ambiguity_id: A-005
  authority_refs: [R-DOC01-3.5-08]
  severity: minor
  problem: >
    lookup_referent resolves to "a graph node id, a core-overview area
    name, or None" — no ranking if multiple candidates match.
  required_resolution: >
    Accepted as minor: return the single best match (exact id match >
    alias match > area name match > None). Test with unambiguous inputs.
  disposition: accepted_minor_assumption

- ambiguity_id: A-006
  authority_refs: [R-DOC01-3.6-01]
  severity: minor
  problem: >
    Push-to-queryable target "[~10s]" is not specified as a p50 or p95.
  required_resolution: >
    Accepted as minor: treat as an aspirational target measured as wall-clock
    on pilot repos, not a gating SLO. The latency_slo section in
    config-defaults.toml covers the query-side SLOs.
  disposition: accepted_minor_assumption

# A-003 resolved by founder decision (not an assumption).
# A-001, A-002, A-004, A-005, A-006: ratified as recorded by founder 2026-07-17.
