# event_corr.requirements.yaml — Doc 03 (Notes / Scribe) — §3.5 Event Emitter + §3.6 Live Corrections
# Atomic EARS requirements. Each carries source_location + verbatim source_quote + criticality.
# ID scheme: R-doc03-EVENT-NN / R-doc03-CORR-NN
# Authority document: DOC-03 (Notes spec §3.5 / §3.6)
#
# Dependency classes (per authoring brief):
#   null     — in-process signal, no external system (event emission to Doc 04, chat line note emitted to Doc 04's formatter)
#   db:postgres — hits Postgres (correction apply, supersede write, attribution write)
